---
# Namespace with Pod Security Admission — restricted profile
# restricts: must run as non-root, no privilege escalation, read-only root fs
apiVersion: v1
kind: Namespace
metadata:
  name: apps-APP_NAME
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
