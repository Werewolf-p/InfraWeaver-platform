name: Auto update platform catalog

on:
  push:
    paths:
      - '.github/**'
      - 'platform/**'
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync-and-commit:
    runs-on: [self-hosted, prod-worker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run NetBird sync (sanitized)
        run: python3 platform/.github/scripts/sync_netbird_status.py || true
      - name: Run catalog validator
        run: python3 ./.github/scripts/validate_catalog.py || true
      - name: Commit and push changes
        run: |
          git config user.name "infraweaver-bot"
          git config user.email "infraweaver-bot@example.com"
          git add platform/.github/memories/ || true
          git add platform/.github/InfraWeaver-platform-catalog.md || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update platform catalog" && git push
          fi
