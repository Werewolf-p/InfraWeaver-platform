name: Auto update platform catalog

on:
  push:
    paths:
      - '.github/**'
      - 'platform/**'
  schedule:
    - cron: '0 */6 * * *' # every 6 hours

permissions:
  contents: write

jobs:
  sync-and-commit:
    runs-on: [self-hosted, prod-worker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run NetBird sync (sanitized)
        run: |
          python3 platform/.github/scripts/sync_netbird_status.py || true
      - name: Regenerate platform catalog (no secrets)
        run: |
          # regenerate using the included script or placeholder
          python3 - <<'PY'
import pathlib
p=pathlib.Path('platform/.github/InfraWeaver-platform-catalog.md')
if p.exists():
    print('Catalog exists; touch')
    p.write_text(p.read_text())
PY
      - name: Run catalog validator
        run: |
          python3 ./.github/scripts/validate_catalog.py || true
      - name: Commit and push changes
        run: |
          git config user.name "infraweaver-bot"
          git config user.email "infraweaver-bot@example.com"
          git add platform/.github/memories/netbird-external-vm-setup.md || true
          git add platform/.github/InfraWeaver-platform-catalog.md || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update platform catalog and sanitized memory

Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>" || true
            git push
          else
            echo "No changes to commit"
          fi
