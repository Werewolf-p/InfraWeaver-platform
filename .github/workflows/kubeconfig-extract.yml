name: Extract Kubeconfig
on:
  workflow_dispatch:
jobs:
  extract:
    runs-on:
      - self-hosted
      - prod-worker
    environment: productie
    steps:
      - name: Extract kubeconfig from state JSON
        run: |
          STATE="$HOME/.tofu/state/platform-productie/terraform.tfstate"
          mkdir -p /tmp/kubeconfig-extract
          
          # Extract kubeconfig content directly from state JSON
          # local_sensitive_file.kubeconfig stores content in instances[].attributes.content
          python3 - <<'PYEOF'
import json, os, sys

state_path = os.path.expanduser("~/.tofu/state/platform-productie/terraform.tfstate")
with open(state_path) as f:
    state = json.load(f)

kubeconfig = None
talosconfig = None

for resource in state.get("resources", []):
    rtype = resource.get("type", "")
    rname = resource.get("name", "")
    
    if rtype == "local_sensitive_file" and rname == "kubeconfig":
        kubeconfig = resource["instances"][0]["attributes"]["content"]
    elif rtype == "local_sensitive_file" and rname == "talosconfig":
        talosconfig = resource["instances"][0]["attributes"]["content"]
    
    # Also check inside module (talos-cluster writes talosconfig_generated)
    if rtype == "local_sensitive_file" and rname == "talosconfig_generated":
        if not talosconfig:
            talosconfig = resource["instances"][0]["attributes"]["content"]

if kubeconfig:
    with open("/tmp/kubeconfig-extract/kubeconfig", "w") as f:
        f.write(kubeconfig)
    print(f"kubeconfig: {len(kubeconfig)} bytes")
else:
    print("ERROR: kubeconfig not found in state")
    
if talosconfig:
    with open("/tmp/kubeconfig-extract/talosconfig", "w") as f:
        f.write(talosconfig)
    print(f"talosconfig: {len(talosconfig)} bytes")
else:
    print("ERROR: talosconfig not found in state")

PYEOF
          
          head -3 /tmp/kubeconfig-extract/kubeconfig

      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-productie
          path: /tmp/kubeconfig-extract/
          retention-days: 1
