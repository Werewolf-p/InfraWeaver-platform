name: Extract Kubeconfig
on:
  workflow_dispatch:
jobs:
  extract:
    runs-on:
      - self-hosted
      - prod-worker
    environment: productie
    steps:
      - uses: actions/checkout@v4
      - name: Extract kubeconfig from state
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
        run: |
          echo "${{ secrets.AGE_SECRET_KEY }}" > $SOPS_AGE_KEY_FILE
          chmod 600 $SOPS_AGE_KEY_FILE
          mkdir -p "$GITHUB_WORKSPACE/generated"
          cd terraform
          tofu init -backend-config="../envs/productie/backend.hcl" -reconfigure -input=false -no-color 2>&1 | tail -3
          # List available outputs to debug
          echo "=== Available outputs ==="
          tofu output -json 2>&1 | python3 -c "import sys,json; d=json.load(sys.stdin); print([k for k in d])" 2>/dev/null || tofu output 2>&1 | head -20
          # Extract sensitive outputs
          tofu output -raw kubeconfig > "$GITHUB_WORKSPACE/generated/kubeconfig" 2>&1 || true
          tofu output -raw talosconfig > "$GITHUB_WORKSPACE/generated/talosconfig" 2>&1 || true
          # Check if valid YAML
          head -2 "$GITHUB_WORKSPACE/generated/kubeconfig"
      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-productie
          path: generated/
          retention-days: 1
