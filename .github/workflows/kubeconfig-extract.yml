name: Extract Kubeconfig
on:
  workflow_dispatch:
jobs:
  extract:
    runs-on:
      - self-hosted
      - prod-worker
    environment: productie
    steps:
      - uses: actions/checkout@v4
      - name: Extract kubeconfig from state
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
        run: |
          echo "${{ secrets.AGE_SECRET_KEY }}" > $SOPS_AGE_KEY_FILE
          chmod 600 $SOPS_AGE_KEY_FILE
          STATE_DIR=~/.tofu/state/platform-productie
          echo "State dir: $STATE_DIR"
          ls -la $STATE_DIR/ 2>&1 || echo "State dir not found"
          
          mkdir -p "$GITHUB_WORKSPACE/generated"
          
          if [ -f "$STATE_DIR/terraform.tfstate" ]; then
            cd terraform
            tofu init -backend-config="../envs/productie/backend.hcl" -reconfigure -input=false -no-color 2>&1 | tail -5
            tofu output -raw kubeconfig > "$GITHUB_WORKSPACE/generated/kubeconfig" 2>&1 || true
            tofu output -raw talosconfig > "$GITHUB_WORKSPACE/generated/talosconfig" 2>&1 || true
            echo "kubeconfig $(wc -l < $GITHUB_WORKSPACE/generated/kubeconfig) lines"
            echo "talosconfig $(wc -l < $GITHUB_WORKSPACE/generated/talosconfig) lines"
          else
            echo "State file not found - platform has not been applied"
          fi
      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-productie
          path: generated/
          retention-days: 1
