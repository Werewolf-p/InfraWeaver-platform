name: Extract Kubeconfig
on:
  workflow_dispatch:
jobs:
  extract:
    runs-on: self-hosted
    environment: productie
    steps:
      - uses: actions/checkout@v4
      - name: Setup SOPS age key
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: |
          echo "$AGE_SECRET_KEY" > /tmp/age.key
          chmod 600 /tmp/age.key
          export SOPS_AGE_KEY_FILE=/tmp/age.key
          cd terraform
          tofu init -backend-config="../envs/productie/backend.hcl" -reconfigure -input=false
          tofu output -state=~/.tofu/state/productie/terraform.tfstate -raw kubeconfig > /home/runner/platform/envs/productie/generated/kubeconfig || true
          tofu output -state=~/.tofu/state/productie/terraform.tfstate -raw talosconfig > /home/runner/platform/envs/productie/generated/talosconfig || true
          chmod 600 /home/runner/platform/envs/productie/generated/kubeconfig 2>/dev/null || true
          chmod 600 /home/runner/platform/envs/productie/generated/talosconfig 2>/dev/null || true
          echo "Done"
          cat /home/runner/platform/envs/productie/generated/kubeconfig | head -5 || true
