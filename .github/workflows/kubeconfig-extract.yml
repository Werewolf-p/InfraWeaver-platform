name: Extract Kubeconfig
on:
  workflow_dispatch:
jobs:
  extract:
    runs-on: self-hosted
    environment: productie
    steps:
      - uses: actions/checkout@v4
      - name: Extract kubeconfig from state
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
        run: |
          echo "${{ secrets.AGE_SECRET_KEY }}" > $SOPS_AGE_KEY_FILE
          chmod 600 $SOPS_AGE_KEY_FILE
          mkdir -p $HOME/.tofu/state/productie
          cd terraform
          tofu init -backend-config="../envs/productie/backend.hcl" -reconfigure -input=false -no-color 2>&1 | tail -5
          mkdir -p "$GITHUB_WORKSPACE/generated"
          tofu output \
            -state="$HOME/.tofu/state/productie/terraform.tfstate" \
            -raw kubeconfig > "$GITHUB_WORKSPACE/generated/kubeconfig" 2>&1 || echo "FAILED"
          tofu output \
            -state="$HOME/.tofu/state/productie/terraform.tfstate" \
            -raw talosconfig > "$GITHUB_WORKSPACE/generated/talosconfig" 2>&1 || echo "FAILED"
          echo "kubeconfig lines: $(wc -l < $GITHUB_WORKSPACE/generated/kubeconfig)"
          echo "talosconfig lines: $(wc -l < $GITHUB_WORKSPACE/generated/talosconfig)"
      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-productie
          path: generated/
          retention-days: 1
