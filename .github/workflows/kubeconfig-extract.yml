name: Extract Kubeconfig
on:
  workflow_dispatch:
jobs:
  extract:
    runs-on:
      - self-hosted
      - prod-worker
    environment: productie
    steps:
      - uses: actions/checkout@v4
      - name: Extract kubeconfig from state
        run: |
          python3 .github/scripts/extract_kubeconfig.py
          head -3 /tmp/kubeconfig-extract/kubeconfig
      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-productie
          path: /tmp/kubeconfig-extract/
          retention-days: 1
