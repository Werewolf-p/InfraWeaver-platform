name: Dependency Audit

# Runs npm audit on both apps to detect known vulnerabilities.
# Fails on HIGH or CRITICAL severity findings.
# Runs weekly and on every pull request.

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  pull_request:
    paths:
      - "**/package.json"
      - "**/package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-console:
    name: Audit infraweaver-console
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      status: ${{ steps.audit.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/infraweaver-console/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/infraweaver-console

      - name: Run npm audit
        id: audit
        run: npm audit --audit-level=high
        working-directory: apps/infraweaver-console

  audit-api:
    name: Audit infraweaver-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      status: ${{ steps.audit.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/infraweaver-api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/infraweaver-api

      - name: Run npm audit
        id: audit
        run: npm audit --audit-level=high
        working-directory: apps/infraweaver-api

  create-issue:
    name: Create GitHub Issue on Critical Findings
    needs: [audit-console, audit-api]
    runs-on: ubuntu-latest
    # Only run on schedule (weekly) and only if any audit failed
    if: |
      always() &&
      github.event_name == 'schedule' &&
      (needs.audit-console.outputs.status == 'failure' || needs.audit-api.outputs.status == 'failure')
    permissions:
      issues: write

    steps:
      - name: Create issue for critical vulnerabilities
        uses: actions/github-script@v9
        with:
          script: |
            const consoleStatus = '${{ needs.audit-console.outputs.status }}';
            const apiStatus = '${{ needs.audit-api.outputs.status }}';
            const failedApps = [];
            if (consoleStatus === 'failure') failedApps.push('infraweaver-console');
            if (apiStatus === 'failure') failedApps.push('infraweaver-api');

            const title = `[Security] High/Critical npm vulnerabilities found in: ${failedApps.join(', ')}`;
            const body = [
              '## 🔴 Dependency Audit Failed',
              '',
              `The weekly dependency audit found HIGH or CRITICAL vulnerabilities in: **${failedApps.join(', ')}**`,
              '',
              '### Action Required',
              '1. Run `npm audit` in the affected app directory',
              '2. Run `npm audit fix` to auto-remediate where safe',
              '3. Review and manually update packages that cannot be auto-fixed',
              '4. Re-run the audit to confirm all HIGH+ vulnerabilities are resolved',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '_This issue was created automatically by the Dependency Audit workflow._',
            ].join('\n');

            // Check for existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies',
            });

            const alreadyOpen = existing.data.find(i => i.title.startsWith('[Security] High/Critical npm'));
            if (alreadyOpen) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: alreadyOpen.number,
                body: `🔄 **Weekly re-scan on ${new Date().toISOString().split('T')[0]}**: vulnerabilities still present in ${failedApps.join(', ')}.`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'dependencies'],
              });
            }
