name: Full Redeploy — InfraWeaver Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - productie
          - ontwikkel
      confirm:
        description: "Type DESTROY to confirm full redeploy"
        required: true
        type: string

concurrency:
  group: platform-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  redeploy:
    name: "Full Redeploy Platform (${{ inputs.environment }})"
    if: inputs.confirm == 'DESTROY'
    runs-on:
      - self-hosted
      - management-host
    env:
      ENV_NAME: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          if [ "$(swapon --show --noheadings | wc -l)" -eq 0 ]; then
            sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=none || true
            sudo chmod 600 /swapfile && sudo mkswap /swapfile >/dev/null 2>&1 || true
            sudo swapon /swapfile 2>/dev/null || true
          fi
          command -v tofu || (curl -fsSL https://get.opentofu.org/install-opentofu.sh | sudo sh -s -- --install-method deb)
          command -v sops || (sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.10.2/sops-v3.10.2.linux.amd64 && \
            sudo chmod +x /usr/local/bin/sops)
          command -v age || (curl -fsSL -o /tmp/age.tar.gz \
            https://github.com/FiloSottile/age/releases/download/v1.1.1/age-v1.1.1-linux-amd64.tar.gz && \
            sudo tar -xzf /tmp/age.tar.gz -C /usr/local/bin/ --strip-components=1 age/age age/age-keygen)
          command -v helm || (curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | sudo bash)
          # talosctl: download from GitHub releases first (no Docker Hub needed).
          # If binary fails to execute (AMD64 v2 CPU feature issue), build from source via Go (not Docker).
          if ! talosctl version --client >/dev/null 2>&1; then
            TALOS_VER=$(grep 'talos_version' envs/$ENV_NAME/cluster.yaml | awk '{print $2}' | tr -d '"')
            echo "Downloading talosctl ${TALOS_VER} from GitHub releases..."
            sudo curl -fsSL -o /usr/local/bin/talosctl \
              "https://github.com/siderolabs/talos/releases/download/${TALOS_VER}/talosctl-linux-amd64"
            sudo chmod +x /usr/local/bin/talosctl
            if ! talosctl version --client >/dev/null 2>&1; then
              echo "talosctl binary not functional (AMD64 v2 issue). Building with GOAMD64=v1 via Go..."
              command -v go || (
                GO_VER=1.22.3
                curl -fsSL -o /tmp/go.tar.gz "https://go.dev/dl/go${GO_VER}.linux-amd64.tar.gz"
                sudo tar -C /usr/local -xzf /tmp/go.tar.gz
                export PATH=$PATH:/usr/local/go/bin
              )
              export PATH=$PATH:/usr/local/go/bin
              git clone --depth=1 --branch ${TALOS_VER} https://github.com/siderolabs/talos.git /tmp/talos-src 2>&1 | tail -3
              cd /tmp/talos-src && GOAMD64=v1 go build -o /usr/local/bin/talosctl ./cmd/talosctl/
              sudo chmod +x /usr/local/bin/talosctl
              cd -
            fi
          fi
          talosctl version --client
          command -v kubectl || (K8S_VER=$(curl -fsSL https://dl.k8s.io/release/stable.txt) && \
            sudo curl -fsSL -o /usr/local/bin/kubectl \
              "https://dl.k8s.io/release/${K8S_VER}/bin/linux/amd64/kubectl" && \
            sudo chmod +x /usr/local/bin/kubectl)
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.tofurc
          tofu version

      - name: Cleanup NetBird peers for cluster
        env:
          NETBIRD_API_TOKEN: ${{ secrets.NETBIRD_API_TOKEN }}
        run: |
          ENV=${{ env.ENV_NAME }}
          if [ -z "${NETBIRD_API_TOKEN:-}" ]; then
            echo "⚠ NETBIRD_API_TOKEN not set — skipping NetBird peer cleanup"
          else
            echo "==> Removing stale NetBird peers for ${ENV} cluster..."
            bash .github/scripts/netbird_cleanup_peers.sh "talos-${ENV}"
          fi

      - name: Export Terraform secrets from GitHub Secrets
        env:
          # These GitHub Secrets must be configured in the repository settings
          # They contain API tokens sourced from GitHub Secrets Manager
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          RUNNER_REGISTRATION_TOKEN: ${{ secrets.RUNNER_REGISTRATION_TOKEN }}
        run: |
          # Export as TF_VAR_* for Terraform to consume
          # These take precedence over SOPS file values
          if [ -n "${PROXMOX_API_TOKEN:-}" ]; then
            echo "TF_VAR_proxmox_api_token=${PROXMOX_API_TOKEN}" >> $GITHUB_ENV
          fi
          if [ -n "${RUNNER_REGISTRATION_TOKEN:-}" ]; then
            echo "TF_VAR_github_runner_token=${RUNNER_REGISTRATION_TOKEN}" >> $GITHUB_ENV
          fi

      - name: Validate Proxmox API token permissions
        env:
          TF_VAR_proxmox_api_token: ${{ env.TF_VAR_proxmox_api_token }}
        run: |
          set +e
          
          # Platform: proxmox_host comes from cluster.yaml
          CLUSTER_YAML="envs/${{ env.ENV_NAME }}/cluster.yaml"
          HOST=$(grep 'proxmox_host' "$CLUSTER_YAML" 2>/dev/null | head -1 | sed 's/.*: *"\(.*\)"/\1/' | xargs)
          
          ENDPOINT="https://${HOST}:8006"
          TOKEN="${TF_VAR_proxmox_api_token}"
          
          if [ -z "$HOST" ]; then
            echo "⚠ Could not parse proxmox_host from cluster.yaml — skipping pre-flight check"
            exit 0
          fi
          
          echo "📋 Pre-flight: testing Proxmox API connectivity..."
          echo "  Endpoint: $ENDPOINT"
          echo ""
          
          # Test connectivity + token — warn only, Terraform will hard-fail if token is bad
          RESPONSE=$(curl -sk --max-time 10 \
            -H "Authorization: PVEAPIToken=${TOKEN}" \
            "${ENDPOINT}/api2/json/nodes" 2>&1)
          
          if echo "$RESPONSE" | grep -q '"data"'; then
            echo "✓ Proxmox API reachable and token is valid"
          elif echo "$RESPONSE" | grep -q '401\|Authentication failed'; then
            echo "✗ FATAL: Token is invalid or expired — aborting before Terraform wastes time"
            exit 1
          else
            echo "⚠ Could not reach Proxmox API pre-flight (network/timeout) — continuing anyway"
            echo "  Terraform will confirm authentication on apply"
          fi
          set -e

          set -e


      - name: Destroy existing platform
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
          SSH_KEY_FILE: ${{ runner.temp }}/deployer
        run: |
          echo "${{ secrets.AGE_SECRET_KEY }}" > $SOPS_AGE_KEY_FILE
          chmod 600 $SOPS_AGE_KEY_FILE
          echo "${{ secrets.DEPLOYER_SSH_KEY }}" > $SSH_KEY_FILE
          chmod 600 $SSH_KEY_FILE
          mkdir -p ~/.ssh && cp $SSH_KEY_FILE ~/.ssh/deployer_ed25519 && chmod 600 ~/.ssh/deployer_ed25519

          ENV=${{ env.ENV_NAME }}
          STATE_DIR=~/.tofu/state/platform-$ENV
          mkdir -p $STATE_DIR

          while IFS= read -r line; do
            if [[ "$line" =~ ^([a-zA-Z_][a-zA-Z0-9_]*):[[:space:]]*(.*) ]]; then
              KEY="${BASH_REMATCH[1]}" ; VAL="${BASH_REMATCH[2]}"
              [[ "$KEY" == "sops" ]] && break
              VAL="${VAL#\"}" ; VAL="${VAL%\"}"
              [[ -n "$VAL" ]] && export "TF_VAR_${KEY}=${VAL}"
            fi
          done < <(sops -d "envs/$ENV/secrets.sops.yaml" 2>/dev/null || echo "")

          # Force-destroy all platform VMs by ID before tofu destroy.
          # This handles the case where VMs exist on Proxmox but are not in
          # Terraform state (e.g., from a prior cancelled or partial deploy).
          PVE_IP="10.25.0.3"
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 -i ~/.ssh/deployer_ed25519"
          PLATFORM_VMIDS="9300 9301 9302 9310 9311 9312"  # 9100 = runner VM, do NOT destroy (it runs this workflow)
          echo "==> Force-stopping and destroying platform VMs: $PLATFORM_VMIDS"
          for VMID in $PLATFORM_VMIDS; do
            # Kill any ghost QEMU process for this VMID before touching the config
            GHOST_PID=$(ssh $SSH_OPTS root@$PVE_IP "ps aux | grep 'kvm -id $VMID ' | grep -v grep | awk '{print \$2}' | head -1" 2>/dev/null || true)
            if [ -n "$GHOST_PID" ]; then
              echo "  Ghost QEMU PID $GHOST_PID found for VM $VMID — killing..."
              ssh $SSH_OPTS root@$PVE_IP "kill -9 $GHOST_PID 2>/dev/null; sleep 3; kill -0 $GHOST_PID 2>/dev/null && echo 'still alive (D-state)' || echo 'process gone'" || true
              # Remove stale socket files so new QEMU can bind them
              ssh $SSH_OPTS root@$PVE_IP "rm -f /var/run/qemu-server/$VMID.qmp /var/run/qemu-server/$VMID.serial0 2>/dev/null; true" || true
            fi
            if ssh $SSH_OPTS root@$PVE_IP "qm status $VMID" 2>/dev/null | grep -q "running\|stopped\|status"; then
              echo "  Stopping VM $VMID..."
              ssh $SSH_OPTS root@$PVE_IP "qm stop $VMID --skiplock --timeout 10 2>/dev/null; sleep 2; qm destroy $VMID --purge --skiplock 2>/dev/null" || true
              echo "  VM $VMID destroyed ✓"
            else
              echo "  VM $VMID not found (no config) — removing orphan LVM volumes if any..."
              ssh $SSH_OPTS root@$PVE_IP "
                for DISK in \$(lvs Storage 2>/dev/null | grep 'vm-${VMID}-disk' | awk '{print \$1}'); do
                  echo '    Removing orphan LV: '\$DISK
                  lvremove -f Storage/\$DISK 2>/dev/null || true
                done
                # Also remove stale socket files
                rm -f /var/run/qemu-server/${VMID}.qmp /var/run/qemu-server/${VMID}.serial0 2>/dev/null || true
              " || true
            fi
          done
          echo "==> Pre-destroy VM cleanup complete"

          cd terraform
          tofu init -backend-config="path=$STATE_DIR/terraform.tfstate" -reconfigure 2>&1 || true
          VARS=""
          [ -f "../envs/$ENV/terraform.tfvars" ]     && VARS="$VARS -var-file=../envs/$ENV/terraform.tfvars"
          [ -f "../envs/$ENV/services.auto.tfvars" ] && VARS="$VARS -var-file=../envs/$ENV/services.auto.tfvars"
          # Destroy only cluster resources — exclude runner VM (it's running this workflow!)
          CLUSTER_TARGETS="-target=module.talos_cluster -target=module.cloudinit_templates"
          tofu destroy $VARS $CLUSTER_TARGETS -auto-approve 2>&1 || echo "⚠ Destroy failed or no prior state — continuing"

      - name: Clear state
        run: |
          STATE_DIR="$HOME/.tofu/state/platform-${{ env.ENV_NAME }}"
          # Remove only cluster resources from state; preserve runner VM state so tofu apply won't try to recreate it
          cd terraform
          tofu init -backend-config="path=$STATE_DIR/terraform.tfstate" -reconfigure 2>&1 | tail -3 || true
          tofu state rm module.talos_cluster 2>/dev/null || true
          tofu state rm module.cloudinit_templates 2>/dev/null || true
          echo "✓ Cluster state cleared (runner state preserved)"

      - name: Deploy Platform
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
          SSH_KEY_FILE: ${{ runner.temp }}/deployer
        run: |
          export TF_PLUGIN_CACHE_DIR="$HOME/.terraform.d/plugin-cache"
          echo "${{ secrets.AGE_SECRET_KEY }}" > $SOPS_AGE_KEY_FILE
          chmod 600 $SOPS_AGE_KEY_FILE
          echo "${{ secrets.DEPLOYER_SSH_KEY }}" > $SSH_KEY_FILE
          chmod 600 $SSH_KEY_FILE
          mkdir -p ~/.ssh && cp $SSH_KEY_FILE ~/.ssh/deployer_ed25519 && chmod 600 ~/.ssh/deployer_ed25519

          ENV=${{ env.ENV_NAME }}
          STATE_DIR=~/.tofu/state/platform-$ENV
          mkdir -p $STATE_DIR

          while IFS= read -r line; do
            if [[ "$line" =~ ^([a-zA-Z_][a-zA-Z0-9_]*):[[:space:]]*(.*) ]]; then
              KEY="${BASH_REMATCH[1]}" ; VAL="${BASH_REMATCH[2]}"
              [[ "$KEY" == "sops" ]] && break
              VAL="${VAL#\"}" ; VAL="${VAL%\"}"
              [[ -n "$VAL" ]] && export "TF_VAR_${KEY}=${VAL}"
              echo "✅ TF_VAR_${KEY} set"
            fi
          done < <(sops -d "envs/$ENV/secrets.sops.yaml" 2>/dev/null || echo "")

          cd terraform
          tofu init \
            -backend-config="path=$STATE_DIR/terraform.tfstate" \
            -reconfigure

          VARS=""
          [ -f "../envs/$ENV/terraform.tfvars" ]       && VARS="$VARS -var-file=../envs/$ENV/terraform.tfvars"
          [ -f "../envs/$ENV/services.auto.tfvars" ]   && VARS="$VARS -var-file=../envs/$ENV/services.auto.tfvars"

          # Stage 1: provision Talos cluster
          tofu apply $VARS \
            -target=module.talos_cluster \
            -target=local_sensitive_file.kubeconfig \
            -target=local_sensitive_file.talosconfig \
            -auto-approve 2>&1

          # Stage 2: deploy platform bootstrap (ArgoCD + ApplicationSet)
          tofu apply $VARS -auto-approve 2>&1

      - name: Save kubeconfig & talosconfig
        if: always()
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
        run: |
          ENV=${{ env.ENV_NAME }}
          mkdir -p ~/.kube envs/$ENV/generated
          cd terraform
          tofu output -raw kubeconfig > ~/.kube/config-platform-$ENV 2>/dev/null || true
          chmod 600 ~/.kube/config-platform-$ENV 2>/dev/null || true
          tofu output -raw talosconfig > "../envs/$ENV/generated/talosconfig" 2>/dev/null || true
          chmod 600 "../envs/$ENV/generated/talosconfig" 2>/dev/null || true
          echo "✅ Configs saved"
          KUBECONFIG=~/.kube/config-platform-$ENV kubectl get nodes 2>&1 || echo "  (cluster not yet reachable)"

      - name: Deploy ArgoCD & Bootstrap
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARGOCD_GITHUB_TOKEN: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
        run: |
          ENV=${{ env.ENV_NAME }}
          KB=~/.kube/config-platform-$ENV

          if [ ! -s "$KB" ]; then
            cd terraform
            tofu output -raw kubeconfig > "$KB" 2>/dev/null || true
            chmod 600 "$KB"
            cd ..
          fi

          kubectl --kubeconfig "$KB" create namespace argocd --dry-run=client -o yaml \
            | kubectl --kubeconfig "$KB" apply -f -

          helm repo add argo https://argoproj.github.io/argo-helm 2>/dev/null || true
          helm repo update argo

          # Patch any pre-existing ArgoCD resources for Helm ownership
          for rtype in serviceaccount role rolebinding clusterrole clusterrolebinding \
              configmap secret service networkpolicy deployment statefulset; do
            for item in $(kubectl --kubeconfig "$KB" get $rtype -n argocd \
                --no-headers -o custom-columns=":metadata.name" 2>/dev/null | grep "^argocd" || true); do
              kubectl --kubeconfig "$KB" annotate $rtype/$item -n argocd \
                "meta.helm.sh/release-name=argocd" \
                "meta.helm.sh/release-namespace=argocd" --overwrite 2>/dev/null || true
              kubectl --kubeconfig "$KB" label $rtype/$item -n argocd \
                "app.kubernetes.io/managed-by=Helm" --overwrite 2>/dev/null || true
            done
          done
          for rtype in clusterrole clusterrolebinding; do
            for item in $(kubectl --kubeconfig "$KB" get $rtype \
                --no-headers -o custom-columns=":metadata.name" 2>/dev/null | grep "^argocd" || true); do
              kubectl --kubeconfig "$KB" annotate $rtype/$item \
                "meta.helm.sh/release-name=argocd" \
                "meta.helm.sh/release-namespace=argocd" --overwrite 2>/dev/null || true
              kubectl --kubeconfig "$KB" label $rtype/$item \
                "app.kubernetes.io/managed-by=Helm" --overwrite 2>/dev/null || true
            done
          done

          helm --kubeconfig "$KB" upgrade --install argocd argo/argo-cd \
            --namespace argocd --skip-crds --timeout 5m \
            -f kubernetes/core/argocd/values.yaml

          kubectl --kubeconfig "$KB" patch svc argocd-repo-server -n argocd \
            --type json -p '[{"op":"replace","path":"/spec/ports/0/targetPort","value":8081}]' 2>/dev/null || true
          kubectl --kubeconfig "$KB" patch svc argocd-dex-server -n argocd \
            --type json -p '[{"op":"replace","path":"/spec/ports/0/targetPort","value":5556},{"op":"replace","path":"/spec/ports/1/targetPort","value":5557}]' 2>/dev/null || true
          kubectl --kubeconfig "$KB" patch svc argocd-applicationset-controller -n argocd \
            --type json -p '[{"op":"replace","path":"/spec/ports/0/targetPort","value":7000}]' 2>/dev/null || true
          kubectl --kubeconfig "$KB" patch svc argocd-redis -n argocd \
            --type json -p '[{"op":"replace","path":"/spec/ports/0/targetPort","value":6379}]' 2>/dev/null || true

          REPO_TOKEN="${ARGOCD_GITHUB_TOKEN:-$GITHUB_TOKEN}"
          kubectl --kubeconfig "$KB" create secret generic repo-creds-github \
            --namespace argocd \
            --from-literal=url="https://github.com/Werewolf-p/" \
            --from-literal=username="x-access-token" \
            --from-literal=password="${REPO_TOKEN}" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KB" apply -f -
          kubectl --kubeconfig "$KB" label secret repo-creds-github --namespace argocd \
            "argocd.argoproj.io/secret-type=repo-creds" --overwrite

          # Apply bootstrap manifests with env-specific revision so ArgoCD tracks the correct branch
          GIT_REVISION="${{ inputs.environment == 'productie' && 'main' || 'ontwikkel' }}"
          for f in kubernetes/bootstrap/*.yaml; do
            sed "s|targetRevision: HEAD|targetRevision: ${GIT_REVISION}|g" "$f" \
              | kubectl --kubeconfig "$KB" apply --server-side --force-conflicts -f -
          done

          kubectl --kubeconfig "$KB" wait --for=condition=available \
            deployment/argocd-server -n argocd --timeout=180s || true

          echo "✅ ArgoCD deployed & bootstrapped"
          kubectl --kubeconfig "$KB" get pods -n argocd
          kubectl --kubeconfig "$KB" get applicationsets,appprojects -n argocd 2>/dev/null || true

      - name: Bootstrap Storage (local-path-provisioner)
        if: success()
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          LOCAL_PATH_VERSION="v0.0.30"

          # Install local-path-provisioner (idempotent)
          curl -sL "https://raw.githubusercontent.com/rancher/local-path-provisioner/${LOCAL_PATH_VERSION}/deploy/local-path-storage.yaml" \
            | kubectl --kubeconfig "$KB" apply -f -

          # Allow hostPath volumes in local-path-storage namespace (required by provisioner helper pods)
          kubectl --kubeconfig "$KB" label namespace local-path-storage \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            --overwrite

          # Allow monitoring namespace to run privileged initContainers (prometheus chown fix)
          kubectl --kubeconfig "$KB" label namespace monitoring \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            --overwrite 2>/dev/null || true

          # Allow apps-grafana namespace (initChownData requires CAP_CHOWN, needs baseline+)
          kubectl --kubeconfig "$KB" create namespace apps-grafana 2>/dev/null || true
          kubectl --kubeconfig "$KB" label namespace apps-grafana \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            --overwrite 2>/dev/null || true

          # Allow metallb-system namespace (speaker needs NET_RAW + hostNetwork + hostPorts)
          kubectl --kubeconfig "$KB" create namespace metallb-system 2>/dev/null || true
          kubectl --kubeconfig "$KB" label namespace metallb-system \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            --overwrite 2>/dev/null || true

          # Allow longhorn-system namespace (manager needs hostPath + privileged + hostNetwork)
          kubectl --kubeconfig "$KB" create namespace longhorn-system 2>/dev/null || true
          kubectl --kubeconfig "$KB" label namespace longhorn-system \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            --overwrite 2>/dev/null || true

          # Set local-path as the default StorageClass
          kubectl --kubeconfig "$KB" patch storageclass local-path \
            -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}' \
            2>/dev/null || true

          echo "✅ local-path-provisioner bootstrapped"
          kubectl --kubeconfig "$KB" get storageclass
          kubectl --kubeconfig "$KB" get pods -n local-path-storage

      - name: Bootstrap OpenBao + ExternalSecrets
        if: success()
        run: |
          ENV=${{ env.ENV_NAME }}
          KB=~/.kube/config-platform-$ENV
          LOCAL_OPENBAO="http://127.0.0.1:8200"
          # In-cluster OpenBao address (ClusterIP service, accessible via NetBird)
          OPENBAO_ADDR="http://openbao.openbao.svc.cluster.local:8200"

          # Apply RBAC so the autounseal sidecar can read the openbao-unseal secret
          kubectl --kubeconfig "$KB" apply -f kubernetes/core/openbao/manifests/rbac.yaml 2>/dev/null || true

          # Pre-create openbao-unseal secret with placeholder values so the autounseal
          # sidecar volume mount doesn't block the pod from starting. Real values are
          # written below after OpenBao is initialised.
          kubectl --kubeconfig "$KB" create namespace openbao --dry-run=client -o yaml \
            | kubectl --kubeconfig "$KB" apply -f -
          kubectl --kubeconfig "$KB" create secret generic openbao-unseal \
            -n openbao \
            --from-literal=unseal_key="placeholder" \
            --from-literal=root_token="placeholder" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KB" apply -f -
          echo "==> openbao-unseal placeholder secret created"

          # Wait for Longhorn to be ready (OpenBao PVC needs Longhorn storage)
          echo "==> Waiting for Longhorn manager to be Running..."
          for i in $(seq 1 30); do
            LHCOUNT=$(kubectl --kubeconfig "$KB" get pods -n longhorn-system \
              --no-headers 2>/dev/null | grep "longhorn-manager" | grep -c "Running" || echo "0")
            if [ "$LHCOUNT" -gt "0" ]; then
              echo "  Longhorn manager running (${LHCOUNT} pod(s))"
              break
            fi
            echo "  Waiting for Longhorn ($i/30)..."
            sleep 10
          done

          # Wait for ArgoCD to discover and create the core-openbao Application
          echo "==> Waiting for ArgoCD to discover core-openbao Application..."
          BAO_APP=""
          for i in $(seq 1 30); do
            BAO_APP=$(kubectl --kubeconfig "$KB" get applications -n argocd \
              --no-headers -o custom-columns=":metadata.name" 2>/dev/null | \
              grep -i "openbao" | head -1 || echo "")
            if [ -n "$BAO_APP" ]; then
              echo "  ArgoCD Application '$BAO_APP' found"
              break
            fi
            echo "  Waiting for ArgoCD to discover openbao ($i/30)..."
            sleep 10
          done

          if [ -n "$BAO_APP" ]; then
            echo "==> Waiting for ArgoCD Application '$BAO_APP' to sync..."
            for i in $(seq 1 18); do
              SYNC=$(kubectl --kubeconfig "$KB" get application "$BAO_APP" -n argocd \
                -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
              echo "  [$i/18] sync=$SYNC"
              if [ "$SYNC" = "Synced" ]; then break; fi
              sleep 10
            done
          fi

          # Wait for OpenBao pod to be Ready (ArgoCD deploys it via Helm; PVC needs Longhorn)
          echo "==> Waiting for OpenBao pod to be Ready (up to 15 min)..."
          for i in $(seq 1 90); do
            if kubectl --kubeconfig "$KB" wait pod -n openbao \
                -l app.kubernetes.io/name=openbao \
                --for=condition=Ready --timeout=10s 2>/dev/null; then
              echo "  OpenBao pod Ready"
              break
            fi
            echo "  Waiting for OpenBao pod ($i/90)..."
            if [ $(( i % 15 )) -eq 0 ]; then
              echo "  --- Diagnostics at iteration $i ---"
              kubectl --kubeconfig "$KB" get pods -n openbao 2>/dev/null || echo "  (openbao namespace not found)"
              BAO_APP_NOW=$(kubectl --kubeconfig "$KB" get applications -n argocd \
                --no-headers -o custom-columns=":metadata.name" 2>/dev/null | grep -i "openbao" || echo "")
              if [ -n "$BAO_APP_NOW" ]; then
                kubectl --kubeconfig "$KB" get application "$BAO_APP_NOW" -n argocd \
                  -o jsonpath='  sync={.status.sync.status} health={.status.health.status}\n' 2>/dev/null || true
              fi
            fi
            sleep 10
          done

          # Port-forward so the workflow runner can reach OpenBao
          kubectl --kubeconfig "$KB" port-forward -n openbao svc/openbao 8200:8200 &
          PF_PID=$!
          sleep 5

          # Check initialisation status
          INIT_STATUS=$(curl -s "${LOCAL_OPENBAO}/v1/sys/init" | \
            python3 -c "import json,sys; print(json.load(sys.stdin).get('initialized', False))" \
            2>/dev/null || echo "False")

          if [ "$INIT_STATUS" != "True" ]; then
            echo "==> Initializing OpenBao (first deploy)..."
            INIT_OUTPUT=$(curl -s -X POST "${LOCAL_OPENBAO}/v1/sys/init" \
              -H "Content-Type: application/json" \
              -d '{"secret_shares": 1, "secret_threshold": 1}' || echo "")

            UNSEAL_KEY=$(echo "$INIT_OUTPUT" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(d['keys_base64'][0])" \
              2>/dev/null || echo "")
            ROOT_TOKEN=$(echo "$INIT_OUTPUT" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(d['root_token'])" \
              2>/dev/null || echo "")

            if [ -z "$UNSEAL_KEY" ] || [ -z "$ROOT_TOKEN" ]; then
              echo "ERROR: Init output missing keys:"
              echo "$INIT_OUTPUT"
              kill $PF_PID 2>/dev/null || true
              exit 1
            fi

            # Store unseal key + root token as k8s Secret (RBAC-protected)
            kubectl --kubeconfig "$KB" create namespace openbao \
              --dry-run=client -o yaml | kubectl --kubeconfig "$KB" apply -f -
            kubectl --kubeconfig "$KB" create secret generic openbao-unseal \
              -n openbao \
              --from-literal=unseal_key="$UNSEAL_KEY" \
              --from-literal=root_token="$ROOT_TOKEN" \
              --dry-run=client -o yaml | kubectl --kubeconfig "$KB" apply -f -

            # Unseal via the API
            curl -s -X POST "${LOCAL_OPENBAO}/v1/sys/unseal" \
              -H "Content-Type: application/json" \
              -d "{"key": "$UNSEAL_KEY"}" > /dev/null || true
            echo "==> OpenBao initialized and unsealed"
          else
            echo "==> OpenBao already initialized — checking seal status..."
            UNSEAL_KEY=$(kubectl --kubeconfig "$KB" get secret openbao-unseal \
              -n openbao -o jsonpath='{.data.unseal_key}' 2>/dev/null | base64 -d || echo "")
            ROOT_TOKEN=$(kubectl --kubeconfig "$KB" get secret openbao-unseal \
              -n openbao -o jsonpath='{.data.root_token}' 2>/dev/null | base64 -d || echo "")
            SEALED=$(curl -s "${LOCAL_OPENBAO}/v1/sys/seal-status" | \
              python3 -c "import json,sys; print(json.load(sys.stdin).get('sealed', True))" \
              2>/dev/null || echo "True")
            if [ "$SEALED" != "False" ] && [ -n "$UNSEAL_KEY" ]; then
              curl -s -X POST "${LOCAL_OPENBAO}/v1/sys/unseal" \
                -H "Content-Type: application/json" \
                -d "{"key": "$UNSEAL_KEY"}" > /dev/null || true
              echo "==> Unsealed"
            fi
          fi

          if [ -z "$ROOT_TOKEN" ]; then
            echo "⚠ No root token available — skipping OpenBao configuration"
            kill $PF_PID 2>/dev/null || true
            exit 0
          fi

          # Enable KV v2 at path "secret" (idempotent — 400 if already mounted is OK)
          curl -s -X POST "${LOCAL_OPENBAO}/v1/sys/mounts/secret" \
            -H "X-Vault-Token: $ROOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type": "kv", "options": {"version": "2"}}' > /dev/null 2>&1 || true

          # Write Grafana secret — only on first deploy (do not overwrite existing password)
          EXISTING_GRAFANA=$(curl -s -H "X-Vault-Token: $ROOT_TOKEN" \
            "${LOCAL_OPENBAO}/v1/secret/data/platform/grafana" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('data',{}).get('data',{}).get('admin-password',''))" \
            2>/dev/null || echo "")
          if [ -z "$EXISTING_GRAFANA" ]; then
            GRAFANA_PASS=$(openssl rand -base64 20 | tr -d '=+/')
            curl -s -X POST "${LOCAL_OPENBAO}/v1/secret/data/platform/grafana" \
              -H "X-Vault-Token: $ROOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{"data": {"admin-user": "admin", "admin-password": "$GRAFANA_PASS"}}" > /dev/null
            echo "==> Grafana secret written (randomly generated)"
          else
            echo "==> Grafana secret already exists — preserving existing password"
          fi

          # ArgoCD: read auto-generated admin password → store in OpenBao (idempotent)
          ARGOCD_ADMIN_PASS=$(kubectl --kubeconfig "$KB" get secret argocd-initial-admin-secret \
            -n argocd -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")
          if [ -n "$ARGOCD_ADMIN_PASS" ]; then
            curl -s -X POST "${LOCAL_OPENBAO}/v1/secret/data/platform/argocd" \
              -H "X-Vault-Token: $ROOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"data\": {\"admin-user\": \"admin\", \"admin-password\": \"$ARGOCD_ADMIN_PASS\"}}" > /dev/null
            echo "==> ArgoCD admin password stored in OpenBao (auto-generated by ArgoCD)"
          else
            echo "==> argocd-initial-admin-secret not found — ArgoCD already configured"
          fi

          # ArgoCD remon: generate random password, apply bcrypt hash to argocd-secret, store in OpenBao
          pip3 install bcrypt -q 2>/dev/null || true
          REMON_PASS=$(openssl rand -base64 20 | tr -d '=+/')
          REMON_PASS_FILE=$(mktemp)
          REMON_PATCH_FILE=$(mktemp)
          printf '%s' "$REMON_PASS" > "$REMON_PASS_FILE"
          python3 - "$REMON_PASS_FILE" "$REMON_PATCH_FILE" 2>/dev/null || true << 'REMON_PYEOF'
          import bcrypt, json, sys
          from datetime import datetime, timezone
          with open(sys.argv[1]) as f:
              p = f.read().strip().encode()
          h = bcrypt.hashpw(p, bcrypt.gensalt(10)).decode()
          mtime = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          json.dump({'stringData': {'accounts.remon.password': h, 'accounts.remon.passwordMtime': mtime}}, open(sys.argv[2], 'w'))
          REMON_PYEOF
          if [ -s "$REMON_PATCH_FILE" ]; then
            kubectl --kubeconfig "$KB" patch secret argocd-secret -n argocd \
              --patch-file "$REMON_PATCH_FILE" 2>/dev/null || true
            curl -s -X POST "${LOCAL_OPENBAO}/v1/secret/data/platform/argocd-remon" \
              -H "X-Vault-Token: $ROOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"data\": {\"user\": \"remon\", \"password\": \"$REMON_PASS\"}}" > /dev/null
            echo "==> ArgoCD remon password randomized and stored in OpenBao"
          else
            echo "==> WARNING: bcrypt unavailable — remon password not set"
          fi
          rm -f "$REMON_PASS_FILE" "$REMON_PATCH_FILE"

          # NetBird: generate random TURN relay password + datastore encryption key
          EXISTING_NETBIRD=$(curl -s -H "X-Vault-Token: $ROOT_TOKEN" \
            "${LOCAL_OPENBAO}/v1/secret/data/platform/netbird" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('data',{}).get('data',{}).get('turn-password',''))" \
            2>/dev/null || echo "")
          if [ -z "$EXISTING_NETBIRD" ]; then
            TURN_PASS=$(openssl rand -base64 24 | tr -d '=+/')
            DATASTORE_KEY=$(openssl rand -base64 32)
            curl -s -X POST "${LOCAL_OPENBAO}/v1/secret/data/platform/netbird" \
              -H "X-Vault-Token: $ROOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"data\": {\"turn-password\": \"$TURN_PASS\", \"datastore-enc-key\": \"$DATASTORE_KEY\"}}" > /dev/null
            echo "==> NetBird secrets written (randomly generated)"
          else
            echo "==> NetBird secrets already exist — preserving existing values"
          fi

                    # Write least-privilege policy for ESO
          POLICY_JSON='{"policy": "path \"secret/data/platform/*\" { capabilities = [\"read\", \"list\"] }\npath \"secret/metadata/platform/*\" { capabilities = [\"read\", \"list\"] }"}'
          curl -s -X PUT "${LOCAL_OPENBAO}/v1/sys/policies/acl/platform-k8s" \
            -H "X-Vault-Token: $ROOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$POLICY_JSON" > /dev/null

          # Tune token auth to allow long-lived tokens
          curl -s -X POST "${LOCAL_OPENBAO}/v1/sys/auth/token/tune" \
            -H "X-Vault-Token: $ROOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"max_lease_ttl": "87600h"}' > /dev/null 2>&1 || true

          # Create ESO service token (orphan, long TTL, least-privilege)
          SERVICE_TOKEN=$(curl -s -X POST "${LOCAL_OPENBAO}/v1/auth/token/create" \
            -H "X-Vault-Token: $ROOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{"policies": ["platform-k8s", "default"], "ttl": "87600h", "display_name": "eso-$ENV", "renewable": true, "orphan": true}" | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['auth']['client_token'])" \
            2>/dev/null || echo "")

          if [ -z "$SERVICE_TOKEN" ]; then
            echo "⚠ Could not create ESO service token — skipping"
            kill $PF_PID 2>/dev/null || true
            exit 0
          fi

          # Close port-forward before kubectl operations
          kill $PF_PID 2>/dev/null || true

          # Wait for ESO to be ready (deployed by ArgoCD)
          echo "==> Waiting for ESO deployment..."
          for i in $(seq 1 30); do
            if kubectl --kubeconfig "$KB" get deployment external-secrets -n external-secrets >/dev/null 2>&1; then break; fi
            echo "  Waiting for ESO ($i/30)..."
            sleep 10
          done
          kubectl --kubeconfig "$KB" wait deployment/external-secrets \
            -n external-secrets --for=condition=available --timeout=120s 2>/dev/null || \
            echo "⚠ ESO not yet available"
          for i in $(seq 1 30); do
            if kubectl --kubeconfig "$KB" get deployment external-secrets-webhook -n external-secrets >/dev/null 2>&1; then break; fi
            echo "  Waiting for ESO webhook ($i/30)..."
            sleep 10
          done
          kubectl --kubeconfig "$KB" wait deployment/external-secrets-webhook \
            -n external-secrets --for=condition=available --timeout=120s 2>/dev/null || \
            echo "⚠ ESO webhook not yet available"

          # Wait for etcd to stabilize
          echo "==> Waiting 30s for etcd to stabilize..."
          sleep 30

          # Helper: retry kubectl apply from a file up to 5 times
          kube_apply_retry() {
            local KB="$1"; local FILE="$2"
            for attempt in 1 2 3 4 5; do
              if kubectl --kubeconfig "$KB" apply -f "$FILE"; then return 0; fi
              echo "  attempt $attempt failed, retrying in 15s..."
              sleep 15
            done
            echo "⚠ apply failed after 5 attempts, continuing..."
            return 0
          }

          TMP1=$(mktemp); TMP2=$(mktemp); TMP3=$(mktemp); TMP4=$(mktemp)

          # Create external-secrets namespace + openbao-token secret for ESO
          kubectl --kubeconfig "$KB" create namespace external-secrets \
            --dry-run=client -o yaml > "$TMP1"
          kube_apply_retry "$KB" "$TMP1"

          kubectl --kubeconfig "$KB" create secret generic openbao-token \
            --namespace external-secrets \
            --from-literal=token="$SERVICE_TOKEN" \
            --dry-run=client -o yaml > "$TMP2"
          kube_apply_retry "$KB" "$TMP2"

          # Apply ClusterSecretStore pointing at in-cluster OpenBao
          sed "s|OPENBAO_ADDR_PLACEHOLDER|$OPENBAO_ADDR|g; s|PLACEHOLDER_REPLACED_BY_TOFU|$SERVICE_TOKEN|g" \
            kubernetes/core/external-secrets/manifests/cluster-secret-store.yaml > "$TMP3"
          kube_apply_retry "$KB" "$TMP3"

          # Create apps-grafana namespace
          kubectl --kubeconfig "$KB" create namespace apps-grafana \
            --dry-run=client -o yaml > "$TMP4"
          kube_apply_retry "$KB" "$TMP4"
          rm -f "$TMP1" "$TMP2" "$TMP3" "$TMP4"

          # Apply ExternalSecret for Grafana (apps-grafana namespace)
          TMP_ES=$(mktemp)
          cat > "$TMP_ES" << 'ESEOF'
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: grafana-admin-secret
            namespace: apps-grafana
          spec:
            refreshInterval: 1h
            secretStoreRef:
              name: openbao
              kind: ClusterSecretStore
            target:
              name: grafana-admin-secret
              creationPolicy: Owner
            data:
              - secretKey: admin-password
                remoteRef:
                  key: secret/platform/grafana
                  property: admin-password
              - secretKey: admin-user
                remoteRef:
                  key: secret/platform/grafana
                  property: admin-user
          ESEOF
          kube_apply_retry "$KB" "$TMP_ES"
          rm -f "$TMP_ES"

          # ExternalSecret for monitoring namespace (kube-prometheus-stack grafana)
          kubectl --kubeconfig "$KB" apply \
            -f kubernetes/core/external-secrets/manifests/grafana-externalsecret.yaml \
            2>/dev/null || true

          # ClusterIssuer for cert-manager (if CRD is ready)
          if kubectl --kubeconfig "$KB" get crd clusterissuers.cert-manager.io >/dev/null 2>&1; then
            kubectl --kubeconfig "$KB" apply \
              -f kubernetes/core/cert-manager/manifests/cluster-issuer.yaml 2>/dev/null || true
          fi

          echo "✅ OpenBao secrets bootstrapped"
          kubectl --kubeconfig "$KB" get clustersecretstore openbao 2>/dev/null || \
            echo "  (ClusterSecretStore not yet synced)"

      - name: Apply MetalLB IP Pool + Traefik Middleware
        if: success()
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}

          # Wait for MetalLB CRDs to be available (deployed by ArgoCD)
          echo "==> Waiting for MetalLB CRDs..."
          for i in $(seq 1 30); do
            if kubectl --kubeconfig "$KB" get crd ipaddresspools.metallb.io >/dev/null 2>&1; then
              break
            fi
            echo "  Waiting ($i/30)..."
            sleep 10
          done

          # Apply MetalLB IP pool and L2 advertisement
          kubectl --kubeconfig "$KB" apply -f kubernetes/core/metallb/ip-pool.yaml 2>/dev/null || true

          # Apply Traefik netbird-only middleware (restricts ArgoCD/Grafana to LAN+VPN IPs)
          kubectl --kubeconfig "$KB" apply -f kubernetes/core/traefik/manifests/middleware-netbird.yaml 2>/dev/null || true

          echo "✅ MetalLB IP pool and Traefik middleware applied"
          kubectl --kubeconfig "$KB" get ipaddresspools -n metallb-system 2>/dev/null
          kubectl --kubeconfig "$KB" get svc -A | grep LoadBalancer | head -10






