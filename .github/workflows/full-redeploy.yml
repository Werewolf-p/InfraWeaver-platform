name: Full Redeploy — InfraWeaver Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - productie
          - ontwikkel
      confirm:
        description: "Type DESTROY to confirm full redeploy"
        required: true
        type: string
      letsencrypt_env:
        description: "Let's Encrypt environment (staging = no rate limits, untrusted cert)"
        required: false
        type: choice
        default: production
        options:
          - production
          - staging

concurrency:
  group: platform-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  redeploy:
    name: "Full Redeploy Platform (${{ inputs.environment }})"
    if: inputs.confirm == 'DESTROY'
    timeout-minutes: 60
    runs-on:
      - self-hosted
      - management-host
    env:
      ENV_NAME: ${{ inputs.environment }}
      LETSENCRYPT_ENV: ${{ inputs.letsencrypt_env || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install tools
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/install-tools.sh
      - name: Cleanup NetBird peers for cluster
        env:
          NETBIRD_API_TOKEN: ${{ secrets.NETBIRD_API_TOKEN }}
        run: |
          ENV=${{ env.ENV_NAME }}
          if [ -z "${NETBIRD_API_TOKEN:-}" ]; then
            echo "⚠ NETBIRD_API_TOKEN not set — skipping NetBird peer cleanup"
          else
            echo "==> Removing stale NetBird peers for ${ENV} cluster..."
            bash .github/scripts/netbird_cleanup_peers.sh "talos-${ENV}"
          fi

      - name: Export Terraform secrets from GitHub Secrets
        env:
          # These GitHub Secrets must be configured in the repository settings
          # They contain API tokens sourced from GitHub Secrets Manager
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          RUNNER_REGISTRATION_TOKEN: ${{ secrets.RUNNER_REGISTRATION_TOKEN }}
        run: |
          # Export as TF_VAR_* for Terraform to consume
          # These take precedence over SOPS file values
          if [ -n "${PROXMOX_API_TOKEN:-}" ]; then
            echo "TF_VAR_proxmox_api_token=${PROXMOX_API_TOKEN}" >> $GITHUB_ENV
          fi
          if [ -n "${RUNNER_REGISTRATION_TOKEN:-}" ]; then
            echo "TF_VAR_github_runner_token=${RUNNER_REGISTRATION_TOKEN}" >> $GITHUB_ENV
          fi

      - name: Validate Proxmox API token permissions
        env:
          TF_VAR_proxmox_api_token: ${{ env.TF_VAR_proxmox_api_token }}
        run: |
          set +e
          
          # Platform: proxmox_host comes from cluster.yaml
          CLUSTER_YAML="envs/${{ env.ENV_NAME }}/cluster.yaml"
          HOST=$(grep 'proxmox_host' "$CLUSTER_YAML" 2>/dev/null | head -1 | sed 's/.*: *"\(.*\)"/\1/' | xargs)
          
          ENDPOINT="https://${HOST}:8006"
          TOKEN="${TF_VAR_proxmox_api_token}"
          
          if [ -z "$HOST" ]; then
            echo "⚠ Could not parse proxmox_host from cluster.yaml — skipping pre-flight check"
            exit 0
          fi
          
          echo "📋 Pre-flight: testing Proxmox API connectivity..."
          echo "  Endpoint: $ENDPOINT"
          echo ""
          
          # Test connectivity + token — warn only, Terraform will hard-fail if token is bad
          RESPONSE=$(curl -sk --max-time 10 \
            -H "Authorization: PVEAPIToken=${TOKEN}" \
            "${ENDPOINT}/api2/json/nodes" 2>&1)
          
          if echo "$RESPONSE" | grep -q '"data"'; then
            echo "✓ Proxmox API reachable and token is valid"
          elif echo "$RESPONSE" | grep -q '401\|Authentication failed'; then
            echo "✗ FATAL: Token is invalid or expired — aborting before Terraform wastes time"
            exit 1
          else
            echo "⚠ Could not reach Proxmox API pre-flight (network/timeout) — continuing anyway"
            echo "  Terraform will confirm authentication on apply"
          fi
          set -e

          set -e


      - name: Backup TLS secrets before destroy
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          BACKUP_DIR=/opt/platform-tls-backup
          mkdir -p "$BACKUP_DIR"
          echo "==> Backing up TLS secrets to $BACKUP_DIR..."
          for secret in rlservers-com-wildcard-tls int-rlservers-com-tls; do
            YAML=$(kubectl --kubeconfig "$KB" --insecure-skip-tls-verify get secret "$secret" -n traefik -o yaml 2>/dev/null || echo "")
            SIZE=${#YAML}
            if [ "$SIZE" -gt 100 ]; then
              # Only backup if issued by Let's Encrypt (not self-signed) to avoid persisting bad certs
              # Base64-encoded Python avoids YAML column-0 parsing issues in block scalars.
              _CERT_PY=""
              CERT_ISSUER=$(echo "$YAML" | python3 <(echo "$_CERT_PY" | base64 -d) 2>/dev/null || echo "unknown")
              if echo "$CERT_ISSUER" | grep -qi "Let's Encrypt\|letsencrypt\|ISRG"; then
                echo "$YAML" > "$BACKUP_DIR/${secret}.yaml"
                echo "  ✅ Backed up: $secret (${SIZE} bytes, issuer: $CERT_ISSUER)"
              else
                echo "  ⚠ $secret issuer is not Let's Encrypt ($CERT_ISSUER) — skipping backup to avoid persisting self-signed cert"
              fi
            else
              echo "  ⚠ $secret not found or empty in cluster (will be created fresh)"
            fi
          done
          ls -la "$BACKUP_DIR/" 2>/dev/null || true

      - name: Destroy existing platform
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
          SSH_KEY_FILE: ${{ runner.temp }}/deployer
        run: |
          echo "${{ secrets.AGE_SECRET_KEY }}" > $SOPS_AGE_KEY_FILE
          chmod 600 $SOPS_AGE_KEY_FILE
          echo "${{ secrets.DEPLOYER_SSH_KEY }}" > $SSH_KEY_FILE
          chmod 600 $SSH_KEY_FILE
          mkdir -p ~/.ssh && cp $SSH_KEY_FILE ~/.ssh/deployer_ed25519 && chmod 600 ~/.ssh/deployer_ed25519

          ENV=${{ env.ENV_NAME }}
          STATE_DIR=~/.tofu/state/platform-$ENV
          mkdir -p $STATE_DIR

          while IFS= read -r line; do
            if [[ "$line" =~ ^([a-zA-Z_][a-zA-Z0-9_]*):[[:space:]]*(.*) ]]; then
              KEY="${BASH_REMATCH[1]}" ; VAL="${BASH_REMATCH[2]}"
              [[ "$KEY" == "sops" ]] && break
              VAL="${VAL#\"}" ; VAL="${VAL%\"}"
              [[ -n "$VAL" ]] && export "TF_VAR_${KEY}=${VAL}"
            fi
          done < <(sops -d "envs/$ENV/secrets.sops.yaml" 2>/dev/null || echo "")

          # Force-destroy all platform VMs by ID before tofu destroy.
          # This handles the case where VMs exist on Proxmox but are not in
          # Terraform state (e.g., from a prior cancelled or partial deploy).
          PVE_IP="10.25.0.3"
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 -i ~/.ssh/deployer_ed25519"
          PLATFORM_VMIDS="9300 9301 9302 9310 9311 9312"  # 9100 = runner VM, do NOT destroy (it runs this workflow)
          echo "==> Force-stopping and destroying platform VMs: $PLATFORM_VMIDS"
          for VMID in $PLATFORM_VMIDS; do
            # Kill any ghost QEMU process for this VMID before touching the config
            GHOST_PID=$(ssh $SSH_OPTS root@$PVE_IP "ps aux | grep 'kvm -id $VMID ' | grep -v grep | awk '{print \$2}' | head -1" 2>/dev/null || true)
            if [ -n "$GHOST_PID" ]; then
              echo "  Ghost QEMU PID $GHOST_PID found for VM $VMID — killing..."
              ssh $SSH_OPTS root@$PVE_IP "kill -9 $GHOST_PID 2>/dev/null; sleep 3; kill -0 $GHOST_PID 2>/dev/null && echo 'still alive (D-state)' || echo 'process gone'" || true
              # Remove stale socket files so new QEMU can bind them
              ssh $SSH_OPTS root@$PVE_IP "rm -f /var/run/qemu-server/$VMID.qmp /var/run/qemu-server/$VMID.serial0 2>/dev/null; true" || true
            fi
            if ssh $SSH_OPTS root@$PVE_IP "qm status $VMID" 2>/dev/null | grep -q "running\|stopped\|status"; then
              echo "  Stopping VM $VMID..."
              ssh $SSH_OPTS root@$PVE_IP "qm stop $VMID --skiplock --timeout 10 2>/dev/null; sleep 2; qm destroy $VMID --purge --skiplock 2>/dev/null" || true
              echo "  VM $VMID destroyed ✓"
            else
              echo "  VM $VMID not found (no config) — removing orphan LVM volumes if any..."
              ssh $SSH_OPTS root@$PVE_IP "
                for DISK in \$(lvs Storage 2>/dev/null | grep 'vm-${VMID}-disk' | awk '{print \$1}'); do
                  echo '    Removing orphan LV: '\$DISK
                  lvremove -f Storage/\$DISK 2>/dev/null || true
                done
                # Also remove stale socket files
                rm -f /var/run/qemu-server/${VMID}.qmp /var/run/qemu-server/${VMID}.serial0 2>/dev/null || true
              " || true
            fi
          done
          echo "==> Pre-destroy VM cleanup complete"

          cd terraform
          tofu init -backend-config="path=$STATE_DIR/terraform.tfstate" -reconfigure 2>&1 || true
          VARS=""
          [ -f "../envs/$ENV/terraform.tfvars" ]     && VARS="$VARS -var-file=../envs/$ENV/terraform.tfvars"
          [ -f "../envs/$ENV/services.auto.tfvars" ] && VARS="$VARS -var-file=../envs/$ENV/services.auto.tfvars"
          # Destroy only cluster resources — exclude runner VM (it's running this workflow!)
          CLUSTER_TARGETS="-target=module.talos_cluster -target=module.cloudinit_templates"
          tofu destroy $VARS $CLUSTER_TARGETS -auto-approve 2>&1 || echo "⚠ Destroy failed or no prior state — continuing"

      - name: Clear state
        run: |
          STATE_DIR="$HOME/.tofu/state/platform-${{ env.ENV_NAME }}"
          # Remove cluster resources from state; preserve runner VM state so tofu apply won't recreate it.
          # Also clear platform_bootstrap state: kubernetes_manifest resources referencing ArgoCD CRDs
          # (AppProject, ApplicationSet) fail with UpgradeResourceState on a fresh cluster because
          # ArgoCD CRDs are not installed yet. Clearing them lets tofu plan start clean.
          cd terraform
          tofu init -backend-config="path=$STATE_DIR/terraform.tfstate" -reconfigure 2>&1 | tail -3 || true
          tofu state rm module.talos_cluster 2>/dev/null || true
          tofu state rm module.cloudinit_templates 2>/dev/null || true
          # Clear platform_bootstrap resources (ArgoCD namespace, Helm release, AppProject, ApplicationSet)
          tofu state list 2>/dev/null | grep 'module\.platform_bootstrap' | while read -r res; do
            tofu state rm "$res" 2>/dev/null || true
            echo "  cleared: $res"
          done || true
          echo "✓ Cluster + platform-bootstrap state cleared (runner state preserved)"

      - name: Deploy Platform
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
          SSH_KEY_FILE: ${{ runner.temp }}/deployer
        run: |
          export TF_PLUGIN_CACHE_DIR="$HOME/.terraform.d/plugin-cache"
          echo "${{ secrets.AGE_SECRET_KEY }}" > $SOPS_AGE_KEY_FILE
          chmod 600 $SOPS_AGE_KEY_FILE
          echo "${{ secrets.DEPLOYER_SSH_KEY }}" > $SSH_KEY_FILE
          chmod 600 $SSH_KEY_FILE
          mkdir -p ~/.ssh && cp $SSH_KEY_FILE ~/.ssh/deployer_ed25519 && chmod 600 ~/.ssh/deployer_ed25519

          ENV=${{ env.ENV_NAME }}
          STATE_DIR=~/.tofu/state/platform-$ENV
          mkdir -p $STATE_DIR

          while IFS= read -r line; do
            if [[ "$line" =~ ^([a-zA-Z_][a-zA-Z0-9_]*):[[:space:]]*(.*) ]]; then
              KEY="${BASH_REMATCH[1]}" ; VAL="${BASH_REMATCH[2]}"
              [[ "$KEY" == "sops" ]] && break
              VAL="${VAL#\"}" ; VAL="${VAL%\"}"
              [[ -n "$VAL" ]] && export "TF_VAR_${KEY}=${VAL}"
              echo "✅ TF_VAR_${KEY} set"
            fi
          done < <(sops -d "envs/$ENV/secrets.sops.yaml" 2>/dev/null || echo "")

          cd terraform
          tofu init \
            -backend-config="path=$STATE_DIR/terraform.tfstate" \
            -reconfigure

          VARS=""
          [ -f "../envs/$ENV/terraform.tfvars" ]       && VARS="$VARS -var-file=../envs/$ENV/terraform.tfvars"
          [ -f "../envs/$ENV/services.auto.tfvars" ]   && VARS="$VARS -var-file=../envs/$ENV/services.auto.tfvars"

          # Stage 1: provision Talos cluster
          tofu apply $VARS \
            -target=module.talos_cluster \
            -target=local_sensitive_file.kubeconfig \
            -target=local_sensitive_file.talosconfig \
            -auto-approve 2>&1

          # Stage 2a: install ArgoCD (namespace + Helm release only) so CRDs get registered.
          # kubernetes_manifest.app_project and kubernetes_manifest.platform_applicationset
          # require the argoproj.io CRDs to exist during plan time — they won't exist until
          # ArgoCD's Helm chart is installed. Split into two targeted applies to avoid the
          # "API did not recognize GroupVersionKind (CRD may not be installed)" error.
          tofu output -raw kubeconfig > /tmp/kubeconfig-deploy 2>/dev/null || true
          chmod 600 /tmp/kubeconfig-deploy
          KB=/tmp/kubeconfig-deploy

          echo "==> Stage 2a: installing ArgoCD (namespace + Helm)..."
          tofu apply $VARS \
            -target='module.platform_bootstrap[0].kubernetes_namespace.argocd' \
            -target='module.platform_bootstrap[0].helm_release.argocd' \
            -auto-approve 2>&1

          echo "==> Waiting for ArgoCD CRDs to be registered..."
          for crd in appprojects.argoproj.io applications.argoproj.io applicationsets.argoproj.io; do
            for i in $(seq 1 36); do
              kubectl --kubeconfig "$KB" wait --for=condition=Established \
                "crd/$crd" --timeout=5s 2>/dev/null && echo "  ✅ $crd ready" && break
              echo "  waiting for $crd ($i/36)..."
              sleep 5
            done
          done

          # Stage 2b: apply everything else (AppProject, ApplicationSet — CRDs now exist)
          echo "==> Stage 2b: applying full platform bootstrap..."
          tofu apply $VARS -auto-approve 2>&1

      - name: Save kubeconfig & talosconfig
        if: always()
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age.key
        run: |
          ENV=${{ env.ENV_NAME }}
          mkdir -p ~/.kube envs/$ENV/generated
          cd terraform
          tofu output -raw kubeconfig > ~/.kube/config-platform-$ENV 2>/dev/null || true
          chmod 600 ~/.kube/config-platform-$ENV 2>/dev/null || true
          tofu output -raw talosconfig > "../envs/$ENV/generated/talosconfig" 2>/dev/null || true
          chmod 600 "../envs/$ENV/generated/talosconfig" 2>/dev/null || true
          echo "✅ Configs saved"
          KUBECONFIG=~/.kube/config-platform-$ENV kubectl get nodes 2>&1 || echo "  (cluster not yet reachable)"

      - name: Fix CoreDNS startup race condition
        if: success()
        run: |
          ENV=${{ env.ENV_NAME }}
          KB=~/.kube/config-platform-$ENV

          # CoreDNS and argocd-repo-server can fail with "no users found" or "subnet.env missing"
          # on fresh cluster startup due to a race with Flannel CNI initialization.
          # Wait for Flannel to write subnet.env on all nodes, then restart any stuck pods.
          echo "==> Waiting for Flannel DaemonSet to be ready..."
          for i in $(seq 1 30); do
            DESIRED=$(kubectl --kubeconfig "$KB" get ds kube-flannel -n kube-system \
              -o jsonpath='{.status.desiredNumberScheduled}' 2>/dev/null || echo "0")
            READY=$(kubectl --kubeconfig "$KB" get ds kube-flannel -n kube-system \
              -o jsonpath='{.status.numberReady}' 2>/dev/null || echo "0")
            if [ "$DESIRED" -gt 0 ] && [ "$READY" -eq "$DESIRED" ]; then
              echo "  Flannel ready: $READY/$DESIRED"
              break
            fi
            echo "  Waiting for Flannel ($i/30): $READY/$DESIRED ready..."
            sleep 10
          done

          # Extra buffer for subnet.env to be written
          sleep 10

          # Restart CoreDNS to clear any startup failures
          echo "==> Restarting CoreDNS to clear startup failures..."
          kubectl --kubeconfig "$KB" rollout restart deployment/coredns -n kube-system 2>/dev/null || true
          kubectl --kubeconfig "$KB" rollout status deployment/coredns -n kube-system --timeout=120s 2>/dev/null || true
          echo "  CoreDNS restarted"

      - name: Deploy ArgoCD & Bootstrap
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARGOCD_GITHUB_TOKEN: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/deploy-argocd.sh
      - name: Bootstrap Storage (local-path-provisioner)
        if: success()
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/bootstrap-storage.sh
      - name: Bootstrap OpenBao + ExternalSecrets
        if: success()
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/bootstrap-openbao.sh
      - name: Bootstrap ExternalSecrets + TLS Restore
        if: success()
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/bootstrap-externalsecrets.sh
      - name: Ensure Cloudflare DNS records for api-netbird.rlservers.com
        if: success()
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/ensure-cloudflare-dns.sh
      - name: Apply MetalLB IP Pool + Traefik Middleware
        if: success()
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}

          # Wait for MetalLB CRDs to be available (deployed by ArgoCD)
          echo "==> Waiting for MetalLB CRDs..."
          for i in $(seq 1 30); do
            if kubectl --kubeconfig "$KB" get crd ipaddresspools.metallb.io >/dev/null 2>&1; then
              break
            fi
            echo "  Waiting ($i/30)..."
            sleep 10
          done

          # Apply MetalLB IP pool and L2 advertisement
          kubectl --kubeconfig "$KB" apply -f kubernetes/core/metallb/ip-pool.yaml 2>/dev/null || true

          # Re-apply the privileged PodSecurity label on metallb-system.
          # The Helm chart creates the namespace WITHOUT the label, so the speaker DaemonSet
          # fails to start on first deploy.  Applying the label here (after the chart deploys)
          # and restarting the DaemonSet ensures L2 announcements work immediately.
          kubectl --kubeconfig "$KB" label namespace metallb-system \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            pod-security.kubernetes.io/enforce-version=latest \
            --overwrite 2>/dev/null || true
          # Restart the speaker DaemonSet so all pods pick up the new label
          kubectl --kubeconfig "$KB" rollout restart daemonset/metallb-speaker \
            -n metallb-system 2>/dev/null || true
          echo "  MetalLB speaker restarted after namespace label update"

          # Apply Traefik netbird-only middleware (restricts ArgoCD/Grafana to LAN+VPN IPs)
          kubectl --kubeconfig "$KB" apply -f kubernetes/core/traefik/manifests/middleware-netbird.yaml 2>/dev/null || true

          echo "✅ MetalLB IP pool and Traefik middleware applied"
          kubectl --kubeconfig "$KB" get ipaddresspools -n metallb-system 2>/dev/null
          kubectl --kubeconfig "$KB" get svc -A | grep LoadBalancer | head -10


      - name: Configure certificate issuers
        if: success()
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}

          # When running with staging LE, patch all Certificate resources to use staging issuers.
          # Staging certificates are untrusted but bypass LE rate limits — useful for testing.
          # Production (default): letsencrypt-http, letsencrypt-cloudflare
          # Staging:              letsencrypt-http-staging, letsencrypt-cloudflare-staging

          if [ "${{ env.LETSENCRYPT_ENV }}" = "staging" ]; then
            echo "⚙️  Switching certificates to Let's Encrypt STAGING issuers..."
            # Wait for Certificates CRD to exist
            for i in $(seq 1 20); do
              kubectl --kubeconfig "$KB" --insecure-skip-tls-verify get crd certificates.cert-manager.io >/dev/null 2>&1 && break
              echo "  Waiting for cert-manager CRDs ($i/20)..."
              sleep 10
            done
            # Patch all Certificates in traefik namespace
            for cert in $(kubectl --kubeconfig "$KB" --insecure-skip-tls-verify get certificate -n traefik -o name 2>/dev/null); do
              CURRENT=$(kubectl --kubeconfig "$KB" --insecure-skip-tls-verify get "$cert" -n traefik \
                -o jsonpath='{.spec.issuerRef.name}' 2>/dev/null)
              case "$CURRENT" in
                letsencrypt-http)
                  NEW="letsencrypt-http-staging" ;;
                letsencrypt-cloudflare)
                  NEW="letsencrypt-cloudflare-staging" ;;
                *)
                  echo "  Skipping $cert (issuer: $CURRENT)"
                  continue ;;
              esac
              kubectl --kubeconfig "$KB" --insecure-skip-tls-verify patch "$cert" -n traefik \
                --type=merge -p "{\"spec\":{\"issuerRef\":{\"name\":\"${NEW}\"}}}" 2>/dev/null && \
                echo "  ✅ Patched $cert: $CURRENT → $NEW" || \
                echo "  ⚠ Failed to patch $cert"
            done
            echo "✅ All certificates switched to staging issuers"
            echo "⚠️  NOTE: Staging certs are NOT trusted by browsers. This is expected."
          else
            echo "✅ Using production Let's Encrypt issuers (default)"
          fi

      - name: Reconnect NetBird router VM after redeploy
        if: success()
        continue-on-error: true   # watchdog auto-reconnects within 60s even if this step fails
        timeout-minutes: 4        # hard cap — prevents hanging when management VIP isn't ready
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/reconnect-netbird.sh
      - name: Populate NetBird routing group after reconnect
        if: success()
        continue-on-error: true
        timeout-minutes: 3
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/populate-netbird.sh
      - name: Fix ingress-nginx admission webhook
        if: success()
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          echo "==> Patching ingress-nginx admission webhook with correct CA bundle..."
          # On fresh deploys the ValidatingWebhookConfiguration caBundle is empty because
          # the admission-create/patch jobs only run once (Helm hook) and Kubernetes doesn't
          # re-run completed jobs. We patch it manually from the ingress-nginx-admission secret.
          for attempt in $(seq 1 12); do
            CA_BUNDLE=$(kubectl --kubeconfig "$KB" get secret ingress-nginx-admission \
              -n ingress-nginx -o jsonpath='{.data.ca}' 2>/dev/null)
            if [[ -n "$CA_BUNDLE" ]]; then
              kubectl --kubeconfig "$KB" patch validatingwebhookconfiguration \
                ingress-nginx-admission --type json \
                -p "[{\"op\":\"replace\",\"path\":\"/webhooks/0/clientConfig/caBundle\",\"value\":\"$CA_BUNDLE\"}]" \
                2>/dev/null && echo "✅ ingress-nginx webhook CA patched" && break
            fi
            echo "  Waiting for ingress-nginx-admission secret ($attempt/12)..."
            sleep 10
          done

      - name: Patch cluster CoreDNS for internal zones
        if: success()
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}

          # Add forward rules for rlservers.com and prod.local to our custom CoreDNS.
          # kube-system CoreDNS is managed by talos and must be patched post-install;
          # without this, cert-manager self-checks for rlservers.com domains fail (NXDOMAIN).
          # We use the ClusterIP (not the MetalLB external IP) so pod-network traffic can reach it.
          echo "==> Patching kube-system CoreDNS to forward rlservers.com + prod.local..."

          # Dynamically resolve the dns-system ClusterIP (stable within cluster, but may change on redeploy)
          DNS_CLUSTERIP=$(kubectl --kubeconfig "$KB" get svc coredns -n dns-system -o jsonpath='{.spec.clusterIP}')
          echo "Using dns-system ClusterIP: $DNS_CLUSTERIP"

          kubectl --kubeconfig "$KB" patch configmap coredns -n kube-system --type=merge -p \
            "{\"data\":{\"Corefile\":\".:53 {\n    errors\n    health {\n        lameduck 5s\n    }\n    ready\n    log . {\n        class error\n    }\n    prometheus :9153\n\n    kubernetes cluster.local in-addr.arpa ip6.arpa {\n        pods insecure\n        fallthrough in-addr.arpa ip6.arpa\n        ttl 30\n    }\n    forward . /etc/resolv.conf {\n       max_concurrent 1000\n    }\n    cache 30 {\n       disable success cluster.local\n       disable denial cluster.local\n    }\n    loop\n    reload\n    loadbalance\n}\n\nrlservers.com:53 {\n    errors\n    forward . ${DNS_CLUSTERIP}\n    cache 30\n}\n\nint.rlservers.com:53 {\n    errors\n    forward . ${DNS_CLUSTERIP}\n    cache 30\n}\n\nprod.local:53 {\n    errors\n    forward . ${DNS_CLUSTERIP}\n    cache 30\n}\n\"}}"
          kubectl --kubeconfig "$KB" rollout restart deployment/coredns -n kube-system
          kubectl --kubeconfig "$KB" rollout status deployment/coredns -n kube-system --timeout=60s
          echo "✅ kube-system CoreDNS patched"

      - name: Set Authentik admin privileges
        if: success()
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/configure-authentik.sh
      - name: Force-set Authentik user passwords from K8s secret
        if: success()
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/set-user-passwords.sh
      - name: Send welcome emails to non-admin users
        if: success()
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          AUTHENTIK_ADMIN_TOKEN: ${{ env.AUTHENTIK_ADMIN_TOKEN }}
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/send-welcome-emails.sh
      - name: Configure OIDC for ArgoCD and OpenBao
        if: success()
        env:
          AUTHENTIK_ADMIN_TOKEN: ${{ env.AUTHENTIK_ADMIN_TOKEN }}
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/configure-oidc.sh
      - name: Run post-deploy tests
        run: |
          bash scripts/test-post-deploy.sh ~/.kube/config-platform-${{ env.ENV_NAME }} ${{ env.ENV_NAME }} || true

      - name: Generate SBOM for deployed images
        if: env.LETSENCRYPT_ENV == 'production'
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          SYFT_VERSION="v1.26.1"
          curl -fsSL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_1.26.1_linux_amd64.tar.gz" \
            | tar -xzf - -C /usr/local/bin/ syft
          mkdir -p /tmp/sbom

          # Collect unique images from running pods
          kubectl --kubeconfig "$KB" --insecure-skip-tls-verify \
            get pods -A -o jsonpath='{range .items[*]}{range .spec.containers[*]}{.image}{"\n"}{end}{end}' \
            2>/dev/null | sort -u > /tmp/sbom/image-list.txt

          echo "==> Generating SBOM for $(wc -l < /tmp/sbom/image-list.txt) unique images..."
          while IFS= read -r img; do
            [ -z "$img" ] && continue
            safename=$(echo "$img" | tr '/:' '--')
            echo "  SBOM: $img"
            syft "$img" -o spdx-json=/tmp/sbom/${safename}.spdx.json --quiet 2>/dev/null || \
              echo "  ⚠ SBOM failed for $img (skipping)"
          done < /tmp/sbom/image-list.txt

          # Merge all SBOMs into a summary count
          TOTAL=$(find /tmp/sbom -name "*.spdx.json" | wc -l)
          echo "✅ SBOM generation complete: ${TOTAL} image SBOMs generated"
          ls -lh /tmp/sbom/*.spdx.json 2>/dev/null | awk '{print "  " $5 " " $9}' || true
        continue-on-error: true

      - name: Upload SBOM artifact
        if: env.LETSENCRYPT_ENV == 'production'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ github.run_id }}
          path: /tmp/sbom/
          retention-days: 90
          if-no-files-found: ignore

      - name: Refresh TLS secret backup
        if: success() && env.LETSENCRYPT_ENV == 'production'
        run: |
          ENV_NAME="${{ env.ENV_NAME }}" \
            bash scripts/deploy/refresh-tls-backup.sh
      - name: Send deployment summary email
        if: always()
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          export DEPLOY_ENV="${{ env.ENV_NAME }}"
          export DEPLOY_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # OpenBao root token + unseal key from K8s openbao-unseal secret
          export BAO_TOKEN=$(kubectl --kubeconfig "$KB" get secret openbao-unseal -n openbao \
            -o jsonpath='{.data.root_token}' 2>/dev/null | base64 -d || echo "unavailable")
          export BAO_UNSEAL=$(kubectl --kubeconfig "$KB" get secret openbao-unseal -n openbao \
            -o jsonpath='{.data.unseal_key}' 2>/dev/null | base64 -d || echo "unavailable")

          # Authentik credentials from OpenBao (needed to log in to SSO → NetBird VPN)
          BAO_ADDR="https://openbao.int.rlservers.com"
          export AUTHENTIK_ADMIN_PASS=$(kubectl --kubeconfig "$KB" exec -n openbao openbao-0 -- \
            sh -c "VAULT_TOKEN='$BAO_TOKEN' vault kv get -field=bootstrap-password secret/platform/authentik" \
            2>/dev/null || echo "unavailable")

          python3 scripts/send-deploy-email.py

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"embeds\": [{
                \"title\": \":x: Full Redeploy FAILED\",
                \"color\": 15158332,
                \"description\": \"A full redeploy pipeline failure occurred.\",
                \"fields\": [
                  {\"name\": \"Triggered by\", \"value\": \"\`${{ github.actor }}\`\", \"inline\": true},
                  {\"name\": \"Environment\", \"value\": \"\`${{ inputs.environment }}\`\", \"inline\": true},
                  {\"name\": \"Logs\", \"value\": \"[View run]($RUN_URL)\", \"inline\": false}
                ]
              }]
            }" > /dev/null
