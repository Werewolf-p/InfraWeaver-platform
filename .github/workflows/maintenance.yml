name: Maintenance — Scheduled Operations

# ─────────────────────────────────────────────────────────────────────────────
# Scheduled and on-demand maintenance tasks. Consolidates:
#   - IaC drift detection (weekly)
#   - etcd snapshot backup (weekly)
#   - OpenBao Raft snapshot (weekly)
#   - Proxmox resource check (on-demand)
#   - ArgoCD token refresh (on-demand)
#   - Self-heal cluster (daily + on-demand) — auto-recovers stuck pods & apps
#
# Previously: drift-detection.yml + etcd-snapshot.yml + openbao-snapshot.yml
#             + check-resources.yml + refresh-argocd-token.yml
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 3 * * 0"    # Sunday 03:00 UTC  — etcd snapshot
    - cron: "10 */6 * * *"  # Every 6 hours     — etcd health check + defrag if needed
    - cron: "0 4 * * 0"    # Sunday 04:00 UTC  — OpenBao snapshot
    - cron: "0 7 * * 1"    # Monday 07:00 UTC  — drift detection
    - cron: "0 */6 * * *"  # Every 6 hours     — self-heal cluster + OpenBao/ESO recovery
    - cron: "0 5 1,15 * *"  # 1st+15th of month — ESO token renewal
    - cron: "30 8 * * *"   # Daily 08:30 UTC   — certificate expiry check
    - cron: "45 */6 * * *"  # Every 6 hours     — Velero backup verification
    - cron: "0 6 * * *"    # Daily 06:00 UTC   — GitHub↔Onedev sync health check
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "all-snapshots"
        type: choice
        options:
          - all-snapshots      # etcd + openbao snapshot
          - etcd-snapshot
          - etcd-defrag         # defrag etcd DB on all 3 nodes
          - openbao-snapshot
          - drift-detection
          - check-resources
          - refresh-argocd-token
          - renew-eso-token         # renew ESO periodic token in OpenBao
          - self-heal           # auto-recover stuck pods + OutOfSync apps
          - etcd-alarm-check    # fix etcd CORRUPT alarm if detected
          - openbao-eso-recovery # validate OpenBao store + refresh failed ExternalSecrets
          - cert-expiry-check
          - velero-backup-verify
          - sync-health-check
      environment:
        description: "Environment (for drift detection)"
        required: false
        default: "productie"
        type: choice
        options: [productie, ontwikkel]

concurrency:
  group: maintenance-${{ github.event.inputs.task || 'scheduled' }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  ENV_NAME: ${{ github.event.inputs.environment || 'productie' }}
  TOFU_VERSION: "1.11.6"

jobs:
  # ── etcd Health Check + Defrag ────────────────────────────────────────────────
  # Runs every 6 h to catch fragmentation and CORRUPT alarms before they cause OOM.
  # Uses etcd-heal.py via a longhorn-manager pod (has /host/proc + etcd client certs).
  # Defrags proactively when: fragmentation ratio > 1.5x OR DB size > 800 MB.
  # Root cause of multiple cluster outages: fragmented etcd → slow ops → apiserver OOM.
  etcd-defrag:
    name: etcd Health Check
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '10 */6 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'etcd-defrag')
    timeout-minutes: 15
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-kubectl
        with:
          kubeconfig-b64: ${{ secrets.KUBECONFIG_PRODUCTIE }}

      - name: Run etcd-heal (alarms + proactive size-based defrag)
        run: |
          KB=~/.kube/config-platform-productie
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          # Find longhorn-manager on cp1 (has /host/proc with kube-apiserver certs)
          LH_POD=$($KT get pods -n longhorn-system -l app=longhorn-manager \
            --field-selector spec.nodeName=talos-prod-cp1 \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          if [[ -z "$LH_POD" ]]; then
            echo "::warning::No longhorn-manager pod found on talos-prod-cp1 — skipping"
            exit 0
          fi

          echo "### etcd Health Check — $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"

          # Transfer script via stdin (avoids kubectl cp + tar + runner disk overhead)
          SCRIPT=$(base64 -w0 scripts/etcd-heal.py)
          $KT exec -n longhorn-system "$LH_POD" -c longhorn-manager -- \
            sh -c "echo '${SCRIPT}' | base64 -d > /tmp/etcd-heal.py"

          RESULT=$($KT exec -n longhorn-system "$LH_POD" -c longhorn-manager -- \
            python3 /tmp/etcd-heal.py 2>&1)
          echo "$RESULT"
          printf '```\n%s\n```\n' "$RESULT" >> "$GITHUB_STEP_SUMMARY"

  # ── etcd Snapshot ─────────────────────────────────────────────────────────────
  etcd-snapshot:
    name: etcd Snapshot
    if: >
      github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0' ||
      github.event_name == 'workflow_dispatch' && (inputs.task == 'etcd-snapshot' || inputs.task == 'all-snapshots')
    timeout-minutes: 20
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup talosctl
        run: |
          # Pre-flight: free runner disk space from accumulated _work directories
          find /tmp -name "etcd-snapshot-*.db" -mtime +1 -delete 2>/dev/null || true
          df -h /tmp || true

          TALOS_VER=$(grep 'talos_version' envs/${{ env.ENV_NAME }}/cluster.yaml | awk '{print $2}' | tr -d '"')
          mkdir -p "$HOME/.local/bin"
          if ! "$HOME/.local/bin/talosctl" version --client 2>/dev/null | grep -q "$TALOS_VER"; then
            curl -fsSL \
              "https://github.com/siderolabs/talos/releases/download/${TALOS_VER}/talosctl-linux-amd64" \
              -o "$HOME/.local/bin/talosctl" && chmod +x "$HOME/.local/bin/talosctl"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup talosconfig
        run: |
          mkdir -p ~/.talos
          TALOS_CFG="envs/${{ env.ENV_NAME }}/generated/talosconfig"
          [ -f "$TALOS_CFG" ] || { echo "❌ talosconfig not found at $TALOS_CFG — run full-redeploy.yml first"; exit 1; }
          cp "$TALOS_CFG" ~/.talos/config

      - name: Create etcd snapshot
        run: |
          SNAPSHOT_FILE="/tmp/etcd-snapshot-$(date +%Y%m%d-%H%M%S).db"
          for NODE in 10.10.0.90 10.10.0.91 10.10.0.92; do
            if talosctl --nodes "$NODE" etcd snapshot "$SNAPSHOT_FILE" 2>/dev/null; then
              echo "✅ etcd snapshot created from $NODE: $(du -sh "$SNAPSHOT_FILE" | cut -f1)"
              break
            fi
            echo "⚠️  Node $NODE failed, trying next..."
          done
          [ -f "$SNAPSHOT_FILE" ] || { echo "❌ All nodes failed for etcd snapshot"; exit 1; }

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: etcd-snapshot-${{ env.ENV_NAME }}-${{ github.run_id }}
          path: /tmp/etcd-snapshot-*.db
          retention-days: 28

  # ── OpenBao Snapshot ──────────────────────────────────────────────────────────
  openbao-snapshot:
    name: OpenBao Raft Snapshot
    if: >
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 0' ||
      github.event_name == 'workflow_dispatch' && (inputs.task == 'openbao-snapshot' || inputs.task == 'all-snapshots')
    timeout-minutes: 20
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create OpenBao Raft snapshot
        run: |
          SNAPSHOT_FILE="/tmp/openbao-snapshot-$(date +%Y%m%d-%H%M%S).snap"
          KB=~/.kube/config-platform-productie
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          OPENBAO_POD=$($KT get pods -n openbao -l app.kubernetes.io/name=openbao \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          [ -z "$OPENBAO_POD" ] && { echo "❌ No running OpenBao pod"; exit 1; }

          echo "Creating Raft snapshot from pod $OPENBAO_POD..."
          $KT exec -n openbao "$OPENBAO_POD" -- \
            sh -c "bao operator raft snapshot save - 2>/dev/null" > "$SNAPSHOT_FILE"

          SNAP_SIZE=$(stat -c%s "$SNAPSHOT_FILE" 2>/dev/null || echo 0)
          [ "$SNAP_SIZE" -lt 100 ] && { echo "❌ Snapshot too small ($SNAP_SIZE bytes)"; cat "$SNAPSHOT_FILE" >&2; exit 1; }
          echo "✅ OpenBao snapshot: $(du -sh "$SNAPSHOT_FILE" | cut -f1)"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openbao-snapshot-${{ env.ENV_NAME }}-${{ github.run_id }}
          path: /tmp/openbao-snapshot-*.snap
          retention-days: 28

  # ── IaC Drift Detection ───────────────────────────────────────────────────────
  drift-detection:
    name: IaC Drift Detection
    if: >
      github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1' ||
      github.event_name == 'workflow_dispatch' && inputs.task == 'drift-detection'
    timeout-minutes: 20
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup tools
        uses: ./.github/actions/setup-platform
        with:
          age-secret-key: ${{ secrets.AGE_SECRET_KEY }}

      - name: Run tofu plan (drift check)
        env:
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
        run: |
          export TF_PLUGIN_CACHE_DIR="$HOME/.terraform.d/plugin-cache"
          STATE_DIR=~/.tofu/state/platform-${{ env.ENV_NAME }}
          mkdir -p $STATE_DIR

          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          while IFS= read -r line; do
            if [[ "$line" =~ ^([a-zA-Z_][a-zA-Z0-9_]*):[[:space:]]*(.*) ]]; then
              KEY="${BASH_REMATCH[1]}"; VAL="${BASH_REMATCH[2]}"
              [[ "$KEY" == "sops" ]] && break
              VAL="${VAL#\"}"; VAL="${VAL%\"}"
              [[ -n "$VAL" ]] && export "TF_VAR_${KEY}=${VAL}"
            fi
          done < <(sops -d "envs/${{ env.ENV_NAME }}/secrets.sops.yaml" 2>/dev/null || echo "")

          cd terraform
          tofu init -backend-config="path=$STATE_DIR/terraform.tfstate" -reconfigure -no-color 2>&1 | tail -5

          VARS=""
          [ -f "../envs/${{ env.ENV_NAME }}/terraform.tfvars" ]     && VARS="$VARS -var-file=../envs/${{ env.ENV_NAME }}/terraform.tfvars"
          [ -f "../envs/${{ env.ENV_NAME }}/services.auto.tfvars" ] && VARS="$VARS -var-file=../envs/${{ env.ENV_NAME }}/services.auto.tfvars"

          tofu plan $VARS -detailed-exitcode -no-color 2>&1 | tee /tmp/drift-plan.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          if [ $PLAN_EXIT -eq 0 ]; then
            echo "✅ No drift — infrastructure matches IaC state" >> "$GITHUB_STEP_SUMMARY"
          elif [ $PLAN_EXIT -eq 2 ]; then
            echo "⚠️ Drift detected — run ops.yml → apply-terraform to reconcile" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Drift check failed (tofu error)" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

      - name: Upload drift plan
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: drift-plan-${{ env.ENV_NAME }}-${{ github.run_id }}
          path: /tmp/drift-plan.txt
          retention-days: 14

  # ── Check Proxmox Resources ───────────────────────────────────────────────────
  check-resources:
    name: Check Proxmox Resources
    if: github.event_name == 'workflow_dispatch' && inputs.task == 'check-resources'
    timeout-minutes: 20
    runs-on: [self-hosted, prod-worker]
    steps:
      - name: Setup SSH key
        env:
          SSH_KEY_FILE: ${{ runner.temp }}/deployer
        run: |
          echo "${{ secrets.DEPLOYER_SSH_KEY }}" > $SSH_KEY_FILE
          chmod 600 $SSH_KEY_FILE
          mkdir -p ~/.ssh && cp $SSH_KEY_FILE ~/.ssh/deployer_ed25519 && chmod 600 ~/.ssh/deployer_ed25519

      - name: Check live Proxmox resources
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 -i ~/.ssh/deployer_ed25519"
          echo "===== HOST CPU & RAM =====" && ssh $SSH_OPTS root@10.25.0.3 "nproc; free -h; swapon --show || true"
          echo "===== ALL VMs =====" && ssh $SSH_OPTS root@10.25.0.3 "qm list"
          echo "===== STORAGE =====" && ssh $SSH_OPTS root@10.25.0.3 "pvesm status"
          echo "===== RAM TOTALS =====" && ssh $SSH_OPTS root@10.25.0.3 "
            total=0
            for vmid in \$(qm list | awk 'NR>1 && \$3==\"running\" {print \$1}'); do
              mem=\$(qm config \$vmid | awk -F': ' '/^memory:/{print \$2}')
              total=\$((total + mem))
            done
            phys=\$(free -m | awk '/Mem:/{print \$2}')
            echo \"Allocated: \${total}MB / Physical: \${phys}MB / Free: \$((phys - total))MB\"
          "

  # ── Refresh ArgoCD Token ──────────────────────────────────────────────────────
  refresh-argocd-token:
    name: Refresh ArgoCD GitHub Token
    if: github.event_name == 'workflow_dispatch' && inputs.task == 'refresh-argocd-token'
    timeout-minutes: 20
    runs-on:
      - self-hosted
      - prod-worker
    environment: productie
    steps:
      - name: Patch ArgoCD repo credentials
        run: |
          KB=~/.kube/config-platform-productie
          NEW_TOKEN=$(echo -n "${{ secrets.ARGOCD_GITHUB_TOKEN }}" | base64)
          kubectl --kubeconfig $KB patch secret repo-creds-github -n argocd \
            --type='json' \
            -p="[{\"op\":\"replace\",\"path\":\"/data/password\",\"value\":\"${NEW_TOKEN}\"}]"
          echo "✅ ArgoCD GitHub token refreshed"
          for app in $(kubectl --kubeconfig $KB get applications -n argocd -o name); do
            kubectl --kubeconfig $KB annotate $app -n argocd argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true
          done
          echo "✅ All apps hard-refreshed"

  # ── Renew ESO Periodic Token ──────────────────────────────────────────────────
  # Proactively renews the ESO periodic token in OpenBao before it expires.
  # The token has a 30-day period — this job runs every 15 days (1st and 15th of month).
  # ESO auto-renews the token while running, but this is a safety net for restart windows.
  renew-eso-token:
    name: Renew ESO OpenBao Token
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 5 1,15 * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'renew-eso-token')
    timeout-minutes: 20
    runs-on:
      - self-hosted
      - prod-worker
    environment: productie
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Renew ESO token in OpenBao
        env:
          ENV_NAME: ${{ env.ENV_NAME }}
        run: |
          KB=~/.kube/config-platform-$ENV_NAME

          # Get the current root token to create a new ESO token
          ROOT_TOKEN=$(kubectl --kubeconfig $KB get secret openbao-unseal-key \
            -n openbao -o jsonpath='{.data.root_token}' 2>/dev/null | base64 -d || echo "")
          if [ -z "$ROOT_TOKEN" ]; then
            echo "❌ Could not get root token — cannot renew ESO token"
            exit 1
          fi

          # Port-forward OpenBao for local API access
          kubectl --kubeconfig $KB port-forward svc/openbao -n openbao 8200:8200 &
          PF_PID=$!
          sleep 5

          # Create a new periodic ESO token (30-day period)
          NEW_TOKEN=$(kubectl --kubeconfig $KB exec -n openbao openbao-0 -- \
            env VAULT_TOKEN="$ROOT_TOKEN" VAULT_ADDR=http://127.0.0.1:8200 bao token create \
              -policy=platform-k8s \
              -policy=default \
              -period=720h \
              -orphan \
              -display-name="eso-${ENV_NAME}-periodic-renewed" \
              -renewable=true \
              -format=json 2>/dev/null | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['auth']['client_token'])" \
            2>/dev/null || echo "")

          kill $PF_PID 2>/dev/null || true

          if [ -z "$NEW_TOKEN" ]; then
            echo "❌ Failed to create new ESO token in OpenBao"
            exit 1
          fi

          # Update the openbao-token K8s secret with the new token
          kubectl --kubeconfig $KB create secret generic openbao-token \
            --namespace external-secrets \
            --from-literal=token="$NEW_TOKEN" \
            --dry-run=client -o yaml | \
            kubectl --kubeconfig $KB apply -f -

          # Restart ESO to pick up the new token immediately
          kubectl --kubeconfig $KB rollout restart deployment/external-secrets \
            -n external-secrets 2>/dev/null || true
          kubectl --kubeconfig $KB rollout status deployment/external-secrets \
            -n external-secrets --timeout=120s 2>/dev/null || true

          echo "✅ ESO token renewed — new 30-day periodic token created and applied"
          echo "✅ ESO deployment restarted to pick up new token"

  # ── Self-Heal Cluster ─────────────────────────────────────────────────────────
  # Automated recovery: restarts stuck pods, re-syncs OutOfSync ArgoCD apps,
  # refreshes failed ExternalSecrets, and cleans stale CSI VolumeAttachments.
  # Runs every 6 h. Longhorn orphan/snapshot cleanup is handled by Longhorn
  # settings (autoCleanupSystemGeneratedSnapshot + orphanResourceAutoDeletion).
  self-heal:
    name: Self-Heal Cluster
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'self-heal')
    timeout-minutes: 20
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-kubectl
        with:
          kubeconfig-b64: ${{ secrets.KUBECONFIG_PRODUCTIE }}

      - name: Recover stuck pods
        run: |
          KB=~/.kube/config-platform-productie
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"
          HEALED=0
          ISSUES=""

          echo "### 🔍 Checking for stuck pods..." | tee -a "$GITHUB_STEP_SUMMARY"

          # CrashLoopBackOff — restart count ≥ 10 (give more runway before force-restarting)
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            NS=$(echo "$line" | awk '{print $1}')
            POD=$(echo "$line" | awk '{print $2}')
            RESTARTS=$(echo "$line" | awk '{print $4}')
            echo "  ⚠️  CrashLoopBackOff: $NS/$POD (restarts: $RESTARTS) — deleting to force restart"
            $KT delete pod "$POD" -n "$NS" --grace-period=0 2>/dev/null && HEALED=$((HEALED+1)) || true
            ISSUES="${ISSUES}\n- CrashLoopBackOff: \`$NS/$POD\` (restarts: $RESTARTS) → deleted"
          done < <($KT get pods -A --field-selector='status.phase!=Succeeded' \
            -o custom-columns='NS:.metadata.namespace,NAME:.metadata.name,STATUS:.status.containerStatuses[0].state.waiting.reason,RESTARTS:.status.containerStatuses[0].restartCount' \
            --no-headers 2>/dev/null | awk '$3=="CrashLoopBackOff" && $4+0 >= 10 {print}' || true)

          # ImagePullBackOff — image can't be pulled
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            NS=$(echo "$line" | awk '{print $1}')
            POD=$(echo "$line" | awk '{print $2}')
            echo "  ⚠️  ImagePullBackOff: $NS/$POD — deleting (ArgoCD will recreate)"
            $KT delete pod "$POD" -n "$NS" --grace-period=0 2>/dev/null && HEALED=$((HEALED+1)) || true
            ISSUES="${ISSUES}\n- ImagePullBackOff: \`$NS/$POD\` → deleted"
          done < <($KT get pods -A \
            -o custom-columns='NS:.metadata.namespace,NAME:.metadata.name,STATUS:.status.containerStatuses[0].state.waiting.reason' \
            --no-headers 2>/dev/null | awk '$3=="ImagePullBackOff" || $3=="ErrImagePull" {print}' || true)

          # OOMKilled pods stuck in Failed state (not being restarted by controller)
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            NS=$(echo "$line" | awk '{print $1}')
            POD=$(echo "$line" | awk '{print $2}')
            echo "  ⚠️  OOMKilled+Failed: $NS/$POD — deleting for restart"
            $KT delete pod "$POD" -n "$NS" --grace-period=0 2>/dev/null && HEALED=$((HEALED+1)) || true
            ISSUES="${ISSUES}\n- OOMKilled/Error: \`$NS/$POD\` → deleted"
          done < <($KT get pods -A --field-selector='status.phase=Failed' \
            -o custom-columns='NS:.metadata.namespace,NAME:.metadata.name,REASON:.status.reason' \
            --no-headers 2>/dev/null | awk '$3=="OOMKilled" || $3=="Error" {print}' || true)

          # Stale CSI VolumeAttachments (attached=false = detach RPC failed; safe to delete)
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            VA_NAME=$(echo "$line" | awk '{print $1}')
            PV_NAME=$(echo "$line" | awk '{print $2}')
            NODE=$(echo "$line" | awk '{print $3}')
            echo "  ⚠️  Stale VolumeAttachment $VA_NAME (pv=$PV_NAME, node=$NODE) — deleting"
            $KT delete volumeattachment "$VA_NAME" --grace-period=0 2>/dev/null && HEALED=$((HEALED+1)) || true
            ISSUES="${ISSUES}\n- Stale VolumeAttachment: \`$VA_NAME\` (pv=$PV_NAME) → deleted"
          done < <($KT get volumeattachments \
            -o custom-columns='NAME:.metadata.name,PV:.spec.source.persistentVolumeName,NODE:.spec.nodeName,ATTACHED:.status.attached' \
            --no-headers 2>/dev/null | awk '$1~/^csi-/ && $4=="false" {print}' || true)

          if [[ $HEALED -eq 0 ]]; then
            echo "✅ No stuck pods found — cluster is healthy" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "🔧 Recovered $HEALED issue(s):" | tee -a "$GITHUB_STEP_SUMMARY"
            echo -e "$ISSUES" | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Re-sync OutOfSync ArgoCD apps
        run: |
          KB=~/.kube/config-platform-productie
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"
          RESYNCED=0
          ISSUES=""

          echo "### 🔍 Checking ArgoCD application health..." | tee -a "$GITHUB_STEP_SUMMARY"

          # Find apps that are OutOfSync or Degraded
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            APP=$(echo "$line" | awk '{print $1}')
            SYNC=$(echo "$line" | awk '{print $2}')
            HEALTH=$(echo "$line" | awk '{print $3}')
            echo "  ⚠️  App $APP is $SYNC/$HEALTH — forcing sync"
            $KT annotate application "$APP" -n argocd argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true
            RESYNCED=$((RESYNCED+1))
            ISSUES="${ISSUES}\n- \`$APP\`: $SYNC / $HEALTH → hard-refreshed"
          done < <($KT get applications -n argocd \
            -o custom-columns='NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status' \
            --no-headers 2>/dev/null | awk '$2=="OutOfSync" || $3=="Degraded" || $3=="Missing" {print}' || true)

          if [[ $RESYNCED -eq 0 ]]; then
            echo "✅ All ArgoCD apps are Synced and Healthy" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "🔧 Refreshed $RESYNCED ArgoCD app(s):" | tee -a "$GITHUB_STEP_SUMMARY"
            echo -e "$ISSUES" | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Refresh failed ExternalSecrets
        run: |
          KB=~/.kube/config-platform-productie
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"
          REFRESHED=0

          echo "### 🔍 Checking ExternalSecrets..." | tee -a "$GITHUB_STEP_SUMMARY"

          # Find ExternalSecrets in Error/NotReady state
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            NS=$(echo "$line" | awk '{print $1}')
            ES=$(echo "$line" | awk '{print $2}')
            STATUS=$(echo "$line" | awk '{print $3}')
            echo "  ⚠️  ExternalSecret $NS/$ES status=$STATUS — forcing refresh"
            $KT annotate externalsecret "$ES" -n "$NS" \
              "force-sync=$(date +%s)" --overwrite 2>/dev/null || true
            REFRESHED=$((REFRESHED+1))
          done < <($KT get externalsecrets -A \
            -o custom-columns='NS:.metadata.namespace,NAME:.metadata.name,STATUS:.status.conditions[0].reason' \
            --no-headers 2>/dev/null | awk '$3!="SecretSynced" && $3!="" {print}' || true)

          if [[ $REFRESHED -eq 0 ]]; then
            echo "✅ All ExternalSecrets are synced" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "🔧 Refreshed $REFRESHED ExternalSecret(s)" | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summary
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "🏥 Self-heal complete — $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"

  # ── etcd Alarm Check (manual emergency tool) ────────────────────────────────
  # On-demand only — the scheduled etcd-defrag job (every 6h) now handles both
  # CORRUPT alarm detection and proactive size-based defrag via etcd-heal.py.
  # Use this for immediate investigation when an alarm is suspected.
  etcd-alarm-check:
    name: etcd Alarm Check
    runs-on: [self-hosted, prod-worker]
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.task == 'etcd-alarm-check'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-kubectl
        with:
          kubeconfig-b64: ${{ secrets.KUBECONFIG_PRODUCTIE }}

      - name: Check and fix etcd CORRUPT alarm
        run: |
          KB=~/.kube/config-platform-productie
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          # Find the longhorn-manager pod on cp1 (has /host/proc with kube-apiserver certs)
          LH_POD=$($KT get pods -n longhorn-system -l app=longhorn-manager \
            --field-selector spec.nodeName=talos-prod-cp1 \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          if [[ -z "$LH_POD" ]]; then
            echo "::warning::No longhorn-manager pod found on talos-prod-cp1"
            exit 0
          fi

          # Copy the heal script (checked out from repo) into the pod and run it
          $KT cp scripts/etcd-heal.py longhorn-system/${LH_POD}:/tmp/etcd-heal.py 2>&1
          RESULT=$($KT exec -n longhorn-system "$LH_POD" -c longhorn-manager -- \
            python3 /tmp/etcd-heal.py 2>&1)
          echo "$RESULT"
          echo "$RESULT" >> "$GITHUB_STEP_SUMMARY"

  # ── OpenBao + ESO Recovery (every 6 h) ───────────────────────────────────────
  # Validates OpenBao is unsealed + ClusterSecretStore is healthy, then refreshes
  # any failed ExternalSecrets. Runs every 6 h alongside self-heal.
  # Stale VolumeAttachment cleanup is handled by the self-heal job above.
  openbao-eso-recovery:
    name: OpenBao / ESO Recovery
    runs-on: [self-hosted, prod-worker]
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'openbao-eso-recovery')
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-kubectl
        with:
          kubeconfig-b64: ${{ secrets.KUBECONFIG_PRODUCTIE }}

      - name: Validate OpenBao + refresh failed ExternalSecrets
        run: |
          KB=~/.kube/config-platform-productie
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"
          RECOVERED=0

          # ── 1. Check if OpenBao pod is Ready ─────────────────────────────────
          BAO_READY=$($KT get pod -n openbao openbao-0 \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "False")

          if [[ "$BAO_READY" != "True" ]]; then
            echo "OpenBao not ready yet (status=$BAO_READY) — skipping"
            exit 0
          fi

          # ── 2. Re-validate ClusterSecretStore ────────────────────────────────
          STORE_READY=$($KT get clustersecretstore openbao \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "False")
          if [[ "$STORE_READY" != "True" ]]; then
            echo "ClusterSecretStore not ready — annotating to force re-validation"
            $KT annotate clustersecretstore openbao \
              force-sync="$(date +%s)" --overwrite 2>/dev/null || true
            sleep 5
            RECOVERED=$((RECOVERED+1))
          fi

          # ── 3. Refresh all failed ExternalSecrets ────────────────────────────
          REFRESHED=0
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            NS=$(echo "$line" | awk '{print $1}')
            ES=$(echo "$line" | awk '{print $2}')
            $KT annotate externalsecret "$ES" -n "$NS" \
              force-sync="$(date +%s)" --overwrite 2>/dev/null || true
            REFRESHED=$((REFRESHED+1))
          done < <($KT get externalsecrets -A \
            -o custom-columns='NS:.metadata.namespace,NAME:.metadata.name,STATUS:.status.conditions[0].reason' \
            --no-headers 2>/dev/null | awk '$3=="SecretSyncedError" || $3=="NoSecretSynced" {print}' || true)

          if [[ $REFRESHED -gt 0 ]]; then
            RECOVERED=$((RECOVERED+1))
            echo "Refreshed $REFRESHED failed ExternalSecret(s)"
          fi

          # ── 4. Report ─────────────────────────────────────────────────────────
          if [[ $RECOVERED -gt 0 ]]; then
            DISCORD_URL=$($KT get secret -n argocd argocd-discord-secret \
              -o jsonpath='{.data.webhook_url}' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            if [[ -n "$DISCORD_URL" ]]; then
              curl -s -X POST "$DISCORD_URL" \
                -H "Content-Type: application/json" \
                -d "{\"content\": \"✅ **OpenBao/ESO Recovery**: refreshed $REFRESHED ExternalSecret(s).\"}" \
                > /dev/null 2>&1 || true
            fi
          else
            echo "✅ OpenBao healthy, all ExternalSecrets synced — nothing to recover"
          fi


  cert-expiry-check:
    name: Certificate Expiry Check
    runs-on: [self-hosted, prod-worker]
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'cert-expiry-check')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-kubectl
        with:
          kubeconfig-b64: ${{ secrets.KUBECONFIG_PRODUCTIE }}

      - name: Check certificate expiry windows
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.DISCORD_WEBHOOK }}
        run: |
          KB=~/.kube/config-platform-productie
          export KB
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import urllib.request
          from datetime import datetime, timezone

          kb = os.environ['KB']
          summary_file = os.environ['GITHUB_STEP_SUMMARY']
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '').strip()
          cmd = ['kubectl', '--kubeconfig', kb, '--insecure-skip-tls-verify', 'get', 'certificates.cert-manager.io', '-A', '-o', 'json']
          data = json.loads(subprocess.check_output(cmd, text=True))
          now = datetime.now(timezone.utc)
          warnings = []
          urgent = []
          for item in data.get('items', []):
            status = item.get('status') or {}
            not_after = status.get('notAfter')
            if not not_after:
              continue
            expiry = datetime.fromisoformat(not_after.replace('Z', '+00:00')).astimezone(timezone.utc)
            days_left = int((expiry - now).total_seconds() // 86400)
            entry = f"{item['metadata']['namespace']}/{item['metadata']['name']} expires in {days_left}d"
            if days_left <= 14:
              warnings.append(entry)
            if days_left <= 7:
              urgent.append(entry)
          with open(summary_file, 'a', encoding='utf-8') as handle:
            handle.write('## Certificate expiry check\n')
            if warnings:
              for entry in warnings:
                handle.write(f'- {entry}\n')
            else:
              handle.write('- All cert-manager certificates have >14d remaining\n')
          if urgent and webhook:
            try:
              payload = json.dumps({'content': '⚠️ **Certificate expiry check**\n' + '\n'.join(f'- {entry}' for entry in urgent)}).encode()
              req = urllib.request.Request(webhook, data=payload, headers={'Content-Type': 'application/json'})
              urllib.request.urlopen(req, timeout=10).read()
            except Exception:
              pass
          if urgent:
            sys.exit(1)
          PY

  velero-backup-verify:
    name: Velero Backup Verify
    runs-on: [self-hosted, prod-worker]
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '45 */6 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'velero-backup-verify')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-kubectl
        with:
          kubeconfig-b64: ${{ secrets.KUBECONFIG_PRODUCTIE }}

      - name: Verify recent Velero backups
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.DISCORD_WEBHOOK }}
        run: |
          KB=~/.kube/config-platform-productie
          export KB
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import urllib.request
          from datetime import datetime, timezone

          kb = os.environ['KB']
          summary_file = os.environ['GITHUB_STEP_SUMMARY']
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '').strip()
          cmd = ['kubectl', '--kubeconfig', kb, '--insecure-skip-tls-verify', '-n', 'velero', 'get', 'backups.velero.io', '-o', 'json']
          data = json.loads(subprocess.check_output(cmd, text=True))
          now = datetime.now(timezone.utc)
          completed = []
          for item in data.get('items', []):
            status = item.get('status') or {}
            if status.get('phase') != 'Completed':
              continue
            completed_at = status.get('completionTimestamp') or status.get('startTimestamp')
            if not completed_at:
              continue
            timestamp = datetime.fromisoformat(completed_at.replace('Z', '+00:00')).astimezone(timezone.utc)
            completed.append(((now - timestamp).total_seconds() / 3600, item['metadata']['name']))
          freshest = min(completed, default=None)
          with open(summary_file, 'a', encoding='utf-8') as handle:
            handle.write('## Velero backup verification\n')
            if freshest is None:
              handle.write('- No completed Velero backups found\n')
            else:
              handle.write(f'- Freshest completed backup: {freshest[1]} ({freshest[0]:.1f}h ago)\n')
          stale = freshest is None or freshest[0] > 36
          if stale and webhook:
            try:
              payload = json.dumps({'content': '⚠️ **Velero backup verification** found no completed backup within the last 36h.'}).encode()
              req = urllib.request.Request(webhook, data=payload, headers={'Content-Type': 'application/json'})
              urllib.request.urlopen(req, timeout=10).read()
            except Exception:
              pass
          if stale:
            sys.exit(1)
          PY

  # ── GitHub↔Onedev Sync Health Check ──────────────────────────────────────────
  # Compares the HEAD SHA on GitHub (runner checkout) against the latest commit
  # on the main branch in Onedev. A mismatch means the git mirror is behind and
  # ArgoCD may be syncing from stale manifests.
  sync-health-check:
    name: GitHub↔Onedev Sync Health Check
    runs-on: [self-hosted, prod-worker]
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'sync-health-check')
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compare GitHub HEAD with Onedev main
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.DISCORD_WEBHOOK }}
          ONEDEV_TOKEN: ${{ secrets.ONEDEV_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import urllib.request

          summary_file = os.environ['GITHUB_STEP_SUMMARY']
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '').strip()
          onedev_token = os.environ.get('ONEDEV_TOKEN', '').strip()

          github_sha = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()

          onedev_url = 'https://onedev.rlservers.com/~api/projects/InfraWeaver-platform/commits/main'
          req = urllib.request.Request(onedev_url)
          if onedev_token:
              import base64
              credentials = base64.b64encode(f'infraweaver:{onedev_token}'.encode()).decode()
              req.add_header('Authorization', f'Basic {credentials}')
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  data = json.loads(resp.read())
              onedev_sha = data.get('hash', '')
          except Exception as exc:
              msg = f'Failed to reach Onedev API: {exc}'
              with open(summary_file, 'a') as fh:
                  fh.write(f'## GitHub↔Onedev Sync\n- ⚠️ {msg}\n')
              if webhook:
                  payload = json.dumps({'content': f'⚠️ **GitHub↔Onedev sync check** could not reach Onedev: {exc}'}).encode()
                  try:
                      urllib.request.urlopen(urllib.request.Request(webhook, data=payload, headers={'Content-Type': 'application/json'}), timeout=10)
                  except Exception:
                      pass
              sys.exit(1)

          in_sync = github_sha == onedev_sha
          with open(summary_file, 'a') as fh:
              fh.write('## GitHub↔Onedev Sync\n')
              fh.write(f'- GitHub HEAD : `{github_sha}`\n')
              fh.write(f'- Onedev main : `{onedev_sha}`\n')
              fh.write(f'- Status      : {"✅ in sync" if in_sync else "❌ MISMATCH"}\n')

          if not in_sync:
              msg = f'GitHub HEAD `{github_sha[:8]}` does not match Onedev main `{onedev_sha[:8]}`. ArgoCD may be syncing stale manifests.'
              if webhook:
                  payload = json.dumps({'content': f'⚠️ **GitHub↔Onedev sync mismatch**\n{msg}'}).encode()
                  try:
                      urllib.request.urlopen(urllib.request.Request(webhook, data=payload, headers={'Content-Type': 'application/json'}), timeout=10)
                  except Exception:
                      pass
              sys.exit(1)
          PY
