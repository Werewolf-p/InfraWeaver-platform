name: Recover Kubeconfig
on:
  workflow_dispatch:
    inputs:
      target_path:
        description: 'Path to write kubeconfig on runner'
        required: false
        default: '/home/runner/.kube/config-active'
      use_fallback:
        description: 'Use fallback kubeconfig (true/false)'
        required: false
        default: 'false'

jobs:
  recover:
    runs-on: self-hosted
    steps:
      - name: Write kubeconfig to runner filesystem
        env:
          KUBE_PRIMARY: ${{ secrets.KUBECONFIG_PRODUCTIE }}
          KUBE_FALLBACK: ${{ secrets.KUBECONFIG_PRODUCTIE_FALLBACK }}
        run: |
          TARGET="${{ github.event.inputs.target_path }}"
          if [ "${{ github.event.inputs.use_fallback }}" = "true" ]; then
            SECRET="$KUBE_FALLBACK"
            echo "Using FALLBACK kubeconfig"
          else
            SECRET="$KUBE_PRIMARY"
            echo "Using PRIMARY kubeconfig"
          fi
          
          # Check if it's base64 (doesn't start with 'apiVersion')
          FIRST_CHAR=$(echo "$SECRET" | head -c 10)
          if echo "$FIRST_CHAR" | grep -q "^apiVersion"; then
            echo "Secret is plain YAML, writing directly"
            echo "$SECRET" > "$TARGET"
          else
            echo "Secret appears base64 encoded, decoding..."
            echo "$SECRET" | base64 -d > "$TARGET"
          fi
          chmod 600 "$TARGET"
          
          # Show server URL
          grep "server:" "$TARGET" || true
          echo "---kubeconfig written---"
          
          # Test connectivity (allow failure)
          kubectl --kubeconfig "$TARGET" get nodes 2>&1 || echo "NOTE: kubectl test failed - credentials may need renewal"
