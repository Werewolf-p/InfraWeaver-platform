name: Recover Kubeconfig
on:
  workflow_dispatch:
    inputs:
      target_path:
        description: 'Path to write kubeconfig on runner'
        required: false
        default: '/home/runner/.kube/config-active'

jobs:
  recover:
    runs-on: self-hosted
    steps:
      - name: Write kubeconfig to runner filesystem
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTIE }}" > "${{ github.event.inputs.target_path }}"
          chmod 600 "${{ github.event.inputs.target_path }}"
          echo "Written kubeconfig to ${{ github.event.inputs.target_path }}"
          # Test connectivity
          kubectl --kubeconfig "${{ github.event.inputs.target_path }}" get nodes 2>&1 || echo "kubectl test failed"
