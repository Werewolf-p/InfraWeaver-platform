name: Recover Kubeconfig
on:
  workflow_dispatch:
    inputs:
      target_path:
        description: 'Path to write kubeconfig on runner'
        required: false
        default: '/home/runner/.kube/config-active'
      use_fallback:
        description: 'Use fallback kubeconfig'
        required: false
        default: 'false'

jobs:
  recover:
    runs-on: self-hosted
    steps:
      - name: Write kubeconfig to runner filesystem
        env:
          KUBE_PRIMARY: ${{ secrets.KUBECONFIG_PRODUCTIE }}
          KUBE_FALLBACK: ${{ secrets.KUBECONFIG_PRODUCTIE_FALLBACK }}
        run: |
          TARGET="${{ github.event.inputs.target_path }}"
          if [ "${{ github.event.inputs.use_fallback }}" = "true" ]; then
            SECRET="$KUBE_FALLBACK"
            echo "Using FALLBACK kubeconfig"
          else
            SECRET="$KUBE_PRIMARY"
            echo "Using PRIMARY kubeconfig"
          fi
          
          # Try as-is first, then try base64 decode
          echo "$SECRET" > "${TARGET}.raw"
          if kubectl --kubeconfig "${TARGET}.raw" version --client 2>&1 | grep -q "error loading"; then
            echo "Decoding base64..."
            echo "$SECRET" | base64 -d > "$TARGET"
          else
            cp "${TARGET}.raw" "$TARGET"
          fi
          rm -f "${TARGET}.raw"
          chmod 600 "$TARGET"
          
          # Show server URL (not credentials)
          grep "server:" "$TARGET" || true
          
          # Test connectivity
          kubectl --kubeconfig "$TARGET" get nodes 2>&1 || echo "kubectl test failed - credentials may be stale"
