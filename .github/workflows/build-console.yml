name: Build InfraWeaver Console

on:
  push:
    branches: [main]
    paths:
      - 'apps/infraweaver-console/**'
  workflow_dispatch:

env:
  REGISTRY: onedev.rlservers.com
  IMAGE_NAME: infraweaver/infraweaver-console

concurrency:
  group: build-infraweaver-console
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Build and push Docker image
        env:
          ONEDEV_USER: ${{ secrets.ONEDEV_REGISTRY_USER }}
          ONEDEV_PASS: ${{ secrets.ONEDEV_REGISTRY_PASS }}
        run: |
          set -euo pipefail

          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          BRANCH_TAG="${GITHUB_REF_NAME}"
          SHA_TAG="${GITHUB_REF_NAME}-${SHORT_SHA}"
          IMAGE_BASE="${REGISTRY}/${IMAGE_NAME}"

          # Wait for registry to be reachable (handles node disruptions)
          echo "==> Waiting for registry to be reachable..."
          for i in $(seq 1 12); do
            if curl -sf --max-time 5 "https://${REGISTRY}/v2/" >/dev/null 2>&1 || \
               curl -sf --max-time 5 "https://${REGISTRY}/v2/" -o /dev/null -w "%{http_code}" 2>/dev/null | grep -qE "200|401"; then
              echo "Registry reachable after ${i} attempt(s)"
              break
            fi
            echo "  Registry not ready (attempt $i/12), waiting 30s..."
            sleep 30
          done

          echo "==> Logging in to OneDev registry..."
          for i in 1 2 3; do
            echo "${ONEDEV_PASS}" | docker login "${REGISTRY}" -u "${ONEDEV_USER}" --password-stdin && break
            echo "  Login failed (attempt $i/3), retrying in 20s..."
            sleep 20
          done

          CACHE_DIR="/tmp/.buildx-cache-console"
          CACHE_NEW_DIR="/tmp/.buildx-cache-console-new"

          echo "==> Building image..."
          docker buildx build \
            --platform linux/amd64 \
            --build-arg CACHEBUST="${GITHUB_SHA}" \
            --cache-from "type=local,src=${CACHE_DIR}" \
            --cache-to "type=local,dest=${CACHE_NEW_DIR},mode=max" \
            --tag "${IMAGE_BASE}:${BRANCH_TAG}" \
            --tag "${IMAGE_BASE}:${SHA_TAG}" \
            --push \
            apps/infraweaver-console

          echo "✅ Built and pushed to OneDev registry:" >> $GITHUB_STEP_SUMMARY
          echo "- ${IMAGE_BASE}:${BRANCH_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- ${IMAGE_BASE}:${SHA_TAG}" >> $GITHUB_STEP_SUMMARY

          # Rotate cache atomically to prevent unlimited growth
          rm -rf "${CACHE_DIR}"
          mv "${CACHE_NEW_DIR}" "${CACHE_DIR}" 2>/dev/null || true

      - name: Rollout restart console deployment
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PRODUCTIE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

          # Heal kubeconfig to a reachable API server
          for ip in 10.10.0.90 10.10.0.91 10.10.0.92; do
            if curl -sk --max-time 3 "https://$ip:6443/healthz" >/dev/null 2>&1; then
              sed -i "s|server: https://[0-9.]*:6443|server: https://$ip:6443|g" ~/.kube/config
              echo "Using API server: $ip"
              break
            fi
          done

          kubectl rollout restart deployment/infraweaver-console -n infraweaver-console
          kubectl rollout status deployment/infraweaver-console -n infraweaver-console --timeout=180s
          echo "✅ Deployment rolled out successfully" >> $GITHUB_STEP_SUMMARY
