name: Build InfraWeaver Console

on:
  push:
    branches: [main]
    paths:
      - 'apps/infraweaver-console/**'
  workflow_dispatch:

env:
  REGISTRY: onedev.rlservers.com
  IMAGE_NAME: infraweaver/infraweaver-console

concurrency:
  group: build-infraweaver-console
  cancel-in-progress: false

jobs:
  test:
    runs-on: [self-hosted, prod-worker]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/infraweaver-console/package-lock.json
      - name: Install dependencies
        working-directory: apps/infraweaver-console
        run: npm ci
      - name: TypeScript check
        working-directory: apps/infraweaver-console
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: apps/infraweaver-console
        run: npm test -- --passWithNoTests

  build:
    needs: [test]
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Free disk space (aggressive cleanup)
        run: |
          df -h /
          # Remove all stopped containers, dangling images, unused networks, build cache
          docker system prune -f || true
          # Remove unused images older than 24h (keeps the base layers we need cached)
          docker image prune -a --filter "until=24h" -f || true
          # Remove stale buildx cache
          docker buildx prune --filter "until=24h" -f || true
          rm -rf /tmp/.buildx-cache-console-new || true
          # Clean up runner diagnostic logs older than 1 day
          find /opt/platform-runner/_diag -name "*.log" -mtime +1 -delete 2>/dev/null || true
          find /opt/platform-runner/_work/_temp -mindepth 1 -maxdepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          # Clean npm cache if >5GB
          NPM_CACHE_SIZE=$(du -sb ~/.npm 2>/dev/null | cut -f1 || echo 0)
          if [ "$NPM_CACHE_SIZE" -gt 5368709120 ]; then npm cache clean --force || true; fi
          df -h /

      - name: Build and push Docker image
        id: build_image
        env:
          ONEDEV_USER: ${{ secrets.ONEDEV_REGISTRY_USER }}
          ONEDEV_PASS: ${{ secrets.ONEDEV_REGISTRY_PASS }}
        run: |
          set -euo pipefail

          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          BRANCH_TAG="${GITHUB_REF_NAME}"
          SHA_TAG="${GITHUB_REF_NAME}-${SHORT_SHA}"
          IMAGE_BASE="${REGISTRY}/${IMAGE_NAME}"

          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_BASE}:${SHA_TAG}" >> "$GITHUB_OUTPUT"

          # Wait for registry to be reachable (handles node disruptions)
          echo "==> Waiting for registry to be reachable..."
          for i in $(seq 1 12); do
            if curl -sf --max-time 5 "https://${REGISTRY}/v2/" >/dev/null 2>&1 || \
               curl -sf --max-time 5 "https://${REGISTRY}/v2/" -o /dev/null -w "%{http_code}" 2>/dev/null | grep -qE "200|401"; then
              echo "Registry reachable after ${i} attempt(s)"
              break
            fi
            echo "  Registry not ready (attempt $i/12), waiting 30s..."
            sleep 30
          done

          echo "==> Logging in to OneDev registry..."
          for i in 1 2 3; do
            echo "${ONEDEV_PASS}" | docker login "${REGISTRY}" -u "${ONEDEV_USER}" --password-stdin && break
            echo "  Login failed (attempt $i/3), retrying in 20s..."
            sleep 20
          done

          CACHE_DIR="/tmp/.buildx-cache-console"
          CACHE_NEW_DIR="/tmp/.buildx-cache-console-new"

          echo "==> Building image..."
          docker buildx build \
            --platform linux/amd64 \
            --build-arg CACHEBUST="${GITHUB_SHA}" \
            --build-arg APP_VERSION="${SHORT_SHA}" \
            --cache-from "type=local,src=${CACHE_DIR}" \
            --cache-to "type=local,dest=${CACHE_NEW_DIR},mode=max" \
            --tag "${IMAGE_BASE}:${BRANCH_TAG}" \
            --tag "${IMAGE_BASE}:${SHA_TAG}" \
            --push \
            apps/infraweaver-console

          echo "✅ Built and pushed to OneDev registry:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${IMAGE_BASE}:${BRANCH_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${IMAGE_BASE}:${SHA_TAG}" >> "$GITHUB_STEP_SUMMARY"

          rm -rf "${CACHE_DIR}"
          mv "${CACHE_NEW_DIR}" "${CACHE_DIR}" 2>/dev/null || true

      - name: Install Trivy
        run: |
          if command -v trivy >/dev/null 2>&1; then
            exit 0
          fi
          TRIVY_VERSION="v0.70.0"
          mkdir -p "$HOME/bin"
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_0.70.0_Linux-64bit.tar.gz" \
            | tar -xzf - -C "$HOME/bin" trivy
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Scan built image for CRITICAL CVEs
        run: |
          trivy image --severity CRITICAL --exit-code 1 --no-progress --quiet "${{ steps.build_image.outputs.image_ref }}"

      - name: Set deployment mode (blocks mutations during rollout)
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PRODUCTIE }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          for ip in 10.10.0.90 10.10.0.91 10.10.0.92; do
            if curl -sk --max-time 3 "https://$ip:6443/healthz" >/dev/null 2>&1; then
              sed -i "s|server: https://[0-9.]*:6443|server: https://$ip:6443|g" ~/.kube/config
              break
            fi
          done
          kubectl patch configmap infraweaver-api-mode -n infraweaver-console \
            --patch '{"data":{"mode":"deployment"}}' --type merge 2>/dev/null \
            || kubectl create configmap infraweaver-api-mode -n infraweaver-console \
               --from-literal=mode=deployment 2>/dev/null || true
          echo "🚀 API set to deployment mode" >> $GITHUB_STEP_SUMMARY

      - name: Update deployment manifest
        id: update_manifest
        run: |
          set -euo pipefail
          MANIFEST="kubernetes/catalog/infraweaver-console/manifests/deployment.yaml"
          SHA_TAG="${{ steps.build_image.outputs.sha_tag }}"
          PREVIOUS_TAG=$(grep -E "image: ${REGISTRY}/${IMAGE_NAME}:" "$MANIFEST" | head -1 | sed -E "s|.*image: ${REGISTRY}/${IMAGE_NAME}:([^[:space:]]+).*|\\1|")
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          sed -i "s|image: ${REGISTRY}/${IMAGE_NAME}:.*|image: ${REGISTRY}/${IMAGE_NAME}:${SHA_TAG}|g" "$MANIFEST"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          if ! git diff --cached --quiet; then
            echo "manifest_changed=true" >> "$GITHUB_OUTPUT"
            git commit -m $'chore: deploy '"${SHA_TAG}"$' [skip ci]\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>'
          else
            echo "manifest_changed=false" >> "$GITHUB_OUTPUT"
            echo "Manifest already updated for ${SHA_TAG}"
          fi
          PUSHED=false
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Manifest pushed on attempt $attempt"
              PUSHED=true
              break
            fi
            echo "Push failed (attempt $attempt), rebasing..."
            git pull --rebase origin main
          done
          if [ "$PUSHED" != true ]; then
            echo "❌ Failed to push deployment manifest after 3 attempts" >&2
            exit 1
          fi
          echo "✅ Deployment manifest updated from ${PREVIOUS_TAG} to ${SHA_TAG}" >> "$GITHUB_STEP_SUMMARY"

      - name: Force ArgoCD sync and wait for rollout
        env:
          KUBECONFIG: ~/.kube/config
          APP_NAME: catalog-infraweaver-console-manifests
          DEPLOYMENT_NAME: infraweaver-console
          DEPLOYMENT_NAMESPACE: infraweaver-console
          SYNC_TIMEOUT_SECONDS: "300"
          ROLLOUT_TIMEOUT_SECONDS: "300"
        run: bash scripts/deploy/sync-argocd-app.sh

      - name: Smoke test console
        env:
          SMOKE_URL: https://infraweaver.int.rlservers.com/api/health
          SMOKE_TIMEOUT_SECONDS: "180"
        run: bash scripts/deploy/smoke-test-url.sh

      - name: Restore live mode
        if: always()
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PRODUCTIE }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          for ip in 10.10.0.90 10.10.0.91 10.10.0.92; do
            if curl -sk --max-time 3 "https://$ip:6443/healthz" >/dev/null 2>&1; then
              sed -i "s|server: https://[0-9.]*:6443|server: https://$ip:6443|g" ~/.kube/config
              break
            fi
          done
          kubectl patch configmap infraweaver-api-mode -n infraweaver-console \
            --patch '{"data":{"mode":"live"}}' --type merge 2>/dev/null || true
          echo "✅ API restored to live mode" >> $GITHUB_STEP_SUMMARY

      - name: Auto rollback on failed rollout
        if: failure() && steps.update_manifest.outputs.previous_tag != '' && steps.update_manifest.outputs.manifest_changed == 'true'
        env:
          PREVIOUS_TAG: ${{ steps.update_manifest.outputs.previous_tag }}
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PRODUCTIE }}
          APP_NAME: catalog-infraweaver-console-manifests
          DEPLOYMENT_NAME: infraweaver-console
          DEPLOYMENT_NAMESPACE: infraweaver-console
          SYNC_TIMEOUT_SECONDS: "300"
          ROLLOUT_TIMEOUT_SECONDS: "300"
          SMOKE_URL: https://infraweaver.int.rlservers.com/api/health
          SMOKE_TIMEOUT_SECONDS: "180"
        run: |
          set -euo pipefail
          MANIFEST="kubernetes/catalog/infraweaver-console/manifests/deployment.yaml"
          sed -i "s|image: ${REGISTRY}/${IMAGE_NAME}:.*|image: ${REGISTRY}/${IMAGE_NAME}:${PREVIOUS_TAG}|g" "$MANIFEST"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          if ! git diff --cached --quiet; then
            git commit -m $'revert: rollback console deploy to '"${PREVIOUS_TAG}"$' [skip ci]\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>'
            PUSHED=false
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                PUSHED=true
                break
              fi
              git pull --rebase origin main
            done
            if [ "$PUSHED" != true ]; then
              echo "❌ Failed to push rollback manifest" >&2
              exit 1
            fi
          fi
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          for ip in 10.10.0.90 10.10.0.91 10.10.0.92; do
            if curl -sk --max-time 3 "https://$ip:6443/healthz" >/dev/null 2>&1; then
              sed -i "s|server: https://[0-9.]*:6443|server: https://$ip:6443|g" ~/.kube/config
              break
            fi
          done
          bash scripts/deploy/sync-argocd-app.sh
          bash scripts/deploy/smoke-test-url.sh
          echo "↩️ Rolled console back to ${PREVIOUS_TAG}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord on success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.DISCORD_WEBHOOK }}
          DISCORD_TITLE: "✅ InfraWeaver Console deploy succeeded"
          DISCORD_DESCRIPTION: "ArgoCD synced infraweaver-console and the smoke test passed."
          DISCORD_COLOR: "3066993"
          DISCORD_FIELDS_JSON: >-
            [{"name":"Image","value":"`${{ steps.build_image.outputs.image_ref }}`","inline":false},{"name":"Environment","value":"`productie`","inline":true},{"name":"Logs","value":"[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})","inline":false}]
        run: bash scripts/deploy/notify-discord.sh

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.DISCORD_WEBHOOK }}
          DISCORD_TITLE: "❌ InfraWeaver Console deploy failed"
          DISCORD_DESCRIPTION: "The console build/deploy pipeline failed before completing rollout."
          DISCORD_COLOR: "15158332"
          DISCORD_FIELDS_JSON: >-
            [{"name":"Ref","value":"`${{ github.ref_name }}`","inline":true},{"name":"Actor","value":"`${{ github.actor }}`","inline":true},{"name":"Logs","value":"[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})","inline":false}]
        run: bash scripts/deploy/notify-discord.sh
