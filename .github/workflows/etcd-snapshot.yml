name: etcd Snapshot Backup

# ── Scheduled etcd snapshots ──────────────────────────────────────────────────
# Creates a Talos etcd snapshot weekly and uploads as a GitHub Actions artifact.
# Retains 4 snapshots (4 weeks). For production DR, also copy to off-cluster storage.

on:
  schedule:
    - cron: "0 3 * * 0"   # Every Sunday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: etcd-snapshot
  cancel-in-progress: false

permissions:
  contents: read

env:
  ENV_NAME: productie

jobs:
  snapshot:
    name: "etcd Snapshot — productie"
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup talosctl
        run: |
          TALOS_VER=$(grep 'talos_version' envs/${{ env.ENV_NAME }}/cluster.yaml | awk '{print $2}' | tr -d '"')
          curl -fsSL \
            "https://github.com/siderolabs/talos/releases/download/${TALOS_VER}/talosctl-linux-amd64" \
            -o /usr/local/bin/talosctl
          chmod +x /usr/local/bin/talosctl
          echo "talosctl $(talosctl version --client --short 2>/dev/null || echo installed)"

      - name: Setup talosconfig
        run: |
          mkdir -p ~/.talos
          TALOS_CFG="envs/${{ env.ENV_NAME }}/generated/talosconfig"
          if [ -f "$TALOS_CFG" ]; then
            cp "$TALOS_CFG" ~/.talos/config
            echo "Talosconfig loaded from ${TALOS_CFG}"
          else
            echo "❌ talosconfig not found at ${TALOS_CFG}" >&2
            echo "Run full-redeploy.yml first to generate the talosconfig." >&2
            exit 1
          fi

      - name: Create etcd snapshot
        run: |
          SNAPSHOT_FILE="/tmp/etcd-snapshot-$(date +%Y%m%d-%H%M%S).db"
          # Take snapshot from one of the control plane nodes
          for NODE in 10.25.0.90 10.25.0.91 10.25.0.92; do
            if talosctl --nodes "$NODE" etcd snapshot "$SNAPSHOT_FILE" 2>/dev/null; then
              echo "✅ etcd snapshot created from ${NODE}: ${SNAPSHOT_FILE}"
              echo "   Size: $(du -sh "$SNAPSHOT_FILE" | cut -f1)"
              break
            fi
            echo "⚠️  Node ${NODE} failed, trying next..."
          done
          [ -f "$SNAPSHOT_FILE" ] || { echo "❌ All nodes failed for etcd snapshot"; exit 1; }

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: etcd-snapshot-${{ env.ENV_NAME }}-${{ github.run_id }}
          path: /tmp/etcd-snapshot-*.db
          retention-days: 28   # keep 4 weekly snapshots
