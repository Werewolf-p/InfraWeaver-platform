name: Refresh ArgoCD GitHub Token
on:
  workflow_dispatch:
jobs:
  refresh:
    runs-on:
      - self-hosted
      - prod-worker
    environment: productie
    steps:
      - name: Update ArgoCD repo credentials
        run: |
          export KUBECONFIG=~/.kube/config-platform-productie
          
          # Encode new token
          NEW_TOKEN=$(echo -n "${{ secrets.ARGOCD_GITHUB_TOKEN }}" | base64)
          
          # Patch the repo-creds secret
          kubectl patch secret repo-creds-github -n argocd \
            --type='json' \
            -p="[{\"op\":\"replace\",\"path\":\"/data/password\",\"value\":\"${NEW_TOKEN}\"}]"
          
          echo "Secret patched successfully"
          
          # Force a hard refresh of all apps
          for app in $(kubectl get applications -n argocd -o name); do
            kubectl annotate $app -n argocd argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true
          done
          echo "All apps refreshed"
