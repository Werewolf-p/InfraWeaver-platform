name: Fix Etcd Corruption
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'list-members'
        type: choice
        options:
          - list-members
          - remove-cp2
          - reboot-cp2
          - alarm-disarm
jobs:
  fix-etcd:
    runs-on:
      - self-hosted
      - prod-worker
    environment: productie
    steps:
      - uses: actions/checkout@v4
      - name: Setup talosconfig
        run: |
          mkdir -p ~/.talos
          python3 .github/scripts/extract_kubeconfig.py
          cp /tmp/kubeconfig-extract/talosconfig ~/.talos/config
          chmod 600 ~/.talos/config
      - name: List etcd members
        if: inputs.action == 'list-members' || inputs.action == 'remove-cp2'
        run: |
          talosctl --nodes 10.25.0.90 etcd members 2>&1
      - name: Remove cp2 etcd member (ID 3accb43c5401c1cb)
        if: inputs.action == 'remove-cp2'
        run: |
          echo "Removing cp2 etcd member: 3accb43c5401c1cb"
          talosctl --nodes 10.25.0.90 etcd remove-member "3accb43c5401c1cb" 2>&1
          echo "Members after removal:"
          talosctl --nodes 10.25.0.90 etcd members 2>&1
      - name: Disarm etcd alarm
        if: inputs.action == 'alarm-disarm'
        run: |
          talosctl --nodes 10.25.0.90 etcd alarm disarm 2>&1
          talosctl --nodes 10.25.0.90 etcd alarm list 2>&1
      - name: Reboot cp2 (rejoins etcd after boot)
        if: inputs.action == 'reboot-cp2'
        run: |
          talosctl --nodes 10.25.0.91 reboot 2>&1
          echo "cp2 is rebooting - it will rejoin etcd cluster automatically"
