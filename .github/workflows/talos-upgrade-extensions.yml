name: Talos Rolling Upgrade - Add Longhorn Extensions

permissions:
  contents: read

concurrency:
  group: talos-upgrade-productie
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm rolling upgrade (causes controlled reboots)"
        required: true

jobs:
  rolling-upgrade:
    runs-on: [self-hosted, prod-worker]
    if: github.event.inputs.confirm == 'yes'
    steps:
      - uses: actions/checkout@v4

      - name: Setup talosctl
        run: |
          curl -sL https://talos.dev/install | sh

      - name: Setup talosconfig
        run: |
          mkdir -p ~/.talos
          python3 - <<'EOF'
          import json, os, sys
          state_path = '/home/ubuntu/.tofu/state/platform-productie/terraform.tfstate'
          with open(state_path) as f:
              state = json.load(f)
          for res in state.get('resources', []):
              for inst in res.get('instances', []):
                  attrs = inst.get('attributes', {})
                  filename = attrs.get('filename', '')
                  if res.get('type') == 'local_sensitive_file' and 'talosconfig' in filename:
                      content = attrs['content']
                      out_path = os.path.expanduser('~/.talos/config')
                      with open(out_path, 'w') as out:
                          out.write(content)
                      print(f"Talosconfig written to {out_path}")
                      sys.exit(0)
          print("ERROR: talosconfig not found in state", file=sys.stderr)
          sys.exit(1)
          EOF

      - name: Verify cluster health before upgrade
        run: |
          talosctl --nodes 10.25.0.90 health --wait-timeout 2m

      - name: Rolling upgrade - cp1 (10.25.0.90)
        run: |
          echo "Upgrading cp1 to schematic 53513e54... (iscsi-tools + util-linux-tools)"
          talosctl upgrade \
            --nodes 10.25.0.90 \
            --image factory.talos.dev/installer/53513e54bb39202f35694412577a6bc53d484744d35a126e5d42ef34785c0d83:v1.10.9 \
            --wait \
            --timeout 10m
          echo "cp1 upgrade complete"

      - name: Wait for cluster to stabilize after cp1
        run: |
          sleep 30
          talosctl --nodes 10.25.0.91 health --wait-timeout 3m

      - name: Rolling upgrade - cp2 (10.25.0.91)
        run: |
          echo "Upgrading cp2 to schematic 53513e54... (iscsi-tools + util-linux-tools)"
          talosctl upgrade \
            --nodes 10.25.0.91 \
            --image factory.talos.dev/installer/53513e54bb39202f35694412577a6bc53d484744d35a126e5d42ef34785c0d83:v1.10.9 \
            --wait \
            --timeout 10m
          echo "cp2 upgrade complete"

      - name: Wait for cluster to stabilize after cp2
        run: |
          sleep 30
          talosctl --nodes 10.25.0.92 health --wait-timeout 3m

      - name: Rolling upgrade - cp3 (10.25.0.92)
        run: |
          echo "Upgrading cp3 to schematic 53513e54... (iscsi-tools + util-linux-tools)"
          talosctl upgrade \
            --nodes 10.25.0.92 \
            --image factory.talos.dev/installer/53513e54bb39202f35694412577a6bc53d484744d35a126e5d42ef34785c0d83:v1.10.9 \
            --wait \
            --timeout 10m
          echo "cp3 upgrade complete"

      - name: Verify cluster health after all upgrades
        run: |
          sleep 30
          talosctl --nodes 10.25.0.90 health --wait-timeout 5m
          echo "All nodes upgraded successfully"
          echo "New schematic: 53513e54bb39202f35694412577a6bc53d484744d35a126e5d42ef34785c0d83"
          echo "Extensions: iscsi-tools, util-linux-tools (required for Longhorn)"
