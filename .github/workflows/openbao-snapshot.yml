name: OpenBao Raft Snapshot

# ── Scheduled OpenBao Raft snapshots ─────────────────────────────────────────
# Creates an OpenBao Raft snapshot weekly and uploads as a GitHub Actions artifact.
# This captures all secrets, policies, and auth config in a single restore-able file.
# Retains 4 snapshots (4 weeks).

on:
  schedule:
    - cron: "0 4 * * 0"   # Every Sunday at 04:00 UTC (1h after etcd snapshot)
  workflow_dispatch:

concurrency:
  group: openbao-snapshot
  cancel-in-progress: false

permissions:
  contents: read

env:
  ENV_NAME: productie

jobs:
  snapshot:
    name: "OpenBao Snapshot — productie"
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@v4

      - name: Create OpenBao Raft snapshot
        env:
          OPENBAO_TOKEN: ${{ secrets.OPENBAO_ROOT_TOKEN }}
        run: |
          SNAPSHOT_FILE="/tmp/openbao-snapshot-$(date +%Y%m%d-%H%M%S).snap"
          OPENBAO_ADDR="http://openbao.openbao.svc.cluster.local:8200"

          # Use bao CLI via kubectl exec into the OpenBao pod
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          OPENBAO_POD=$($KT get pods -n openbao -l app.kubernetes.io/name=openbao \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

          if [ -z "$OPENBAO_POD" ]; then
            echo "❌ No running OpenBao pod found"
            exit 1
          fi

          echo "Creating Raft snapshot from pod ${OPENBAO_POD}..."
          $KT exec -n openbao "$OPENBAO_POD" -- \
            sh -c "bao operator raft snapshot save - 2>/dev/null" > "$SNAPSHOT_FILE"

          SNAP_SIZE=$(stat -c%s "$SNAPSHOT_FILE" 2>/dev/null || echo "0")
          if [ "$SNAP_SIZE" -lt 100 ]; then
            echo "❌ Snapshot file is too small (${SNAP_SIZE} bytes) — something went wrong"
            cat "$SNAPSHOT_FILE" >&2 || true
            exit 1
          fi

          echo "✅ OpenBao Raft snapshot created: ${SNAPSHOT_FILE}"
          echo "   Size: $(du -sh "$SNAPSHOT_FILE" | cut -f1)"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: openbao-snapshot-${{ env.ENV_NAME }}-${{ github.run_id }}
          path: /tmp/openbao-snapshot-*.snap
          retention-days: 28   # keep 4 weekly snapshots
