name: Catalog Validate
# ─────────────────────────────────────────────────────────────────────────────
# Validates catalog.jsonl schema on push/PR to catalog files.
# NOT redundant with auto-update-catalog.yml:
#   • auto-update-catalog: runs on push, updates + commits catalog (no PR coverage)
#   • catalog-validate (this):  also runs on PRs and schedule (catches PR changes
#                               before they merge without auto-committing)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    paths:
      - '.github/catalog.jsonl'
      - '.github/catalog_schema.json'
      - '.github/scripts/**'
  pull_request:
    paths:
      - '.github/catalog.jsonl'
      - '.github/catalog_schema.json'
      - '.github/scripts/**'
  schedule:
    - cron: '0 2 * * *'

jobs:
  validate:
    runs-on: [self-hosted, prod-worker]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install jsonschema (optional)
        run: python3 -m pip install --user jsonschema || true
      - name: Run catalog validator
        run: |
          python3 ./.github/scripts/validate_catalog.py
