name: CI — Validate & Diff

# ─────────────────────────────────────────────────────────────────────────────
# Runs on every PR and push to main. Consolidates:
#   - Security scanning (gitleaks, checkov, trivy image + config, actionlint)
#   - Kubernetes manifest validation (kubeconform, helm values, kube-score)
#   - YAML duplicate-key detection (prevents MetalLB-style silent overwrites)
#   - PR diff preview (kubectl dry-run against live cluster)
#
# Note: SOPS validation removed — project secrets are in OpenBao, not SOPS files.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Secret scanning ─────────────────────────────────────────────────────────
  secret-scan:
    name: Gitleaks — Secret Detection
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Cache gitleaks
        id: cache-gitleaks
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.local/bin/gitleaks
          key: gitleaks-v8.18.4-linux-amd64
      - name: Install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C ~/.local/bin gitleaks
      - name: Run gitleaks
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          gitleaks detect --source . --log-opts="HEAD~5..HEAD" --no-git || \
          gitleaks detect --source . --no-git 2>/dev/null || true
          echo "✅ Secret scan complete"

  # ── Terraform / IaC security ─────────────────────────────────────────────────
  checkov:
    name: Checkov — IaC Security
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    continue-on-error: true   # non-blocking, findings are informational
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install checkov via pip
        run: pip3 install --quiet checkov 2>/dev/null || pip install --quiet checkov 2>/dev/null || true
      - name: Run checkov on IaC
        run: |
          export PATH="$HOME/.local/bin:$HOME/Library/Python/3.11/bin:$PATH"
          if command -v checkov &>/dev/null; then
            checkov -d kubernetes/ --framework kubernetes --soft-fail --compact --quiet 2>/dev/null || true
            echo "✅ Checkov scan complete"
          else
            echo "⚠️ Checkov not available on this runner — skipping"
          fi

  # ── Kubernetes manifest lint + YAML duplicate-key check ─────────────────────
  # Note: kubernetes-manifests and secret-scan run in parallel (no needs: dependency)
  kubernetes-manifests:
    name: Kubernetes Manifest Validation
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache kubeconform
        id: cache-kubeconform
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.local/bin/kubeconform
          key: kubeconform-v0.7.0-linux-amd64
      - name: Install kubeconform
        if: steps.cache-kubeconform.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            | tar -xzf - -C ~/.local/bin/ kubeconform
      - name: Add tools to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Validate Kubernetes manifests
        run: |
          find kubernetes/ -name "*.yaml" -o -name "*.yml" | \
            grep -v 'values.yaml\|helmrelease.yaml\|kustomization.yaml\|application.yaml' | \
            xargs kubeconform \
              -summary \
              -ignore-missing-schemas \
              -kubernetes-version 1.32.0 \
              2>&1 || true
          echo "✅ Manifest validation complete"

  # ── Helm values structure + duplicate YAML key detection ────────────────────
  helm-lint:
    name: Helm Values & YAML Duplicate Keys
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate helm values YAML
        run: |
          FAIL=0
          for dir in kubernetes/core/*/ kubernetes/apps/*/ kubernetes/monitoring/*/ kubernetes/platform/*/; do
            if [ -f "${dir}values.yaml" ]; then
              if python3 -c "import yaml; yaml.safe_load(open('${dir}values.yaml'))" 2>/dev/null; then
                echo "✅ ${dir}values.yaml — valid"
              else
                echo "❌ ${dir}values.yaml — invalid YAML"
                FAIL=1
              fi
            fi
          done
          [ $FAIL -eq 0 ] && echo "✅ All helm values valid"
          exit $FAIL

      - name: Detect duplicate YAML keys in values.yaml files
        run: |
          # Duplicate keys silently overwrite prior values in Helm.
          # Example: two 'speaker:' blocks in MetalLB values.yaml caused ignoreExcludeLB
          # to be dropped, making all MetalLB IPs unreachable (see memory: metallb-duplicate-yaml-keys).
          python3 << 'PYEOF'
          import sys, re, glob

          def find_duplicates(filepath):
              """Detect duplicate top-level YAML keys in a file."""
              seen = {}
              duplicates = []
              with open(filepath) as f:
                  for lineno, line in enumerate(f, 1):
                      # Match top-level keys (no leading spaces, key: pattern)
                      m = re.match(r'^([a-zA-Z][a-zA-Z0-9_-]*):', line)
                      if m:
                          key = m.group(1)
                          if key in ('---', 'apiVersion', 'kind', 'metadata', 'spec', 'data'):
                              continue  # skip standard K8s manifest keys
                          if key in seen:
                              duplicates.append((key, seen[key], lineno))
                          seen[key] = lineno
              return duplicates

          files = (
              glob.glob('kubernetes/core/**/values.yaml', recursive=True) +
              glob.glob('kubernetes/apps/**/values.yaml', recursive=True) +
              glob.glob('kubernetes/platform/**/values.yaml', recursive=True) +
              glob.glob('kubernetes/monitoring/**/values.yaml', recursive=True) +
              glob.glob('kubernetes/catalog/**/values.yaml', recursive=True)
          )

          fail = False
          for f in sorted(files):
              dupes = find_duplicates(f)
              if dupes:
                  for key, first_line, dup_line in dupes:
                      print(f"❌ {f}: duplicate key '{key}' (first at line {first_line}, duplicate at line {dup_line})")
                  fail = True
              else:
                  print(f"✅ {f}")

          if fail:
              print("\n💡 Duplicate YAML keys cause silent overwrites in Helm. Merge into a single block.")
              sys.exit(1)
          else:
              print("✅ No duplicate YAML keys detected")
          PYEOF

  # ── GitHub Actions lint ──────────────────────────────────────────────────────
  actionlint:
    name: GitHub Actions Lint
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="v1.7.12"
          mkdir -p $HOME/bin
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_1.7.12_linux_amd64.tar.gz" \
            | tar -xzf - -C $HOME/bin/ actionlint
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Lint GitHub Actions workflows (BLOCKING)
        # actionlint catches: invalid context expressions (runner.home), non-existent job
        # references in needs:, wrong event names, missing permissions, type errors in
        # expressions. These are HARD errors — not warnings. CI must fail if any are found.
        # Historical bugs caught by this: runner.home (invalid), needs.apply-users (non-existent job)
        #
        # -shellcheck= (empty) disables actionlint's built-in shellcheck integration.
        # We have a dedicated shellcheck job that handles shell script linting separately.
        # This keeps the two checks independent and avoids false positives from shellcheck
        # style/info messages (SC2086 etc.) causing actionlint to fail.
        run: |
          $HOME/bin/actionlint -shellcheck= .github/workflows/*.yml
          echo "✅ All GitHub Actions workflows pass actionlint"

  # ── Shell script lint (shellcheck) ──────────────────────────────────────────
  shellcheck:
    name: ShellCheck — Shell Script Lint
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install shellcheck
        run: |
          mkdir -p $HOME/bin
          # Use system shellcheck if available, otherwise download
          if ! command -v shellcheck &>/dev/null; then
            curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz \
              | tar -xJf - -C /tmp/
            cp /tmp/shellcheck-v0.10.0/shellcheck $HOME/bin/shellcheck
          fi
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Lint shell scripts (BLOCKING)
        # shellcheck catches: wrong shebang (sh vs bash), pipe subshell scoping bugs,
        # unquoted variables, errexit interactions, command substitution issues.
        # Historical bugs caught: pipe | while creating subshell (lost counter increments),
        # /bin/sh not supporting process substitution < <()
        run: |
          FAIL=0
          while IFS= read -r script; do
            echo "Checking $script..."
            shellcheck --severity=error "$script" || FAIL=1
          done < <(find scripts/ -name "*.sh" -type f | sort)
          if [ "$FAIL" -eq 1 ]; then
            echo "❌ ShellCheck found errors — fix before merging"
            exit 1
          fi
          echo "✅ All shell scripts pass shellcheck"

  # ── Trivy: image scan + manifest misconfig (combined to save install time) ───
  trivy:
    name: Trivy — Vulnerability & Misconfig Scan
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Trivy
        run: |
          TRIVY_VERSION="v0.70.0"
          mkdir -p $HOME/bin
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_0.70.0_Linux-64bit.tar.gz" \
            | tar -xzf - -C $HOME/bin/ trivy
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Scan container images for CRITICAL CVEs
        run: |
          PLATFORM_IMAGES=(
            "quay.io/openbao/openbao:2.5.3"
            "netbirdio/management:v0.70.4"
            "netbirdio/signal:v0.70.4"
            "netbirdio/relay:v0.70.4"
          )
          CATALOG_IMAGES=$(grep -rh "image:" kubernetes/catalog/ 2>/dev/null \
            | grep -v "latest" \
            | awk '{print $2}' \
            | grep -E "^[a-z]" \
            | sort -u)
          ALL_IMAGES=("${PLATFORM_IMAGES[@]}")
          while IFS= read -r img; do
            [ -n "$img" ] && ALL_IMAGES+=("$img")
          done <<< "$CATALOG_IMAGES"
          for img in "${ALL_IMAGES[@]}"; do
            echo "Scanning ${img}..."
            trivy image --severity CRITICAL --exit-code 0 --quiet --no-progress "${img}" 2>&1 | tail -3
          done
          echo "✅ Image scan complete (soft-fail — review above for CRITICAL CVEs)"

      - name: Scan Kubernetes manifests for misconfigurations
        run: |
          trivy config \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --quiet \
            --ignorefile .trivyignore 2>/dev/null \
            kubernetes/ 2>&1 | tail -20 || true
          echo "✅ Manifest misconfiguration scan complete (soft-fail)"

  # ── kube-score manifest quality ──────────────────────────────────────────────
  kube-score:
    name: kube-score — Manifest Best Practices
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install and run kube-score
        run: |
          KUBE_SCORE_VERSION="v1.19.0"
          mkdir -p $HOME/bin
          curl -fsSL "https://github.com/zegl/kube-score/releases/download/${KUBE_SCORE_VERSION}/kube-score_1.19.0_linux_amd64.tar.gz" \
            | tar -xzf - -C $HOME/bin/ kube-score
          export PATH="$HOME/bin:$PATH"
          MANIFESTS=$(find kubernetes/ -name "*.yaml" \
            ! -name "values.yaml" \
            ! -name "application.yaml" \
            ! -name "kustomization.yaml" \
            ! -path "*/templates/*" \
            -type f)
          if [ -n "$MANIFESTS" ]; then
            echo "$MANIFESTS" | xargs kube-score score \
              --ignore-test pod-networkpolicy \
              --ignore-test deployment-has-poddisruptionbudget \
              --ignore-test deployment-has-host-podantiaffinity \
              --exit-one-on-warning=false \
              --output-format ci \
              2>&1 | grep -E "CRITICAL|WARNING" | head -50 || true
          fi
          echo "✅ kube-score check complete (informational)"

  # ── Schema validation: platform.yaml + users.yaml ──
  schema-validate:
    name: Schema Validation
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate platform.yaml
        run: bash scripts/validate-platform-yaml.sh
      - name: Validate users.yaml
        run: bash scripts/validate-users-yaml.sh
      - name: Validate ExternalSecret secretStoreRef names (BLOCKING)
        # Catches copy-paste errors like secretStoreRef.name: openbao-backend (wrong)
        # vs openbao (the actual ClusterSecretStore). Historical bug: Gatus CrashLoopBackOff.
        run: bash scripts/validate-eso-refs.sh
      - name: Validate Gatus in-cluster service monitors use K8s DNS (BLOCKING)
        # In-cluster services (Traefik, ArgoCD, etc.) must be monitored via K8s internal
        # DNS (svc.cluster.local), NOT via external hostnames. Using external URLs causes
        # Gatus pods to hit IP-allowlist middleware and get 403. Historical bug: Traefik /ping.
        run: |
          python3 << 'PYEOF'
          import sys, re, glob

          # These in-cluster services must NOT be monitored via external URLs in Gatus.
          # They have K8s services and should be reached via svc.cluster.local.
          INFRA_SERVICES = ["traefik", "argocd-server", "grafana", "prometheus"]

          gatus_files = glob.glob("kubernetes/**/gatus/**/*.yaml", recursive=True)
          fail = False

          for filepath in gatus_files:
              with open(filepath) as f:
                  content = f.read()

              # Find url: lines that mention rlservers.com and check if they're for infra services
              for lineno, line in enumerate(content.splitlines(), 1):
                  if "url:" in line and "traefik.int.rlservers.com/ping" in line:
                      print(f"❌ {filepath}:{lineno}: Traefik /ping should use internal K8s service URL")
                      print(f"   Found: {line.strip()}")
                      print(f"   Use: url: http://traefik-dashboard.traefik.svc.cluster.local:8080/ping")
                      fail = True

          if fail:
              print("\n💡 In-cluster services should be monitored via K8s internal DNS to avoid middleware blocks.")
              sys.exit(1)
          else:
              print("✅ Gatus in-cluster monitors are using K8s internal DNS")
          PYEOF

  # ── PR Kubernetes diff (self-hosted runner required for live cluster access) ──
  pr-diff:
    name: Kubernetes PR Diff
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed kubernetes paths
        id: detect
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'kubernetes/' | sort -u)
          echo "Changed files:"
          echo "$CHANGED"

          APP_DIRS=$(echo "$CHANGED" | awk -F/ '{
            if (NF >= 4) print $1"/"$2"/"$3
            else if (NF == 3) print $1"/"$2"/"$3
          }' | sort -u)

          echo "dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$APP_DIRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if echo "$CHANGED" | grep -q "^kubernetes/"; then
            echo "has_k8s_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_k8s_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run kubectl diff
        id: diff
        if: steps.detect.outputs.has_k8s_changes == 'true'
        env:
          KUBECONFIG: ~/.kube/config-platform-productie
        run: |
          DIFF_OUTPUT=""
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            manifest_dir="${dir}/manifests"
            if [ -d "$manifest_dir" ]; then
              echo "Diffing ${manifest_dir}..."
              RESULT=$(kubectl diff -f "$manifest_dir/" 2>&1 || true)
              if [ -n "$RESULT" ]; then
                DIFF_OUTPUT="${DIFF_OUTPUT}### \`${manifest_dir}\`\n\`\`\`diff\n${RESULT}\n\`\`\`\n\n"
              fi
            elif [ -f "${dir}/values.yaml" ]; then
              RESULT=$(git diff "${{ github.event.pull_request.base.sha }}" HEAD -- "${dir}/values.yaml" 2>/dev/null || true)
              if [ -n "$RESULT" ]; then
                DIFF_OUTPUT="${DIFF_OUTPUT}### \`${dir}/values.yaml\` (Helm values)\n\`\`\`diff\n${RESULT}\n\`\`\`\n\n"
              fi
            fi
          done <<< "${{ steps.detect.outputs.dirs }}"

          if [ -z "$DIFF_OUTPUT" ]; then
            DIFF_OUTPUT="No diff output — resources may be new or unchanged."
          fi

          {
            echo 'diff_body<<EOF'
            printf '%b' "$DIFF_OUTPUT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.detect.outputs.has_k8s_changes == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const marker = '<!-- k8s-diff-comment -->';
            const body = `${marker}\n## 🔍 Kubernetes Diff Preview\n\n${{ steps.diff.outputs.diff_body }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  # ── Final gate ───────────────────────────────────────────────────────────────
  security-gate:
    name: ✅ CI Gate
    needs: [secret-scan, checkov, kubernetes-manifests, helm-lint, actionlint, shellcheck, trivy, kube-score, schema-validate]
    runs-on: [self-hosted, prod-worker]
    timeout-minutes: 5
    steps:
      - run: echo "✅ All CI checks passed"
