name: Update Cluster Kubeconfig Secret

# Run this workflow after cluster rebuild to update the KUBECONFIG_PRODUCTIE secret.
# Provide the new kubeconfig (base64 encoded) as input.
on:
  workflow_dispatch:
    inputs:
      kubeconfig_b64:
        description: 'New kubeconfig (base64 encoded). Run: base64 -w0 ~/.kube/config'
        required: true
      test_only:
        description: 'Only test, do not update secret (true/false)'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: [self-hosted]
    steps:
      - name: Test new kubeconfig
        env:
          KUBECONFIG_B64: ${{ github.event.inputs.kubeconfig_b64 }}
        run: |
          printf '%s' "$KUBECONFIG_B64" | base64 -d > /tmp/kube-new-test.yaml
          chmod 600 /tmp/kube-new-test.yaml
          grep "server:" /tmp/kube-new-test.yaml || true
          # Try new cluster IPs
          for ip in 10.10.0.92 10.10.0.93 10.10.0.94; do
            sed -i "s|server: https://[0-9.]*:6443|server: https://$ip:6443|g" /tmp/kube-new-test.yaml
            if kubectl --kubeconfig /tmp/kube-new-test.yaml get nodes 2>&1 | grep -q "Ready"; then
              echo "✅ Kubeconfig works with $ip!"
              kubectl --kubeconfig /tmp/kube-new-test.yaml get nodes
              break
            fi
            echo "  $ip didn't work, trying next..."
          done
          rm -f /tmp/kube-new-test.yaml

      - name: Update kubeconfig on runner
        if: github.event.inputs.test_only != 'true'
        env:
          KUBECONFIG_B64: ${{ github.event.inputs.kubeconfig_b64 }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_B64" | base64 -d > ~/.kube/config-active
          chmod 600 ~/.kube/config-active
          # Try all new cluster IPs
          for ip in 10.10.0.92 10.10.0.93 10.10.0.94; do
            sed -i "s|server: https://[0-9.]*:6443|server: https://$ip:6443|g" ~/.kube/config-active
            if kubectl --kubeconfig ~/.kube/config-active get nodes >/dev/null 2>&1; then
              echo "✅ Runner kubeconfig updated! Using $ip"
              kubectl --kubeconfig ~/.kube/config-active get nodes
              break
            fi
          done
          echo "✅ Kubeconfig written to ~/.kube/config-active"

      - name: Update GitHub secret KUBECONFIG_PRODUCTIE
        if: github.event.inputs.test_only != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KUBECONFIG_B64: ${{ github.event.inputs.kubeconfig_b64 }}
          REPO: ${{ github.repository }}
        run: |
          # Update the GitHub secret with the new kubeconfig
          printf '%s' "$KUBECONFIG_B64" | \
            gh secret set KUBECONFIG_PRODUCTIE -R "$REPO" 2>&1 || \
            echo "⚠️ Could not update GitHub secret - update it manually in Settings > Secrets"
          echo "✅ Secret update attempted" >> $GITHUB_STEP_SUMMARY
