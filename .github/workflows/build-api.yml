name: Build InfraWeaver API

on:
  push:
    branches: [main]
    paths:
      - 'apps/infraweaver-api/**'
  workflow_dispatch:

env:
  REGISTRY: onedev.rlservers.com
  INTERNAL_REGISTRY: onedev.infraweaver.local
  IMAGE_NAME: infraweaver/infraweaver-api

concurrency:
  group: build-infraweaver-api
  cancel-in-progress: false

jobs:
  test:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/infraweaver-api/package-lock.json
      - name: Install dependencies
        working-directory: apps/infraweaver-api
        run: npm ci
      - name: TypeScript check
        working-directory: apps/infraweaver-api
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: apps/infraweaver-api
        run: npm test -- --passWithNoTests

  build:
    needs: [test]
    runs-on: [self-hosted]
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        env:
          ONEDEV_USER: ${{ secrets.ONEDEV_REGISTRY_USER }}
          ONEDEV_PASS: ${{ secrets.ONEDEV_REGISTRY_PASS }}
        run: |
          set -euo pipefail

          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          SHA_TAG="${GITHUB_REF_NAME}-${SHORT_SHA}"
          IMAGE_BASE="${REGISTRY}/${IMAGE_NAME}"
          INTERNAL_IMAGE_BASE="${INTERNAL_REGISTRY}/${IMAGE_NAME}"

          echo "==> Logging in to OneDev registry..."
          for i in 1 2 3; do
            echo "${ONEDEV_PASS}" | docker login "${REGISTRY}" -u "${ONEDEV_USER}" --password-stdin && break
            echo "  Login failed (attempt $i/3), retrying in 20s..."
            sleep 20
          done

          echo "==> Building image ${SHA_TAG}..."
          docker buildx build \
            --platform linux/amd64 \
            --build-arg CACHEBUST="${GITHUB_SHA}" \
            --no-cache \
            --tag "${IMAGE_BASE}:${GITHUB_REF_NAME}" \
            --tag "${IMAGE_BASE}:${SHA_TAG}" \
            --push \
            apps/infraweaver-api

          echo "✅ Built and pushed: ${IMAGE_BASE}:${SHA_TAG}" >> $GITHUB_STEP_SUMMARY

          # Update deployment manifest (GitOps source-of-truth)
          MANIFEST="kubernetes/catalog/infraweaver-api/manifests/deployment.yaml"
          sed -i "s|image: ${INTERNAL_REGISTRY}/${IMAGE_NAME}:.*|image: ${INTERNAL_IMAGE_BASE}:${SHA_TAG}|g" "${MANIFEST}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST}"
          DEPLOY_MSG=$(printf 'chore: deploy infraweaver-api %s [skip ci]\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>' "${SHA_TAG}")
          git diff --cached --quiet || git commit -m "${DEPLOY_MSG}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Manifest pushed on attempt $attempt"
              break
            fi
            echo "Push failed (attempt $attempt), rebasing..."
            git pull --rebase origin main
          done

      - name: Rollout restart (if cluster accessible)
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PRODUCTIE }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config-ci
          chmod 600 ~/.kube/config-ci

          # Try new cluster IPs first, then fallback to old
          WORKING_IP=""
          for ip in 10.10.0.92 10.10.0.93 10.10.0.94 10.10.0.90 10.10.0.91; do
            if curl -sk --max-time 3 "https://$ip:6443/healthz" >/dev/null 2>&1; then
              sed -i "s|server: https://[0-9.]*:6443|server: https://$ip:6443|g" ~/.kube/config-ci
              WORKING_IP="$ip"
              echo "Using API server: $ip"
              break
            fi
          done

          if [ -z "$WORKING_IP" ]; then
            echo "⚠️ No cluster API server accessible - ArgoCD will sync automatically" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          kubectl --kubeconfig ~/.kube/config-ci rollout restart deployment/infraweaver-api -n infraweaver-console || \
            echo "⚠️ Rollout restart failed - ArgoCD will sync automatically"
          kubectl --kubeconfig ~/.kube/config-ci rollout status deployment/infraweaver-api -n infraweaver-console --timeout=180s || true
          echo "✅ Rollout triggered" >> $GITHUB_STEP_SUMMARY
          rm -f ~/.kube/config-ci
