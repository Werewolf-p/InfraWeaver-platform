# .github/workflows/release.yml — InfraWeaver Platform CI/CD
#
# Triggers:
#   - Push to main → builds "main-<sha>" images (rolling/dev channel)
#   - Version tag v* → builds semver images + creates GitHub Release
#   - Manual dispatch → force-rebuild with optional reason
#
# What it does:
#   1. Builds infraweaver-api, infraweaver-console, infraweaver-node
#   2. Pushes images to ghcr.io/werewolf-p/<app>:<version>
#   3. Updates kubernetes/catalog/*/manifests/deployment.yaml image tags
#   4. Commits the manifest changes back to main
#   5. On v* tags: creates a GitHub Release with generated notes

name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual rebuild'

# Allow pushing updated manifests and creating packages
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: werewolf-p

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so changelog generation works
          fetch-depth: 0

      - name: Compute version
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="main-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── infraweaver-api ───────────────────────────────────────────────────
      - name: Build & push infraweaver-api
        uses: docker/build-push-action@v5
        with:
          context: ./apps/infraweaver-api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/infraweaver-api:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/infraweaver-api:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=infraweaver-api
          cache-to: type=gha,mode=max,scope=infraweaver-api

      # ── infraweaver-console ───────────────────────────────────────────────
      - name: Build & push infraweaver-console
        uses: docker/build-push-action@v5
        with:
          context: ./apps/infraweaver-console
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/infraweaver-console:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/infraweaver-console:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha,scope=infraweaver-console
          cache-to: type=gha,mode=max,scope=infraweaver-console

      # ── infraweaver-node ──────────────────────────────────────────────────
      - name: Build & push infraweaver-node
        uses: docker/build-push-action@v5
        with:
          context: ./apps/infraweaver-node
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/infraweaver-node:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/infraweaver-node:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=infraweaver-node
          cache-to: type=gha,mode=max,scope=infraweaver-node

      # ── Update manifest image tags ────────────────────────────────────────
      - name: Update deployment manifests
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.ORG }}"

          for APP in infraweaver-api infraweaver-console infraweaver-node; do
            MANIFEST="kubernetes/catalog/${APP}/manifests/deployment.yaml"
            if [ -f "$MANIFEST" ]; then
              # Replace any existing image tag for this app (any registry)
              sed -i -E \
                "s|image: [^ ]*/infraweaver-${APP}:[^ ]+|image: ${REGISTRY}/infraweaver-${APP}:${VERSION}|g" \
                "$MANIFEST"
              # Update APP_VERSION env var value if it exists in the manifest
              perl -0777 -i -pe 's/(name:\s+APP_VERSION\s*\n\s+value:\s+)\S+/$1"'"${VERSION}"'"/g' "$MANIFEST" 2>/dev/null || true
              echo "Updated $MANIFEST → $VERSION"
            fi
          done

      - name: Commit manifest updates
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add kubernetes/catalog/infraweaver-api/manifests/deployment.yaml
          git add kubernetes/catalog/infraweaver-console/manifests/deployment.yaml
          git add kubernetes/catalog/infraweaver-node/manifests/deployment.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "ci: update image tags to ${VERSION} [skip ci]"
            git push origin HEAD:main
            echo "Pushed manifest updates for ${VERSION}"
          fi

      # ── Create GitHub Release (on version tags only) ──────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "InfraWeaver ${{ steps.meta.outputs.version }}"
          body: |
            ## 🚀 InfraWeaver ${{ steps.meta.outputs.version }}

            ### Docker Images
            ```
            ghcr.io/werewolf-p/infraweaver-api:${{ steps.meta.outputs.version }}
            ghcr.io/werewolf-p/infraweaver-console:${{ steps.meta.outputs.version }}
            ghcr.io/werewolf-p/infraweaver-node:${{ steps.meta.outputs.version }}
            ```

            ### Apply this update
            In your InfraWeaver console → **Settings → Platform Updates → Apply Update**

            Or via API:
            ```bash
            curl -X POST https://your-infraweaver/api/v1/platform/update \
              -H "Authorization: Bearer <token>" \
              -H "Content-Type: application/json" \
              -d '{"version": "${{ steps.meta.outputs.version }}"}'
            ```
