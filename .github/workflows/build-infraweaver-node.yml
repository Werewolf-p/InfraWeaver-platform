name: Build infraweaver-node

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/infraweaver-node/**'
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: werewolf-p/infraweaver-node

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/infraweaver-node
          file: apps/infraweaver-node/Dockerfile
          push: true
          tags: |
            ghcr.io/werewolf-p/infraweaver-node:latest
            ghcr.io/werewolf-p/infraweaver-node:${{ github.sha }}
