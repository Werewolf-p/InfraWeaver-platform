name: PR — Kubernetes Diff

# ─────────────────────────────────────────────────────────────────────────────
# Shows a live diff of what would change in the cluster when this PR is merged.
#
# How it works:
#   1. Detects which kubernetes/ manifest directories changed in the PR
#   2. For manifest-only apps: runs `kubectl diff` (server-side dry-run)
#      against the live cluster — shows exactly what would be patched/created
#   3. For Helm app values changes: shows the values.yaml diff
#   4. Posts the combined diff as a PR comment (updates existing comment on re-push)
#
# Requirements:
#   - Self-hosted runner (prod-worker) with kubectl configured for the cluster
#   - Read-only kubeconfig is sufficient (kubectl diff uses server-side dry-run)
#
# Notes:
#   - ArgoCD auto-syncs kubernetes/ on merge — this preview just shows what ArgoCD will apply
#   - For new resources (not yet in cluster), kubectl diff returns exit code 1 but still
#     prints the diff — this is expected and handled below
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    paths:
      - 'kubernetes/**'
      - 'docs/templates/**'

concurrency:
  group: pr-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # needed to post/update PR comment

jobs:
  diff:
    name: Kubernetes Diff
    runs-on:
      - self-hosted
      - prod-worker

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed kubernetes paths
        id: detect
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Get all changed files under kubernetes/
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'kubernetes/' | sort -u)
          echo "Changed files:"
          echo "$CHANGED"

          # Extract unique app manifest directories (kubernetes/<tier>/<app>/manifests/)
          MANIFEST_DIRS=$(echo "$CHANGED" \
            | grep '/manifests/' \
            | sed 's|/manifests/.*||' \
            | sort -u)

          # Extract Helm app directories (kubernetes/<tier>/<app>/values.yaml or application.yaml)
          HELM_DIRS=$(echo "$CHANGED" \
            | grep -E '/(values\.yaml|application\.yaml)$' \
            | sed 's|/[^/]*$||' \
            | sort -u)

          # Bootstrap file changes
          BOOTSTRAP_FILES=$(echo "$CHANGED" \
            | grep '^kubernetes/bootstrap/' \
            | tr '\n' ' ')

          echo "manifest_dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MANIFEST_DIRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "helm_dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$HELM_DIRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "bootstrap_files=${BOOTSTRAP_FILES}" >> "$GITHUB_OUTPUT"

      - name: Run kubectl diff for manifest apps
        id: manifest_diff
        if: steps.detect.outputs.manifest_dirs != ''
        run: |
          KUBECONFIG="${HOME}/.kube/config-platform-productie"
          KT="kubectl --kubeconfig=$KUBECONFIG"

          FULL_DIFF=""
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            MANIFEST_PATH="${dir}/manifests"
            [ ! -d "$MANIFEST_PATH" ] && continue

            APP=$(basename "$dir")
            echo "::group::kubectl diff — ${dir}/manifests"

            # kubectl diff exits 1 if there are differences (that's normal) or 0 if no change.
            # It exits 2+ on error. We capture output regardless.
            DIFF_OUTPUT=$(${KT} diff -f "$MANIFEST_PATH" --field-manager=argocd-controller 2>&1 || true)

            if [ -n "$DIFF_OUTPUT" ]; then
              FULL_DIFF="${FULL_DIFF}

          ### 📁 \`${dir}/manifests\`
          \`\`\`diff
          ${DIFF_OUTPUT}
          \`\`\`"
            else
              FULL_DIFF="${FULL_DIFF}

          ### 📁 \`${dir}/manifests\`
          > ✅ No changes — already matches live cluster"
            fi

            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.manifest_dirs }}"

          # Write to file to avoid env var size limits
          echo "$FULL_DIFF" > /tmp/manifest-diff.txt

      - name: Show Helm values changes
        id: helm_diff
        if: steps.detect.outputs.helm_dirs != ''
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FULL_DIFF=""

          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            APP=$(basename "$dir")

            echo "::group::values diff — ${dir}"

            VALUES_DIFF=""
            for f in values.yaml application.yaml; do
              FILE="${dir}/${f}"
              if git show "${BASE}:${FILE}" > /dev/null 2>&1; then
                D=$(git diff "${BASE}" "${HEAD}" -- "${FILE}" 2>/dev/null || true)
                if [ -n "$D" ]; then
                  VALUES_DIFF="${VALUES_DIFF}

          #### \`${f}\`
          \`\`\`diff
          ${D}
          \`\`\`"
                fi
              else
                VALUES_DIFF="${VALUES_DIFF}
          > 🆕 New Helm app — \`${f}\` added"
              fi
            done

            if [ -n "$VALUES_DIFF" ]; then
              FULL_DIFF="${FULL_DIFF}

          ### ⎈ \`${dir}\` (Helm)
          ${VALUES_DIFF}"
            fi

            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.helm_dirs }}"

          echo "$FULL_DIFF" > /tmp/helm-diff.txt

      - name: Build PR comment
        id: build_comment
        run: |
          MANIFEST_DIFF=""
          HELM_DIFF=""
          [ -f /tmp/manifest-diff.txt ] && MANIFEST_DIFF=$(cat /tmp/manifest-diff.txt)
          [ -f /tmp/helm-diff.txt ] && HELM_DIFF=$(cat /tmp/helm-diff.txt)

          BOOTSTRAP="${{ steps.detect.outputs.bootstrap_files }}"

          # Build the comment body
          BODY="## 🔍 Kubernetes Cluster Diff

          *This shows what would change in the live cluster if this PR is merged.*
          *ArgoCD auto-syncs \`kubernetes/\` changes within ~3 minutes after merge.*

          ---"

          if [ -n "$MANIFEST_DIFF" ]; then
            BODY="${BODY}

          ## Manifest Changes
          ${MANIFEST_DIFF}"
          fi

          if [ -n "$HELM_DIFF" ]; then
            BODY="${BODY}

          ## Helm Values Changes
          ${HELM_DIFF}"
          fi

          if [ -n "$BOOTSTRAP" ]; then
            BODY="${BODY}

          ## 🚀 New App Bootstrap Files
          The following bootstrap Applications will be applied to ArgoCD:
          \`\`\`
          ${BOOTSTRAP}
          \`\`\`"
          fi

          if [ -z "$MANIFEST_DIFF" ] && [ -z "$HELM_DIFF" ] && [ -z "$BOOTSTRAP" ]; then
            BODY="${BODY}

          > ✅ No diffable Kubernetes changes detected."
          fi

          # Truncate to 65000 chars to stay within GitHub comment limit
          if [ ${#BODY} -gt 65000 ]; then
            BODY="${BODY:0:65000}

          *[Diff truncated — too large for a single comment. Review files directly.]*"
          fi

          # Write to file (avoids shell quoting issues with multiline)
          echo "$BODY" > /tmp/pr-comment.txt

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/pr-comment.txt', 'utf8');
            const marker = '## 🔍 Kubernetes Cluster Diff';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
              core.info(`Updated existing diff comment (id: ${existing.id})`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
              core.info('Created new diff comment');
            }
