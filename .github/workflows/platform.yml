name: Platform — InfraWeaver

concurrency:
  group: platform-${{ github.ref_name }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: false
        default: "apply"
        type: choice
        options: [apply, plan]
  push:
    branches: [main, ontwikkel]
    paths:
      - "envs/**"
      - "terraform/**"
      - "kubernetes/**"
      - ".github/workflows/platform.yml"
      - "Makefile"
  pull_request:
    branches: [main, ontwikkel]
    paths:
      - "envs/**"
      - "terraform/**"
      - "kubernetes/**"
      - ".github/workflows/platform.yml"
      - "Makefile"

permissions:
  contents: read
  pull-requests: write

env:
  ENV_NAME: ${{ github.ref_name == 'main' && 'productie' || 'ontwikkel' }}
  TOFU_VERSION: "1.11.6"

jobs:

  # ── Security gate (PR only) ──────────────────────────────────────────────────
  security-gate:
    name: "Security Gate"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform,dockerfile,github_actions
          soft_fail: true
          output_format: github_failed_only

      - name: SOPS check
        run: |
          for f in envs/*/secrets.sops.yaml; do
            if [ -f "$f" ] && ! grep -q "sops:" "$f"; then
              echo "❌ $f not encrypted"; exit 1
            fi
          done
          echo "✅ All secrets encrypted"

  # ── Plan (PR + push) ────────────────────────────────────────────────────────
  plan:
    name: "Plan (${{ github.ref_name == 'main' && 'productie' || 'ontwikkel' }})"
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on:
      - self-hosted
      - ${{ github.ref_name == 'main' && 'prod-worker' || 'dev-worker' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup tools
        uses: ./.github/actions/setup-platform
        with:
          age-secret-key: ${{ secrets.AGE_SECRET_KEY }}

      - name: Tofu Init & Plan
        env:
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
        run: |
          export TF_PLUGIN_CACHE_DIR="$HOME/.terraform.d/plugin-cache"

          ENV=${{ env.ENV_NAME }}
          STATE_DIR=~/.tofu/state/platform-$ENV
          mkdir -p $STATE_DIR

          # Load secrets from GitHub Secrets (primary) then SOPS fallback
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          while IFS= read -r line; do
            if [[ "$line" =~ ^([a-zA-Z_][a-zA-Z0-9_]*):[[:space:]]*(.*) ]]; then
              KEY="${BASH_REMATCH[1]}" ; VAL="${BASH_REMATCH[2]}"
              [[ "$KEY" == "sops" ]] && break
              VAL="${VAL#\"}" ; VAL="${VAL%\"}"
              [[ -n "$VAL" ]] && export "TF_VAR_${KEY}=${VAL}"
            fi
          done < <(sops -d "envs/$ENV/secrets.sops.yaml" 2>/dev/null || echo "")

          cd terraform
          tofu init \
            -backend-config="path=$STATE_DIR/terraform.tfstate" \
            -reconfigure

          VARS=""
          [ -f "../envs/$ENV/terraform.tfvars" ]     && VARS="$VARS -var-file=../envs/$ENV/terraform.tfvars"
          [ -f "../envs/$ENV/services.auto.tfvars" ] && VARS="$VARS -var-file=../envs/$ENV/services.auto.tfvars"
          tofu plan $VARS -out=tfplan 2>&1 | tee /tmp/plan-output.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Tofu Plan — \`${{ env.ENV_NAME }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ── Deploy (push to main/ontwikkel only) ────────────────────────────────────
  deploy:
    name: "Deploy (${{ github.ref_name == 'main' && 'productie' || 'ontwikkel' }})"
    needs: []
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on:
      - self-hosted
      - ${{ github.ref_name == 'main' && 'prod-worker' || 'dev-worker' }}
    steps:
      - uses: actions/checkout@v4

      - name: Security Checks
        run: |
          [ -f .sops.yaml ] || (echo "❌ .sops.yaml missing"; exit 1)
          for f in envs/*/secrets.sops.yaml; do
            if [ -f "$f" ] && ! grep -q "sops:" "$f"; then
              echo "❌ $f not encrypted"; exit 1
            fi
          done
          # Allow insecure=true only for proxmox provider (self-signed certs in homelab)
          grep -rE 'insecure\s*=\s*true' terraform/ --include="*.tf" | grep -v '^\s*#' | \
            grep -v 'proxmox\|provider\|pve_tls_insecure\|proxmox_tls_insecure' && \
            (echo "❌ insecure=true found in non-provider code"; exit 1) || true
          echo "✅ Security checks passed"

      - name: Setup tools
        uses: ./.github/actions/setup-platform
        with:
          age-secret-key: ${{ secrets.AGE_SECRET_KEY }}
          deployer-ssh-key: ${{ secrets.DEPLOYER_SSH_KEY }}
          with-talosctl: "true"
          with-helm: "true"
          environment: ${{ env.ENV_NAME }}

      - name: Deploy Platform
        env:
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
        run: |
          export TF_PLUGIN_CACHE_DIR="$HOME/.terraform.d/plugin-cache"

          ENV=${{ env.ENV_NAME }}
          STATE_DIR=~/.tofu/state/platform-$ENV
          mkdir -p $STATE_DIR

          # Load secrets from GitHub Secrets (primary) then SOPS fallback
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          echo "✅ TF_VAR_proxmox_api_token set from GitHub Secret"
          while IFS= read -r line; do
            if [[ "$line" =~ ^([a-zA-Z_][a-zA-Z0-9_]*):[[:space:]]*(.*) ]]; then
              KEY="${BASH_REMATCH[1]}"
              VAL="${BASH_REMATCH[2]}"
              [[ "$KEY" == "sops" ]] && break   # stop at sops metadata
              VAL="${VAL#\"}" ; VAL="${VAL%\"}"  # strip surrounding quotes
              [[ -n "$VAL" ]] && export "TF_VAR_${KEY}=${VAL}"
              echo "✅ TF_VAR_${KEY} set from SOPS"
            fi
          done < <(sops -d "envs/$ENV/secrets.sops.yaml" 2>/dev/null || echo "")

          cd terraform
          tofu init \
            -backend-config="path=$STATE_DIR/terraform.tfstate" \
            -reconfigure

          VARS=""
          [ -f "../envs/$ENV/terraform.tfvars" ]     && VARS="$VARS -var-file=../envs/$ENV/terraform.tfvars"
          [ -f "../envs/$ENV/services.auto.tfvars" ] && VARS="$VARS -var-file=../envs/$ENV/services.auto.tfvars"

          # Stage 1: provision Talos cluster
          tofu apply $VARS \
            -target=module.talos_cluster \
            -target=local_sensitive_file.kubeconfig \
            -target=local_sensitive_file.talosconfig \
            -auto-approve 2>&1

          # Stage 2: deploy platform bootstrap (ArgoCD + ApplicationSet)
          tofu apply $VARS -auto-approve 2>&1

      - name: Save kubeconfig & talosconfig
        if: always()
        run: |
          ENV=${{ env.ENV_NAME }}
          STATE_DIR=~/.tofu/state/platform-$ENV
          mkdir -p ~/.kube "$STATE_DIR"
          cd terraform
          # Init first so tofu output can read backend state
          tofu init \
            -backend-config="path=$STATE_DIR/terraform.tfstate" \
            -reconfigure 2>/dev/null || true
          tofu output -raw kubeconfig > ~/.kube/config-platform-$ENV 2>/dev/null || true
          chmod 600 ~/.kube/config-platform-$ENV 2>/dev/null || true
          tofu output -raw talosconfig > "../envs/$ENV/generated/talosconfig" 2>/dev/null || true
          chmod 600 "../envs/$ENV/generated/talosconfig" 2>/dev/null || true
          echo "✅ Kubeconfig/talosconfig saved"
          KUBECONFIG=~/.kube/config-platform-$ENV kubectl get nodes 2>&1 || echo "  (cluster not yet reachable)"

      - name: Deploy ArgoCD & Bootstrap
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARGOCD_GITHUB_TOKEN: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
        run: |
          ENV=${{ env.ENV_NAME }}
          KB=~/.kube/config-platform-$ENV

          # Ensure kubeconfig is present
          if [ ! -s "$KB" ]; then
            cd terraform
            tofu output -raw kubeconfig > "$KB" 2>/dev/null || true
            chmod 600 "$KB"
            cd ..
          fi

          # Create argocd namespace (idempotent)
          kubectl --kubeconfig "$KB" create namespace argocd --dry-run=client -o yaml \
            | kubectl --kubeconfig "$KB" apply -f -

          # ── Deploy ArgoCD via Helm (chart 9.x = ArgoCD v3.x) ──────────────────
          helm repo add argo https://argoproj.github.io/argo-helm 2>/dev/null || true
          helm repo update argo

          # Add Helm ownership annotations to any pre-existing ArgoCD resources
          # so Helm can manage them without "cannot be imported" errors
          for rtype in serviceaccount role rolebinding clusterrole clusterrolebinding \
              configmap secret service networkpolicy deployment statefulset; do
            for item in $(kubectl --kubeconfig "$KB" get $rtype -n argocd \
                --no-headers -o custom-columns=":metadata.name" 2>/dev/null | grep "^argocd" || true); do
              kubectl --kubeconfig "$KB" annotate $rtype/$item -n argocd \
                "meta.helm.sh/release-name=argocd" \
                "meta.helm.sh/release-namespace=argocd" \
                --overwrite 2>/dev/null || true
              kubectl --kubeconfig "$KB" label $rtype/$item -n argocd \
                "app.kubernetes.io/managed-by=Helm" --overwrite 2>/dev/null || true
            done
          done
          # Cluster-scoped resources
          for rtype in clusterrole clusterrolebinding; do
            for item in $(kubectl --kubeconfig "$KB" get $rtype \
                --no-headers -o custom-columns=":metadata.name" 2>/dev/null | grep "^argocd" || true); do
              kubectl --kubeconfig "$KB" annotate $rtype/$item \
                "meta.helm.sh/release-name=argocd" \
                "meta.helm.sh/release-namespace=argocd" \
                --overwrite 2>/dev/null || true
              kubectl --kubeconfig "$KB" label $rtype/$item \
                "app.kubernetes.io/managed-by=Helm" --overwrite 2>/dev/null || true
            done
          done
          # ArgoCD CRDs
          for crd in $(kubectl --kubeconfig "$KB" get crd \
              --no-headers -o custom-columns=":metadata.name" 2>/dev/null | grep "argoproj.io" || true); do
            kubectl --kubeconfig "$KB" annotate crd/$crd \
              "meta.helm.sh/release-name=argocd" \
              "meta.helm.sh/release-namespace=argocd" \
              --overwrite 2>/dev/null || true
            kubectl --kubeconfig "$KB" label crd/$crd \
              "app.kubernetes.io/managed-by=Helm" --overwrite 2>/dev/null || true
          done

          helm --kubeconfig "$KB" upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --skip-crds \
            --timeout 5m \
            -f kubernetes/core/argocd/values.yaml

          # Fix ArgoCD service targetPorts: Helm-installed services may still use named ports.
          # The EndpointSlice controller can't resolve named targetPorts → connection refused.
          # Patch all affected services to numeric targetPorts (idempotent).
          kubectl --kubeconfig "$KB" patch svc argocd-repo-server -n argocd \
            --type json -p '[{"op":"replace","path":"/spec/ports/0/targetPort","value":8081}]' 2>/dev/null || true
          kubectl --kubeconfig "$KB" patch svc argocd-dex-server -n argocd \
            --type json -p '[{"op":"replace","path":"/spec/ports/0/targetPort","value":5556},{"op":"replace","path":"/spec/ports/1/targetPort","value":5557}]' 2>/dev/null || true
          kubectl --kubeconfig "$KB" patch svc argocd-applicationset-controller -n argocd \
            --type json -p '[{"op":"replace","path":"/spec/ports/0/targetPort","value":7000}]' 2>/dev/null || true
          kubectl --kubeconfig "$KB" patch svc argocd-redis -n argocd \
            --type json -p '[{"op":"replace","path":"/spec/ports/0/targetPort","value":6379}]' 2>/dev/null || true

          # Create repo credentials (use ARGOCD_GITHUB_TOKEN if set, else GITHUB_TOKEN)
          REPO_TOKEN="${ARGOCD_GITHUB_TOKEN:-$GITHUB_TOKEN}"
          kubectl --kubeconfig "$KB" create secret generic repo-creds-github \
            --namespace argocd \
            --from-literal=url="https://github.com/Werewolf-p/" \
            --from-literal=username="x-access-token" \
            --from-literal=password="${REPO_TOKEN}" \
            --dry-run=client -o yaml \
            | kubectl --kubeconfig "$KB" apply -f -
          kubectl --kubeconfig "$KB" label secret repo-creds-github \
            --namespace argocd \
            "argocd.argoproj.io/secret-type=repo-creds" \
            --overwrite

          # Apply bootstrap manifests with env-specific revision so ArgoCD tracks the correct branch
          GIT_REVISION="${{ github.ref_name }}"
          for f in kubernetes/bootstrap/*.yaml; do
            sed "s|targetRevision: HEAD|targetRevision: ${GIT_REVISION}|g" "$f" \
              | kubectl --kubeconfig "$KB" apply --server-side --force-conflicts -f -
          done

          # Wait for ArgoCD server to be available (up to 3 min)
          kubectl --kubeconfig "$KB" wait --for=condition=available \
            deployment/argocd-server -n argocd --timeout=180s || true

          echo "✅ ArgoCD deployed & bootstrapped"
          kubectl --kubeconfig "$KB" get pods -n argocd
          kubectl --kubeconfig "$KB" get applicationsets,appprojects -n argocd

      - name: Bootstrap Storage (local-path-provisioner)
        if: success()
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          LOCAL_PATH_VERSION="v0.0.30"

          # Install local-path-provisioner (idempotent)
          curl -sL "https://raw.githubusercontent.com/rancher/local-path-provisioner/${LOCAL_PATH_VERSION}/deploy/local-path-storage.yaml" \
            | kubectl --kubeconfig "$KB" apply -f -

          # Allow hostPath volumes in local-path-storage namespace (required by provisioner helper pods)
          kubectl --kubeconfig "$KB" label namespace local-path-storage \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            --overwrite

          # Allow monitoring namespace to run privileged initContainers (prometheus chown fix)
          kubectl --kubeconfig "$KB" label namespace monitoring \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            --overwrite 2>/dev/null || true

          # Allow apps-grafana namespace (initChownData requires CAP_CHOWN, needs baseline+)
          kubectl --kubeconfig "$KB" create namespace apps-grafana 2>/dev/null || true
          kubectl --kubeconfig "$KB" label namespace apps-grafana \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            pod-security.kubernetes.io/audit=privileged \
            --overwrite 2>/dev/null || true

          # Set local-path as the default StorageClass
          kubectl --kubeconfig "$KB" patch storageclass local-path \
            -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}' \
            2>/dev/null || true

          echo "✅ local-path-provisioner bootstrapped"
          kubectl --kubeconfig "$KB" get storageclass
          kubectl --kubeconfig "$KB" get pods -n local-path-storage

      - name: Bootstrap OpenBao + ExternalSecrets
        if: success()
        run: |
          ENV=${{ env.ENV_NAME }}
          KB=~/.kube/config-platform-$ENV
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 -i ~/.ssh/deployer_ed25519"

          # Parse OpenBao address from cluster.yaml (robust YAML read)
          OPENBAO_ADDR=$(python3 -c "
          import sys
          with open('envs/$ENV/cluster.yaml') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('openbao_address:'):
                      print(line.split(':', 1)[1].strip().strip('\"'))
                      break
          ")

          if [ -z "$OPENBAO_ADDR" ]; then
            echo "⚠ No openbao_address in cluster.yaml — skipping"
            exit 0
          fi

          # Extract IP from URL (supports http://IP:PORT)
          OPENBAO_IP=$(echo "$OPENBAO_ADDR" | sed 's|https\?://\([^/:]*\).*|\1|')
          echo "==> OpenBao: $OPENBAO_ADDR (IP: $OPENBAO_IP)"

          # Get root token from OpenBao VM
          OPENBAO_ROOT_TOKEN=$(ssh $SSH_OPTS root@"$OPENBAO_IP" \
            "python3 -c \"import json; print(json.load(open('/opt/openbao/init-output.json'))['root_token'])\"" 2>/dev/null || echo "")

          if [ -z "$OPENBAO_ROOT_TOKEN" ]; then
            echo "⚠ Could not retrieve OpenBao root token — skipping secret bootstrap"
            exit 0
          fi

          # Write policy file and SCP to OpenBao VM
          cat > /tmp/platform-k8s-policy.hcl << 'HCLEOF'
          path "secret/data/platform/*" { capabilities = ["read", "list"] }
          path "secret/metadata/platform/*" { capabilities = ["read", "list"] }
          HCLEOF
          scp $SSH_OPTS /tmp/platform-k8s-policy.hcl root@"$OPENBAO_IP":/tmp/platform-k8s.hcl

          # Configure OpenBao: enable KV v2, create policy and service token
          OPENBAO_SERVICE_TOKEN=$(ssh $SSH_OPTS root@"$OPENBAO_IP" "
            export VAULT_ADDR='http://localhost:8200'
            export VAULT_TOKEN='$OPENBAO_ROOT_TOKEN'
            BAO=/opt/openbao/bin/bao
            # Enable KV v2 (idempotent)
            \$BAO secrets list 2>/dev/null | grep -q 'secret/' || \$BAO secrets enable -path=secret kv-v2
            # Write platform-k8s policy (least-privilege)
            \$BAO policy write platform-k8s /tmp/platform-k8s.hcl
            # Seed initial secrets if not present (idempotent)
            \$BAO kv get secret/platform/grafana >/dev/null 2>&1 || \
              \$BAO kv put secret/platform/grafana admin-user=admin admin-password=\$(openssl rand -base64 32 | tr -d '/+=')
            # Create service token (long-lived, least-privilege)
            \$BAO token create -policy=platform-k8s -no-default-policy -ttl=87600h \
              -display-name=kubernetes-eso-$ENV -orphan -field=client_token
          " 2>/dev/null)

          if [ -z "$OPENBAO_SERVICE_TOKEN" ]; then
            echo "⚠ Could not create OpenBao service token — skipping"
            exit 0
          fi

          # Wait for ESO to be installed by ArgoCD (up to 5 min)
          echo "==> Waiting for ESO to be deployed..."
          for i in $(seq 1 30); do
            if kubectl --kubeconfig "$KB" get deployment external-secrets -n external-secrets >/dev/null 2>&1; then
              break
            fi
            echo "  Waiting for ESO deployment ($i/30)..."
            sleep 10
          done

          kubectl --kubeconfig "$KB" wait deployment/external-secrets \
            -n external-secrets --for=condition=available --timeout=120s 2>/dev/null || \
            echo "⚠ ESO not yet available — ClusterSecretStore may fail until ESO is ready"

          # Create openbao-token secret for ESO
          kubectl --kubeconfig "$KB" create namespace external-secrets --dry-run=client -o yaml \
            | kubectl --kubeconfig "$KB" apply -f -
          kubectl --kubeconfig "$KB" create secret generic openbao-token \
            --namespace external-secrets \
            --from-literal=token="$OPENBAO_SERVICE_TOKEN" \
            --dry-run=client -o yaml \
            | kubectl --kubeconfig "$KB" apply -f -

          # Apply ClusterSecretStore with env-specific OpenBao address (file from repo)
          sed "s|OPENBAO_ADDR_PLACEHOLDER|$OPENBAO_ADDR|g; s|PLACEHOLDER_REPLACED_BY_TOFU|$OPENBAO_SERVICE_TOKEN|g" \
            kubernetes/core/external-secrets/manifests/cluster-secret-store.yaml \
            | kubectl --kubeconfig "$KB" apply -f -

          # Apply ExternalSecrets for apps (creates k8s Secrets from OpenBao)
          # grafana-admin-secret (apps-grafana namespace)
          kubectl --kubeconfig "$KB" create namespace apps-grafana --dry-run=client -o yaml \
            | kubectl --kubeconfig "$KB" apply -f -
          kubectl --kubeconfig "$KB" apply -f - << ESEOF
          apiVersion: external-secrets.io/v1beta1
          kind: ExternalSecret
          metadata:
            name: grafana-admin-secret
            namespace: apps-grafana
          spec:
            refreshInterval: 1h
            secretStoreRef:
              name: openbao
              kind: ClusterSecretStore
            target:
              name: grafana-admin-secret
              creationPolicy: Owner
            data:
              - secretKey: admin-user
                remoteRef:
                  key: secret/platform/grafana
                  property: admin-user
              - secretKey: admin-password
                remoteRef:
                  key: secret/platform/grafana
                  property: admin-password
          ESEOF

          # Apply ClusterIssuer for cert-manager (if cert-manager is ready)
          if kubectl --kubeconfig "$KB" get crd clusterissuers.cert-manager.io >/dev/null 2>&1; then
            kubectl --kubeconfig "$KB" apply -f kubernetes/core/cert-manager/manifests/cluster-issuer.yaml 2>/dev/null || true
          fi

          echo "✅ OpenBao secrets bootstrapped"
          kubectl --kubeconfig "$KB" get clustersecretstore openbao 2>/dev/null || echo "  (ClusterSecretStore not yet synced)"

      - name: Seed Cloudflare token & apply cert-manager ExternalSecrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ENV="${{ github.ref_name == 'main' && 'productie' || 'ontwikkel' }}"
          KB=~/.kube/config-platform-$ENV

          if [ ! -f "$KB" ]; then
            echo "⚠ Kubeconfig not found — skipping Cloudflare token seeding"
            exit 0
          fi

          # Get root token from openbao-unseal secret
          ROOT_TOKEN=$(kubectl --kubeconfig "$KB" get secret openbao-unseal -n openbao \
            -o jsonpath='{.data.root_token}' 2>/dev/null | base64 -d || echo "")
          if [ -z "$ROOT_TOKEN" ]; then
            echo "⚠ No openbao-unseal secret — skipping Cloudflare token seeding"
            exit 0
          fi

          # Port-forward to OpenBao
          kubectl --kubeconfig "$KB" port-forward -n openbao svc/openbao 8200:8200 &
          PF_PID=$!
          sleep 4
          LOCAL_OPENBAO="http://127.0.0.1:8200"

          # Seed Cloudflare API token (always refresh from GitHub secret)
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            curl -s -X POST "${LOCAL_OPENBAO}/v1/secret/data/platform/cloudflare" \
              -H "X-Vault-Token: $ROOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"data\": {\"CF_API_TOKEN\": \"$CLOUDFLARE_API_TOKEN\", \"CF_EMAIL\": \"remonhulst@gmail.com\"}}" > /dev/null
            echo "==> Cloudflare token seeded to OpenBao"
          else
            echo "⚠ CLOUDFLARE_API_TOKEN not set — cert-manager DNS-01 challenges will fail"
          fi

          kill $PF_PID 2>/dev/null; wait $PF_PID 2>/dev/null || true

          # Apply cert-manager ExternalSecret and trigger refresh
          kubectl --kubeconfig "$KB" apply -f kubernetes/core/cert-manager/manifests/external-secret-cloudflare.yaml 2>/dev/null || true
          kubectl --kubeconfig "$KB" annotate externalsecret cloudflare-api-token -n cert-manager \
            force-sync="$(date +%s)" --overwrite 2>/dev/null || true

          echo "✅ Cloudflare token seeded; cert-manager ExternalSecret refreshed"


