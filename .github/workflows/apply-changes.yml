name: Platform — Apply Changes

# ─────────────────────────────────────────────────────────────────────────────
# Incremental GitOps apply — runs on push to main, checks WHICH files changed,
# and runs ONLY the steps needed for those changes.
#
# What this workflow handles (ArgoCD doesn't do these automatically):
#   • User config changes  → seed new user passwords in OpenBao, set Authentik
#                            group memberships from users.yaml, generate recovery
#                            links, send notification email
#   • Authentik blueprints → force-sync the ArgoCD authentik app so Authentik
#                            immediately reloads the new blueprint ConfigMaps
#   • OpenBao seed script  → re-run seeding to add any new secret fields
#
# What ArgoCD handles automatically (no step needed here):
#   • Any kubernetes/ manifest change → ArgoCD auto-syncs on push
#   • ArgoCD RBAC (argocd/values.yaml) → ArgoCD syncs its own Helm chart
#   • Traefik / ingress / DNS changes  → ArgoCD syncs those apps
#
# To add a new user:
#   1. Add entry to users.yaml
#   2. Add user to kubernetes/apps/authentik/manifests/blueprint-users.yaml
#   3. Add <username>-password to .github/scripts/seed-openbao-authentik.sh
#   4. Add <username>-password to kubernetes/apps/authentik/manifests/externalsecret.yaml
#   5. Add AUTHENTIK_<USERNAME>_PASSWORD env in kubernetes/apps/authentik/values.yaml
#   6. Push to main → this workflow handles the rest
# ─────────────────────────────────────────────────────────────────────────────

concurrency:
  group: apply-changes-${{ github.ref_name }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      # User access control
      - "users.yaml"
      - "kubernetes/apps/authentik/manifests/blueprint-users.yaml"
      - "kubernetes/apps/authentik/manifests/blueprint-access-control.yaml"
      # OpenBao seeding (new secrets)
      - ".github/scripts/seed-openbao-authentik.sh"
      # Authentik Helm values (env vars, blueprint list, storage classes)
      - "kubernetes/apps/authentik/values.yaml"
      # Authentik email / branding / flow blueprints
      - "kubernetes/apps/authentik/manifests/blueprint-*.yaml"

  # Allow manual trigger for any user
  workflow_dispatch:
    inputs:
      force_user_sync:
        description: "Force user/group sync even without file changes"
        required: false
        default: "false"
        type: choice
        options: [false, true]
      send_recovery_email:
        description: "Send recovery links email"
        required: false
        default: "true"
        type: choice
        options: [true, false]

env:
  ENV_NAME: productie

jobs:
  # ── Detect what changed ────────────────────────────────────────────────────
  detect:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      user_config: ${{ steps.changes.outputs.user_config }}
      blueprints:  ${{ steps.changes.outputs.blueprints }}
      openbao_seed: ${{ steps.changes.outputs.openbao_seed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          # Get list of files changed in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD^ HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          # User config: users.yaml or authentik user/access blueprints
          if echo "$CHANGED" | grep -qE "^users\.yaml$|^kubernetes/apps/authentik/manifests/blueprint-(users|access-control)\.yaml$"; then
            echo "user_config=true" >> $GITHUB_OUTPUT
          else
            echo "user_config=false" >> $GITHUB_OUTPUT
          fi

          # Any Authentik blueprint (ConfigMap) changed
          if echo "$CHANGED" | grep -qE "^kubernetes/apps/authentik/manifests/blueprint-"; then
            echo "blueprints=true" >> $GITHUB_OUTPUT
          else
            echo "blueprints=false" >> $GITHUB_OUTPUT
          fi

          # OpenBao seeding script changed (new users/secrets added)
          if echo "$CHANGED" | grep -qE "^\.github/scripts/seed-openbao-authentik\.sh$|^kubernetes/apps/authentik/values\.yaml$|^kubernetes/apps/authentik/manifests/externalsecret\.yaml$"; then
            echo "openbao_seed=true" >> $GITHUB_OUTPUT
          else
            echo "openbao_seed=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "### 🔍 Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "| Category       | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|----------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| User config    | ${{ steps.changes.outputs.user_config }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Blueprints     | ${{ steps.changes.outputs.blueprints }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenBao seed   | ${{ steps.changes.outputs.openbao_seed }} |" >> $GITHUB_STEP_SUMMARY

  # ── Sync Authentik blueprints via ArgoCD ──────────────────────────────────
  sync-blueprints:
    name: "Sync Authentik Blueprints"
    needs: detect
    if: needs.detect.outputs.blueprints == 'true'
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@v4

      - name: Trigger ArgoCD sync for authentik app
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          echo "==> Triggering ArgoCD hard-refresh + sync for authentik..."
          $KT annotate application authentik -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true
          sleep 5

          # Wait for ArgoCD to sync the app
          for i in $(seq 1 30); do
            STATUS=$($KT get application authentik -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH=$($KT get application authentik -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "  [${i}/30] authentik: sync=$STATUS health=$HEALTH"
            if [ "$STATUS" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ Authentik ArgoCD app synced and healthy"
              break
            fi
            sleep 10
          done

          echo "==> Blueprints synced — Authentik will auto-reload them within 60s"
          echo "### ✅ Blueprints Synced" >> $GITHUB_STEP_SUMMARY
          echo "Authentik app synced. Blueprint ConfigMaps reloaded." >> $GITHUB_STEP_SUMMARY

  # ── Seed new OpenBao secrets (for new users) ──────────────────────────────
  seed-openbao:
    name: "Seed OpenBao Secrets"
    needs: detect
    if: needs.detect.outputs.openbao_seed == 'true' || needs.detect.outputs.user_config == 'true'
    runs-on:
      - self-hosted
      - prod-worker
    outputs:
      root_token_available: ${{ steps.openbao.outputs.root_token_available }}
    steps:
      - uses: actions/checkout@v4

      - name: Seed OpenBao with new user secrets
        id: openbao
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          # Get OpenBao root token from cluster secret
          ROOT_TOKEN=$($KT get secret openbao-unseal -n openbao \
            -o jsonpath='{.data.root_token}' 2>/dev/null | base64 -d || echo "")

          if [ -z "$ROOT_TOKEN" ]; then
            echo "⚠️ Could not get OpenBao root token — skipping seed (non-critical)"
            echo "root_token_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "root_token_available=true" >> $GITHUB_OUTPUT

          # Port-forward OpenBao
          BAO_POD=$($KT get pod -n openbao -l app.kubernetes.io/name=openbao \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "$BAO_POD" ]; then
            echo "⚠️ No OpenBao pod found — skipping seed"
            exit 0
          fi

          $KT port-forward -n openbao "pod/${BAO_POD}" 8200:8200 > /tmp/bao-pf.log 2>&1 &
          BAO_PF_PID=$!
          sleep 4

          LOCAL_OPENBAO="http://localhost:8200"

          # Run the seeding script — it's idempotent, only adds missing fields
          bash .github/scripts/seed-openbao-authentik.sh "$LOCAL_OPENBAO" "$ROOT_TOKEN"

          # Update SMTP credentials if provided
          if [ -n "$SMTP_PASSWORD" ]; then
            EXISTING_DATA=$(curl -s -H "X-Vault-Token: $ROOT_TOKEN" \
              "${LOCAL_OPENBAO}/v1/secret/data/platform/authentik" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d.get('data',{}).get('data',{})))" \
              2>/dev/null || echo "{}")

            SMTP_PATCHED=$(python3 -c "
import json, sys
d = json.loads(sys.argv[1])
d['smtp-username'] = sys.argv[2]
d['smtp-password'] = sys.argv[3]
d['smtp-from']     = sys.argv[2]
d['smtp-host']     = 'smtp-mail.outlook.com'
d['smtp-port']     = '587'
print(json.dumps({'data': d}))
" "$EXISTING_DATA" "$SMTP_USERNAME" "$SMTP_PASSWORD" 2>/dev/null || echo "")

            if [ -n "$SMTP_PATCHED" ]; then
              curl -s -X POST "${LOCAL_OPENBAO}/v1/secret/data/platform/authentik" \
                -H "X-Vault-Token: $ROOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$SMTP_PATCHED" > /dev/null
              echo "==> SMTP credentials updated in OpenBao"
            fi
          fi

          kill $BAO_PF_PID 2>/dev/null || true
          echo "### ✅ OpenBao Seeded" >> $GITHUB_STEP_SUMMARY

  # ── Apply user/group changes ──────────────────────────────────────────────
  apply-users:
    name: "Apply User Config"
    needs: [detect, seed-openbao]
    if: |
      always() &&
      (needs.detect.outputs.user_config == 'true' ||
       github.event.inputs.force_user_sync == 'true')
    runs-on:
      - self-hosted
      - prod-worker
    outputs:
      remon_recovery:  ${{ steps.recovery.outputs.remon_link }}
      ardaty_recovery: ${{ steps.recovery.outputs.ardaty_link }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Authentik worker
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          echo "==> Waiting for Authentik worker to be ready..."
          for i in $(seq 1 60); do
            READY=$($KT get deployment/authentik-worker -n authentik \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [ "${READY:-0}" -ge 1 ]; then
              echo "✅ Authentik worker ready"
              break
            fi
            echo "  [${i}/60] Waiting for authentik-worker (readyReplicas=${READY:-0})..."
            sleep 5
          done

      - name: Sync group memberships from users.yaml
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          WORKER_POD=$($KT get pod -n authentik \
            -l app.kubernetes.io/component=worker \
            -o jsonpath='{.items[0].metadata.name}')
          echo "==> Using worker pod: $WORKER_POD"

          # Parse users.yaml to extract username → groups mapping (pure Python, no extra deps)
          python3 - <<'PYEOF'
import yaml, os, subprocess, sys

with open("users.yaml") as f:
    config = yaml.safe_load(f)

users = config.get("users", {})
print(f"Users in users.yaml: {list(users.keys())}")

lines = []
for username, udata in users.items():
    groups = udata.get("authentik_groups", [])
    groups_repr = repr(groups)
    lines.append(f"""
try:
    u = User.objects.get(username='{username}')
    # Clear current group memberships and re-apply from users.yaml
    current_groups = list(u.ak_groups.values_list('name', flat=True))
    desired_groups = {groups_repr}
    for grp_name in desired_groups:
        grp, _ = Group.objects.get_or_create(name=grp_name)
        grp.users.add(u)
    print(f'OK: {username} → {{desired_groups}}')
except User.DoesNotExist:
    print(f'WARN: {username} not found — blueprint may not have synced yet')
""")

script = """
from authentik.core.models import User, Group
""" + "\n".join(lines)

print("==> Generated Django shell script:")
print(script)

# Write script to a temp file
with open("/tmp/ak-group-sync.py", "w") as f:
    f.write(script)
PYEOF

          # Execute the generated script in the Authentik worker
          $KT exec -n authentik "$WORKER_POD" -- ak shell < /tmp/ak-group-sync.py
          echo "✅ Group memberships synced from users.yaml"
          echo "### ✅ Users Synced" >> $GITHUB_STEP_SUMMARY
          echo "Group memberships applied from users.yaml:" >> $GITHUB_STEP_SUMMARY
          python3 -c "
import yaml
with open('users.yaml') as f:
    c = yaml.safe_load(f)
for u, d in c.get('users', {}).items():
    print(f'- **{u}**: {d.get(\"authentik_groups\", [])}')
" >> $GITHUB_STEP_SUMMARY

      - name: Generate recovery links
        id: recovery
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          WORKER_POD=$($KT get pod -n authentik \
            -l app.kubernetes.io/component=worker \
            -o jsonpath='{.items[0].metadata.name}')

          # Create/refresh API token
          _AK_PY=""
          AK_TOKEN=$(echo "$_AK_PY" | base64 -d | \
            $KT exec -i -n authentik "$WORKER_POD" -- ak shell \
            2>&1 | grep "^TOKEN:" | sed 's/TOKEN://' || echo "")

          if [ -z "$AK_TOKEN" ]; then
            echo "⚠️ Could not get Authentik API token — skipping recovery links"
            exit 0
          fi

          # Port-forward Authentik server
          $KT port-forward svc/authentik-server -n authentik 8089:80 > /tmp/ak-pf.log 2>&1 &
          AK_PF_PID=$!
          sleep 4

          # Parse users.yaml for users with send_recovery_email: true
          USERS_WITH_RECOVERY=$(python3 -c "
import yaml
with open('users.yaml') as f:
    c = yaml.safe_load(f)
for u, d in c.get('users', {}).items():
    if d.get('send_recovery_email', False):
        print(u)
")

          echo "==> Generating recovery links for: $(echo $USERS_WITH_RECOVERY | tr '\n' ' ')"

          for USERNAME in $USERS_WITH_RECOVERY; do
            USER_ID=$(curl -sf \
              -H "Authorization: Bearer $AK_TOKEN" \
              "http://localhost:8089/api/v3/core/users/?username=${USERNAME}" \
              2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('results',[]); print(r[0]['pk'] if r else '')" || echo "")

            if [ -n "$USER_ID" ]; then
              LINK=$(curl -sf -X POST \
                -H "Authorization: Bearer $AK_TOKEN" \
                -H "Content-Type: application/json" \
                "http://localhost:8089/api/v3/core/users/$USER_ID/recovery/" \
                2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('link',''))" || echo "")
              LINK=$(echo "$LINK" | sed 's|http://localhost:8089|https://auth.rlservers.com|g')
              echo "✅ Recovery link for ${USERNAME}: $LINK"
              # Export as output (safe variable name)
              SAFE_NAME=$(echo "$USERNAME" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
              echo "${SAFE_NAME}_recovery_link=${LINK}" >> $GITHUB_ENV
              # Also set structured outputs
              if [ "$USERNAME" = "remon" ]; then
                echo "remon_link=${LINK}" >> $GITHUB_OUTPUT
              elif [ "$USERNAME" = "ardaty" ]; then
                echo "ardaty_link=${LINK}" >> $GITHUB_OUTPUT
              fi
            else
              echo "⚠️ User ${USERNAME} not found in Authentik"
            fi
          done

          kill $AK_PF_PID 2>/dev/null || true

  # ── Send notification email ───────────────────────────────────────────────
  notify:
    name: "Send Notification Email"
    needs: [detect, apply-users]
    if: |
      always() &&
      needs.detect.outputs.user_config == 'true' &&
      github.event.inputs.send_recovery_email != 'false'
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@v4

      - name: Send user change notification
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          AUTHENTIK_RECOVERY_LINK: ${{ needs.apply-users.outputs.remon_recovery }}
          AUTHENTIK_ARDATY_RECOVERY_LINK: ${{ needs.apply-users.outputs.ardaty_recovery }}
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          export DEPLOY_ENV="${{ env.ENV_NAME }}"
          export DEPLOY_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # OpenBao token for email script
          export BAO_TOKEN=$($KT get secret openbao-unseal -n openbao \
            -o jsonpath='{.data.root_token}' 2>/dev/null | base64 -d || echo "unavailable")
          export BAO_UNSEAL=$($KT get secret openbao-unseal -n openbao \
            -o jsonpath='{.data.unseal_key}' 2>/dev/null | base64 -d || echo "unavailable")
          export AUTHENTIK_ADMIN_PASS=$($KT exec -n openbao openbao-0 -- \
            sh -c "VAULT_TOKEN='$BAO_TOKEN' vault kv get -field=bootstrap-password secret/platform/authentik" \
            2>/dev/null || echo "unavailable")

          # Override subject for incremental apply (not a full redeploy)
          export DEPLOY_TYPE="user-config-update"
          python3 scripts/send-deploy-email.py
          echo "### ✅ Notification Sent" >> $GITHUB_STEP_SUMMARY
