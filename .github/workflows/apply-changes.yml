name: Platform — Apply Changes

# ─────────────────────────────────────────────────────────────────────────────
# Incremental GitOps apply — runs on push to main, checks WHICH files changed,
# and runs ONLY the steps needed for those changes.
#
# What this workflow handles (ArgoCD doesn't do these automatically):
#   • User config changes  → seed new user passwords in OpenBao, set Authentik
#                            group memberships from users.yaml, send welcome
#                            emails ONLY to newly added users (not existing ones)
#   • Authentik blueprints → force-sync the ArgoCD authentik app so Authentik
#                            immediately reloads the new blueprint ConfigMaps
#   • OpenBao seed script  → re-run seeding to add any new secret fields
#
# What ArgoCD handles automatically (no step needed here):
#   • Any kubernetes/ manifest change → ArgoCD auto-syncs on push (~3 min)
#   • ArgoCD RBAC (argocd/values.yaml) → ArgoCD syncs its own Helm chart
#   • Traefik / ingress / DNS changes  → ArgoCD syncs those apps
#
# Email logic:
#   • NEW user added → welcome email sent to that user's email from users.yaml
#   • Existing user changed (group, name, etc.) → no email
#   • Full redeploy → admin summary email (handled by full-redeploy.yml, not here)
#
# To add a new user: see users.yaml header for the 5-file checklist.
# ─────────────────────────────────────────────────────────────────────────────

concurrency:
  group: apply-changes-${{ github.ref_name }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - "users.yaml"
      - "platform.yaml"                # catalog app enable/disable config
      - "kubernetes/platform/authentik/manifests/blueprint-users.yaml"
      - "kubernetes/platform/authentik/manifests/blueprint-access-control.yaml"
      - ".github/scripts/seed-openbao-authentik.sh"
      - "kubernetes/platform/authentik/values.yaml"
      - "kubernetes/platform/authentik/manifests/blueprint-*.yaml"
      - "kubernetes/bootstrap/*.yaml"  # new app bootstrap Applications

  workflow_dispatch:
    inputs:
      force_user_sync:
        description: "Force user/group sync even without file changes"
        required: false
        default: "false"
        type: choice
        options: [false, true]
      send_welcome_emails:
        description: "Send welcome emails to new users"
        required: false
        default: "true"
        type: choice
        options: [true, false]

permissions:
  contents: read

env:
  ENV_NAME: productie

jobs:
  # ── 1. Detect what changed ─────────────────────────────────────────────────
  detect:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      user_config:    ${{ steps.changes.outputs.user_config }}
      blueprints:     ${{ steps.changes.outputs.blueprints }}
      openbao_seed:   ${{ steps.changes.outputs.openbao_seed }}
      new_users:      ${{ steps.changes.outputs.new_users }}
      new_bootstrap:  ${{ steps.changes.outputs.new_bootstrap }}
      catalog_sync:   ${{ steps.changes.outputs.catalog_sync }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Detect changed paths and new users
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD^ HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE "^users\.yaml$|^kubernetes/platform/authentik/manifests/blueprint-(users|access-control)\.yaml$"; then
            echo "user_config=true"  >> $GITHUB_OUTPUT
          else
            echo "user_config=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE "^kubernetes/platform/authentik/manifests/blueprint-"; then
            echo "blueprints=true"  >> $GITHUB_OUTPUT
          else
            echo "blueprints=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE "^\.github/scripts/seed-openbao-authentik\.sh$|^kubernetes/platform/authentik/values\.yaml$|^kubernetes/platform/authentik/manifests/externalsecret\.yaml$"; then
            echo "openbao_seed=true"  >> $GITHUB_OUTPUT
          else
            echo "openbao_seed=false" >> $GITHUB_OUTPUT
          fi

          # Detect newly added users (in HEAD but not HEAD~1)
          NEW_USERS=$(python3 .github/scripts/list-recovery-users.py --new-only | python3 -c "import sys,json; users=sys.stdin.read().split(); print(json.dumps(users))")
          echo "new_users=${NEW_USERS}" >> $GITHUB_OUTPUT
          echo "==> Newly added users: ${NEW_USERS}"

          # Detect new/changed bootstrap Application files (created by new-app.sh)
          if echo "$CHANGED" | grep -qE "^kubernetes/bootstrap/app-"; then
            echo "new_bootstrap=true" >> $GITHUB_OUTPUT
            echo "==> Changed bootstrap files:"
            echo "$CHANGED" | grep -E "^kubernetes/bootstrap/app-"
          else
            echo "new_bootstrap=false" >> $GITHUB_OUTPUT
          fi

          # Detect platform.yaml catalog changes
          if echo "$CHANGED" | grep -qE "^platform\.yaml$"; then
            echo "catalog_sync=true" >> $GITHUB_OUTPUT
            echo "==> platform.yaml changed — will sync catalog"
          else
            echo "catalog_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "### Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "| Category      | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| User config   | ${{ steps.changes.outputs.user_config }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Blueprints    | ${{ steps.changes.outputs.blueprints }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenBao seed  | ${{ steps.changes.outputs.openbao_seed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New users     | ${{ steps.changes.outputs.new_users }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New apps      | ${{ steps.changes.outputs.new_bootstrap }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Catalog sync  | ${{ steps.changes.outputs.catalog_sync }} |" >> $GITHUB_STEP_SUMMARY

  # ── 2. Sync Authentik blueprints via ArgoCD ────────────────────────────────
  sync-blueprints:
    name: "Sync Authentik Blueprints"
    needs: detect
    if: needs.detect.outputs.blueprints == 'true'
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - name: Trigger ArgoCD hard-refresh for authentik
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          echo "==> Triggering ArgoCD hard-refresh for authentik..."
          $KT annotate application authentik -n argocd argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true
          sleep 5

          for i in $(seq 1 30); do
            STATUS=$($KT get application authentik -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH=$($KT get application authentik -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "  [${i}/30] authentik: sync=$STATUS health=$HEALTH"
            if [ "$STATUS" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ Authentik ArgoCD app synced and healthy" >> $GITHUB_STEP_SUMMARY
              break
            fi
            sleep 10
          done

  # ── 3. Seed OpenBao secrets (new users / SMTP) ────────────────────────────
  seed-openbao:
    name: "Seed OpenBao Secrets"
    needs: detect
    if: needs.detect.outputs.openbao_seed == 'true' || needs.detect.outputs.user_config == 'true'
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@v4

      - name: Seed new user secrets into OpenBao
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          ROOT_TOKEN=$($KT get secret openbao-unseal -n openbao -o jsonpath='{.data.root_token}' 2>/dev/null | base64 -d || echo "")
          if [ -z "$ROOT_TOKEN" ]; then
            echo "Could not get OpenBao root token — skipping seed"
            exit 0
          fi

          BAO_POD=$($KT get pod -n openbao -l app.kubernetes.io/name=openbao --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "$BAO_POD" ]; then
            echo "No running OpenBao pod found — skipping seed"
            exit 0
          fi

          $KT port-forward -n openbao "pod/${BAO_POD}" 8200:8200 > /tmp/bao-pf.log 2>&1 &
          BAO_PF_PID=$!
          sleep 4

          LOCAL_OPENBAO="http://localhost:8200"
          bash .github/scripts/seed-openbao-authentik.sh "$LOCAL_OPENBAO" "$ROOT_TOKEN"

          if [ -n "$SMTP_PASSWORD" ]; then
            EXISTING_DATA=$(curl -s -H "X-Vault-Token: $ROOT_TOKEN" \
              "${LOCAL_OPENBAO}/v1/secret/data/platform/authentik" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d.get('data',{}).get('data',{})))" \
              2>/dev/null || echo "{}")
            SMTP_PATCHED=$(python3 -c "import json,sys; d=json.loads(sys.argv[1]); d['smtp-username']=sys.argv[2]; d['smtp-password']=sys.argv[3]; d['smtp-from']=sys.argv[2]; d['smtp-host']='smtp-mail.outlook.com'; d['smtp-port']='587'; print(json.dumps({'data': d}))" \
              "$EXISTING_DATA" "$SMTP_USERNAME" "$SMTP_PASSWORD" 2>/dev/null || echo "")
            if [ -n "$SMTP_PATCHED" ]; then
              curl -s -X POST "${LOCAL_OPENBAO}/v1/secret/data/platform/authentik" \
                -H "X-Vault-Token: $ROOT_TOKEN" -H "Content-Type: application/json" \
                -d "$SMTP_PATCHED" > /dev/null
              echo "==> SMTP credentials updated in OpenBao"
            fi
          fi

          kill $BAO_PF_PID 2>/dev/null || true
          echo "✅ OpenBao secrets seeded/patched" >> $GITHUB_STEP_SUMMARY

  # ── 4. Apply user/group changes ───────────────────────────────────────────
  apply-users:
    name: "Apply User Config"
    needs: [detect, seed-openbao]
    if: |
      always() &&
      (needs.detect.outputs.user_config == 'true' ||
       github.event.inputs.force_user_sync == 'true')
    runs-on:
      - self-hosted
      - prod-worker
    outputs:
      recovery_links_json: ${{ steps.recovery.outputs.links_json }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Authentik worker
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"
          for i in $(seq 1 60); do
            READY=$($KT get deployment/authentik-worker -n authentik -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [ "${READY:-0}" -ge 1 ]; then echo "Authentik worker ready"; break; fi
            echo "  [${i}/60] Waiting for authentik-worker (ready=${READY:-0})..."
            sleep 5
          done

      - name: Sync group memberships from users.yaml
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          python3 .github/scripts/sync-authentik-users.py > /tmp/ak-group-sync.py
          # Use deploy/ target — avoids stale pod name issues on rolling updates
          cat /tmp/ak-group-sync.py | $KT exec -i -n authentik deploy/authentik-worker -c worker -- ak shell
          echo "✅ Group memberships synced from users.yaml" >> $GITHUB_STEP_SUMMARY

      - name: Force-create new users and set passwords from K8s secret
        if: needs.detect.outputs.new_users != '[]' && needs.detect.outputs.new_users != ''
        env:
          NEW_USERS_JSON: ${{ needs.detect.outputs.new_users }}
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          echo "==> Force-creating/updating new users: $NEW_USERS_JSON"

          # Generate ak shell script that creates/updates users with passwords from K8s secret
          # Use deploy/ target — avoids stale pod name issues on rolling updates
          python3 .github/scripts/create-new-users.py \
            "deploy/authentik-worker" "$KB" "$NEW_USERS_JSON" | \
            $KT exec -i -n authentik deploy/authentik-worker -c worker -- ak shell 2>&1 | tail -10
          echo "✅ New users created/updated with passwords" >> $GITHUB_STEP_SUMMARY

      - name: Generate recovery links for new users
        id: recovery
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          NEW_USERS='${{ needs.detect.outputs.new_users }}'
          if [ "$NEW_USERS" = "[]" ] || [ -z "$NEW_USERS" ]; then
            echo "==> No new users — skipping recovery link generation"
            echo 'links_json={}' >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get a short-lived Authentik API token via ak shell
          # Use deploy/ target — avoids stale pod name issues on rolling updates
          _AK_PY=""
          AK_TOKEN=$(echo "$_AK_PY" | base64 -d | $KT exec -i -n authentik deploy/authentik-worker -c worker -- ak shell 2>&1 | grep "^TOKEN:" | sed 's/TOKEN://' || echo "")

          if [ -z "$AK_TOKEN" ]; then
            echo "Could not get Authentik API token — skipping recovery links"
            echo 'links_json={}' >> $GITHUB_OUTPUT
            exit 0
          fi

          $KT port-forward svc/authentik-server -n authentik 8089:80 > /tmp/ak-pf.log 2>&1 &
          AK_PF_PID=$!
          sleep 4

          LINKS_JSON="{}"
          for USERNAME in $(echo "$NEW_USERS" | python3 -c "import sys,json; print('\n'.join(json.loads(sys.stdin.read())))"); do
            USER_ID=$(curl -sf -H "Authorization: Bearer $AK_TOKEN" \
              "http://localhost:8089/api/v3/core/users/?username=${USERNAME}" 2>/dev/null | \
              python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('results',[]); print(r[0]['pk'] if r else '')" || echo "")
            if [ -n "$USER_ID" ]; then
              RAW_LINK=$(curl -sf -X POST -H "Authorization: Bearer $AK_TOKEN" \
                -H "Content-Type: application/json" \
                "http://localhost:8089/api/v3/core/users/$USER_ID/recovery/" 2>/dev/null | \
                python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('link',''))" || echo "")
              LINK=$(echo "$RAW_LINK" | sed 's|http://localhost:8089|https://auth.rlservers.com|g')
              echo "==> Recovery link generated for ${USERNAME}"
              LINKS_JSON=$(echo "$LINKS_JSON" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); d[\"${USERNAME}\"]=\"${LINK}\"; print(json.dumps(d))")
            else
              echo "==> WARN: user ${USERNAME} not yet in Authentik (blueprint may not have synced)"
            fi
          done

          kill $AK_PF_PID 2>/dev/null || true
          echo "links_json=${LINKS_JSON}" >> $GITHUB_OUTPUT
          echo "✅ Recovery links generated for: $(echo "$NEW_USERS" | python3 -c "import sys,json; print(', '.join(json.loads(sys.stdin.read())))")" >> $GITHUB_STEP_SUMMARY

  # ── 5. Send welcome emails (only to NEW users, to their own email) ─────────
  welcome-emails:
    name: "Send Welcome Emails"
    needs: [detect, apply-users]
    if: |
      always() &&
      needs.detect.outputs.new_users != '[]' &&
      needs.detect.outputs.new_users != '' &&
      github.event.inputs.send_welcome_emails != 'false'
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@v4

      - name: Send welcome email to each new user
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NEW_USERS:      ${{ needs.detect.outputs.new_users }}
          RECOVERY_LINKS: ${{ needs.apply-users.outputs.recovery_links_json }}
        run: |
          for USERNAME in $(echo "$NEW_USERS" | python3 -c "import sys,json; print('\n'.join(json.loads(sys.stdin.read())))"); do
            LINK=$(echo "$RECOVERY_LINKS" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get(\"${USERNAME}\",\"\"))")
            echo "==> Sending welcome email to user: ${USERNAME}"
            python3 scripts/send-welcome-email.py \
              --username "$USERNAME" \
              --recovery-link "$LINK" || echo "WARN: welcome email failed for ${USERNAME} (non-critical)"
          done
          echo "✅ Welcome emails sent" >> $GITHUB_STEP_SUMMARY

  # ── 5. Apply new bootstrap Applications (new apps added via new-app.sh) ─────
  apply-new-apps:
    name: "Apply New App Bootstraps"
    needs: [detect]
    if: needs.detect.outputs.new_bootstrap == 'true' || github.event.inputs.force_user_sync == 'true'
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Apply changed bootstrap Application files
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep "^kubernetes/bootstrap/app-" || echo "")

          if [ -z "$CHANGED" ]; then
            echo "==> No changed bootstrap files detected — applying all bootstrap apps"
            $KT apply -f kubernetes/bootstrap/ --dry-run=client 2>&1 | head -5
            $KT apply -f kubernetes/bootstrap/
          else
            echo "==> Applying changed bootstrap files:"
            for f in $CHANGED; do
              if [ -f "$f" ]; then
                echo "  kubectl apply -f $f"
                $KT apply -f "$f"
                APP_NAME=$(grep "^  name:" "$f" | head -1 | awk '{print $2}')
                if [ -n "$APP_NAME" ]; then
                  echo "  Waiting for ArgoCD to pick up ${APP_NAME}..."
                  $KT wait application/"$APP_NAME" -n argocd \
                    --for=jsonpath='{.status.sync.status}'=Synced \
                    --timeout=120s 2>/dev/null || echo "  ⚠️ Not yet Synced — ArgoCD will continue in background"
                fi
              else
                echo "  ⚠️ File deleted: $f (app will be pruned by ArgoCD)"
              fi
            done
          fi
          echo "✅ Bootstrap Application files applied" >> $GITHUB_STEP_SUMMARY

  # ── 5b. Sync catalog apps (when platform.yaml changes) ───────────────────
  sync-catalog:
    name: "Sync Catalog Apps"
    needs: [detect]
    if: needs.detect.outputs.catalog_sync == 'true' || github.event.inputs.force_user_sync == 'true'
    runs-on:
      - self-hosted
      - prod-worker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Sync catalog bootstrap files from platform.yaml
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "InfraWeaver Catalog Sync"
          bash scripts/sync-catalog.sh
          echo "✅ Catalog sync complete" >> $GITHUB_STEP_SUMMARY

      - name: Apply catalog bootstrap files to ArgoCD
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"
          # Apply any new/changed catalog bootstrap files
          for f in kubernetes/bootstrap/catalog-*.yaml; do
            [ -f "$f" ] && $KT apply -f "$f"
          done
          echo "✅ Catalog applications applied to ArgoCD" >> $GITHUB_STEP_SUMMARY

  # ── 6. Post-apply health check ────────────────────────────────────────────
  post-health-check:
    name: "Post-Apply Health Check"
    needs: [detect, apply-users, apply-new-apps, sync-catalog]
    if: |
      always() &&
      (needs.detect.outputs.user_config == 'true' ||
       needs.detect.outputs.new_bootstrap == 'true' ||
       needs.detect.outputs.catalog_sync == 'true' ||
       github.event.inputs.force_user_sync == 'true')
    runs-on:
      - self-hosted
      - prod-worker
    steps:
      - name: Ensure node labels (grafana-eligible)
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"
          # Label nodes that can run Grafana (all except cp1 which has Docker Hub issues)
          for node in talos-prod-cp2 talos-prod-cp3; do
            if $KT get node "$node" >/dev/null 2>&1; then
              $KT label node "$node" grafana-eligible=true --overwrite
              echo "✅ Labelled ${node} grafana-eligible=true"
            fi
          done

      - name: Check public endpoint reachability
        run: |
          FAIL=0
          check_url() {
            local URL=$1 LABEL=$2
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            if [ "$CODE" = "000" ]; then
              echo "❌ $LABEL ($URL) — unreachable"
              FAIL=1
            elif [ "$CODE" -ge 500 ]; then
              echo "⚠️  $LABEL ($URL) — HTTP $CODE (server error)"
              FAIL=1
            else
              echo "✅ $LABEL ($URL) — HTTP $CODE"
            fi
          }

          check_url "https://auth.rlservers.com/if/flow/default-authentication-flow/" "Authentik login"
          check_url "https://api-netbird.rlservers.com/" "NetBird API"
          check_url "https://netbird.rlservers.com/" "NetBird Dashboard"

          if [ $FAIL -eq 0 ]; then
            echo "✅ All public endpoints reachable" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  Some endpoints failed health check — check logs above" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Authentik ArgoCD app health
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          KT="kubectl --kubeconfig $KB --insecure-skip-tls-verify"

          APP_NAME="apps-authentik-manifests"

          for i in $(seq 1 12); do
            SYNC=$($KT get application "$APP_NAME" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH=$($KT get application "$APP_NAME" -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "  [${i}/12] $APP_NAME: sync=$SYNC health=$HEALTH"
            if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ Authentik app ($APP_NAME): Synced + Healthy" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            sleep 10
          done
          echo "⚠️  Authentik app ($APP_NAME) not Synced+Healthy after 2 min — check ArgoCD UI" >> $GITHUB_STEP_SUMMARY

      - name: Run post-deploy test suite
        if: always()
        run: |
          KB=~/.kube/config-platform-${{ env.ENV_NAME }}
          bash scripts/test-post-deploy.sh "$KB" "${{ env.ENV_NAME }}" 2>&1 || true
          echo "✅ Post-deploy test suite complete (non-blocking)" >> $GITHUB_STEP_SUMMARY

      - name: Write deploy summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | push to \`${{ github.ref_name }}\` by \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ env.ENV_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| User config changed | \`${{ needs.detect.outputs.user_config }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New users added | \`${{ needs.detect.outputs.new_users }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
