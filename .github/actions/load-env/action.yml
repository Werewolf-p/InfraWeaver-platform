name: Load Runner Environment
description: >
  Load secrets from /opt/platform/.env on the self-hosted runner into GITHUB_ENV.
  This replaces GitHub Secrets for all self-hosted runner jobs.

inputs:
  env-file:
    description: "Path to the .env file on the runner"
    required: false
    default: "/opt/platform/.env"

runs:
  using: composite
  steps:
    - name: Load .env into GITHUB_ENV
      shell: bash
      run: |
        ENV_FILE="${{ inputs.env-file }}"

        if [ ! -f "$ENV_FILE" ]; then
          echo "❌ .env file not found at: $ENV_FILE"
          echo "   Run: bash scripts/setup-runner-env.sh  to install it"
          exit 1
        fi

        echo "📂 Loading environment from: $ENV_FILE"
        count=0
        while IFS= read -r line || [ -n "$line" ]; do
          # Skip comments and empty lines
          [[ "$line" =~ ^[[:space:]]*# ]] && continue
          [[ -z "${line// }" ]] && continue
          # Only process KEY=VALUE lines
          if [[ "$line" =~ ^([A-Za-z_][A-Za-z0-9_]*)=(.*)$ ]]; then
            key="${BASH_REMATCH[1]}"
            val="${BASH_REMATCH[2]}"
            # Strip surrounding quotes if present
            val="${val#\"}" ; val="${val%\"}"
            val="${val#\'}" ; val="${val%\'}"
            # Mask the value in GitHub Actions logs
            echo "::add-mask::$val"
            printf '%s=%s\n' "$key" "$val" >> "$GITHUB_ENV"
            ((count++)) || true
          fi
        done < "$ENV_FILE"
        echo "✅ Loaded $count environment variables"
