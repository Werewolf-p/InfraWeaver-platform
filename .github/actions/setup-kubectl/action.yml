name: 'Setup kubectl with kubeconfig'
description: 'Decode and install kubeconfig for cluster access'
inputs:
  kubeconfig-b64:
    description: 'Base64-encoded kubeconfig content'
    required: true
  env-name:
    description: 'Environment name (e.g. productie)'
    required: false
    default: 'productie'
runs:
  using: composite
  steps:
    - name: Install kubeconfig
      shell: bash
      run: |
        mkdir -p ~/.kube
        echo "${{ inputs.kubeconfig-b64 }}" | base64 -d > ~/.kube/config-platform-${{ inputs.env-name }}
        chmod 600 ~/.kube/config-platform-${{ inputs.env-name }}
        # Verify we can connect
        if ! kubectl --kubeconfig ~/.kube/config-platform-${{ inputs.env-name }} \
            --insecure-skip-tls-verify get nodes --request-timeout=10s &>/dev/null; then
          echo "::warning::Kubeconfig from secret failed — checking existing file"
          if kubectl --kubeconfig ~/.kube/config-platform-${{ inputs.env-name }} \
              --insecure-skip-tls-verify get nodes --request-timeout=10s 2>&1 | grep -q "Ready"; then
            echo "Cluster accessible"
          fi
        fi
