name: 'Setup kubectl with kubeconfig'
description: 'Decode and install kubeconfig for cluster access, with fallback to alternate CP nodes'
inputs:
  kubeconfig-b64:
    description: 'Base64-encoded kubeconfig content (primary)'
    required: true
  kubeconfig-fallback-b64:
    description: 'Base64-encoded kubeconfig content (fallback CP node)'
    required: false
    default: ''
  env-name:
    description: 'Environment name (e.g. productie)'
    required: false
    default: 'productie'
runs:
  using: composite
  steps:
    - name: Install kubeconfig
      shell: bash
      run: |
        mkdir -p ~/.kube
        DEST=~/.kube/config-platform-${{ inputs.env-name }}
        echo "${{ inputs.kubeconfig-b64 }}" | base64 -d > "$DEST"
        chmod 600 "$DEST"

        # Test primary connection
        if kubectl --kubeconfig "$DEST" --insecure-skip-tls-verify \
            get nodes --request-timeout=10s &>/dev/null; then
          echo "✅ Primary kubeconfig connected"
        else
          echo "::warning::Primary kubeconfig unreachable — trying fallback"
          FALLBACK="${{ inputs.kubeconfig-fallback-b64 }}"
          if [[ -n "$FALLBACK" ]]; then
            echo "$FALLBACK" | base64 -d > "$DEST"
            chmod 600 "$DEST"
            if kubectl --kubeconfig "$DEST" --insecure-skip-tls-verify \
                get nodes --request-timeout=10s &>/dev/null; then
              echo "✅ Fallback kubeconfig connected"
            else
              echo "::warning::Both primary and fallback kubeconfigs failed — cluster may be degraded"
            fi
          fi
        fi
