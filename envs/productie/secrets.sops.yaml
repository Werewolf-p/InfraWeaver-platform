# 
# ⚠️  This file is kept for documentation purposes ONLY.
#
# All secrets have been migrated to GitHub Actions Secrets.
# See: https://github.com/Werewolf-p/InfraWeaver-platform/settings/secrets/actions
#
# **Previously encrypted here (now migrated):**
#   - proxmox_api_token → GITHUB_SECRET: PROXMOX_API_TOKEN
#   - github_runner_token → GITHUB_SECRET: RUNNER_TOKEN (optional)
#   - openbao_token → GITHUB_SECRET: OPENBAO_TOKEN (optional)
#
# **Secrets sourcing pattern:**
#   GitHub Secrets → .github/workflows/full-redeploy.yml →
#   Export as TF_VAR_* environment variables → Terraform
#
# **For future developers:**
#   If you need to add new secrets:
#   1. Add them to GitHub Secrets (Settings > Secrets > Actions)
#   2. Update .github/workflows/full-redeploy.yml to export them as TF_VAR_*
#   3. Add corresponding Terraform variables in terraform/variables.tf
#   4. The infrastructure will automatically pick them up
#
