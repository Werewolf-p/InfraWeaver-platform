cluster_name: "infraweaver-prod"
environment: "productie"
talos_version: "v1.12.7"
kubernetes_version: "v1.35.4"
proxmox_host: "10.25.0.3"

# Talos VMs — 3 stacked control planes for HA etcd
nodes:
  talos-prod-cp1:
    proxmox_node: "proxmox"
    ip: "10.10.0.90"
    mac_address: "BC:24:11:10:10:90"
    vm_id: 9310
    controlplane: true
    cpu: 8
    memory_mb: 8192
    disk_gb: 200
    datastore: "lvm-proxmox"
  talos-prod-cp2:
    proxmox_node: "proxmox"
    ip: "10.10.0.91"
    mac_address: "BC:24:11:10:10:91"
    vm_id: 9311
    controlplane: true
    cpu: 8
    memory_mb: 8192
    disk_gb: 200
    datastore: "lvm-proxmox"
  talos-prod-cp3:
    proxmox_node: "proxmox"
    ip: "10.10.0.92"
    mac_address: "BC:24:11:10:10:92"
    vm_id: 9312
    controlplane: true
    cpu: 8
    memory_mb: 8192
    disk_gb: 200
    datastore: "lvm-proxmox"

# SSH IPs for individual PVE nodes — used by qm importdisk operations
# These are the management IPs of each Proxmox node in the cluster.
pve_nodes:
  proxmox: "10.25.0.3"

gateway: "10.10.0.1"
nameservers:
  - "8.8.8.8"
  - "1.1.1.1"
subnet_prefix: 24
talos_image_datastore: "lvm-proxmox"
