cluster_name: "infraweaver-prod"
environment: "productie"
talos_version: "v1.10.9"
kubernetes_version: "v1.33.0"
proxmox_host: "10.25.0.80"

# Talos VMs — 3 stacked control planes for HA etcd
nodes:
  talos-prod-cp1:
    proxmox_node: "pve-prod1"
    ip: "10.25.0.90"
    vm_id: 9300
    controlplane: true
    cpu: 4
    memory_mb: 4096
    disk_gb: 150
    datastore: "local-lvm"
  talos-prod-cp2:
    proxmox_node: "pve-prod2"
    ip: "10.25.0.91"
    vm_id: 9301
    controlplane: true
    cpu: 4
    memory_mb: 4096
    disk_gb: 150
    datastore: "local-lvm"
  talos-prod-cp3:
    proxmox_node: "pve-prod3"
    ip: "10.25.0.92"
    vm_id: 9302
    controlplane: true
    cpu: 4
    memory_mb: 4096
    disk_gb: 150
    datastore: "local-lvm"

# SSH IPs for individual PVE nodes — used by qm importdisk operations
# These are the management IPs of each Proxmox node in the cluster.
pve_nodes:
  pve-prod1: "10.25.0.80"
  pve-prod2: "10.25.0.81"
  pve-prod3: "10.25.0.82"

gateway: "10.25.0.1"
nameservers:
  - "8.8.8.8"
  - "1.1.1.1"
subnet_prefix: 24
talos_image_datastore: "local-lvm"
openbao_address: "http://10.25.0.86:8200"
