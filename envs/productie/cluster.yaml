cluster_name: "infraweaver-prod"
environment: "productie"
talos_version: "v1.10.0"
kubernetes_version: "v1.33.0"
proxmox_host: "10.25.0.3"

# Talos VMs — 3 stacked control planes for HA etcd
nodes:
  talos-prod-cp1:
    proxmox_node: "pve-prod1"
    ip: "10.25.0.90"
    vm_id: 9300
    controlplane: true
    cpu: 4
    memory_mb: 8192
    disk_gb: 100
    datastore: "lvm-proxmox"
  talos-prod-cp2:
    proxmox_node: "pve-prod2"
    ip: "10.25.0.91"
    vm_id: 9301
    controlplane: true
    cpu: 4
    memory_mb: 8192
    disk_gb: 100
    datastore: "lvm-proxmox"
  talos-prod-cp3:
    proxmox_node: "pve-prod3"
    ip: "10.25.0.92"
    vm_id: 9302
    controlplane: true
    cpu: 4
    memory_mb: 8192
    disk_gb: 100
    datastore: "lvm-proxmox"

gateway: "10.25.0.1"
nameservers:
  - "8.8.8.8"
  - "1.1.1.1"
subnet_prefix: 24
talos_image_datastore: "lvm-proxmox"
openbao_address: "https://10.25.0.241:8200"
