cluster_name: "infraweaver-prod"
environment: "productie"
talos_version: "v1.12.7"
kubernetes_version: "v1.35.4"
proxmox_host: "10.25.0.3"

# Base domain — used to derive internal service hostnames (e.g. onedev.${base_domain})
# Must match BASE_DOMAIN in your .env file.
base_domain: "rlservers.com"

# Talos VMs — 3 stacked control planes for HA etcd
nodes:
  talos-prod-cp1:
    proxmox_node: "proxmox"
    ip: "10.10.0.92"
    vm_id: 9300
    controlplane: true
    cpu: 10
    memory_mb: 22528
    disk_gb: 300
    datastore: "lvm-proxmox"
  talos-prod-cp2:
    proxmox_node: "proxmox"
    ip: "10.10.0.93"
    vm_id: 9301
    controlplane: true
    cpu: 10
    memory_mb: 22528
    disk_gb: 300
    datastore: "lvm-proxmox"

# Management IPs of each Proxmox node in the cluster.
# Used for display/reference only — Talos VM disk operations use the Proxmox API,
# no SSH to root@proxmox is required.
#
# ── Multi-Proxmox-node support ─────────────────────────────────────────────
# This map supports clusters spanning multiple physical Proxmox hosts.
# Requirements for adding a second PVE host:
#   1. All PVE hosts must be in the SAME Proxmox cluster (they share one API endpoint)
#      — proxmox_host above points to any node's management IP (API proxies to all)
#   2. The datastore name used in each node's `datastore:` field must exist on
#      the PVE host that node is assigned to (datastores are per-node, not shared)
#
# To add a second PVE host:
#   1. Add it here via PVE_NODES in .env:  proxmox:10.25.0.3,pve2:192.168.1.101
#   2. Assign nodes to it: proxmox_node: "pve2"  in the nodes section above
#   3. Run tofu plan to verify changes before applying
pve_nodes:
  proxmox: "10.25.0.3"

gateway: "10.10.0.1"
nameservers:
  - "8.8.8.8"
  - "1.1.1.1"
subnet_prefix: 24

# Proxmox storage for staging the Talos disk image via the Proxmox API.
# MUST be an ISO-capable storage (type=dir) — "local" works on every PVE node.
# This is separate from per-node VM disk storage (NODE_X_DATASTORE / TALOS_DATASTORE).
talos_image_datastore: "local"
