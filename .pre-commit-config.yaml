# .pre-commit-config.yaml — InfraWeaver Platform
# Install pre-commit: pip install pre-commit
# Install hooks: pre-commit install
# Run all: pre-commit run --all-files
repos:
  # ── Terraform/OpenTofu format check ──────────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.4
    hooks:
      - id: terraform_fmt
        name: Terraform/OpenTofu fmt
        args: ["--args=-recursive"]
      - id: terraform_validate
        name: Terraform/OpenTofu validate
        files: ^terraform/

  # ── YAML lint ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint
        name: YAML lint
        args: ["-c", ".yamllint.yaml"]
        exclude: "envs/.*/secrets.sops.yaml"

  # ── Secret scanning ───────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: Gitleaks — Secret Detection

  # ── General file hygiene ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"]   # allows custom tags (e.g. Helm)
        exclude: "envs/.*/secrets.sops.yaml"
      - id: check-merge-conflict
      - id: detect-private-key
