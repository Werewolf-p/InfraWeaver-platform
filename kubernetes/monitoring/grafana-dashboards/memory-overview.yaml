---
apiVersion: v1
kind: ConfigMap
metadata:
  name: memory-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  memory-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "type": "timeseries",
          "title": "Per-node memory used",
          "id": 1,
          "datasource": "Prometheus",
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 0},
          "fieldConfig": {
            "defaults": {"unit": "bytes", "color": {"mode": "palette-classic"}},
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by (instance) (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}}
        },
        {
          "type": "table",
          "title": "Top 10 pods by memory",
          "id": 2,
          "datasource": "Prometheus",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 9},
          "targets": [
            {
              "expr": "topk(10, sum by (namespace, pod) (container_memory_working_set_bytes{container!=\"\",container!=\"POD\"}))",
              "format": "table",
              "instant": true,
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "bytes"},
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "footer": {"show": false}
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["infraweaver", "memory"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "timezone": "browser",
      "title": "InfraWeaver Memory Overview",
      "version": 1
    }
