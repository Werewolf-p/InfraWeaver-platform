---
# PrometheusRule cannot evaluate LogQL directly, so use kube-state-metrics as a portable OOM kill signal.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: oom-kill-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: oom.kills
      rules:
        - alert: PodOOMKilled
          expr: |
            increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
            description: >-
              Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }}
              was terminated by the Linux OOM killer within the last 10 minutes.
