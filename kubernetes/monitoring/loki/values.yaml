loki:
  enabled: true
  priorityClassName: platform-standard
  # Prefer standard nodes (CP1/CP2, 18GB RAM each); CP3 only has 6.6GB allocatable
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: infraweaver.io/node-class
            operator: In
            values: [standard]
  persistence:
    enabled: true
    size: 10Gi
  config:
    limits_config:
      retention_period: 168h  # 7 days
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi  # Prevent Loki from OOM-killing the node

promtail:
  enabled: true
  priorityClassName: platform-standard
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi

# Grafana integration — adds Loki as datasource to kube-prometheus-stack's Grafana
grafana:
  enabled: false  # managed by kube-prometheus-stack
  sidecar:
    datasources:
      enabled: true
      label: grafana_datasource
