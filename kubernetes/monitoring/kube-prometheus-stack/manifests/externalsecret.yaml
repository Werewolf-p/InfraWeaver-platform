---
# ExternalSecret — pulls Grafana admin credentials from OpenBao for monitoring namespace.
# The kube-prometheus-stack Helm chart requires grafana-admin-secret in its own namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-user
      remoteRef:
        key: secret/platform/grafana
        property: admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/grafana
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
