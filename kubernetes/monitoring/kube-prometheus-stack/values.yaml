fullnameOverride: kube-prometheus-stack

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminUser: admin
  # adminPassword pulled from OpenBao via ExternalSecret (see external-secrets/grafana-secret.yaml)
  adminPassword: "" # overridden by ExternalSecret
  existingSecret: grafana-admin-secret
  secretKey: admin-password

  persistence:
    enabled: true
    size: 5Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.local
    paths:
      - /

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      talos-dashboard:
        gnetId: 19764
        revision: 1
        datasource: Prometheus

  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    # local-path provisioner creates root-owned dirs; fsGroup gives prometheus write access
    securityContext:
      fsGroup: 65534
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 2Gi

    # Scrape all ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# ── AlertManager ─────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ───────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
