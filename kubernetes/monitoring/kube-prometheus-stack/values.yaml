fullnameOverride: kube-prometheus-stack

# ── Prometheus Operator ───────────────────────────────────────────────────────
# Disable admission webhook (its cert-patch Job has hook-delete-policy:
# hook-succeeded which causes ArgoCD to wait forever after the Job self-deletes)
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  # Admin credentials from OpenBao via ExternalSecret in monitoring namespace
  # grafana-admin-secret provides both admin-user and admin-password keys
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    size: 5Gi

  # Exclude cp1 (talos-prod-cp1) which has a persistent Docker Hub connectivity issue
  # causing init container image pulls to hang/fail on that node.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - talos-prod-cp1

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.prod.local
    paths:
      - /
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-netbird-only@kubernetescrd

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      talos-dashboard:
        gnetId: 19764
        revision: 1
        datasource: Prometheus

  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    # Prevent Kubernetes from re-applying fsGroup between init containers and main container
    # (which would reset our chown). With Never, our initContainer sets the correct ownership.
    podMetadata:
      annotations: {}
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      fsGroup: 2000
      fsGroupChangePolicy: "OnRootMismatch"
      seccompProfile:
        type: RuntimeDefault
    # subPath mounts in Kubernetes use overlayfs. The overlay's upper layer is a fresh
    # root:root 755 directory created by kubelet, overriding changes to the lower layer.
    # Fix: second init container mounts WITH subPath to chmod the overlayfs upper layer directly.
    initContainers:
      - name: fix-prometheus-permissions
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            mkdir -p /prometheus/prometheus-db
            chmod -R a+rwx /prometheus/prometheus-db
            chown -R 1000:2000 /prometheus/prometheus-db
            echo "Lower layer fixed: $(ls -lan /prometheus/)"
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: true
        volumeMounts:
          - name: prometheus-kube-prometheus-stack-prometheus-db
            mountPath: /prometheus
      - name: fix-prometheus-overlay-permissions
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            chmod 777 /prometheus
            chown 1000:2000 /prometheus
            echo "Overlay upper layer fixed: $(ls -lan /prometheus)"
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: true
        volumeMounts:
          - name: prometheus-kube-prometheus-stack-prometheus-db
            mountPath: /prometheus
            subPath: prometheus-db
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 2Gi

    # Scrape all ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# ── AlertManager ─────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ───────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
