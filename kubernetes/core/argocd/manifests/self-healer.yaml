---
# Self-Healer — automatic ArgoCD OutOfSync recovery
#
# Runs every 15 minutes and finds apps that are:
#   Health=Healthy  + Sync=OutOfSync  (safe to re-sync, workloads are fine)
#   Health=Unknown  + Sync=OutOfSync  (stale refresh — trigger hard-refresh)
#
# Strategy: patch argocd.argoproj.io/refresh=hard annotation first, then
# wait 15 s for ArgoCD to re-compute the diff. If the app is still OutOfSync
# AFTER the refresh, trigger a sync operation. This avoids syncing apps whose
# "OutOfSync" was a stale cache entry that resolves on refresh alone.
#
# Apps that are Degraded, Progressing or have a running Operation are skipped —
# they need human review, not an automated sync.
#
# RBAC: ServiceAccount + ClusterRole limited to argoproj.io/applications
# (get, list, patch). No cluster-admin, no secrets access.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-self-healer
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-self-healer
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-self-healer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-self-healer
subjects:
  - kind: ServiceAccount
    name: argocd-self-healer
    namespace: argocd
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: argocd-self-healer
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-self-healer
    infraweaver.io/auth: vpn
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  # Keep 0 failed jobs — ArgoCD marks a CronJob Degraded when failed job pods exist in history.
  # Setting to 0 prevents the self-healer from causing core-argocd-manifests to appear Degraded.
  failedJobsHistoryLimit: 0
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: argocd-self-healer
        spec:
          serviceAccountName: argocd-self-healer
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: healer
              # bitnami/kubectl — has bash + kubectl, works with in-cluster SA token
              image: bitnami/kubectl:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: DISCORD_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: argocd-discord-secret
                      key: webhook-url
                      optional: true   # don't fail if secret not yet created
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail

                  NAMESPACE="argocd"
                  DISCORD_WEBHOOK="${DISCORD_WEBHOOK_URL:-}"
                  echo "[self-healer] $(date -u) — scanning ArgoCD apps in namespace: $NAMESPACE"

                  # Apps that are intentionally Degraded by design (app-of-apps inheriting child health,
                  # or infra apps that self-manage). Skip alerting on these — they need structural fixes,
                  # not automated sync. Still attempt hard-refresh if OutOfSync.
                  # bootstrap:              app-of-apps for bootstrap/*.yaml — inherits worst-child health
                  # core-argocd-manifests:  manages self-healer CronJob — self-referential health check
                  SKIP_ALERT_APPS="bootstrap core-argocd-manifests core-external-secrets-manifests"

                  is_skip_alert() {
                    local app="$1"
                    for skip in $SKIP_ALERT_APPS; do
                      [ "$app" = "$skip" ] && return 0
                    done
                    return 1
                  }

                  # Send Discord notification helper
                  notify_discord() {
                    local title="$1" color="$2" body="$3"
                    [ -z "$DISCORD_WEBHOOK" ] && return 0
                    curl -s -X POST "$DISCORD_WEBHOOK" \
                      -H 'Content-Type: application/json' \
                      -d "{\"embeds\":[{\"title\":\"$title\",\"color\":$color,\"description\":\"$body\"}]}" \
                      > /dev/null 2>&1 || true
                  }

                  # Collect all apps with their status + health transition time
                  APPS=$(kubectl get applications -n "$NAMESPACE" \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.health.status}{"\t"}{.status.sync.status}{"\t"}{.status.operationState.phase}{"\t"}{.status.health.lastTransitionTime}{"\n"}{end}' 2>/dev/null || true)

                  REFRESHED=0
                  SYNCED=0
                  SKIPPED=0
                  SYNCED_APPS=""
                  DEGRADED_APPS=""
                  DEGRADED_REFRESH_APPS=""
                  NOW_EPOCH=$(date -u +%s)
                  # Only alert on Degraded apps that have been Degraded for > 15 minutes (1 full healer cycle)
                  # This filters out transient degradations from hook runs, ESO provisioning, etc.
                  DEGRADED_GRACE_SECONDS=900

                  # Pass 1: hard-refresh OutOfSync, Unknown-sync, AND Synced+Degraded apps.
                  # Synced+Degraded apps get a hard-refresh first — ArgoCD's sync cache can be
                  # stale (showing Synced when git actually differs). A hard-refresh reveals the
                  # true state. If still Synced+Degraded after refresh, notify Discord for review.
                  # Use process substitution to avoid subshell variable scoping issue
                  while IFS=$'\t' read -r APP HEALTH SYNC OP_PHASE TRANSITION_TIME; do
                    [ -z "$APP" ] && continue
                    if [ "$OP_PHASE" = "Running" ]; then
                      echo "  SKIP  $APP — operation in progress"
                      SKIPPED=$((SKIPPED+1))
                      continue
                    fi
                    # Track PERSISTENT Degraded apps for Discord notification
                    # Skip apps that JUST became Degraded (within grace period = transient)
                    if [ "$HEALTH" = "Degraded" ]; then
                      TRANSITION_EPOCH=0
                      if [ -n "$TRANSITION_TIME" ]; then
                        TRANSITION_EPOCH=$(date -u -d "$TRANSITION_TIME" +%s 2>/dev/null || echo 0)
                      fi
                      DEGRADED_SECONDS=$(( NOW_EPOCH - TRANSITION_EPOCH ))
                      if [ "$DEGRADED_SECONDS" -lt "$DEGRADED_GRACE_SECONDS" ]; then
                        echo "  SKIP  $APP — Degraded for ${DEGRADED_SECONDS}s (within ${DEGRADED_GRACE_SECONDS}s grace, likely transient)"
                        SKIPPED=$((SKIPPED+1))
                        continue
                      fi
                      # Skip app-of-apps and self-referential apps from alert list
                      # (still hard-refresh them so OutOfSync detection works)
                      if is_skip_alert "$APP"; then
                        echo "  SKIP-ALERT  $APP — Degraded but in skip-alert list (structural/inherited health)"
                        SKIPPED=$((SKIPPED+1))
                        continue
                      fi
                      # Persistent Degraded — hard-refresh to detect stale sync cache.
                      # This catches cases where git changed but ArgoCD still shows Synced.
                      echo "  REFRESH  $APP — Degraded+${SYNC} for ${DEGRADED_SECONDS}s (hard-refresh to check stale cache)"
                      kubectl patch application "$APP" -n "$NAMESPACE" \
                        --type=merge \
                        -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                        > /dev/null 2>&1 || true
                      DEGRADED_REFRESH_APPS="${DEGRADED_REFRESH_APPS} $APP"
                      REFRESHED=$((REFRESHED+1))
                      continue
                    fi
                    # Refresh both OutOfSync and Unknown (stale cache) apps
                    if [ "$SYNC" != "OutOfSync" ] && [ "$SYNC" != "Unknown" ]; then
                      continue
                    fi
                    echo "  REFRESH  $APP [health=$HEALTH sync=$SYNC]"
                    kubectl patch application "$APP" -n "$NAMESPACE" \
                      --type=merge \
                      -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                      > /dev/null 2>&1 || true
                    REFRESHED=$((REFRESHED+1))
                  done < <(echo "$APPS")

                  # Wait for refreshes to propagate before second pass
                  if [ "$REFRESHED" -gt 0 ]; then
                    echo "[self-healer] Waiting 20s for $REFRESHED refresh(es) to propagate..."
                    sleep 20
                  fi

                  # Pass 2: sync apps still OutOfSync after refresh.
                  # Also handle previously-Degraded apps that are now OutOfSync (stale cache confirmed).
                  APPS2=$(kubectl get applications -n "$NAMESPACE" \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.health.status}{"\t"}{.status.sync.status}{"\t"}{.status.operationState.phase}{"\n"}{end}' 2>/dev/null || true)

                  while IFS=$'\t' read -r APP HEALTH SYNC OP_PHASE; do
                    [ -z "$APP" ] && continue
                    [ "$OP_PHASE" = "Running" ] && continue
                    [ "$SYNC" != "OutOfSync" ] && continue
                    # If this was a Degraded app that hard-refresh revealed as OutOfSync → auto-sync it
                    # Otherwise if still Healthy/Progressing+OutOfSync → auto-sync as normal
                    echo "  SYNC  $APP [health=$HEALTH] — OutOfSync after refresh, triggering sync"
                    kubectl patch application "$APP" -n "$NAMESPACE" \
                      --type=merge \
                      -p '{"operation":{"sync":{"revision":"HEAD","syncStrategy":{"hook":{"force":false}}}}}' \
                      > /dev/null 2>&1 || echo "  WARN  $APP — sync patch failed"
                    SYNCED_APPS="${SYNCED_APPS}• \`${APP}\`\n"
                    SYNCED=$((SYNCED+1))
                  done < <(echo "$APPS2")

                  # Collect Degraded+Synced apps that remain Synced even after hard-refresh
                  # (these need human attention — runtime issue, not a stale cache)
                  if [ -n "$DEGRADED_REFRESH_APPS" ]; then
                    for APP in $DEGRADED_REFRESH_APPS; do
                      APP_STATUS=$(echo "$APPS2" | grep "^${APP}"$'\t' || echo "")
                      APP_SYNC=$(echo "$APP_STATUS" | cut -f3)
                      if [ "$APP_SYNC" != "OutOfSync" ]; then
                        DEGRADED_APPS="${DEGRADED_APPS}• \`${APP}\` (sync=${APP_SYNC:-unknown})\n"
                        echo "  ALERT $APP — still Degraded+${APP_SYNC:-?} after hard-refresh (needs review)"
                      else
                        echo "  FOUND $APP — hard-refresh revealed OutOfSync, will be synced by pass 2"
                      fi
                    done
                  fi

                  echo "[self-healer] Done. refreshed=$REFRESHED synced=$SYNCED skipped=$SKIPPED"

                  # Send Discord notification only when action was taken
                  if [ "$SYNCED" -gt 0 ]; then
                    notify_discord \
                      ":wrench: Self-Healer Auto-Synced $SYNCED App(s)" \
                      "3066993" \
                      "The ArgoCD self-healer triggered sync for:\n${SYNCED_APPS}\nThese apps were OutOfSync after a hard-refresh."
                  fi
                  if [ -n "$DEGRADED_APPS" ]; then
                    notify_discord \
                      ":warning: Degraded Apps Need Review" \
                      "15105570" \
                      "The self-healer skipped these Degraded apps (manual review required):\n${DEGRADED_APPS}"
                  fi
