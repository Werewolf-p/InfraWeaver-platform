---
# Self-Healer — automatic ArgoCD OutOfSync recovery
#
# Runs every 5 minutes and finds apps that are:
#   Health=Healthy  + Sync=OutOfSync  (safe to re-sync, workloads are fine)
#   Health=Unknown  + Sync=OutOfSync  (stale refresh — trigger hard-refresh)
#
# Strategy: patch argocd.argoproj.io/refresh=hard annotation first, then
# wait 15 s for ArgoCD to re-compute the diff. If the app is still OutOfSync
# AFTER the refresh, trigger a sync operation. This avoids syncing apps whose
# "OutOfSync" was a stale cache entry that resolves on refresh alone.
#
# Apps that are Degraded, Progressing or have a running Operation are skipped —
# they need human review, not an automated sync.
#
# RBAC: ServiceAccount + ClusterRole limited to argoproj.io/applications
# (get, list, patch). No cluster-admin, no secrets access.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-self-healer
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-self-healer
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-self-healer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-self-healer
subjects:
  - kind: ServiceAccount
    name: argocd-self-healer
    namespace: argocd
---
# Namespace-scoped Role for reading/writing self-healer state ConfigMaps.
# Intentionally separate from the ClusterRole (which only needs application CRD access).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-self-healer-state
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["self-healer-state", "self-healer-config"]
    verbs: ["get", "create", "patch"]
  # Allow create on any configmap name (needed for initial creation via kubectl create)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-self-healer-state
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-self-healer-state
subjects:
  - kind: ServiceAccount
    name: argocd-self-healer
    namespace: argocd
---
# State ConfigMap — written by the healer at runtime.
# Keys:
#   degraded-<appname>   unix epoch of first observation as Degraded
#   last-degraded-apps   comma-separated sorted list from the last sent alert
#   alerted-apps         comma-separated sorted list currently acknowledged in Discord
#   last-alert-time      RFC3339 timestamp of the last sent Degraded alert
#   last-sync-apps       comma-separated sorted list of apps synced in last notification
#   last-sync-time       RFC3339 timestamp of the last sent sync notification
# Do NOT edit manually; it is managed exclusively by the self-healer CronJob.
apiVersion: v1
kind: ConfigMap
metadata:
  name: self-healer-state
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-self-healer
    app.kubernetes.io/component: state
data:
  last-degraded-apps: ""
  alerted-apps: ""
  last-alert-time: ""
  last-sync-apps: ""
  last-sync-time: ""
---
# Config ConfigMap — human-editable operational controls.
# Set maintenance-until to an RFC3339 timestamp (preferred) or unix epoch to
# suppress Degraded alerts during planned maintenance. Leave empty ("") or
# remove the key to disable.
# Create once: kubectl create configmap self-healer-config -n argocd \
#   --from-literal=maintenance-until="2024-01-01T00:00:00Z"
# Update: kubectl patch cm self-healer-config -n argocd \
#   --type=merge -p '{"data":{"maintenance-until":"2024-01-01T00:00:00Z"}}'
apiVersion: v1
kind: ConfigMap
metadata:
  name: self-healer-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-self-healer
    app.kubernetes.io/component: config
data:
  maintenance-until: ""
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: argocd-self-healer
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-self-healer
    infraweaver.io/auth: vpn
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  # Keep 0 failed jobs — ArgoCD marks a CronJob Degraded when failed job pods exist in history.
  # Setting to 0 prevents the self-healer from causing core-argocd-manifests to appear Degraded.
  failedJobsHistoryLimit: 0
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: argocd-self-healer
        spec:
          serviceAccountName: argocd-self-healer
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: healer
              # bitnami/kubectl — has bash + kubectl, works with in-cluster SA token
              # bitnami/kubectl only publishes 'latest' on Docker Hub (no minor-version tags).
              image: bitnami/kubectl:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: DISCORD_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: argocd-discord-secret
                      key: webhook-url
                      optional: true   # don't fail if secret not yet created
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail

                  NAMESPACE="argocd"
                  DISCORD_WEBHOOK="${DISCORD_WEBHOOK_URL:-}"
                  NOW_EPOCH=$(date -u +%s)
                  STATE_CM="self-healer-state"
                  CONFIG_CM="self-healer-config"

                  # ── Alert thresholds ──────────────────────────────────────
                  # Skip apps degraded < 15m (very transient: hook runs, init containers, etc.)
                  FAST_SKIP_SECONDS=900
                  # Shorter skip for apps whose name implies ExternalSecret dependency
                  # (ESO provisioning can take a few minutes after OpenBao unseal)
                  ES_SKIP_SECONDS=600
                  # Only alert when degradation has persisted > 60m (12 full healer cycles)
                  ALERT_THRESHOLD_SECONDS=3600

                  echo "[self-healer] $(date -u) — scanning ArgoCD apps in namespace: $NAMESPACE"

                  # ── Static alert exclusions ──────────────────────────────
                  # bootstrap:              app-of-apps — inherits worst-child health
                  # core-argocd-manifests:  self-referential (manages this CronJob)
                  # core-external-secrets-manifests: health depends on OpenBao uptime
                  # catalog-game-hub-*: game servers can be intentionally stopped (replicas=0)
                  # catalog-infraweaver-console-manifests: rolling redeploys during active dev
                  SKIP_ALERT_APPS="bootstrap core-argocd-manifests core-external-secrets-manifests catalog-infraweaver-console-manifests"
                  # Wildcard pattern skip — any app whose name matches these globs is silenced
                  SKIP_ALERT_PATTERNS="catalog-game-hub-* catalog-community-*"
                  is_skip_alert() {
                    for s in $SKIP_ALERT_APPS; do [ "$1" = "$s" ] && return 0; done
                    for p in $SKIP_ALERT_PATTERNS; do
                      case "$1" in
                        $p) return 0 ;;
                      esac
                    done
                    return 1
                  }
                  # ExternalSecret-managing apps get a shorter skip threshold
                  is_es_app() {
                    case "$1" in *external-secret* | *externalsecret*) return 0 ;; esac; return 1
                  }

                  # ── Maintenance mode check ───────────────────────────────
                  IN_MAINTENANCE=false
                  MAINT_UNTIL_RAW=$(kubectl get configmap "$CONFIG_CM" -n "$NAMESPACE" \
                    --ignore-not-found -o jsonpath='{.data.maintenance-until}' 2>/dev/null || echo "")
                  MAINT_UNTIL_EPOCH=""
                  if [ -n "$MAINT_UNTIL_RAW" ]; then
                    if echo "$MAINT_UNTIL_RAW" | grep -qE '^[0-9]+$' 2>/dev/null; then
                      MAINT_UNTIL_EPOCH="$MAINT_UNTIL_RAW"
                    else
                      MAINT_UNTIL_EPOCH=$(date -u -d "$MAINT_UNTIL_RAW" +%s 2>/dev/null || echo "")
                    fi
                  fi
                  if [ -n "$MAINT_UNTIL_EPOCH" ] && [ "$NOW_EPOCH" -lt "$MAINT_UNTIL_EPOCH" ] 2>/dev/null; then
                    echo "[self-healer] MAINTENANCE MODE until $(date -u -d "@$MAINT_UNTIL_EPOCH" 2>/dev/null || echo "$MAINT_UNTIL_RAW")"
                    IN_MAINTENANCE=true
                  fi

                  # ── Load state ConfigMap (single read) ───────────────────
                  # Ensure CM exists; create if absent (idempotent on repeat)
                  kubectl get configmap "$STATE_CM" -n "$NAMESPACE" --ignore-not-found -o name \
                    | grep -q "configmap/" \
                    || kubectl create configmap "$STATE_CM" -n "$NAMESPACE" >/dev/null 2>&1 || true

                  # Load all state as KEY=VALUE lines (one kubectl call)
                  STATE_DATA=$(kubectl get configmap "$STATE_CM" -n "$NAMESPACE" --ignore-not-found \
                    -o go-template='{{range $k,$v := .data}}{{$k}}={{$v}}{{"\n"}}{{end}}' \
                    2>/dev/null || echo "")
                  LAST_DEGRADED_APPS=$(echo "$STATE_DATA" | grep '^last-degraded-apps=' | cut -d= -f2- | head -1 || echo "")
                  [ -z "$LAST_DEGRADED_APPS" ] && LAST_DEGRADED_APPS=$(echo "$STATE_DATA" | grep '^last-alert=' | cut -d= -f2- | head -1 || echo "")
                  ALERTED_APPS=$(echo "$STATE_DATA" | grep '^alerted-apps=' | cut -d= -f2- | head -1 || echo "")
                  LAST_ALERT_TIME=$(echo "$STATE_DATA" | grep '^last-alert-time=' | cut -d= -f2- | head -1 || echo "")
                  LAST_SYNC_APPS=$(echo "$STATE_DATA" | grep '^last-sync-apps=' | cut -d= -f2- | head -1 || echo "")
                  LAST_SYNC_TIME_RAW=$(echo "$STATE_DATA" | grep '^last-sync-time=' | cut -d= -f2- | head -1 || echo "")
                  # Sync notification cooldown: 30 minutes — avoids spam when same apps cycle repeatedly
                  SYNC_COOLDOWN_SECONDS=1800

                  # Helpers — read/write per-key without re-loading full CM
                  get_first_seen() {
                    echo "$STATE_DATA" | grep "^degraded-${1}=" | cut -d= -f2 | head -1 || echo ""
                  }
                  update_state_key() {
                    kubectl patch configmap "$STATE_CM" -n "$NAMESPACE" \
                      --type=merge -p "{\"data\":{\"${1}\":\"${2}\"}}" >/dev/null 2>&1 || true
                  }
                  remove_state_key() {
                    kubectl patch configmap "$STATE_CM" -n "$NAMESPACE" \
                      --type=json -p "[{\"op\":\"remove\",\"path\":\"/data/${1}\"}]" \
                      >/dev/null 2>&1 || true
                  }

                  # ── Discord helper ───────────────────────────────────────
                  notify_discord() {
                    local title="$1" color="$2" body="$3"
                    [ -z "$DISCORD_WEBHOOK" ] && return 0
                    curl -s --max-time 15 --retry 2 -X POST "$DISCORD_WEBHOOK" \
                      -H 'Content-Type: application/json' \
                      -d "{\"embeds\":[{\"title\":\"$title\",\"color\":$color,\"description\":\"$body\"}]}" \
                      >/dev/null 2>&1 || true
                  }

                  # ── Collect all apps with annotations ────────────────────
                  APPS=$(kubectl get applications -n "$NAMESPACE" \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.health.status}{"\t"}{.status.sync.status}{"\t"}{.status.operationState.phase}{"\t"}{.metadata.annotations.infraweaver\.io/transient}{"\t"}{.status.health.message}{"\n"}{end}' \
                    2>/dev/null || true)

                  REFRESHED=0 SYNCED=0 SKIPPED=0
                  SYNCED_APPS="" DEGRADED_ALERT_CANDIDATES="" DEGRADED_REFRESH_LIST=""

                  # ── Pass 1: categorize + hard-refresh ────────────────────
                  while IFS=$'\t' read -r APP HEALTH SYNC OP_PHASE TRANSIENT HEALTH_MESSAGE; do
                    [ -z "$APP" ] && continue

                    # Skip apps with a running sync/delete operation
                    if [ "$OP_PHASE" = "Running" ] || [ "$OP_PHASE" = "Terminating" ]; then
                      echo "  SKIP  $APP — operation in progress"
                      SKIPPED=$((SKIPPED+1)); continue
                    fi

                    # Skip intentionally suspended apps (user-paused)
                    if [ "$HEALTH" = "Suspended" ]; then
                      echo "  SKIP  $APP — Suspended"
                      SKIPPED=$((SKIPPED+1)); continue
                    fi

                    if [ "$HEALTH" = "Degraded" ]; then
                      # Skip Degraded+Progressing — health message still indicates startup/rollout work
                      if echo "${HEALTH_MESSAGE:-}" | grep -qi 'progressing'; then
                        echo "  SKIP  $APP — Degraded+Progressing (still starting up)"
                        SKIPPED=$((SKIPPED+1)); continue
                      fi

                      # Skip apps annotated infraweaver.io/transient=true
                      if [ "${TRANSIENT:-}" = "true" ]; then
                        echo "  SKIP  $APP — infraweaver.io/transient=true"
                        SKIPPED=$((SKIPPED+1)); continue
                      fi

                      # Skip static exclusion list; still hard-refresh if OutOfSync
                      if is_skip_alert "$APP"; then
                        echo "  SKIP-ALERT  $APP — static exclusion (structural/inherited health)"
                        if [ "$SYNC" = "OutOfSync" ] || [ "$SYNC" = "Unknown" ]; then
                          kubectl patch application "$APP" -n "$NAMESPACE" --type=merge \
                            -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                            >/dev/null 2>&1 || true
                          REFRESHED=$((REFRESHED+1))
                        fi
                        SKIPPED=$((SKIPPED+1)); continue
                      fi

                      # Determine skip threshold; ES-related apps get a shorter one
                      THRESH=$FAST_SKIP_SECONDS
                      is_es_app "$APP" && THRESH=$ES_SKIP_SECONDS

                      # Get (or record) first-seen timestamp from ConfigMap
                      FIRST_SEEN=$(get_first_seen "$APP")
                      if [ -z "$FIRST_SEEN" ]; then
                        # First time observing this app as Degraded — record and defer to next run
                        update_state_key "degraded-${APP}" "$NOW_EPOCH"
                        echo "  TRACK  $APP — first observed Degraded at $NOW_EPOCH (will evaluate next run)"
                        kubectl patch application "$APP" -n "$NAMESPACE" --type=merge \
                          -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                          >/dev/null 2>&1 || true
                        REFRESHED=$((REFRESHED+1)); SKIPPED=$((SKIPPED+1)); continue
                      fi

                      DEGRADED_SECS=$(( NOW_EPOCH - FIRST_SEEN ))

                      # Fast-skip: very recent degradation (transient)
                      if [ "$DEGRADED_SECS" -lt "$THRESH" ]; then
                        echo "  SKIP  $APP — Degraded ${DEGRADED_SECS}s < ${THRESH}s threshold (transient)"
                        kubectl patch application "$APP" -n "$NAMESPACE" --type=merge \
                          -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                          >/dev/null 2>&1 || true
                        REFRESHED=$((REFRESHED+1)); SKIPPED=$((SKIPPED+1)); continue
                      fi

                      # Grace period: being watched, not yet alerting
                      if [ "$DEGRADED_SECS" -lt "$ALERT_THRESHOLD_SECONDS" ]; then
                        MINS=$(( DEGRADED_SECS / 60 ))
                        echo "  GRACE  $APP — Degraded ${MINS}m, monitoring (alert threshold: $(( ALERT_THRESHOLD_SECONDS / 60 ))m)"
                        kubectl patch application "$APP" -n "$NAMESPACE" --type=merge \
                          -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                          >/dev/null 2>&1 || true
                        DEGRADED_REFRESH_LIST="${DEGRADED_REFRESH_LIST} $APP"
                        REFRESHED=$((REFRESHED+1)); SKIPPED=$((SKIPPED+1)); continue
                      fi

                      # Persistent degradation (>30m) — queue as alert candidate
                      MINS=$(( DEGRADED_SECS / 60 ))
                      echo "  ALERT-CANDIDATE  $APP — Degraded ${MINS}m (exceeds $(( ALERT_THRESHOLD_SECONDS / 60 ))m threshold)"
                      kubectl patch application "$APP" -n "$NAMESPACE" --type=merge \
                        -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                        >/dev/null 2>&1 || true
                      DEGRADED_ALERT_CANDIDATES="${DEGRADED_ALERT_CANDIDATES} $APP"
                      DEGRADED_REFRESH_LIST="${DEGRADED_REFRESH_LIST} $APP"
                      REFRESHED=$((REFRESHED+1)); continue
                    fi

                    # Non-Degraded apps: refresh OutOfSync/Unknown (stale cache)
                    if [ "$SYNC" != "OutOfSync" ] && [ "$SYNC" != "Unknown" ]; then continue; fi
                    echo "  REFRESH  $APP [health=$HEALTH sync=$SYNC]"
                    kubectl patch application "$APP" -n "$NAMESPACE" --type=merge \
                      -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                      >/dev/null 2>&1 || true
                    REFRESHED=$((REFRESHED+1))
                  done < <(echo "$APPS")

                  # Wait for refreshes to propagate
                  if [ "$REFRESHED" -gt 0 ]; then
                    echo "[self-healer] Waiting 20s for $REFRESHED refresh(es) to propagate..."
                    sleep 20
                  fi

                  # ── Pass 2: sync OutOfSync + build final alert list ───────
                  APPS2=$(kubectl get applications -n "$NAMESPACE" \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.health.status}{"\t"}{.status.sync.status}{"\t"}{.status.operationState.phase}{"\n"}{end}' \
                    2>/dev/null || true)

                  while IFS=$'\t' read -r APP HEALTH SYNC OP_PHASE; do
                    [ -z "$APP" ] && continue
                    [ "$OP_PHASE" = "Running" ] && continue
                    [ "$SYNC" != "OutOfSync" ] && continue
                    echo "  SYNC  $APP [health=$HEALTH] — OutOfSync after refresh, triggering sync"
                    kubectl patch application "$APP" -n "$NAMESPACE" --type=merge \
                      -p '{"operation":{"sync":{"revision":"HEAD","syncStrategy":{"hook":{"force":false}}}}}' \
                      >/dev/null 2>&1 || echo "  WARN  $APP — sync patch failed"
                    SYNCED_APPS="${SYNCED_APPS}• \`${APP}\`\n"
                    SYNCED=$((SYNCED+1))
                  done < <(echo "$APPS2")

                  # Build final alert list — only apps still Degraded after hard-refresh
                  # and confirmed to have been degraded > ALERT_THRESHOLD_SECONDS
                  DEGRADED_ALERT_APPS=""
                  ALERT_APP_LIST=""
                  for APP in $DEGRADED_ALERT_CANDIDATES; do
                    APP_HEALTH=$(echo "$APPS2" | grep "^${APP}"$'\t' | cut -f2 | head -1 || echo "")
                    APP_SYNC=$(echo "$APPS2" | grep "^${APP}"$'\t' | cut -f3 | head -1 || echo "")
                    if [ "$APP_SYNC" = "OutOfSync" ]; then
                      echo "  FOUND  $APP — hard-refresh revealed OutOfSync, will be auto-synced"
                      continue
                    fi
                    if [ "$APP_HEALTH" = "Degraded" ]; then
                      FIRST_SEEN=$(get_first_seen "$APP")
                      MINS=$(( ( NOW_EPOCH - ${FIRST_SEEN:-$NOW_EPOCH} ) / 60 ))
                      DEGRADED_ALERT_APPS="${DEGRADED_ALERT_APPS}• \`${APP}\` (${MINS}m degraded, sync=${APP_SYNC:-unknown})\n"
                      ALERT_APP_LIST="${ALERT_APP_LIST}${APP},"
                      echo "  ALERT  $APP — persistently Degraded ${MINS}m, sync=${APP_SYNC:-?}"
                    fi
                  done
                  ALERT_APP_CSV=$(echo "${ALERT_APP_LIST%,}" | tr ',' '\n' | sort | tr '\n' ',' | sed 's/,$//')

                  # ── Clean up state for recovered apps ─────────────────────
                  while IFS=$'\t' read -r APP HEALTH SYNC OP_PHASE TRANSIENT HEALTH_MESSAGE; do
                    [ -z "$APP" ] && continue
                    # If app is no longer Degraded (or is now skipped), remove its tracking key
                    if [ "$HEALTH" != "Degraded" ] || [ "${TRANSIENT:-}" = "true" ] || \
                       [ "$OP_PHASE" = "Running" ] || [ "$OP_PHASE" = "Terminating" ] || \
                       [ "$HEALTH" = "Suspended" ] || is_skip_alert "$APP" || \
                       echo "${HEALTH_MESSAGE:-}" | grep -qi 'progressing'; then
                      TRACKED=$(get_first_seen "$APP")
                      if [ -n "$TRACKED" ]; then
                        echo "  RECOVERED  $APP — removing from degraded-state tracking"
                        remove_state_key "degraded-${APP}"
                      fi
                    fi
                  done < <(echo "$APPS")

                  echo "[self-healer] Done. refreshed=$REFRESHED synced=$SYNCED skipped=$SKIPPED"

                  # ── Notifications ─────────────────────────────────────────
                  if [ "$SYNCED" -gt 0 ]; then
                    # Build sorted CSV of synced app names for deduplication
                    SYNCED_APP_CSV=$(echo "$SYNCED_APPS" | grep -oP '`\K[^`]+' | sort | tr '\n' ',' | sed 's/,$//')

                    # Calculate seconds since last sync notification
                    LAST_SYNC_EPOCH=""
                    if [ -n "$LAST_SYNC_TIME_RAW" ]; then
                      LAST_SYNC_EPOCH=$(date -u -d "$LAST_SYNC_TIME_RAW" +%s 2>/dev/null || echo "")
                    fi
                    SECS_SINCE_SYNC=99999
                    if [ -n "$LAST_SYNC_EPOCH" ]; then
                      SECS_SINCE_SYNC=$(( NOW_EPOCH - LAST_SYNC_EPOCH ))
                    fi

                    # Deduplicate: same apps + within cooldown window → silent sync (still heals, no notification)
                    if [ "$SYNCED_APP_CSV" = "$LAST_SYNC_APPS" ] && [ "$SECS_SINCE_SYNC" -lt "$SYNC_COOLDOWN_SECONDS" ]; then
                      MINS_AGO=$(( SECS_SINCE_SYNC / 60 ))
                      echo "[self-healer] Sync deduplication — same apps ($SYNCED_APP_CSV) synced ${MINS_AGO}m ago (cooldown ${SYNC_COOLDOWN_SECONDS}s), skipping notification"
                    else
                      notify_discord \
                        ":wrench: Self-Healer Auto-Synced $SYNCED App(s)" \
                        "3066993" \
                        "The ArgoCD self-healer triggered sync for:\n${SYNCED_APPS}\nThese apps were OutOfSync after a hard-refresh."
                      CURRENT_SYNC_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                      update_state_key "last-sync-apps" "$SYNCED_APP_CSV"
                      update_state_key "last-sync-time" "$CURRENT_SYNC_TIME"
                    fi
                  fi

                  if [ -n "$DEGRADED_ALERT_APPS" ]; then
                    if [ "$IN_MAINTENANCE" = "true" ]; then
                      echo "[self-healer] Maintenance mode — suppressing Degraded alert for: $ALERT_APP_CSV"
                    elif [ "$ALERT_APP_CSV" = "$LAST_DEGRADED_APPS" ]; then
                      # Deduplicate: same set as last sent alert — don't spam Discord
                      echo "[self-healer] Deduplication — same degraded set as last alert (${LAST_ALERT_TIME:-unknown time} :: ${ALERTED_APPS:-$LAST_DEGRADED_APPS}), skipping"
                    else
                      notify_discord \
                        ":warning: Persistent Degradation — Review Required" \
                        "15105570" \
                        "Apps Degraded for **>30 minutes** (need manual attention):\n${DEGRADED_ALERT_APPS}\nCheck ArgoCD UI. Self-healer cannot auto-fix runtime issues."
                      CURRENT_ALERT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                      update_state_key "last-degraded-apps" "$ALERT_APP_CSV"
                      update_state_key "alerted-apps" "$ALERT_APP_CSV"
                      update_state_key "last-alert-time" "$CURRENT_ALERT_TIME"
                      update_state_key "last-alert" "$ALERT_APP_CSV"
                    fi
                  else
                    # Clear deduplication state when no persistent degradation remains
                    if [ -n "$LAST_DEGRADED_APPS" ] || [ -n "$ALERTED_APPS" ] || [ -n "$LAST_ALERT_TIME" ]; then
                      echo "[self-healer] All previously-alerted apps resolved, clearing alert state"
                      update_state_key "last-degraded-apps" ""
                      update_state_key "alerted-apps" ""
                      update_state_key "last-alert-time" ""
                      update_state_key "last-alert" ""
                    fi
                  fi
