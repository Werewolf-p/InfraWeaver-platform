# etcd-config-patcher — TEMPORARY WORKAROUND for node reboot cascade
#
# ROOT CAUSE: etcd v3.6 runs with --experimental-compact-hash-check-enabled=true
# and --experimental-initial-corrupt-check=true by default in Talos v1.12.7.
# On Proxmox VMs with virtualized storage, the post-compaction hash check fails
# (timing/jitter in storage I/O causes hash mismatches between cluster members).
# This causes etcd to panic after every hourly compaction → machined restart loop
# → Talos reboots the node every ~71 minutes (60min compaction + 11min cascade).
#
# CONFIRMED DIAGNOSIS (May 25, 2026):
# - All 3 CP nodes rebooting every 71 minutes in rolling cascade
# - etcd container args confirmed: experimental-compact-hash-check-enabled=true
# - etcd DB healthy, no corruption (confirmed via etcdctl endpoint status)
# - Flags are false positives on Proxmox virtualized storage
#
# THIS PATCHER:
# - Runs as a privileged DaemonSet on all control-plane nodes
# - Watches /run/containerd/io.containerd.runtime.v2.task/system/etcd/config.json
# - IMMEDIATELY patches the OCI spec when machined writes a new one (on etcd restart)
# - Changes both dangerous flags to false before runc reads the file and starts etcd
# - Uses inotifywait for zero-latency detection of file writes
#
# PERMANENT FIX STATUS:
# - Terraform: terraform/modules/talos-cluster/main.tf updated with correct flags
# - Blocked on: no valid talosconfig (cluster was rebuilt without updating certs)
# - Remove this DaemonSet AFTER applying machineconfig via talosctl on full redeploy
#
# HOW TO APPLY PERMANENT FIX:
# 1. Run full-redeploy.yml workflow (generates new Terraform state + valid talosconfig)
# 2. OR: recover talosconfig from cluster → talosctl apply-config --mode=no-reboot
# 3. After permanent fix is confirmed working → delete this DaemonSet
#
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: etcd-config-patcher
  namespace: kube-system
  labels:
    app: etcd-config-patcher
    managed-by: argocd
  annotations:
    description: "TEMPORARY: patches etcd OCI spec until machineconfig applied via talosctl"
spec:
  selector:
    matchLabels:
      app: etcd-config-patcher
  template:
    metadata:
      labels:
        app: etcd-config-patcher
    spec:
      hostPID: true
      hostNetwork: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
      - operator: "Exists"
      priorityClassName: system-node-critical
      containers:
      - name: patcher
        image: alpine:3.19
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
        - |
          apk add --no-cache inotify-tools 2>/dev/null

          TASK_DIR="/host/run/containerd/io.containerd.runtime.v2.task/system/etcd"
          CONFIG="$TASK_DIR/config.json"
          NODE=$(hostname)

          patch_config() {
            [ -f "$CONFIG" ] || return 1
            if grep -q "experimental-compact-hash-check-enabled=true" "$CONFIG" || \
               grep -q "experimental-initial-corrupt-check=true" "$CONFIG"; then
              sed -i \
                -e 's/experimental-compact-hash-check-enabled=true/experimental-compact-hash-check-enabled=false/g' \
                -e 's/experimental-initial-corrupt-check=true/experimental-initial-corrupt-check=false/g' \
                "$CONFIG"
              echo "$(date): PATCHED etcd config.json on $NODE"
              return 0
            fi
            return 1
          }

          # If the live etcd process has =true flags, it must be restarted to pick up
          # the patched config.json. Stagger by last IP octet to maintain quorum:
          # only one node restarts etcd at a time.
          restart_etcd_if_stale() {
            ETCD_PID=$(for pid in $(ls /proc | grep -E '^[0-9]+$'); do
              cmd=$(cat /proc/$pid/cmdline 2>/dev/null | tr '\0' ' ')
              echo "$cmd" | grep -q 'local/bin/etcd ' && echo $pid && break
            done)
            [ -z "$ETCD_PID" ] && return

            FLAGS=$(cat /proc/$ETCD_PID/cmdline 2>/dev/null | tr '\0' '\n')
            if echo "$FLAGS" | grep -q 'compact-hash-check-enabled=true' || \
               echo "$FLAGS" | grep -q 'initial-corrupt-check=true'; then
              # Stagger: use last octet of node IP (e.g. cp1=92→0s, cp2=93→30s, cp3=94→60s)
              OCTET=$(ip -4 addr show scope global 2>/dev/null | grep -oP '(?<=inet )\d+\.\d+\.\d+\.\K\d+' | head -1)
              DELAY=$(( (${OCTET:-0} % 3) * 30 ))
              echo "$(date): Live etcd on $NODE has stale =true flags (pid=$ETCD_PID). Waiting ${DELAY}s stagger then restarting etcd..."
              sleep $DELAY
              echo "$(date): Sending SIGTERM to etcd pid=$ETCD_PID on $NODE to reload patched config"
              kill -SIGTERM $ETCD_PID 2>/dev/null || true
              echo "$(date): SIGTERM sent — etcd will restart with =false flags"
            else
              echo "$(date): Live etcd on $NODE already has correct =false flags, no restart needed"
            fi
          }

          echo "etcd-config-patcher starting on $NODE at $(date)"
          patch_config
          restart_etcd_if_stale

          while true; do
            inotifywait -q -t 15 -e close_write,create,moved_to "$TASK_DIR" 2>/dev/null || true
            patch_config
          done
        volumeMounts:
        - name: host-root
          mountPath: /host
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      terminationGracePeriodSeconds: 5
