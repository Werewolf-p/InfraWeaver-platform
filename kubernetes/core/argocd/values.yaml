global:
  domain: argocd.int.rlservers.com

server:
  replicas: 1  # override to 2 for productie via env patch
  extraArgs:
    - --insecure  # TLS terminated at ingress

  ingress:
    # Ingress disabled — routing handled by Traefik IngressRoute in external-routes
    # (kubernetes/apps/external-routes/manifests/10-routes-vpn-only.yaml → argocd-int)
    # which uses argocd.int.rlservers.com with netbird-vpn-only middleware.
    enabled: false

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

configs:
  cm:
    # Allow apps to sync without manual approval for platform-managed apps
    resource.customizations.ignoreDifferences.admissionregistration.k8s.io_MutatingWebhookConfiguration: |
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
    # CRDs accumulate runtime-only fields (status.conditions, storedVersions, webhook caBundle)
    resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
      jqPathExpressions:
        - '.spec.conversion.webhook.clientConfig.caBundle'
        - '.spec.preserveUnknownFields'
        - '.status'
    # On bare-metal (no cloud LB), ingresses never get an ADDRESS — mark them always healthy
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      hs.status = "Healthy"
      hs.message = "Ingress managed"
      return hs
    # Local user accounts — passwords set by full-redeploy bootstrap (stored in OpenBao)
    accounts.remon: login
    # OIDC via Authentik — client secret read from argocd-secret by ArgoCD
    oidc.config: |
      name: Authentik
      issuer: https://auth.rlservers.com/application/o/argocd/
      clientID: argocd
      clientSecret: $oidc.authentik.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
    # Override default exclusions: allow Endpoints/EndpointSlice so ArgoCD can manage
    # bare-metal backend Endpoints in the traefik namespace (external-routes app).
    resource.exclusions: |
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
  params:
    server.insecure: "true"
  rbac:
    policy.csv: |
      g, remon, role:admin
  # No hardcoded passwords — admin password auto-generated by ArgoCD on first deploy,
  # retrieved from argocd-initial-admin-secret and stored in OpenBao by bootstrap step.
  # Remon password set by bootstrap step (random, stored in OpenBao).

redis:
  serviceAccount:
    create: true
    name: argocd-redis  # use pre-existing SA with secret create/get RBAC for secret-init
  # Use the existing secret to avoid the secret-init Job hook race condition.
  # The Job has hook-delete-policy: hook-succeeded which causes ArgoCD to wait
  # indefinitely after the Job self-deletes on success.
  existingSecret: argocd-redis

redis-ha:
  enabled: false  # enable for productie HA

notifications:
  enabled: true
