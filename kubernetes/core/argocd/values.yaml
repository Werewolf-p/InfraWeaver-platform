global:
  domain: argocd.prod.local

server:
  replicas: 1  # override to 2 for productie via env patch
  extraArgs:
    - --insecure  # TLS terminated at ingress

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argocd.prod.local
    paths:
      - /
    pathType: Prefix
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-netbird-only@kubernetescrd

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

configs:
  cm:
    # Allow apps to sync without manual approval for platform-managed apps
    resource.customizations.ignoreDifferences.admissionregistration.k8s.io_MutatingWebhookConfiguration: |
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
    # CRDs accumulate runtime-only fields (status.conditions, storedVersions, webhook caBundle)
    resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
      jqPathExpressions:
        - '.spec.conversion.webhook.clientConfig.caBundle'
        - '.spec.preserveUnknownFields'
        - '.status'
    # On bare-metal (no cloud LB), ingresses never get an ADDRESS — mark them always healthy
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      hs.status = "Healthy"
      hs.message = "Ingress managed"
      return hs
    # Local user accounts — login credentials managed below
    accounts.remon: login
  params:
    server.insecure: "true"
  rbac:
    policy.csv: |
      g, remon, role:admin
  secret:
    # Admin password: Unified*Presume8*Sudoku*Karate (bcrypt)
    # Regenerate with: python3 -c "import bcrypt; print(bcrypt.hashpw(b'Unified*Presume8*Sudoku*Karate', bcrypt.gensalt(10)).decode())"
    argocdServerAdminPassword: "$2b$10$r5uYY6K/ey9wjrobpRZfTeQ/P41PTOtFTbt9bCAgaDB8nXtlYgqrW"
    argocdServerAdminPasswordMtime: "2026-04-26T21:00:00Z"

redis:
  serviceAccount:
    create: true
    name: argocd-redis  # use pre-existing SA with secret create/get RBAC for secret-init

redis-ha:
  enabled: false  # enable for productie HA

notifications:
  enabled: true
