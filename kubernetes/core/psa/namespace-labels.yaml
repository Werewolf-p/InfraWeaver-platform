---
# Pod Security Admission (PSA) namespace labels — always applied, independent of Kyverno.
#
# Enforcement levels:
#   privileged  — unrestricted (used only for host-level system components)
#   baseline    — blocks most known privilege escalations; allows typical workloads
#   restricted  — requires non-root, no hostPID/IPC, limited capabilities
#
# Platform namespaces are set to "baseline" enforce + "restricted" warn so drift is
# visible in the audit log without breaking running workloads.
# Networking and storage infrastructure namespaces stay "privileged" since their
# pods legitimately need host-level access (eBPF, CNI, storage drivers).
#
# ArgoCD namespace has its own PSA labels in core/argocd/manifests/namespace-psa.yaml.
# This file covers the remaining platform namespaces.

# ── Host-level infra: privileged ────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
