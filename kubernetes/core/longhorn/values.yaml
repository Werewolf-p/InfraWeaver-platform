# Longhorn HA storage for Talos control-plane-only cluster
# Disable pre-upgrade checker job (causes circular SA dependency on fresh installs)
preUpgradeChecker:
  jobEnabled: false
  upgradeVersionCheck: false

defaultSettings:
  # 3-node cluster: store 3 replicas for true HA
  defaultReplicaCount: 3
  # Allow scheduling on control-plane nodes (no workers in this cluster)
  taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule"
  # Give Longhorn itself platform-standard priority so storage stays online
  # without out-prioritising ingress/DNS/control-plane components.
  priorityClass: platform-standard
  # Storage reserved per node — 5% minimal ensures CP1/CP3 remain schedulable
  # with ~134GB available and 299GB scheduled at 200% overprovisioning (299 < 390).
  # At 15% the condition would require 63GB reserved which pushes CP1/CP3 to
  # "not schedulable" even though overprovisioning headroom is fine.
  storageMinimalAvailablePercentage: 5
  storageOverProvisioningPercentage: 200
  # Reserve CPU for Longhorn instance managers so replica rebuilds do not starve.
  guaranteedInstanceManagerCPU: 12
  # Limit concurrent rebuild pressure during volume creation/recovery storms.
  concurrentReplicaRebuildPerNodeLimit: 1
  # Wait before replenishing a failed replica — avoids immediate rebuild storms on node flap.
  replicaReplenishmentWaitInterval: 600
  # Limit concurrent engine upgrades per node so upgrades don't cause I/O storms.
  concurrentAutomaticEngineUpgradePerNodeLimit: 1
  # Disable periodic snapshot integrity checks — reduces background I/O on small cluster.
  snapshotDataIntegrity: disabled
  # Auto-clean orphaned replicas left behind after PVC deletion (prevents disk fill).
  orphanAutoDeletion: true
  # Reserve 5% of disk for system use (reduced from 15% to keep CP1/CP3 schedulable
  # given current 299GB storageScheduled at 200% overprovisioning on 195GB disks)
  storageReservedPercentageForDefaultDisk: 5
  # Auto-balance replicas when nodes have unequal replica counts
  replicaAutoBalance: least-effort
  # Delete PVCs when PV is deleted
  defaultDataLocality: best-effort
  # Faster failover
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
  # TrueNAS NFS backup target — volumes in the "truenas-backup" RecurringJob group
  # are backed up here nightly. On fresh redeploy, scripts/restore-from-truenas.sh
  # uses this target to restore PVCs before apps deploy.
  # TrueNAS prerequisite: create dataset at /mnt/tank/longhorn-backups and enable
  # NFS share with network access for 10.10.0.0/24 (cluster nodes).
  backupTarget: "nfs://10.25.0.135:/mnt/Main/k8s-longhorn-backups"
  backupTargetCredentialSecret: ""

longhornUI:
  enabled: true
  priorityClass: "platform-standard"

ingress:
  enabled: true
  ingressClassName: traefik
  host: longhorn.prod.local
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: traefik-netbird-only@kubernetescrd

persistence:
  defaultClass: false
  defaultClassReplicaCount: 3

# Allow pods on control-plane nodes
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

longhornManager:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  priorityClass: "platform-standard"

longhornDriver:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  priorityClass: "platform-standard"

longhornAdmissionWebhook:
  priorityClass: "platform-standard"

longhornConversionWebhook:
  priorityClass: "platform-standard"

longhornRecoveryBackend:
  priorityClass: "platform-standard"
