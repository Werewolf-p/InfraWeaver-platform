# Longhorn HA storage for Talos control-plane-only cluster
# Disable pre-upgrade checker job (causes circular SA dependency on fresh installs)
preUpgradeChecker:
  jobEnabled: false
  upgradeVersionCheck: false

defaultSettings:
  # 3-node cluster: store 3 replicas for true HA
  defaultReplicaCount: 3
  # Allow scheduling on control-plane nodes (no workers in this cluster)
  taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule"
  # Storage reserved per node (don't use all disk space)
  storageMinimalAvailablePercentage: 10
  storageOverProvisioningPercentage: 400
  # Reserve 15% of disk for system use (reduced from 30% default to allow more scheduling headroom)
  storageReservedPercentageForDefaultDisk: 15
  # Auto-balance replicas when nodes have unequal replica counts
  replicaAutoBalance: least-effort
  # Delete PVCs when PV is deleted
  defaultDataLocality: best-effort
  # Faster failover
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
  # TrueNAS NFS backup target — volumes in the "truenas-backup" RecurringJob group
  # are backed up here nightly. On fresh redeploy, scripts/restore-from-truenas.sh
  # uses this target to restore PVCs before apps deploy.
  # TrueNAS prerequisite: create dataset at /mnt/tank/longhorn-backups and enable
  # NFS share with network access for 10.10.0.0/24 (cluster nodes).
  backupTarget: "nfs://10.25.0.135:/mnt/Main/k8s-longhorn-backups"
  backupTargetCredentialSecret: ""

longhornUI:
  enabled: true

ingress:
  enabled: true
  ingressClassName: traefik
  host: longhorn.prod.local
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: traefik-netbird-only@kubernetescrd

persistence:
  defaultClass: false
  defaultClassReplicaCount: 3

# Allow pods on control-plane nodes
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

longhornManager:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  priorityClass: "longhorn-critical"

longhornDriver:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  priorityClass: "longhorn-critical"
