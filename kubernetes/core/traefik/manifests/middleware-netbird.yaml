---
# Traefik IPAllowList Middleware — restricts access to NetBird VPN clients only
# Apply this middleware to private services (ArgoCD, Grafana, Longhorn)
# The test-website does NOT use this middleware (it's public)
#
# NetBird route has masquerade=true. VPN clients (100.64.x.x) access 10.25.0.0/24 via
# netbird-client daemonset pods running on K8s nodes (10.25.0.90-92).
# Traefik sees the node LAN IP as source, NOT the client's VPN IP.
# Allow the full 10.25.0.0/24 LAN so any node (current or future) can route VPN traffic.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: netbird-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 100.64.0.0/10    # NetBird CGNAT CIDR (direct WireGuard peers, no masquerade)
      - 10.25.0.0/24     # Homelab LAN — K8s nodes masquerade VPN traffic through their node IP
      - 127.0.0.1/32     # Localhost
