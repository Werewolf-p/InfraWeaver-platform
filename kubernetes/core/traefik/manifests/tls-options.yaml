---
# TLS Options for Traefik — enforce modern TLS standards
# This CRD defines the minimum TLS version and preferred cipher suites.
# Applied to IngressRoutes that specify: tls.options: traefik/tls-modern
#
# To use globally, set in Traefik values.yaml:
#   tlsStore.default.defaultCertificate or reference in each IngressRoute.
#
# References:
#   - https://doc.traefik.io/traefik/https/tls/#tls-options
#   - Mozilla SSL Config Generator: https://ssl-config.mozilla.org/ (Modern profile)
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: tls-modern
  namespace: traefik
spec:
  # Minimum TLS 1.2 — disables deprecated TLS 1.0 and 1.1
  minVersion: VersionTLS12
  # Prefer TLS 1.3 cipher suites (TLS 1.3 ciphers are non-configurable; these apply to TLS 1.2)
  cipherSuites:
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
  # Prefer server cipher order (server chooses the strongest mutually supported cipher)
  preferServerCipherSuites: true
  # Supported elliptic curves
  curvePreferences:
    - CurveP521
    - CurveP384
