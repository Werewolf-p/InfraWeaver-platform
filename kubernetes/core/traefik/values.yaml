deployment:
  replicas: 1

service:
  type: LoadBalancer
  loadBalancerIP: "10.25.0.200"
  spec:
    externalTrafficPolicy: Local  # Preserve real client IPs for IP allowlist middleware

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

rbac:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
