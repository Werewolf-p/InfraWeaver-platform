deployment:
  replicas: 1

service:
  type: LoadBalancer
  loadBalancerIP: "10.25.0.200"
  spec:
    externalTrafficPolicy: Local  # Preserve real client IPs for IP allowlist middleware

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true      # Allow IngressRoutes to reference services in other namespaces
    allowExternalNameServices: true # Allow routing to ExternalName services (cluster app proxying)
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true

rbac:
  enabled: true

# Allow Traefik to connect to backends with self-signed TLS certs (Proxmox, TrueNAS, Portainer, etc.)
# Redirect HTTP to HTTPS at the entrypoint level (v34+ syntax via args)
additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--accesslog=true"
  - "--accesslog.fields.headers.defaultmode=keep"

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    tls:
      enabled: true
  # GitLab container registry
  registry:
    port: 5005
    expose:
      default: true
    exposedPort: 5005
    protocol: TCP
  # Bitwarden / extra NodePort
  extra-port:
    port: 30032
    expose:
      default: true
    exposedPort: 30032
    protocol: TCP
  # Teleport Auth
  teleport-auth:
    port: 3025
    expose:
      default: true
    exposedPort: 3025
    protocol: TCP
  # Teleport Node
  teleport-node:
    port: 3023
    expose:
      default: true
    exposedPort: 3023
    protocol: TCP
  # Teleport Proxy SSH
  teleport-proxy:
    port: 3024
    expose:
      default: true
    exposedPort: 3024
    protocol: TCP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
