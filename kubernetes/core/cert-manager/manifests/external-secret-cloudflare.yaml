---
# ExternalSecret — pulls Cloudflare API token from OpenBao and creates the Secret that
# cert-manager's ClusterIssuer uses for DNS-01 ACME challenges.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-token
      remoteRef:
        key: secret/platform/cloudflare
        property: CF_API_TOKEN
