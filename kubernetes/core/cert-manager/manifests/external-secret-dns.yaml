# DNS provider credentials — ExternalSecret reads from OpenBao
# Provides: dns-provider-credentials secret used by cert-manager ClusterIssuers
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dns-provider-credentials
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: dns-provider-credentials
    creationPolicy: Owner
  data:
    - secretKey: cloudflare-api-token
      remoteRef:
        key: secret/platform/dns-provider
        property: cloudflare-api-token
    - secretKey: aws-access-key-id
      remoteRef:
        key: secret/platform/dns-provider
        property: aws-access-key-id
    - secretKey: aws-secret-access-key
      remoteRef:
        key: secret/platform/dns-provider
        property: aws-secret-access-key
    - secretKey: aws-hosted-zone-id
      remoteRef:
        key: secret/platform/dns-provider
        property: aws-hosted-zone-id
    - secretKey: aws-region
      remoteRef:
        key: secret/platform/dns-provider
        property: aws-region
    - secretKey: azure-client-id
      remoteRef:
        key: secret/platform/dns-provider
        property: azure-client-id
    - secretKey: azure-client-secret
      remoteRef:
        key: secret/platform/dns-provider
        property: azure-client-secret
    - secretKey: azure-subscription-id
      remoteRef:
        key: secret/platform/dns-provider
        property: azure-subscription-id
    - secretKey: azure-tenant-id
      remoteRef:
        key: secret/platform/dns-provider
        property: azure-tenant-id
    - secretKey: azure-resource-group
      remoteRef:
        key: secret/platform/dns-provider
        property: azure-resource-group
    - secretKey: do-token
      remoteRef:
        key: secret/platform/dns-provider
        property: do-token
    - secretKey: hetzner-api-key
      remoteRef:
        key: secret/platform/dns-provider
        property: hetzner-api-key
