---
# NetworkPolicies for the cert-manager namespace
# Default-deny all ingress, then allow ACME HTTP-01 callbacks and Prometheus scraping.

# ── Default deny all ingress ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ── Allow Prometheus to scrape cert-manager metrics ──────────────────────────
# cert-manager exposes metrics on port 9402 (controller) and 9443 (webhook)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9402
        - protocol: TCP
          port: 9403

---
# ── Allow Kubernetes API server to call cert-manager webhook ─────────────────
# The cert-manager webhook must be reachable by the K8s API server for
# Certificate and Issuer validation. Without this, certificate creation fails.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-from-apiserver
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: webhook
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 443

---
# ── Allow intra-namespace communication (controller ↔ webhook ↔ cainjector) ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}   # all pods within cert-manager namespace
