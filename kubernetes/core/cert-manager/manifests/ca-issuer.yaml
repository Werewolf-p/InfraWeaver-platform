---
# Self-signed bootstrap issuer — used only to sign the local CA certificate below
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: infraweaver-ca-selfsigned
spec:
  selfSigned: {}
---
# Local CA certificate — valid for 3 years; stored in cert-manager namespace
# Trusted within the cluster for all *.infraweaver.local services
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: infraweaver-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: InfraWeaver Local CA
  subject:
    organizations:
      - InfraWeaver
  secretName: infraweaver-ca-secret
  duration: 26280h   # 3 years
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: infraweaver-ca-selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA-backed ClusterIssuer — signs all *.infraweaver.local wildcard certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: infraweaver-ca
spec:
  ca:
    secretName: infraweaver-ca-secret
