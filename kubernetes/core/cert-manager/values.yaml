installCRDs: true

replicaCount: 1

global:
  leaderElection:
    enabled: true
  priorityClassName: platform-critical

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

extraArgs:
  - --dns01-recursive-nameservers-only
  - --dns01-recursive-nameservers=1.1.1.1:53,8.8.8.8:53

webhook:
  replicaCount: 1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

cainjector:
  replicaCount: 1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Disable prometheus metrics - monitoring stack is optional
prometheus:
  enabled: false
