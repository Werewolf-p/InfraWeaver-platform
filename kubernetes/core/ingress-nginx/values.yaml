controller:
  replicaCount: 1  # set to 2 for HA
  
  service:
    type: NodePort  # bare-metal — no cloud LB; use NodePort (ports 80→30080, 443→30443)
    nodePorts:
      http: "30080"
      https: "30443"
    externalTrafficPolicy: Local
    annotations: {}

  # Publish node IPs so ingresses get an address
  publishService:
    enabled: false
  hostNetwork: false

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  config:
    use-gzip: "true"
    proxy-body-size: "100m"
    ssl-redirect: "true"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
