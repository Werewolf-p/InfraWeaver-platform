apiVersion: v1
kind: ConfigMap
metadata:
  name: etcd-flag-patcher
  namespace: kube-system
data:
  patch.py: |
    #!/usr/bin/env python3
    """
    etcd-flag-patcher v2 - Talos v1.12.x hardcodes experimental-compact-hash-check-enabled=true
    and experimental-initial-corrupt-check=true in etcd's containerd spec. These flags cause
    etcd to crash after hourly compaction on Proxmox VMs (storage I/O jitter -> hash mismatch).
    Talos does not allow disabling them via machineconfig extraArgs. This patcher re-applies
    the live fix every 5 minutes to survive any Talos-initiated etcd restarts.
    """
    import json, os, signal, subprocess, time, logging

    logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
    log = logging.getLogger(__name__)

    CONFIG = "/run/containerd/io.containerd.runtime.v2.task/system/etcd/config.json"
    FLAGS = ["experimental-compact-hash-check-enabled", "experimental-initial-corrupt-check"]

    def patch_if_needed():
        if not os.path.exists(CONFIG):
            return False
        with open(CONFIG) as f:
            data = json.load(f)
        args = data['process']['args']
        changed = 0
        new_args = []
        for a in args:
            replaced = False
            for flag in FLAGS:
                if f'{flag}=true' in a:
                    new_args.append(a.replace('=true', '=false'))
                    changed += 1
                    replaced = True
                    break
            if not replaced:
                new_args.append(a)
        if changed == 0:
            return False
        data['process']['args'] = new_args
        with open(CONFIG, 'w') as f:
            json.dump(data, f)
        log.info(f"Patched {changed} flags to false in config.json")
        result = subprocess.run(['pgrep', '-f', 'etcd'], capture_output=True, text=True)
        for p in result.stdout.strip().split():
            try:
                with open(f'/proc/{p}/comm') as f:
                    if 'etcd' in f.read():
                        os.kill(int(p), signal.SIGTERM)
                        log.info(f"SIGTERM -> etcd PID {p}")
                        break
            except Exception:
                pass
        return True

    log.info("etcd-flag-patcher v2 starting")
    # Wait for config.json to appear (etcd starting up after node boot)
    for _ in range(30):
        if os.path.exists(CONFIG):
            break
        time.sleep(2)
    # Initial patch
    patch_if_needed()
    # Re-check every 5 minutes (catches Talos-initiated etcd restarts)
    while True:
        time.sleep(300)
        patch_if_needed()
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: etcd-flag-patcher
  namespace: kube-system
  labels:
    app: etcd-flag-patcher
spec:
  selector:
    matchLabels:
      app: etcd-flag-patcher
  template:
    metadata:
      labels:
        app: etcd-flag-patcher
    spec:
      hostPID: true
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      volumes:
      - name: run
        hostPath:
          path: /run
      - name: script
        configMap:
          name: etcd-flag-patcher
          defaultMode: 0755
      containers:
      - name: patcher
        image: python:3.11-alpine
        securityContext:
          privileged: true
        command: ["python3", "/script/patch.py"]
        volumeMounts:
        - name: run
          mountPath: /run
        - name: script
          mountPath: /script
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
      restartPolicy: Always
  updateStrategy:
    type: RollingUpdate
