---
# ExternalSecret — pulls Grafana admin credentials from OpenBao into grafana-admin-secret
# OpenBao path: secret/data/platform/grafana
# Required keys: admin-password, admin-user
# Used by kube-prometheus-stack grafana via: admin.existingSecret: grafana-admin-secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace
      metadata: {}
  data:
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/grafana
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: admin-user
      remoteRef:
        key: secret/platform/grafana
        property: admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
