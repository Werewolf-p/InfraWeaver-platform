---
# ExternalSecret — pulls Grafana admin credentials from OpenBao into grafana-admin-secret
# OpenBao path: secret/data/platform/grafana
# Required keys: admin-password, admin-user
# Used by kube-prometheus-stack grafana via: admin.existingSecret: grafana-admin-secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/grafana
        property: admin-password
    - secretKey: admin-user
      remoteRef:
        key: secret/platform/grafana
        property: admin-user
---
# ExternalSecret — fallback patch for Helm-managed kube-prometheus-stack-grafana secret.
# Needed until Helm upgrade applies admin.existingSecret and rolls the Grafana pod.
# After the pod restarts referencing grafana-admin-secret directly, this can be removed.
# creationPolicy: Merge so Helm keeps ownership; ESO only updates admin-password/admin-user.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-helm-secret-patch
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: kube-prometheus-stack-grafana
    creationPolicy: Merge
  data:
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/grafana
        property: admin-password
    - secretKey: admin-user
      remoteRef:
        key: secret/platform/grafana
        property: admin-user
