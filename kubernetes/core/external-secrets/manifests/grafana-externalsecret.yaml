---
# ExternalSecret example — pulls Grafana admin password from OpenBao
# OpenBao path: secret/data/platform/grafana
# Required OpenBao secret structure:
#   vault kv put secret/platform/grafana admin-password="<strong-password>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/grafana
        property: admin-password
