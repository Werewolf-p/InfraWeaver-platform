---
# ClusterSecretStore — connects ESO to OpenBao (HashiCorp Vault-compatible API)
# The openbao-token Secret is NOT managed by ArgoCD — it is created by the
# bootstrap workflow (full-redeploy.yml / apply-changes.yml) so that the real
# token written by OpenTofu is never overwritten by a GitOps sync.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: openbao-token
          namespace: external-secrets
          key: token
