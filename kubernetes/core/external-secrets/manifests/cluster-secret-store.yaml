---
# ClusterSecretStore — connects ESO to OpenBao (HashiCorp Vault-compatible API)
# The token is stored as a Kubernetes secret created by OpenTofu on bootstrap.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "https://10.25.0.241:8200"  # OpenBao VM address
      path: "secret"
      version: "v2"
      caBundle: ""  # Set to base64 CA cert if using self-signed TLS
      auth:
        tokenSecretRef:
          name: openbao-token
          namespace: external-secrets
          key: token
---
# Token secret is created by OpenTofu bootstrap — DO NOT store real tokens here
# OpenTofu runs: kubectl create secret generic openbao-token -n external-secrets --from-literal=token=<sops-decrypted>
apiVersion: v1
kind: Secret
metadata:
  name: openbao-token
  namespace: external-secrets
  annotations:
    # This is overwritten by OpenTofu bootstrap with the real token from OpenBao
    platform.infraweaver.io/managed-by: "opentofu-bootstrap"
type: Opaque
stringData:
  token: "PLACEHOLDER_REPLACED_BY_TOFU"
