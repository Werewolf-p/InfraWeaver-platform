---
# ClusterSecretStore — connects ESO to OpenBao (HashiCorp Vault-compatible API)
# NOTE: This manifest is applied by the CI/CD workflow with env-specific OpenBao address.
# The workflow reads openbao_address from cluster.yaml and substitutes it at deploy time.
# OpenBao uses HTTP (TLS disabled): http://<ip>:8200
# Dev:  http://10.25.0.241:8200
# Prod: http://10.25.0.86:8200
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao
  annotations:
    platform.infraweaver.io/managed-by: "workflow-bootstrap"
spec:
  provider:
    vault:
      server: "WORKFLOW_INJECTED"  # replaced by workflow with env-specific address
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: openbao-token
          namespace: external-secrets
          key: token
---
# openbao-token secret placeholder — the real token is injected by the workflow
# by SSH-ing to the OpenBao VM and creating a least-privilege platform-k8s token
apiVersion: v1
kind: Secret
metadata:
  name: openbao-token
  namespace: external-secrets
  annotations:
    platform.infraweaver.io/managed-by: "workflow-bootstrap"
type: Opaque
stringData:
  token: "PLACEHOLDER_REPLACED_BY_WORKFLOW"
