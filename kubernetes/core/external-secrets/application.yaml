# External Secrets Operator — bridges Kubernetes Secrets with OpenBao (Vault-compatible)
# After install, create a ClusterSecretStore pointing to your OpenBao instance:
#
#   apiVersion: external-secrets.io/v1beta1
#   kind: ClusterSecretStore
#   metadata:
#     name: openbao
#   spec:
#     provider:
#       vault:
#         server: "https://10.25.0.241:8200"
#         path: "secret"
#         version: "v2"
#         auth:
#           tokenSecretRef:
#             name: openbao-token
#             namespace: external-secrets
#             key: token
repoURL: https://charts.external-secrets.io
targetRevision: "0.*"
chart: external-secrets
releaseName: external-secrets
namespace: external-secrets
