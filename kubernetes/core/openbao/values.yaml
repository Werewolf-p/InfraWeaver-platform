server:
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "raft" {
        path = "/openbao/data"
        node_id = "openbao-0"
      }

      api_addr = "http://openbao.openbao.svc.cluster.local:8200"
      cluster_addr = "http://openbao.openbao.svc.cluster.local:8201"

  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: local-path
    accessMode: ReadWriteOnce

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-netbird-only@kubernetescrd
    hosts:
      - host: openbao.prod.local
        paths:
          - /
      - host: openbao.rlservers.com
        paths:
          - /
    pathType: Prefix

  service:
    type: ClusterIP

  serviceAccount:
    create: true
    name: openbao

  extraContainers:
    - name: autounseal
      image: quay.io/openbao/openbao:2.5.3
      command:
        - /bin/sh
        - -c
        - >-
          echo "Autounseal sidecar starting...";
          while true; do
            EXIT_CODE=0;
            bao status -address=http://127.0.0.1:8200 >/dev/null 2>&1 || EXIT_CODE=$?;
            if [ "$EXIT_CODE" = "2" ]; then
              UNSEAL_KEY=$(cat /etc/openbao-unseal/unseal_key 2>/dev/null || true);
              if [ -n "$UNSEAL_KEY" ]; then
                echo "OpenBao sealed - unsealing...";
                bao operator unseal -address=http://127.0.0.1:8200 "$UNSEAL_KEY" >/dev/null 2>&1 && echo "Unseal OK" || echo "Unseal failed";
              else
                echo "Sealed but no unseal key yet";
              fi;
            fi;
            sleep 30;
          done
      env:
        - name: BAO_ADDR
          value: "http://127.0.0.1:8200"
      volumeMounts:
        - name: userconfig-openbao-unseal
          mountPath: /etc/openbao-unseal
          readOnly: true

  extraVolumes:
    - type: secret
      name: openbao-unseal
      defaultMode: "0444"

injector:
  enabled: false

ui:
  enabled: true
  serviceType: ClusterIP
