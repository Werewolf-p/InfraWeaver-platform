server:
  image:
    repository: ghcr.io/openbao/openbao
    tag: "2.2.0"

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "raft" {
        path = "/openbao/data"
        node_id = "openbao-0"
      }

      api_addr = "http://openbao.openbao.svc.cluster.local:8200"
      cluster_addr = "http://openbao.openbao.svc.cluster.local:8201"

  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce

  service:
    type: ClusterIP

  serviceAccount:
    create: true
    name: openbao

  # Autounseal sidecar: polls every 30s and unseals if sealed + key is available
  extraContainers:
    - name: autounseal
      image: ghcr.io/openbao/openbao:2.2.0
      command:
        - /bin/sh
        - -c
        - |
          echo "Autounseal sidecar starting..."
          while true; do
            STATUS=$(bao status -address=http://127.0.0.1:8200 -format=json 2>/dev/null || echo '"{"sealed":true}"')
            SEALED=$(echo "$STATUS" | grep -o '"sealed":[^,}]*' | grep -o '[^: ]*$' | tr -d ' }')
            if [ "$SEALED" = "true" ]; then
              UNSEAL_KEY=$(cat /etc/openbao-unseal/unseal_key 2>/dev/null || echo "")
              if [ -n "$UNSEAL_KEY" ]; then
                echo "$(date -Iseconds): OpenBao sealed — unsealing..."
                bao operator unseal -address=http://127.0.0.1:8200 "$UNSEAL_KEY" >/dev/null 2>&1 && echo "Unseal OK" || echo "Unseal failed"
              else
                echo "$(date -Iseconds): Sealed but no unseal key yet (first deploy?)"
              fi
            fi
            sleep 30
          done
      env:
        - name: BAO_ADDR
          value: "http://127.0.0.1:8200"
      volumeMounts:
        - name: openbao-unseal
          mountPath: /etc/openbao-unseal
          readOnly: true

  extraVolumes:
    - name: openbao-unseal
      secret:
        secretName: openbao-unseal
        optional: true  # pod starts even if secret not yet created (first deploy)

injector:
  enabled: false

ui:
  enabled: true
  serviceType: ClusterIP
