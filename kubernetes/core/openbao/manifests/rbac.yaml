---
# Role: grants the openbao ServiceAccount read access to the openbao-unseal Secret.
# This allows the autounseal sidecar container to read the unseal key on pod start.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-unseal-reader
  namespace: openbao
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["openbao-unseal"]
    verbs: ["get", "watch", "list"]
---
# RoleBinding: binds the openbao ServiceAccount (created by Helm) to the unseal-reader Role.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-unseal-reader
  namespace: openbao
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-unseal-reader
subjects:
  - kind: ServiceAccount
    name: openbao
    namespace: openbao
