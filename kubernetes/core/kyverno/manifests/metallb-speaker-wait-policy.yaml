---
# Kyverno ClusterPolicy: inject apiserver readiness wait into metallb-speaker pods
#
# Problem: metallb-speaker starts before kube-apiserver is ready after node reboots,
# causing 300+ CrashLoopBackOff restarts per rollout. The speaker image is distroless
# (no shell), so we cannot wrap the entrypoint.
#
# Solution: Kyverno mutates every speaker Pod before admission to inject a busybox
# init container that polls kube-apiserver /healthz and only exits when it responds
# 200 OK.
#
# IMPORTANT — Talos Linux note:
# On Talos, kube-apiserver binds to the node IP only (NOT 127.0.0.1), and has
# --anonymous-auth=false so /healthz returns 401 (wget --spider fails on 401).
# Solution: use `nc -z` TCP port check on the node IP — reliable, auth-free.
# Speaker pods use hostNetwork:true so hostname -I returns the host node's IP.
#
# References: MetalLB issue #2042; fixed in v0.15.0 chart startup logic.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: metallb-speaker-wait-for-apiserver
  annotations:
    policies.kyverno.io/title: MetalLB Speaker — Wait for API Server
    policies.kyverno.io/category: Reliability
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Injects a busybox init container into metallb-speaker pods that waits for
      the kube-apiserver TCP port (6443) to be open on the node's primary IP.
      Uses nc -z (TCP check) instead of HTTP healthz because Talos Linux uses
      --anonymous-auth=false (healthz returns 401, wget --spider fails).
      Uses hostname -I to get the node IP (hostNetwork:true pods share host network).
spec:
  rules:
    - name: inject-wait-for-apiserver
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [metallb-system]
              selector:
                matchLabels:
                  app.kubernetes.io/component: speaker
      mutate:
        patchStrategicMerge:
          spec:
            initContainers:
              - name: wait-for-apiserver
                image: busybox:1.36
                imagePullPolicy: IfNotPresent
                command:
                  - sh
                  - -c
                  - |
                    echo "Waiting for kube-apiserver TCP port to open..."
                    NODE_IP=$(hostname -I 2>/dev/null | awk '{print $1}')
                    [ -z "$NODE_IP" ] && NODE_IP=${NODE_1_IP}
                    echo "  Using node IP: ${NODE_IP}"
                    until nc -z -w 5 "${NODE_IP}" 6443 2>/dev/null; do
                      echo "  Port 6443 not open yet, retrying in 5s..."
                      sleep 5
                    done
                    echo "kube-apiserver TCP port is open — speaker may start."
                resources:
                  requests:
                    cpu: 10m
                    memory: 8Mi
                  limits:
                    cpu: 50m
                    memory: 16Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  runAsNonRoot: true
                  runAsUser: 65534
                  capabilities:
                    drop: ["ALL"]
