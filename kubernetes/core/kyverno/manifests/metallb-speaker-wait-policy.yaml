---
# Kyverno ClusterPolicy: inject apiserver readiness wait into metallb-speaker pods
#
# Problem: metallb-speaker starts before kube-apiserver is ready after node reboots,
# causing 300+ CrashLoopBackOff restarts per rollout. The speaker image is distroless
# (no shell), so we cannot wrap the entrypoint.
#
# Solution: Kyverno mutates every speaker Pod before admission to inject a busybox
# init container that polls kube-apiserver /healthz and only exits when it responds
# 200 OK.
#
# IMPORTANT — Talos Linux note:
# On Talos, kube-apiserver binds to the node IP only, NOT to 127.0.0.1. The speaker
# pods use hostNetwork:true, so hostname -I returns the host node's IP. We use that
# to contact the local API server. Do NOT use 127.0.0.1:6443 — it will loop forever.
#
# References: MetalLB issue #2042; fixed in v0.15.0 chart startup logic.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: metallb-speaker-wait-for-apiserver
  annotations:
    policies.kyverno.io/title: MetalLB Speaker — Wait for API Server
    policies.kyverno.io/category: Reliability
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Injects a busybox init container into metallb-speaker pods that polls
      the node's kube-apiserver /healthz before the speaker starts. Prevents
      the startup race that causes 300+ CrashLoopBackOff restarts per reboot.
      Uses the node's primary IP (via hostname -I) because on Talos Linux the
      API server does not bind to 127.0.0.1.
spec:
  rules:
    - name: inject-wait-for-apiserver
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [metallb-system]
              selector:
                matchLabels:
                  app.kubernetes.io/component: speaker
      mutate:
        patchStrategicMerge:
          spec:
            initContainers:
              - name: wait-for-apiserver
                image: busybox:1.36
                imagePullPolicy: IfNotPresent
                command:
                  - sh
                  - -c
                  - |
                    echo "Waiting for kube-apiserver to be ready..."
                    NODE_IP=$(hostname -I 2>/dev/null | awk '{print $1}')
                    [ -z "$NODE_IP" ] && NODE_IP=10.10.0.90
                    echo "  Using node IP: ${NODE_IP}"
                    until wget -q --spider --no-check-certificate \
                        "https://${NODE_IP}:6443/healthz" 2>/dev/null; do
                      echo "  apiserver not ready at ${NODE_IP}:6443, retrying in 5s..."
                      sleep 5
                    done
                    echo "kube-apiserver is ready."
                resources:
                  requests:
                    cpu: 10m
                    memory: 8Mi
                  limits:
                    cpu: 50m
                    memory: 16Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  runAsNonRoot: true
                  runAsUser: 65534
                  capabilities:
                    drop: ["ALL"]
