---
# Kyverno ClusterPolicy: validate ExternalSecret secretStoreRef names
# Mode: Enforce — BLOCKS deployment if wrong store name is used.
#
# Root cause: In 2025-05, Gatus ExternalSecret used secretStoreRef.name: openbao-backend
# (which does not exist) instead of openbao. This caused a CrashLoopBackOff.
# This policy PREVENTS this class of error at admission time.
#
# The platform's only ClusterSecretStore is named "openbao".
# All ExternalSecrets MUST reference: secretStoreRef.name: openbao
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: validate-externalsecret-storeref
  annotations:
    policies.kyverno.io/title: Validate ExternalSecret SecretStore Reference
    policies.kyverno.io/category: External Secrets
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      All ExternalSecret resources must reference the ClusterSecretStore named "openbao".
      Using any other name (e.g. openbao-backend) will cause the ExternalSecret to fail
      and dependent pods to enter CrashLoopBackOff. This policy enforces the correct name.
spec:
  validationFailureAction: Enforce
  admission: true
  background: true
  rules:
    - name: validate-store-ref-name
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
                - ClusterExternalSecret
      validate:
        message: >-
          ExternalSecret secretStoreRef.name must be "openbao" (the platform's ClusterSecretStore).
          Found: "{{ request.object.spec.secretStoreRef.name }}".
          Common mistake: using "openbao-backend" — the correct name is "openbao".
        pattern:
          spec:
            secretStoreRef:
              name: openbao
---
# Kyverno ClusterPolicy: CronJob failedJobsHistoryLimit for infra namespaces
# Mode: Audit — warns but does NOT block (to not break existing CronJobs).
#
# Root cause: self-healer CronJob had failedJobsHistoryLimit: 3. ArgoCD considers
# a CronJob Degraded when failed job pods exist in history. 3 failed runs →
# core-argocd-manifests shows Degraded → self-healer alerts on itself → alert storm.
# Best practice: failedJobsHistoryLimit: 0 or 1 for operational infrastructure CronJobs.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: cronjob-failed-history-limit
  annotations:
    policies.kyverno.io/title: CronJob failedJobsHistoryLimit Should Be Low
    policies.kyverno.io/category: Infrastructure Stability
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Infrastructure CronJobs should set failedJobsHistoryLimit to 0 or 1.
      High values cause ArgoCD to show the parent Application as Degraded,
      which can cascade to false alerts and self-healer infinite loops.
spec:
  validationFailureAction: Audit
  admission: true
  background: true
  rules:
    - name: check-failed-history-limit
      match:
        any:
          - resources:
              kinds: [CronJob]
              namespaces:
                - argocd
                - external-secrets
                - kyverno
                - cert-manager
                - traefik
                - netbird
                - monitoring
                - openbao
      validate:
        message: >-
          CronJob "{{ request.object.metadata.name }}" has failedJobsHistoryLimit {{ request.object.spec.failedJobsHistoryLimit }}.
          For infrastructure CronJobs, set failedJobsHistoryLimit: 0 (or max 1) to prevent
          ArgoCD from showing the parent Application as Degraded when a job fails.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.failedJobsHistoryLimit || `0` }}"
                operator: GreaterThan
                value: "1"
---
# Kyverno ClusterPolicy: require pod-level security context in infra namespaces
# Mode: Audit
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-security-context-infra
  annotations:
    policies.kyverno.io/title: Require Security Context in Infra Namespaces
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: low
    policies.kyverno.io/description: >-
      Infrastructure pods should set securityContext to improve isolation.
      This is an audit policy to track progress toward least-privilege posture.
spec:
  validationFailureAction: Audit
  admission: true
  background: true
  rules:
    - name: check-security-context
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces:
                - argocd
                - external-secrets
                - cert-manager
                - traefik
      validate:
        message: >-
          Pod "{{ request.object.metadata.name }}" should define a securityContext
          with at least runAsNonRoot: true for better security posture.
        pattern:
          spec:
            =(securityContext):
              =(runAsNonRoot): "?*"
