---
# catalog.yaml — source definition for catalog apps
# This file is read by scripts/sync-catalog.sh to generate ArgoCD Applications.
#
# Catalog app: Forgejo — community-governed Git forge (Gitea fork)
# Access: forgejo.int.rlservers.com (VPN-only, Authentik native OIDC)
# SSO: Native OAuth2/OIDC via Authentik (configured via admin CLI on first deploy)
# Chart: Gitea Helm chart v10 with Forgejo image override
# Note: Uses standalone postgres:16 deployment (Bitnami registry unreachable from cluster)

name: forgejo
description: "Forgejo — community-governed Git forge (Gitea fork) with Authentik native OIDC"
namespace: forgejo

helm:
  repoURL: https://dl.gitea.com/charts/
  chart: gitea
  targetRevision: "10.*"
  releaseName: forgejo

ingressroute:
  host: forgejo.int.rlservers.com
  entrypoint: websecure
