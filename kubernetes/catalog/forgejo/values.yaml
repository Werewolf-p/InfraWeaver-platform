# forgejo/values.yaml — Gitea Helm chart v10 with Forgejo image override
# Forgejo is a Gitea fork; the Gitea chart is fully compatible.
# We override the image to use Forgejo and disable all sub-charts (postgres/redis)
# since the Bitnami registry is unreachable from the cluster nodes.
# A standalone postgres:16 Deployment is in manifests/resources.yaml.

image:
  repository: codeberg.org/forgejo/forgejo
  tag: "9"
  pullPolicy: IfNotPresent

# Disable all sub-charts — we manage postgres and redis externally
postgresql:
  enabled: false

postgresql-ha:
  enabled: false

redis-cluster:
  enabled: false

gitea:
  admin:
    existingSecret: forgejo-admin-secret
    # username and password keys are pulled from the secret

  config:
    APP_NAME: "Forgejo"
    server:
      DOMAIN: forgejo.int.rlservers.com
      ROOT_URL: https://forgejo.int.rlservers.com
      HTTP_PORT: 3000
      SSH_DOMAIN: forgejo.int.rlservers.com
    database:
      DB_TYPE: postgres
      HOST: forgejo-postgresql:5432
      NAME: forgejo
      USER: forgejo
      SCHEMA: public
    cache:
      ADAPTER: db
    session:
      PROVIDER: db
    queue:
      TYPE: level
    indexer:
      ISSUE_INDEXER_TYPE: db
      REPO_INDEXER_ENABLED: "false"
    security:
      INSTALL_LOCK: "true"
    log:
      LEVEL: info

  # Inject DB password from ExternalSecret via env var
  additionalConfigFromEnvs:
    - name: FORGEJO__DATABASE__PASSWD
      valueFrom:
        secretKeyRef:
          name: forgejo-postgres-secret
          key: password

service:
  http:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Disable readiness/liveness probes until DB is ready
livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 20
  successThreshold: 1
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 5
