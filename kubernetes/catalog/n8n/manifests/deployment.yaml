---
# Generated by InfraWeaver Community Apps from Unraid AppFeed
# Source: https://raw.githubusercontent.com/Balya/unraid-templates/main/n8n/n8n.xml
# Category: Tools-Utilities
# Stars: 0 | Downloads: 0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n
          env:
            - name: GENERIC_TIMEZONE
              value: "Europe/Kaliningrad"
            - name: TZ
              value: "Europe/Kaliningrad"
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "true"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_SECURE_COOKIE
              value: "true"
          ports:
            - containerPort: 5678
              protocol: TCP
              name: webui
          startupProbe:
            tcpSocket:
              port: 5678
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: 5678
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 5678
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: n8n-data-0
              mountPath: "/home/node"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
      - name: n8n-data-0
        persistentVolumeClaim:
          claimName: n8n-data-0
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: n8n
  ports:
    - port: 5678
      targetPort: 5678
      protocol: TCP
      name: webui
  type: ClusterIP