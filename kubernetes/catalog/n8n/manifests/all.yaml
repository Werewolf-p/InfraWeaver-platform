---
# Namespace for n8n
apiVersion: v1
kind: Namespace
metadata:
  name: n8n
  labels:
    app.kubernetes.io/name: n8n
    infraweaver.io/type: catalog-app
---
# PersistentVolumeClaim — stores n8n workflows, credentials, and execution history
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: n8n
  annotations:
    # Include in nightly TrueNAS NFS backup (RecurringJob: truenas-backup-daily).
    # n8n workflows and credentials are critical — retained across full redeployments.
    recurring-job-group.longhorn.io/truenas-backup: "enabled"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# Deployment — n8n workflow automation (SQLite mode, no external DB)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
    infraweaver.io/auth: proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      terminationGracePeriodSeconds: 30
      priorityClassName: platform-standard
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:1.91.3
          ports:
            - containerPort: 5678
          env:
            - name: N8N_HOST
              value: "n8n.int.rlservers.com"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: WEBHOOK_URL
              value: "https://n8n.int.rlservers.com"
            - name: N8N_EDITOR_BASE_URL
              value: "https://n8n.int.rlservers.com"
            - name: DB_TYPE
              value: "sqlite"
            - name: DB_SQLITE_VACUUM_ON_STARTUP
              value: "true"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-encryption-key
                  key: encryption-key
            - name: EXECUTIONS_PROCESS
              value: "main"
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
---
# ExternalSecret — pull N8N_ENCRYPTION_KEY from OpenBao
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: n8n-encryption-key
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: n8n-encryption-key
    creationPolicy: Owner
  data:
    - secretKey: encryption-key
      remoteRef:
        key: secret/platform/n8n
        property: encryption-key
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: n8n
spec:
  selector:
    app: n8n
  ports:
    - port: 5678
      targetPort: 5678
---
# IngressRoute — VPN-only + Authentik forward-auth
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n-int
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`n8n.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
        - name: forward-auth
          namespace: traefik
      services:
        - name: n8n
          namespace: n8n
          port: 5678
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow Traefik ingress + internet for webhooks/integrations
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-n8n-traffic
  namespace: n8n
spec:
  podSelector:
    matchLabels:
      app: n8n
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 5678
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 80
        - port: 443
---
# LimitRange — default resource constraints for namespace
# Prevents pods without explicit resources from starving the node
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: n8n
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: 4000m
        memory: 4Gi
