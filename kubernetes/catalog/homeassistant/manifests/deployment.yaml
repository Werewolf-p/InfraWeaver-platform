apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app.kubernetes.io/name: homeassistant
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: complex
spec:
  # replicas intentionally omitted: the console owns start/stop by scaling the
  # live Deployment. Pinning replicas in git makes ArgoCD selfHeal restart a
  # stopped workload on every sync. k8s defaults the field to 1 on first apply.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: homeassistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homeassistant
    spec:
      hostNetwork: true
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      containers:
        - name: homeassistant
          image: lscr.io/linuxserver/homeassistant
          env:
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "022"
            - name: TZ
              value: "UTC"
          ports:
            - containerPort: 8123
              protocol: TCP
              name: port-8123
          startupProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: 8123
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8123
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: homeassistant-data-0
              mountPath: "/config"
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
      volumes:
      - name: homeassistant-data-0
        persistentVolumeClaim:
          claimName: homeassistant-data-0
---
apiVersion: v1
kind: Service
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app.kubernetes.io/name: homeassistant
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: homeassistant
  ports:
    - port: 8123
      targetPort: 8123
      protocol: TCP
      name: port-8123
  type: ClusterIP