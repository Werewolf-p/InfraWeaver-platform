---
# Generated by InfraWeaver Community Apps from Unraid AppFeed
# Source: 
# Category: HomeAutomation, Tools-Utilities
# Stars: 266 | Downloads: 4330290
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app.kubernetes.io/name: homeassistant
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: complex
spec:
  # replicas intentionally omitted: the console owns start/stop by scaling the
  # live Deployment. Pinning replicas in git makes ArgoCD selfHeal restart a
  # stopped workload on every sync. k8s defaults the field to 1 on first apply.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: homeassistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homeassistant
    spec:
      # hostNetwork retained deliberately: Home Assistant relies on host-level
      # mDNS/SSDP/DHCP broadcast + multicast to auto-discover LAN smart-home
      # devices (Chromecast, Sonos, Hue, etc.). Removing it breaks discovery.
      # This is also the sole reason the namespace PodSecurity level stays
      # `privileged` — hostNetwork is forbidden under the baseline/restricted
      # PSA profiles, so the namespace label must NOT be tightened while it is on.
      hostNetwork: true
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      containers:
        - name: homeassistant
          image: lscr.io/linuxserver/homeassistant
          env:
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "022"
            - name: TZ
              value: "UTC"
          ports:
            - containerPort: 8123
              protocol: TCP
              name: port-8123
          startupProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: 8123
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8123
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: homeassistant-data-0
              mountPath: "/config"
          securityContext:
            # Hardened 2026-07-16: replaced blanket `privileged: true`.
            # This pod mounts NO host devices (no /dev hostPath, no volumeDevices,
            # no USB/Bluetooth/Zigbee/Z-Wave dongle) — only a PVC at /config — so
            # full privileged mode granted node-level (container-escape) reach for
            # zero functional benefit. The lscr.io/s6-overlay image still starts as
            # root to fix /config ownership and step down to PUID/PGID, so we keep
            # only the capabilities that init path demonstrably uses and drop ALL else.
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN         # chown /config to PUID:PGID on first start
                - DAC_OVERRIDE  # s6 init edits /config files it does not own
                - FOWNER        # permission/ownership fixups during init
                - SETGID        # step down from root to PGID (100)
                - SETUID        # step down from root to PUID (99)
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
      volumes:
      - name: homeassistant-data-0
        persistentVolumeClaim:
          claimName: homeassistant-data-0
---
apiVersion: v1
kind: Service
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app.kubernetes.io/name: homeassistant
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: homeassistant
  ports:
    - port: 8123
      targetPort: 8123
      protocol: TCP
      name: port-8123
  type: ClusterIP