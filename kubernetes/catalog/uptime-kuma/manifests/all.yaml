---
# Namespace for Uptime Kuma
apiVersion: v1
kind: Namespace
metadata:
  name: uptime-kuma
  labels:
    app.kubernetes.io/name: uptime-kuma
    infraweaver.io/type: catalog-app
---
# PersistentVolumeClaim — stores Uptime Kuma data on Longhorn
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data
  namespace: uptime-kuma
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
# Deployment — Uptime Kuma status monitoring
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
  labels:
    app: uptime-kuma
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      # Uptime Kuma runs as root on startup to chown /app/data, then drops to 'node' user.
      # Running as root is required for proper initialization; the image handles this safely.
      # Kyverno audit-only policies allow this; enforce mode would need a PSA exception.
      terminationGracePeriodSeconds: 30
      priorityClassName: platform-standard
      securityContext:
        runAsUser: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:1
          ports:
            - containerPort: 3001
          env:
            - name: UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
---
# Service — expose Uptime Kuma internally
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  selector:
    app: uptime-kuma
  ports:
    - port: 3001
      targetPort: 3001
---
# IngressRoute — VPN-only with Authentik forward-auth
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma-int
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`uptime-kuma.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
        - name: forward-auth
          namespace: traefik
      services:
        - name: uptime-kuma
          namespace: uptime-kuma
          port: 3001
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow ingress from Traefik only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: uptime-kuma-netpol
  namespace: uptime-kuma
spec:
  podSelector:
    matchLabels:
      app: uptime-kuma
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 3001
  egress:
    - {}
---
# LimitRange — default resource constraints for namespace
# Prevents pods without explicit resources from starving the node
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: uptime-kuma
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: 4000m
        memory: 4Gi
