---
# Generated by InfraWeaver Community Apps from Unraid AppFeed
# Source: https://raw.githubusercontent.com/selfhosters/unRAID-CA-templates/master/templates/paperless-ngx.xml
# Category: Productivity
# Stars: 0 | Downloads: 0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: paperless-ngx
          image: ghcr.io/paperless-ngx/paperless-ngx
          env:
            - name: PAPERLESS_REDIS
              value: "redis://[REPLACE-WITH-IP]:6379"
            - name: PAPERLESS_OCR_LANGUAGE
              value: "eng"
            - name: PAPERLESS_OCR_LANGUAGES
              value: ""
            - name: PAPERLESS_FILENAME_FORMAT
              value: "{{ created }}-{{ correspondent }}-{{ title }}"
            - name: PAPERLESS_TIME_ZONE
              value: "America/Los_Angeles"
            - name: PAPERLESS_IGNORE_DATES
              value: ""
            - name: PAPERLESS_CONSUMER_POLLING
              value: "0"
            - name: PAPERLESS_SECRET_KEY
              value: "e11fl1oa-*ytql8p)(06fbj4ukrlo+n7k&amp;q5+$1md7i+mge=ee"
            - name: USERMAP_UID
              value: "99"
            - name: USERMAP_GID
              value: "100"
          ports:
            - containerPort: 8000
              protocol: TCP
              name: port
          startupProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: paperless-ngx-data-0
              mountPath: "/usr/src/paperless/data"
            - name: paperless-ngx-data-1
              mountPath: "/usr/src/paperless/media"
            - name: paperless-ngx-data-2
              mountPath: "/usr/src/paperless/consume"
            - name: paperless-ngx-data-3
              mountPath: "/usr/src/paperless/export"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
      - name: paperless-ngx-data-0
        persistentVolumeClaim:
          claimName: paperless-ngx-data-0
      - name: paperless-ngx-data-1
        persistentVolumeClaim:
          claimName: paperless-ngx-data-1
      - name: paperless-ngx-data-2
        persistentVolumeClaim:
          claimName: paperless-ngx-data-2
      - name: paperless-ngx-data-3
        persistentVolumeClaim:
          claimName: paperless-ngx-data-3
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: paperless-ngx
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: port
  type: ClusterIP