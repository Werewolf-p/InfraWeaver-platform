---
# catalog.yaml — Paperless-ngx document management
# Defined but not enabled by default. Requires PostgreSQL + Redis.
# Add 'paperless-ngx' to catalog.enabled in platform.yaml to deploy.
# Access: paperless.int.rlservers.com (VPN-only, native OIDC via Authentik)
# SSO: Native OIDC via Authentik (requires additional configuration)
# Complexity: HIGH — requires PostgreSQL, Redis, and tika/gotenberg for document parsing

name: paperless-ngx
description: "Paperless-ngx — self-hosted document management system with OCR and OIDC"
namespace: paperless-ngx

ingressroute:
  host: paperless.int.rlservers.com
  entrypoint: websecure
