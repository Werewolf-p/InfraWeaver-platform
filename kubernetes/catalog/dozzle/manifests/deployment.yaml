apiVersion: apps/v1
kind: Deployment
metadata:
  name: dozzle
  namespace: dozzle
  labels:
    app.kubernetes.io/name: dozzle
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dozzle
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dozzle
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: dozzle
          image: ghcr.io/prophetse7en/dozzle:latest
          env:
            - name: DOZZLE_BASE
              value: "/"
            - name: DOZZLE_LEVEL
              value: "info"
            - name: DOZZLE_TAILSIZE
              value: "300"
            - name: DOZZLE_AUTH_PROVIDER
              value: "none"
            - name: DOZZLE_NO_ANALYTICS
              value: "true"
          ports:
            - containerPort: 8080
              protocol: TCP
              name: webui
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            failureThreshold: 10
          volumeMounts:
            - name: dozzle-data-0
              mountPath: "/var/run/docker.sock"
            - name: dozzle-data-1
              mountPath: "/data"
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
      - name: dozzle-data-0
        persistentVolumeClaim:
          claimName: dozzle-data-0
      - name: dozzle-data-1
        persistentVolumeClaim:
          claimName: dozzle-data-1
---
apiVersion: v1
kind: Service
metadata:
  name: dozzle
  namespace: dozzle
  labels:
    app.kubernetes.io/name: dozzle
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: dozzle
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: webui
  type: ClusterIP