apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: bazarr
  labels:
    app.kubernetes.io/name: bazarr
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bazarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bazarr
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: bazarr
          image: lscr.io/linuxserver/bazarr
          env:
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "022"
            - name: TZ
              value: "UTC"
          ports:
            - containerPort: 6767
              protocol: TCP
              name: webui
          startupProbe:
            tcpSocket:
              port: 6767
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: 6767
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 6767
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: bazarr-data-0
              mountPath: "/config"
            - name: tmp-movies
              mountPath: "/movies"
            - name: tmp-tv
              mountPath: "/tv"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
      - name: bazarr-data-0
        persistentVolumeClaim:
          claimName: bazarr-data-0
      - name: tmp-movies
        emptyDir:
      - name: tmp-tv
        emptyDir:
---
apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: bazarr
  labels:
    app.kubernetes.io/name: bazarr
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: bazarr
  ports:
    - port: 6767
      targetPort: 6767
      protocol: TCP
      name: webui
  type: ClusterIP