---
# Wiki.js OIDC Post-Deploy Configuration Job
# Runs after wiki is deployed to configure Authentik SSO via GraphQL + direct DB update
# Idempotent — safe to run on every deploy
apiVersion: batch/v1
kind: Job
metadata:
  name: wiki-oidc-configure
  namespace: wiki
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      initContainers:
        # Wait for wiki to be accepting connections before configuring OIDC
        - name: wait-wiki
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for wiki to become ready..."
              for i in $(seq 1 60); do
                if curl -sf http://wiki.wiki.svc.cluster.local:3000/healthz >/dev/null 2>&1; then
                  echo "Wiki is ready"
                  exit 0
                fi
                echo "Attempt $i/60 — wiki not ready yet, waiting 10s..."
                sleep 10
              done
              echo "Wiki did not become ready in time"
              exit 1
        # Wait for PostgreSQL to be ready
        - name: wait-postgres
          image: bitnami/postgresql:15
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: wiki-postgres-secret
                  key: postgresql-password
          command:
            - sh
            - -c
            - |
              echo "Waiting for wiki PostgreSQL..."
              for i in $(seq 1 30); do
                if pg_isready -h wiki-postgresql.wiki.svc.cluster.local -U wiki -d wiki -q; then
                  echo "PostgreSQL is ready"
                  exit 0
                fi
                echo "Attempt $i/30..."
                sleep 5
              done
              exit 1
      containers:
        - name: configure-oidc
          image: bitnami/postgresql:15
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: wiki-postgres-secret
                  key: postgresql-password
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: wiki-admin-secret
                  key: oidc-client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wiki-admin-secret
                  key: oidc-client-secret
          command:
            - sh
            - -c
            - |
              set -e
              echo "Configuring Wiki.js OIDC via direct PostgreSQL update..."

              # Build JSON config and update directly in DB (idempotent)
              psql -h wiki-postgresql.wiki.svc.cluster.local -U wiki -d wiki << SQL
              UPDATE authentication
              SET
                "isEnabled" = true,
                "displayName" = 'Authentik SSO',
                config = json_build_object(
                  'clientId',           '${OIDC_CLIENT_ID}',
                  'clientSecret',       '${OIDC_CLIENT_SECRET}',
                  'authorizationURL',   'https://auth.rlservers.com/application/o/authorize/',
                  'tokenURL',           'https://auth.rlservers.com/application/o/token/',
                  'userInfoURL',        'https://auth.rlservers.com/application/o/userinfo/',
                  'issuer',             'https://auth.rlservers.com/application/o/wikijs/',
                  'callbackURL',        'https://wiki.int.rlservers.com/login/oidc/callback',
                  'scope',              'openid profile email',
                  'emailClaim',         'email',
                  'displayNameClaim',   'name',
                  'mapGroupsFromClaims', false,
                  'skipUserProfile',    false,
                  'pictureClaim',       'picture',
                  'mapGroups',          false,
                  'groupsClaim',        'groups',
                  'logoutURL',          '',
                  'acrValues',          ''
                )
              WHERE key = 'oidc';

              -- Verify
              SELECT key, "isEnabled", config->>'issuer' as issuer, config->>'clientId' as client_id
              FROM authentication;
              SQL

              echo "OIDC configuration complete."
