---
# Wiki.js PostgreSQL Secret — sourced from OpenBao
# Keys: postgresql-username + postgresql-password — used by wiki Helm chart as existingSecret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wiki-postgres-secret
  namespace: wiki
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: wiki-postgres-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: postgresql-username
      remoteRef:
        key: secret/platform/wiki
        property: postgresql-username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: postgresql-password
      remoteRef:
        key: secret/platform/wiki
        property: postgresql-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# Wiki.js Admin + OIDC Secret — sourced from OpenBao
# Keys: admin-email, admin-password, oidc-client-id, oidc-client-secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wiki-admin-secret
  namespace: wiki
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: wiki-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-email
      remoteRef:
        key: secret/platform/wiki
        property: admin-email
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/wiki
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: oidc-client-id
      remoteRef:
        key: secret/platform/wiki
        property: oidc-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: oidc-client-secret
      remoteRef:
        key: secret/platform/wiki
        property: oidc-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
