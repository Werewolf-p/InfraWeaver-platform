
image:
  repository: requarks/wiki
  imagePullPolicy: IfNotPresent

# Wiki.js takes 30-60s to initialize; probes must not fire before app is ready.
# startupProbe allows up to 10 minutes for DB connection retries before declaring startup failed.
# Once started, livenessProbe/readinessProbe take over with gentler thresholds.
startupProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60  # 60 × 10s = 10 minutes — enough for PostgreSQL to recover

livenessProbe:
  initialDelaySeconds: 0   # startupProbe guards this window now
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6      # 6 × 20s = 2 minutes of failure tolerance

readinessProbe:
  initialDelaySeconds: 0   # startupProbe guards this window now
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 80

# No ingress — traffic routed via Traefik IngressRoute (wiki.int.rlservers.com)
ingress:
  enabled: false

postgresql:
  enabled: true
  postgresqlUser: wiki
  postgresqlDatabase: wiki
  # Password and username come from externalsecret → wiki-postgres-secret
  existingSecret: wiki-postgres-secret
  existingSecretKey: postgresql-password
  existingSecretUserKey: postgresql-username

  persistence:
    enabled: true
    storageClass: longhorn-retain
    size: 5Gi
    annotations:
      # Include in nightly TrueNAS NFS backup (RecurringJob: truenas-backup-daily).
      recurring-job-group.longhorn.io/truenas-backup: "enabled"

  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
