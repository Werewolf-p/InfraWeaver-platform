---
# catalog.yaml — source definition for catalog apps
# This file is read by scripts/sync-catalog.sh to generate ArgoCD Applications.
# It is NOT named application.yaml so the root ApplicationSet ignores it.
#
# Catalog app: Wiki.js — self-hosted documentation wiki
# Access: wiki.int.rlservers.com (VPN-only via NetBird)

name: wiki
description: "Wiki.js self-hosted documentation wiki with Authentik OIDC SSO"
namespace: wiki

# Helm chart source
helm:
  repoURL: https://charts.js.wiki
  chart: wiki
  targetRevision: "3.0.0"
  releaseName: wiki

# IngressRoute for wiki (internal, VPN-only)
ingressroute:
  host: wiki.int.rlservers.com
  entrypoint: websecure
