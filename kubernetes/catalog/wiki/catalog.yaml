---
# catalog.yaml — source definition for catalog apps
# This file is read by scripts/sync-catalog.sh to generate ArgoCD Applications.
# It is NOT named application.yaml so the root ApplicationSet ignores it.
#
# Catalog app: Wiki.js — self-hosted documentation wiki
# Access: wiki.int.rlservers.com (VPN-only via NetBird)

name: wiki
description: "Wiki.js self-hosted documentation wiki with Authentik OIDC SSO"
namespace: wiki

# Helm chart source
helm:
  repoURL: https://charts.js.wiki
  chart: wiki
  targetRevision: "3.0.0"
  releaseName: wiki

# IngressRoute for wiki (internal, VPN-only)
ingressroute:
  host: wiki.int.rlservers.com
  entrypoint: websecure

# ── Secrets schema ────────────────────────────────────────────────────────────
# Read by scripts/seed-catalog-secrets.sh — auto-seeds OpenBao if missing.
# Path: secret/data/platform/wiki
# Never overwrites existing values (idempotent). Safe to redeploy.
secrets:
  path: platform/wiki
  keys:
    admin-email:
      type: static
      value: "admin@infraweaver.local"
    admin-password:
      type: password         # openssl rand -base64 24, unique per deploy
    postgresql-username:
      type: static
      value: "wiki"
    postgresql-password:
      type: password
    oidc-client-id:
      type: static
      value: "wikijs"        # matches Authentik OAuth2 provider client_id
    oidc-client-secret:
      type: password         # 32-char token, set in both Wiki.js and Authentik
replicas: "1"
