---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-catalog-app
  namespace: catalog-demo
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-catalog-app
  namespace: catalog-demo
  labels:
    app: demo-catalog-app
    infraweaver.io/auth: vpn
    infraweaver.io/type: catalog-app
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: demo-catalog-app
  template:
    metadata:
      labels:
        app: demo-catalog-app
    spec:
      serviceAccountName: demo-catalog-app
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run
            - name: cache
              mountPath: /var/cache/nginx
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: demo-nginx-conf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-nginx-conf
  namespace: catalog-demo
data:
  nginx.conf: |
    worker_processes 1;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      server {
        listen 8080;
        location / {
          default_type text/html;
          return 200 '<h1>🎉 Demo Catalog App</h1><p>This app was deployed via the InfraWeaver catalog system.</p><p>To remove it, delete <code>demo-catalog-app</code> from <code>platform.yaml</code>.</p>';
        }
        location /health {
          return 200 'ok';
          add_header Content-Type text/plain;
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: demo-catalog-app
  namespace: catalog-demo
spec:
  selector:
    app: demo-catalog-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# IngressRoute in the app namespace (Traefik watches all namespaces)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: demo-catalog-app
  namespace: catalog-demo
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`demo-catalog-app.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: demo-catalog-app
          namespace: catalog-demo
          port: 8080
  tls: {}  # Uses Traefik default TLSStore (*.rlservers.com wildcard)
