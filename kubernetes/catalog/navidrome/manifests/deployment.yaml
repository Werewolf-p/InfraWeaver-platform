kind: Service
metadata:
  name: navidrome
  namespace: navidrome
  labels:
    app.kubernetes.io/name: navidrome
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: navidrome
  ports:
    - port: 4533
