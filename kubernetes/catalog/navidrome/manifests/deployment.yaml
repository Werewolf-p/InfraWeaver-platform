apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: navidrome
  labels:
    app.kubernetes.io/name: navidrome
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: navidrome
  template:
    metadata:
      labels:
        app.kubernetes.io/name: navidrome
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      containers:
        - name: navidrome
          image: deluan/navidrome
          env:
            - name: ND_SCANSCHEDULE
              value: "1m"
            - name: ND_LOGLEVEL
              value: "info"
            - name: ND_SESSIONTIMEOUT
              value: "24h"
            - name: ND_BASEURL
              value: ""
            - name: ND_IMAGECACHESIZE
              value: "200MB"
          ports:
            - containerPort: 4533
              protocol: TCP
              name: webui
          startupProbe:
            tcpSocket:
              port: 4533
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 4533
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 4533
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: "/data"
            - name: music
              mountPath: "/music"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: navidrome-data-0
      - name: music
        emptyDir:
---
