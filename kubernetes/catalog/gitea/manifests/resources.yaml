---
# Namespace for Gitea
apiVersion: v1
kind: Namespace
metadata:
  name: gitea
  labels:
    app.kubernetes.io/name: gitea
    infraweaver.io/type: catalog-app
---
# ExternalSecret — Gitea admin credentials from OpenBao
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-admin-secret
  namespace: gitea
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitea-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: secret/platform/gitea
        property: admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: secret/platform/gitea
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: email
      remoteRef:
        key: secret/platform/gitea
        property: admin-email
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# ExternalSecret — Gitea PostgreSQL credentials from OpenBao
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-postgres-secret
  namespace: gitea
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitea-postgres-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      data:
        password: "{{ .pg_password }}"
        postgres-password: "{{ .pg_password }}"
  data:
    - secretKey: pg_password
      remoteRef:
        key: secret/platform/gitea
        property: postgresql-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# IngressRoute — VPN-only access to Gitea
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea-int
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gitea.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: gitea-http
          namespace: gitea
          port: 3000
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow ingress from Traefik only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gitea-netpol
  namespace: gitea
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gitea
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 3000
  egress:
    - {}
