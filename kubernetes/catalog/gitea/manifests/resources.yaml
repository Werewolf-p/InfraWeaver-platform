---
# Namespace for Gitea
apiVersion: v1
kind: Namespace
metadata:
  name: gitea
  labels:
    app.kubernetes.io/name: gitea
    infraweaver.io/type: catalog-app
---
# ExternalSecret — Gitea admin credentials from OpenBao
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-admin-secret
  namespace: gitea
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitea-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: secret/platform/gitea
        property: admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: secret/platform/gitea
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: email
      remoteRef:
        key: secret/platform/gitea
        property: admin-email
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# ExternalSecret — Gitea PostgreSQL credentials from OpenBao
# Rendered into both POSTGRES_PASSWORD (for the postgres container) and
# the password/postgres-password keys expected by Gitea's connection config.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-postgres-secret
  namespace: gitea
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitea-postgres-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      data:
        password: "{{ .pg_password }}"
        postgres-password: "{{ .pg_password }}"
        POSTGRES_PASSWORD: "{{ .pg_password }}"
        POSTGRES_USER: "gitea"
        POSTGRES_DB: "gitea"
  data:
    - secretKey: pg_password
      remoteRef:
        key: secret/platform/gitea
        property: postgresql-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# PersistentVolumeClaim — PostgreSQL data on Longhorn
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-postgresql-data
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# PostgreSQL Deployment — uses official postgres:16 from Docker Hub
# (avoids bitnami images which require unreachable registry.bitnami.com)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-postgresql
  namespace: gitea
  labels:
    app: gitea-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-postgresql
  template:
    metadata:
      labels:
        app: gitea-postgresql
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true
      containers:
        - name: postgresql
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: gitea-postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "gitea"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-postgresql-data
---
# Service — PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: gitea-postgresql
  namespace: gitea
spec:
  selector:
    app: gitea-postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
# IngressRoute — VPN-only access to Gitea
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea-int
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gitea.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: gitea-http
          namespace: gitea
          port: 3000
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow ingress from Traefik only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gitea-netpol
  namespace: gitea
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gitea
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 3000
  egress:
    - {}
