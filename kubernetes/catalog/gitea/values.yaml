# ── Gitea Helm values ──────────────────────────────────────────────────────────
# Chart: https://dl.gitea.com/charts/ gitea
# Docs:  https://gitea.com/gitea/helm-gitea

replicaCount: 1

image:
  registry: ""
  repository: gitea/gitea
  tag: "1.22"
  pullPolicy: IfNotPresent

service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP
    port: 22

# No native Helm ingress — use Traefik IngressRoute (gitea.int.rlservers.com)
ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 10Gi
  storageClass: longhorn

gitea:
  admin:
    existingSecret: gitea-admin-secret

  # Inject database password from the gitea-postgres-secret ExternalSecret
  additionalConfigFromEnvs:
    - name: GITEA__DATABASE__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-postgres-secret
          key: password

  config:
    # Server base URL (external address)
    server:
      DOMAIN: gitea.int.rlservers.com
      ROOT_URL: "https://gitea.int.rlservers.com"
      HTTP_PORT: 3000

    database:
      DB_TYPE: postgres
      HOST: gitea-postgresql:5432
      NAME: gitea
      USER: gitea

    # Use database-backed cache to avoid Redis dependency
    # Avoids needing redis-cluster sub-chart (Bitnami images not reachable)
    cache:
      ADAPTER: db

    # Security settings
    security:
      INSTALL_LOCK: true
      MIN_PASSWORD_LENGTH: 12

    # Disable self-registration (use Authentik SSO only)
    service:
      DISABLE_REGISTRATION: false   # allow first OIDC auto-reg, then disable
      ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      SHOW_REGISTRATION_BUTTON: false

    # OAuth2 OIDC via Authentik (configured post-install via Gitea admin API)
    oauth2_client:
      ENABLE_AUTO_REGISTRATION: true
      USERNAME: preferred_username

    # Session / cookies
    session:
      COOKIE_SECURE: true

# Use external postgres (manifests/resources.yaml) instead of bitnami sub-chart
# Bitnami images require registry.bitnami.com which may not be reachable from nodes
postgresql:
  enabled: false

# Explicitly disable postgresql-ha
postgresql-ha:
  enabled: false

# Disable redis-cluster — using db-backed cache instead
redis-cluster:
  enabled: false
