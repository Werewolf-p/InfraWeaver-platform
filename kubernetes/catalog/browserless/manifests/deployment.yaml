---
# Generated by InfraWeaver Community Apps from Unraid AppFeed
# Source: https://raw.githubusercontent.com/masterwishx/unraid-templates/main/browserless.xml
# Category: Tools-Utilities
# Stars: 256 | Downloads: 173524326
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browserless
  namespace: browserless
  labels:
    app.kubernetes.io/name: browserless
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: browserless
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browserless
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: browserless
          image: browserless/chrome
          env:
            - name: SCREEN_WIDTH
              value: "2560"
            - name: SCREEN_HEIGHT
              value: "1440"
            - name: SCREEN_DEPTH
              value: "16"
            - name: CONNECTION_TIMEOUT
              value: "300000"
            - name: ENABLE_DEBUGGER
              value: "false"
            - name: PREBOOT_CHROME
              value: "true"
            - name: MAX_CONCURRENT_SESSIONS
              value: "10"
            - name: CHROME_REFRESH_TIME
              value: "600000"
            - name: DEFAULT_BLOCK_ADS
              value: "true"
            - name: DEFAULT_STEALTH
              value: "true"
          ports:
            - containerPort: 3000
              protocol: TCP
              name: host-port-1
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            failureThreshold: 10
          # No volume mounts defined
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      # No volumes defined
---
apiVersion: v1
kind: Service
metadata:
  name: browserless
  namespace: browserless
  labels:
    app.kubernetes.io/name: browserless
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: browserless
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: host-port-1
  type: ClusterIP