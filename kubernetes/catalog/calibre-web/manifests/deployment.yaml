              port: 8083
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: calibre-web-data-0
              mountPath: "/config"
            - name: tmp-books
              mountPath: "/books"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
      - name: calibre-web-data-0
        persistentVolumeClaim:
          claimName: calibre-web-data-0
      - name: tmp-books
        emptyDir:
---
