  template:
    metadata:
      labels:
        app.kubernetes.io/name: calibre-web
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: calibre-web
          image: lscr.io/linuxserver/calibre-web
          env:
            - name: DOCKER_MODS
              value: "linuxserver/mods:universal-calibre"
            - name: OAUTHLIB_RELAX_TOKEN_SCOPE
              valueFrom:
                secretKeyRef:
                  name: oauthlib-relax-token-scope-secret
                  key: value
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "022"
