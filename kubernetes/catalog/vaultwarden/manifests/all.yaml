---
# Namespace for Vaultwarden
apiVersion: v1
kind: Namespace
metadata:
  name: vaultwarden
  labels:
    app.kubernetes.io/name: vaultwarden
    infraweaver.io/type: catalog-app
---
# PersistentVolumeClaim — stores Vaultwarden database and attachments on Longhorn
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data
  namespace: vaultwarden
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# ExternalSecret — Vaultwarden admin token from OpenBao
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-secret
  namespace: vaultwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: vaultwarden-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: secret/platform/vaultwarden
        property: admin-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# Deployment — Vaultwarden password manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    app: vaultwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.36.0
          ports:
            - containerPort: 80
          env:
            - name: DOMAIN
              value: "https://vaultwarden.int.rlservers.com"
            - name: SIGNUPS_ALLOWED
              value: "false"
            - name: INVITATIONS_ALLOWED
              value: "true"
            - name: WEBSOCKET_ENABLED
              value: "true"
            - name: ROCKET_PORT
              value: "80"
          envFrom:
            - secretRef:
                name: vaultwarden-secret
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
---
# Service — expose Vaultwarden internally
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  selector:
    app: vaultwarden
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# IngressRoute — VPN-only with Authentik forward-auth (excludes /admin path which is ADMIN_TOKEN-protected)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vaultwarden-int
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vaultwarden.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
        - name: forward-auth
          namespace: traefik
      services:
        - name: vaultwarden
          namespace: vaultwarden
          port: 80
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow ingress from Traefik only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vaultwarden-netpol
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: vaultwarden
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 80
  egress:
    - {}
---
# LimitRange — default resource constraints for namespace
# Prevents pods without explicit resources from starving the node
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: vaultwarden
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: 4000m
        memory: 4Gi
