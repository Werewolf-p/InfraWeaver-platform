              port: 80
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: vaultwarden-data-0
              mountPath: "/data"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
      - name: vaultwarden-data-0
        persistentVolumeClaim:
          claimName: vaultwarden-data-0
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    app.kubernetes.io/name: vaultwarden
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: vaultwarden
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
    - port: 3012
      targetPort: 3012
      protocol: TCP
      name: websocket
  type: ClusterIP