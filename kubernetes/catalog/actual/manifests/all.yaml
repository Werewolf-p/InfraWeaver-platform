---
# Namespace for Actual Budget
apiVersion: v1
kind: Namespace
metadata:
  name: actual
  labels:
    app.kubernetes.io/name: actual
    infraweaver.io/type: catalog-app
---
# PersistentVolumeClaim — stores Actual Budget server data (user budgets)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-data
  namespace: actual
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
# Deployment — Actual Budget self-hosted personal finance
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual
  namespace: actual
  labels:
    app: actual
    infraweaver.io/auth: proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: actual
  template:
    metadata:
      labels:
        app: actual
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      enableServiceLinks: false
      containers:
        - name: actual
          image: actualbudget/actual-server:25.6.0
          ports:
            - containerPort: 5006
          env:
            - name: ACTUAL_DATA_DIR
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 20
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: actual-data
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: actual
  namespace: actual
spec:
  selector:
    app: actual
  ports:
    - port: 5006
      targetPort: 5006
---
# IngressRoute — VPN-only + Authentik forward-auth
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: actual-int
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`actual.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
        - name: forward-auth
          namespace: traefik
      services:
        - name: actual
          namespace: actual
          port: 5006
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow Traefik ingress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-actual
  namespace: actual
spec:
  podSelector:
    matchLabels:
      app: actual
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 5006
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# LimitRange — default resource constraints for namespace
# Prevents pods without explicit resources from starving the node
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: actual
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: 4000m
        memory: 4Gi
