---
apiVersion: v1
kind: Namespace
metadata:
  name: registry
  labels:
    app.kubernetes.io/name: registry
    infraweaver.io/type: catalog-app
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
# ExternalSecret pulls htpasswd + credentials from OpenBao
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-auth
  namespace: registry
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: registry-auth
    creationPolicy: Owner
  data:
    - secretKey: htpasswd
      remoteRef:
        key: platform/registry
        property: htpasswd
    - secretKey: username
      remoteRef:
        key: platform/registry
        property: username
    - secretKey: password
      remoteRef:
        key: platform/registry
        property: password
---
# ConfigMap with Docker Distribution registry configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-config
  namespace: registry
data:
  config.yml: |
    version: 0.1
    log:
      level: warn
      formatter: json
    storage:
      filesystem:
        rootdirectory: /var/lib/registry
      delete:
        enabled: true
      cache:
        blobdescriptor: inmemory
      maintenance:
        uploadpurging:
          enabled: true
          age: 168h
          interval: 24h
          dryrun: false
    http:
      addr: :5000
      headers:
        X-Content-Type-Options: [nosniff]
        X-Frame-Options: [DENY]
      debug:
        addr: :5001
        prometheus:
          enabled: true
          path: /metrics
    auth:
      htpasswd:
        realm: "InfraWeaver Registry"
        path: /auth/htpasswd
    health:
      storagedriver:
        enabled: true
        interval: 10s
        threshold: 3
---
# PersistentVolumeClaim — Longhorn
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
  labels:
    app: registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
---
# Deployment — Docker Distribution v2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
    infraweaver.io/type: catalog-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  strategy:
    type: Recreate   # PVC is RWO; only one pod can mount at a time
  template:
    metadata:
      labels:
        app: registry
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5001"
        prometheus.io/path: "/metrics"
    spec:
      priorityClassName: platform-standard
      # Keep registry away from onedev to avoid both going down on same node disruption
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 80
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: onedev
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Create /auth dir and write htpasswd from secret at startup
        - name: init-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /auth
              echo "$HTPASSWD" > /auth/htpasswd
              chmod 600 /auth/htpasswd
              echo "htpasswd written for user: $USERNAME"
          env:
            - name: HTPASSWD
              valueFrom:
                secretKeyRef:
                  name: registry-auth
                  key: htpasswd
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: registry-auth
                  key: username
          volumeMounts:
            - name: auth
              mountPath: /auth
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: registry
          image: registry:2.8.3
          ports:
            - name: http
              containerPort: 5000
            - name: metrics
              containerPort: 5001
          env:
            - name: REGISTRY_HTTP_SECRET
              valueFrom:
                secretKeyRef:
                  name: registry-auth
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
            - name: config
              mountPath: /etc/docker/registry/config.yml
              subPath: config.yml
            - name: auth
              mountPath: /auth
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
        - name: config
          configMap:
            name: registry-config
        - name: auth
          emptyDir: {}
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  selector:
    app: registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
    - name: metrics
      port: 5001
      targetPort: 5001
---
# IngressRoute — VPN-only via Traefik (internal entrypoint)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: registry
  namespace: registry
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`registry.int.${BASE_DOMAIN}`)
      kind: Rule
      services:
        - name: registry
          port: 5000
  tls:
    certResolver: letsencrypt
---
# NetworkPolicy — only allow traffic from within cluster + ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry
  namespace: registry
spec:
  podSelector:
    matchLabels:
      app: registry
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}   # allow from all namespaces (pull from CI jobs)
      ports:
        - port: 5000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 5001               # Prometheus scrape
  egress:
    - {}   # Allow all egress (DNS, storage)
