---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoogle-search
  namespace: whoogle
  labels:
    app.kubernetes.io/name: whoogle-search
    infraweaver.io/source: community-apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whoogle.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: whoogle-search
          port: 5000
  tls:
    secretName: int-rlservers-com-tls
