---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: plex
  labels:
    app.kubernetes.io/name: plex
    infraweaver.io/type: catalog-app
---
# StorageClass — SMB CSI driver pointing to ardaty's isolated folder on Synology
# csi-driver-smb must be installed: helm install csi-driver-smb csi-driver-smb/csi-driver-smb
# Credentials secret `synology-smb-credentials` must exist in plex namespace (created via CI/sealed-secret)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: smb-ardaty
provisioner: smb.csi.k8s.io
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: false
parameters:
  # Top-level Mediaserver share — subdir restricts to ONLY ardaty's folder
  source: "//10.25.0.21/Mediaserver"
  subDir: "ardaty"
  csi.storage.k8s.io/provisioner-secret-name: synology-smb-credentials
  csi.storage.k8s.io/provisioner-secret-namespace: plex
  csi.storage.k8s.io/node-stage-secret-name: synology-smb-credentials
  csi.storage.k8s.io/node-stage-secret-namespace: plex
---
# PersistentVolumeClaim — SMB mount to ardaty's NAS folder
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-media
  namespace: plex
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: smb-ardaty
  resources:
    requests:
      storage: 500Gi
---
# PersistentVolumeClaim — Plex config/metadata on Longhorn (fast, local)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-retain
  resources:
    requests:
      storage: 20Gi
---
# Deployment — Plex Media Server
# PUID/PGID must match the ardaty user UID/GID on Synology
# After creating ardaty on Synology, check their UID in DSM → User & Group → ardaty → info
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
  labels:
    app: plex
    infraweaver.io/auth: proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      terminationGracePeriodSeconds: 30
      priorityClassName: platform-standard
      securityContext:
        fsGroup: 1000
        runAsNonRoot: false
      containers:
        - name: plex
          # linuxserver/plex handles PUID/PGID remapping — use ardaty's Synology UID
          image: lscr.io/linuxserver/plex:1.43.1.10611-1e34174b1-ls304
          ports:
            - containerPort: 32400
              name: plex
          env:
            - name: PUID
              value: "1026"       # Update to ardaty's actual UID on Synology
            - name: PGID
              value: "100"        # Update to ardaty's actual GID on Synology
            - name: TZ
              value: "Europe/Amsterdam"
            - name: VERSION
              value: "docker"
            # PLEX_CLAIM: get a one-time token from https://plex.tv/claim
            # Set this on first run only; remove after Plex is claimed
            - name: PLEX_CLAIM
              valueFrom:
                secretKeyRef:
                  name: plex-claim
                  key: token
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
              # Plex sees /media — which is ONLY ardaty's NAS folder
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 6Gi
          readinessProbe:
            httpGet:
              path: /identity
              port: 32400
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /identity
              port: 32400
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: true
            runAsNonRoot: false
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config
        - name: media
          persistentVolumeClaim:
            claimName: plex-media
---
# Service — expose Plex internally
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: plex
spec:
  selector:
    app: plex
  ports:
    - name: plex
      port: 32400
      targetPort: 32400
---
# ExternalName Service in traefik namespace for cross-namespace IngressRoute
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: traefik
spec:
  type: ExternalName
  externalName: plex.plex.svc.cluster.local
  ports:
    - port: 32400
---
# IngressRoute — internal only (NetBird VPN required) + Authentik forward-auth
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: plex-int
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`plex.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
        - name: forward-auth
          namespace: traefik
      services:
        - name: plex
          namespace: traefik
          port: 32400
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow Traefik ingress + Plex egress for metadata/updates
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: plex-netpol
  namespace: plex
spec:
  podSelector:
    matchLabels:
      app: plex
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 32400
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Plex.tv metadata, updates, account verification
    - ports:
        - port: 443
    # NAS SMB access (Synology at 10.25.0.21, port 445)
    - to:
        - ipBlock:
            cidr: 10.25.0.21/32
      ports:
        - port: 445
          protocol: TCP
        - port: 137
          protocol: UDP
        - port: 138
          protocol: UDP
        - port: 139
          protocol: TCP
