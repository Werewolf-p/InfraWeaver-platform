---
# Generated by InfraWeaver Community Apps from Unraid AppFeed
# Source: https://raw.githubusercontent.com/linuxserver/templates/main/unraid/plex.xml
# Category: MediaServer-Video, MediaServer-Music, MediaServer-Photos
# Stars: 2142 | Downloads: 891945189
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
  labels:
    app.kubernetes.io/name: plex
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: plex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plex
    spec:
      hostNetwork: true
      securityContext:
        fsGroup: 1000
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex
          env:
            - name: VERSION
              value: "docker"
            - name: PLEX_CLAIM
              value: ""
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "022"
            - name: TZ
              value: "UTC"
          # No ports defined

          volumeMounts:
            - name: plex-data-0
              mountPath: "/config"
            - name: tmp-tv
              mountPath: "/tv"
            - name: tmp-movies
              mountPath: "/movies"
          resources:
            requests:
              memory: "512Mi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
      volumes:
      - name: plex-data-0
        persistentVolumeClaim:
          claimName: plex-data-0
      - name: tmp-tv
        emptyDir:
      - name: tmp-movies
        emptyDir:
---
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: plex
  labels:
    app.kubernetes.io/name: plex
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: plex
  ports:
  - port: 32400
    targetPort: 32400
    protocol: TCP
    name: http
  type: ClusterIP