# Role: full CRUD on game-hub namespace resources for game server management
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-console-game-hub
  namespace: game-hub
  labels:
    app: infraweaver-console
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims", "configmaps", "events", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets: token storage for game servers (gameserver-<name>-tokens)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # HPA: auto-scaling game servers (set-hpa / remove-hpa actions)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CronJobs: restart / backup / scheduled-start / scheduled-stop schedules
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-console-game-hub
  namespace: game-hub
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-console-game-hub
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
