---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: game-hub-quota
  namespace: game-hub
spec:
  hard:
    requests.memory: "24Gi"
    requests.cpu: "16"
    limits.memory: "48Gi"
    limits.cpu: "32"
    count/pods: "20"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: game-hub-limits
  namespace: game-hub
spec:
  limits:
    - type: Container
      defaultRequest:
        memory: "1Gi"
        cpu: "500m"
      default:
        memory: "4Gi"
        cpu: "2"
      max:
        memory: "16Gi"
        cpu: "8"
      min:
        memory: "256Mi"
        cpu: "100m"
