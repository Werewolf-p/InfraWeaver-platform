---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-server-data
  namespace: game-hub
  labels:
    app: minecraft-server
    infraweaver/game: 'true'
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  volumeMode: Filesystem
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gameserver-minecraft-server-egg
  namespace: game-hub
  labels:
    app: minecraft-server
    infraweaver/game: 'true'
    infraweaver/type: game-egg
data:
  saved-commands.json: |-
    [
      {
        "id": "4c7c4c65-af67-4905-bba5-851062cfaa3e",
        "label": "test",
        "cmd": "test"
      }
    ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server
  namespace: game-hub
  labels:
    app: minecraft-server
    infraweaver/game: 'true'
    infraweaver/game-type: minecraft
  annotations: {}
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: minecraft-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: minecraft-server
        infraweaver/game: 'true'
      annotations:
        infraweaver.io/rebalance-memory: "true"
    spec:
      priorityClassName: game-server
      # Prefer the node platform services bias away from so game workloads stop contending with ArgoCD/Auth.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - talos-prod-cp2
      # Spread game servers so no two land on the same node (prevents memory overload on single node)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          minDomains: 3
          labelSelector:
            matchLabels:
              infraweaver/game: "true"
      containers:
        - env:
            - name: EULA
              value: 'TRUE'
            - name: TYPE
              value: PAPER
            - name: VERSION
              value: LATEST
            - name: MEMORY
              value: 2048M
            - name: MAX_PLAYERS
              value: '20'
            - name: SERVER_NAME
              value: InfraWeaver Minecraft
            - name: MOTD
              value: A Minecraft Server - InfraWeaver
          image: itzg/minecraft-server:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          name: minecraft
          ports:
            - containerPort: 25565
              name: game
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            limits:
              cpu: '2'
              memory: 2560Mi
            requests:
              cpu: '500m'
              memory: 1600Mi  # actual usage ~1574Mi; request below limit allows placement on CP2
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data
              name: data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      terminationGracePeriodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-server-data
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-server
  namespace: game-hub
  labels:
    app: minecraft-server
    infraweaver/game: 'true'
  annotations: {}
spec:
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ports:
    - name: game
      nodePort: 31261
      port: 25565
      protocol: TCP
      targetPort: 25565
  selector:
    app: minecraft-server
  sessionAffinity: None
  type: NodePort
