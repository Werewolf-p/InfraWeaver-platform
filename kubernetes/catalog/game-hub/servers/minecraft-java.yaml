---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-server-data
  namespace: game-hub
  labels:
    app: minecraft-server
    infraweaver/game: "true"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server
  namespace: game-hub
  labels:
    app: minecraft-server
    infraweaver/game: "true"
    infraweaver/game-type: minecraft
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minecraft-server
  template:
    metadata:
      labels:
        app: minecraft-server
        infraweaver/game: "true"
    spec:
      priorityClassName: game-server
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: minecraft
          image: itzg/minecraft-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 25565
              protocol: TCP
              name: game
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: PAPER
            - name: VERSION
              value: LATEST
            - name: MEMORY
              value: 2048M
            - name: MAX_PLAYERS
              value: "20"
            - name: SERVER_NAME
              value: "InfraWeaver Minecraft"
            - name: MOTD
              value: "A Minecraft Server - InfraWeaver"
          resources:
            requests:
              memory: 2.5Gi
              cpu: "2"
            limits:
              memory: 2.5Gi
              cpu: "2"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -P 1 > /dev/null 2>&1"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -P 1 > /dev/null 2>&1"]
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-server-data
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-server
  namespace: game-hub
  labels:
    app: minecraft-server
    infraweaver/game: "true"
spec:
  type: NodePort
  selector:
    app: minecraft-server
  ports:
    - port: 25565
      targetPort: 25565
      protocol: TCP
      name: game
