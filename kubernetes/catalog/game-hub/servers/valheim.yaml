---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valheim-server-config
  namespace: game-hub
  labels:
    app: valheim-server
    infraweaver/game: "true"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-game
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valheim-server
  namespace: game-hub
  labels:
    app: valheim-server
    infraweaver/game: "true"
    infraweaver/game-type: valheim
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: valheim-server
  template:
    metadata:
      labels:
        app: valheim-server
        infraweaver/game: "true"
    spec:
      priorityClassName: game-server
      # Spread game servers across nodes so one node failure doesn't take down all games
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              infraweaver/game: "true"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: valheim
          image: lloesche/valheim-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2456
              protocol: UDP
              name: game
            - containerPort: 2457
              protocol: UDP
              name: query
            - containerPort: 2458
              protocol: TCP
              name: rcon
          env:
            - name: SERVER_NAME
              value: "InfraWeaver Valheim"
            - name: WORLD_NAME
              value: "MyWorld"
            - name: SERVER_PASS
              value: "changeme123"
            - name: SERVER_PUBLIC
              value: "false"
            - name: BACKUPS
              value: "false"
            - name: UPDATE_CRON
              value: ""
          resources:
            requests:
              memory: 4Gi
              cpu: "2"
            limits:
              memory: 4Gi
              cpu: "2"
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -P 1 > /dev/null 2>&1"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -P 1 > /dev/null 2>&1"]
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config
              mountPath: /opt/valheim
              subPath: valheim-data
      terminationGracePeriodSeconds: 60
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: valheim-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: valheim-server
  namespace: game-hub
  labels:
    app: valheim-server
    infraweaver/game: "true"
spec:
  type: NodePort
  selector:
    app: valheim-server
  ports:
    - port: 2456
      targetPort: 2456
      protocol: UDP
      name: game
    - port: 2457
      targetPort: 2457
      protocol: UDP
      name: query
    - port: 2458
      targetPort: 2458
      protocol: TCP
      name: rcon
