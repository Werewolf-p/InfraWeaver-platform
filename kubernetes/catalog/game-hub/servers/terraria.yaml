---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: terraria-server-data
  namespace: game-hub
  labels:
    app: terraria-server
    infraweaver/game: "true"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraria-server
  namespace: game-hub
  labels:
    app: terraria-server
    infraweaver/game: "true"
    infraweaver/game-type: terraria
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terraria-server
  template:
    metadata:
      labels:
        app: terraria-server
        infraweaver/game: "true"
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: terraria
          # vanilla server accepts -world/-autocreate non-interactively
          image: ryshe/terraria:vanilla-latest
          args:
            - "-world"
            - "/world/World1.wld"
            - "-autocreate"
            - "2"
            - "-worldname"
            - "World1"
            - "-port"
            - "7777"
            - "-maxplayers"
            - "20"
          ports:
            - containerPort: 7777
              protocol: TCP
              name: game
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1500Mi
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /world
          livenessProbe:
            tcpSocket:
              port: 7777
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 7777
            initialDelaySeconds: 90
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: terraria-server-data
---
apiVersion: v1
kind: Service
metadata:
  name: terraria-server
  namespace: game-hub
  labels:
    app: terraria-server
    infraweaver/game: "true"
spec:
  type: NodePort
  selector:
    app: terraria-server
  ports:
    - port: 7777
      targetPort: 7777
      protocol: TCP
      name: game
      nodePort: 31515
