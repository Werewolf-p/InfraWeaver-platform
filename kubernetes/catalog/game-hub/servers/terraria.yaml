---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: terraria-server-data
  namespace: game-hub
  labels:
    app: terraria-server
    infraweaver/game: "true"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-game
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraria-server
  namespace: game-hub
  labels:
    app: terraria-server
    infraweaver/game: "true"
    infraweaver/game-type: terraria
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: terraria-server
  template:
    metadata:
      labels:
        app: terraria-server
        infraweaver/game: "true"
    spec:
      priorityClassName: game-server
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              infraweaver/game: "true"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: terraria
          # vanilla server accepts -world/-autocreate non-interactively
          image: ryshe/terraria:vanilla-latest
          imagePullPolicy: IfNotPresent
          args:
            - "-world"
            - "/world/World1.wld"
            - "-autocreate"
            - "2"
            - "-worldname"
            - "World1"
            - "-port"
            - "7777"
            - "-maxplayers"
            - "20"
          ports:
            - containerPort: 7777
              protocol: TCP
              name: game
          resources:
            requests:
              memory: 1500Mi
              cpu: "1"
            limits:
              memory: 1500Mi
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /world
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -P 1 > /dev/null 2>&1"]
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -P 1 > /dev/null 2>&1"]
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: terraria-server-data
---
apiVersion: v1
kind: Service
metadata:
  name: terraria-server
  namespace: game-hub
  labels:
    app: terraria-server
    infraweaver/game: "true"
spec:
  type: NodePort
  selector:
    app: terraria-server
  ports:
    - port: 7777
      targetPort: 7777
      protocol: TCP
      name: game
      nodePort: 31515
