                - name: ACTION_ENABLED
                  valueFrom:
                    configMapKeyRef:
                      name: game-hub-scale-schedule-config
                      key: scaleUpEnabled
                - name: TARGET_REPLICAS
                  valueFrom:
                    configMapKeyRef:
                      name: game-hub-scale-schedule-config
                      key: scaleUpReplicas
              resources:
                requests:
                  cpu: 25m
