                limits:
                  cpu: 100m
                  memory: 96Mi
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail

                  if [ "${ACTION_ENABLED:-false}" != "true" ]; then
                    echo "${ACTION} is disabled; exiting"
                    exit 0
                  fi

                  scale_targets() {
                    local kind="$1"
                    local replicas="$2"
                    local targets="$3"

                    for target in $targets; do
                      [ -n "$target" ] || continue
                      echo "Scaling ${kind}/${target} to ${replicas}"
                      kubectl scale "${kind}/${target}" -n game-hub --replicas="${replicas}"
                    done
                  }

                  scale_targets deployment "${TARGET_REPLICAS}" "${TARGET_DEPLOYMENTS:-}"
                  scale_targets statefulset "${TARGET_REPLICAS}" "${TARGET_STATEFULSETS:-}"

                  echo "${ACTION} complete"
