---
# Generated by InfraWeaver Community Apps from Unraid AppFeed
# Source: https://raw.githubusercontent.com/linuxserver/templates/main/unraid/pairdrop.xml
# Category: Tools-Utilities, Network-Web
# Stars: 30 | Downloads: 570149
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pairdrop
  namespace: pairdrop
  labels:
    app.kubernetes.io/name: pairdrop
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pairdrop
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pairdrop
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: pairdrop
          image: lscr.io/linuxserver/pairdrop
          env:
            - name: RATE_LIMIT
              value: "false"
            - name: WS_FALLBACK
              value: "false"
            - name: RTC_CONFIG
              value: ""
            - name: DEBUG_MODE
              value: "false"
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "022"
            - name: TZ
              value: "UTC"
          ports:
            - containerPort: 3000
              protocol: TCP
              name: webui
          startupProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 30
            failureThreshold: 3
          # No volume mounts defined
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      # No volumes defined
---
apiVersion: v1
kind: Service
metadata:
  name: pairdrop
  namespace: pairdrop
  labels:
    app.kubernetes.io/name: pairdrop
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: pairdrop
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: webui
  type: ClusterIP