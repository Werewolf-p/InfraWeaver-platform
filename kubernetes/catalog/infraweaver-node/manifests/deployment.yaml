apiVersion: apps/v1
kind: Deployment
metadata:
  name: infraweaver-node
  namespace: infraweaver-system
  labels:
    app: infraweaver-node
    app.kubernetes.io/name: infraweaver-node
    app.kubernetes.io/component: agent
spec:
  replicas: 0
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 300
  minReadySeconds: 10
  selector:
    matchLabels:
      app: infraweaver-node
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: infraweaver-node
    spec:
      serviceAccountName: infraweaver-node
      imagePullSecrets:
        - name: onedev-pull-secret
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: infraweaver-node
          image: onedev.rlservers.com/infraweaver-platform/infraweaver-node:main-9713f5a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: health
          env:
            - name: APP_VERSION
              value: "main-b42d758"
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
            - name: HUB_URL
              value: wss://api.int.rlservers.com
            - name: REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infraweaver-node-registration
                  key: REGISTRATION_TOKEN
                  optional: true
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ARGOCD_SERVER
              value: http://argocd-server.argocd.svc.cluster.local
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infraweaver-node-registration
                  key: ARGOCD_TOKEN
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
