# This Secret is created with the registration token by the Hub during cluster registration.
# Apply this manifest to the target cluster to register it.
# Example: kubectl apply -f <generated-manifest>
apiVersion: v1
kind: Secret
metadata:
  name: infraweaver-node-registration
  namespace: infraweaver-system
type: Opaque
stringData:
  REGISTRATION_TOKEN: ""  # Filled in by Hub when generating registration manifest
