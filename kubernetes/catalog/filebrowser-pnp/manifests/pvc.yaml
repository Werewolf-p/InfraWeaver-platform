---
# PVC for "Path of Directory to Access" → /srv
# Default path on Unraid: /mnt/user
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-pnp-data-0
  namespace: filebrowser-pnp
  labels:
    app.kubernetes.io/name: filebrowser-pnp
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/mnt/user"
    infraweaver.io/required: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
# PVC for "Path to Config" → /config
# Default path on Unraid: /mnt/user/appdata/FileBrowser-PNP
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-pnp-data-1
  namespace: filebrowser-pnp
  labels:
    app.kubernetes.io/name: filebrowser-pnp
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/mnt/user/appdata/FileBrowser-PNP"
    infraweaver.io/required: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
# PVC for "Path to Database File" → /data (adjusted from file path "/database.db")
# Default path on Unraid: /mnt/user/appdata/FileBrowser-PNP/filebrowser.db
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-pnp-data-2
  namespace: filebrowser-pnp
  labels:
    app.kubernetes.io/name: filebrowser-pnp
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/mnt/user/appdata/FileBrowser-PNP/filebrowser.db"
    infraweaver.io/required: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi