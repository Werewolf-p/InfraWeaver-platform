---
# PVC for "AppData" → /app/data
# Default path on Unraid: /mnt/user/appdata/uptimekuma
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptimekuma-data-0
  namespace: uptimekuma
  labels:
    app.kubernetes.io/name: uptimekuma
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/mnt/user/appdata/uptimekuma"
    infraweaver.io/required: "false"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi