# catalog.yaml — outline
# Defined but not enabled by default. Add 'outline' to catalog.enabled in platform.yaml to deploy.
# Access: outline.int.rlservers.com (VPN-only, VPN gate only — auth via native OIDC)
# SSO: Native OIDC with Authentik (forward-auth NOT used; Outline handles auth natively)
# Note: Seed secret/platform/outline in OpenBao before enabling (secret-key, utils-secret, db-password, oidc-client-secret).

name: outline
description: "Outline — team knowledge base and wiki with real-time collaboration and OIDC SSO"
namespace: outline

ingressroute:
  host: outline.int.rlservers.com
  entrypoint: websecure
