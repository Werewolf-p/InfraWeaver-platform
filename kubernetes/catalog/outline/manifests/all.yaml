---
# Namespace for Outline
# SSO: Native OIDC with Authentik — forward-auth NOT used for this app
# Note: Seed secret/platform/outline in OpenBao before enabling.
apiVersion: v1
kind: Namespace
metadata:
  name: outline
  labels:
    app.kubernetes.io/name: outline
    infraweaver.io/type: catalog-app
---
# ExternalSecret — Outline secrets from OpenBao (secret-key, utils-secret, db-password, oidc-client-secret)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-secret
  namespace: outline
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: outline-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: secret/platform/outline
        property: secret-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: UTILS_SECRET
      remoteRef:
        key: secret/platform/outline
        property: utils-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/platform/outline
        property: database-url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: dbpassword
      remoteRef:
        key: secret/platform/outline
        property: db-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/platform/outline
        property: db-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: secret/platform/outline
        property: oidc-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# PersistentVolumeClaim — stores Outline PostgreSQL database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: outline-postgres-data
  namespace: outline
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
# PersistentVolumeClaim — stores Outline local file uploads and attachments
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: outline-data
  namespace: outline
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# Deployment — Outline team knowledge base
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline
  namespace: outline
  labels:
    app: outline
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: outline
  template:
    metadata:
      labels:
        app: outline
    spec:
      terminationGracePeriodSeconds: 30
      priorityClassName: platform-standard
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'until nc -z outline-postgres 5432; do echo "waiting for postgres..."; sleep 3; done']
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: outline
          image: outlinewiki/outline:0.83.0
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_URL
              value: "redis://outline-redis:6379"
            - name: URL
              value: "https://outline.int.rlservers.com"
            - name: PORT
              value: "3000"
            - name: FILE_STORAGE
              value: "local"
            - name: FILE_STORAGE_LOCAL_ROOT_DIR
              value: "/var/lib/outline/data"
            - name: OIDC_CLIENT_ID
              value: "outline"
            - name: OIDC_AUTH_URI
              value: "https://auth.rlservers.com/application/o/authorize/"
            - name: OIDC_TOKEN_URI
              value: "https://auth.rlservers.com/application/o/token/"
            - name: OIDC_USERINFO_URI
              value: "https://auth.rlservers.com/application/o/userinfo/"
            - name: OIDC_USERNAME_CLAIM
              value: "email"
            - name: OIDC_DISPLAY_NAME
              value: "Authentik"
            - name: OIDC_SCOPES
              value: "openid profile email"
          envFrom:
            - secretRef:
                name: outline-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/outline/data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /_health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /_health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: outline-data
---
# Deployment — Outline PostgreSQL database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline-postgres
  namespace: outline
  labels:
    app: outline-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: outline-postgres
  template:
    metadata:
      labels:
        app: outline-postgres
    spec:
      terminationGracePeriodSeconds: 30
      priorityClassName: platform-standard
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: docker.io/library/postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "outline"
            - name: POSTGRES_DB
              value: "outline"
            # PGDATA subdir avoids Longhorn lost+found directory conflicts
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          envFrom:
            - secretRef:
                name: outline-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: outline-postgres-data
---
# Deployment — Outline Redis cache
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline-redis
  namespace: outline
  labels:
    app: outline-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: outline-redis
  template:
    metadata:
      labels:
        app: outline-redis
    spec:
      terminationGracePeriodSeconds: 30
      priorityClassName: platform-standard
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: docker.io/redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
---
# Service — expose Outline internally
apiVersion: v1
kind: Service
metadata:
  name: outline
  namespace: outline
spec:
  selector:
    app: outline
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
# Service — expose Outline PostgreSQL internally
apiVersion: v1
kind: Service
metadata:
  name: outline-postgres
  namespace: outline
spec:
  selector:
    app: outline-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Service — expose Outline Redis internally
apiVersion: v1
kind: Service
metadata:
  name: outline-redis
  namespace: outline
spec:
  selector:
    app: outline-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
# IngressRoute — VPN-only; no forward-auth (Outline handles auth natively via OIDC)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: outline-int
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`outline.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: outline
          namespace: outline
          port: 3000
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — outline: allow Traefik ingress; egress to postgres, redis, DNS, HTTPS (OIDC)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outline-netpol
  namespace: outline
spec:
  podSelector:
    matchLabels:
      app: outline
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 3000
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
    # Allow egress to outline-postgres
    - to:
        - podSelector:
            matchLabels:
              app: outline-postgres
      ports:
        - port: 5432
    # Allow egress to outline-redis
    - to:
        - podSelector:
            matchLabels:
              app: outline-redis
      ports:
        - port: 6379
---
# NetworkPolicy — outline-postgres: allow ingress from outline only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outline-postgres-netpol
  namespace: outline
spec:
  podSelector:
    matchLabels:
      app: outline-postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: outline
      ports:
        - port: 5432
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# NetworkPolicy — outline-redis: allow ingress from outline only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outline-redis-netpol
  namespace: outline
spec:
  podSelector:
    matchLabels:
      app: outline-redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: outline
      ports:
        - port: 6379
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
