---
# NetworkPolicies for OneDev
# Default-deny ingress, then allow Traefik for the public HTTPS route and
# allow same-namespace traffic so the bootstrap Job can reach the service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: onedev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-http
  namespace: onedev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: onedev
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 6610
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: onedev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# Allow infraweaver-api to push IaC version updates to OneDev git
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-infraweaver-api
  namespace: onedev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: onedev
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infraweaver-console
          podSelector:
            matchLabels:
              app: infraweaver-api
      ports:
        - port: 6610
          protocol: TCP
