---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: onedev
  labels:
    app.kubernetes.io/name: onedev
    infraweaver.io/type: catalog-app
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
# ExternalSecret — OneDev initial admin credentials from OpenBao
# Only used to pre-seed the admin password via environment variable on first boot.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onedev-admin-secret
  namespace: onedev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: onedev-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-login
      remoteRef:
        key: secret/platform/onedev
        property: admin-login
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/onedev
        property: admin-password
    - secretKey: admin-email
      remoteRef:
        key: secret/platform/onedev
        property: admin-email
    - secretKey: oidc-client-id
      remoteRef:
        key: secret/platform/onedev
        property: oidc-client-id
    - secretKey: oidc-client-secret
      remoteRef:
        key: secret/platform/onedev
        property: oidc-client-secret
---
# PersistentVolumeClaim — OneDev data (repos, DB, CI artifacts, attachments)
# Uses longhorn-retain so data survives app removal and can be restored from backup.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onedev-data
  namespace: onedev
  annotations:
    # Include in nightly TrueNAS NFS backup via RecurringJob truenas-backup-daily.
    # On fresh redeploy, scripts/restore-from-truenas.sh uses this backup to restore
    # the volume before OneDev starts — preserving all repos, CI config, and issues.
    recurring-job-group.longhorn.io/truenas-backup: "enabled"
spec:
  storageClassName: longhorn-retain
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# Deployment — OneDev server (single container, embedded H2 + built-in CI agent)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onedev
  namespace: onedev
  labels:
    app.kubernetes.io/name: onedev
    app.kubernetes.io/component: server
spec:
  replicas: 1
  # OneDev uses file-based storage — only one replica is safe
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: onedev
  template:
    metadata:
      annotations:
        infraweaver.io/rebalance-memory: "true"
      labels:
        app.kubernetes.io/name: onedev
        app.kubernetes.io/component: server
    spec:
      automountServiceAccountToken: false
      # Keep onedev away from registry — if they're on the same node and that node
      # has a Flannel disruption, both go down simultaneously causing image pull failures
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 80
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: registry
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: false  # OneDev requires root for Docker-in-Docker CI agents
      containers:
        - name: onedev
          image: 1dev/server:15.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6610
              protocol: TCP
            - name: ssh
              containerPort: 6611
              protocol: TCP
          env:
            - name: ONEDEV_URL
              value: "https://onedev.infraweaver.local"
            # Pre-seed admin account on first boot (only applies when data dir is empty)
            - name: INITIAL_ADMIN_LOGIN
              valueFrom:
                secretKeyRef:
                  name: onedev-admin-secret
                  key: admin-login
                  optional: true
            - name: INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onedev-admin-secret
                  key: admin-password
                  optional: true
            - name: INITIAL_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: onedev-admin-secret
                  key: admin-email
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /opt/onedev
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1200Mi  # Reduced from 2Gi; actual usage ~644Mi, leaving headroom for CI
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: onedev-data
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: onedev
  namespace: onedev
  labels:
    app.kubernetes.io/name: onedev
spec:
  selector:
    app.kubernetes.io/name: onedev
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: ssh
      port: 22
      targetPort: ssh
      protocol: TCP
---
# IngressRoute — public via Traefik (onedev.infraweaver.local)
# Native Authentik OIDC is configured in-app, so only security headers are added here.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: onedev
  namespace: onedev
  labels:
    app.kubernetes.io/name: onedev
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`onedev.infraweaver.local`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
      services:
        - name: onedev
          port: 80
  tls:
    secretName: platform-wildcard-tls  # wildcard *.infraweaver.local cert
