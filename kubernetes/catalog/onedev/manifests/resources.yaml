---
# Internal PostgreSQL credentials — not externally accessible, cluster-internal only
apiVersion: v1
kind: Secret
metadata:
  name: onedev-db-secret
  namespace: onedev
type: Opaque
stringData:
  username: "onedev"
  password: "onedev-internal-db"
  database: "onedev"
---
# PostgreSQL StatefulSet for Onedev — Onedev 11+ dropped embedded H2
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: onedev-postgres
  namespace: onedev
  labels:
    app: onedev-postgres
spec:
  selector:
    matchLabels:
      app: onedev-postgres
  serviceName: onedev-postgres-headless
  replicas: 1
  template:
    metadata:
      labels:
        app: onedev-postgres
    spec:
      priorityClassName: platform-high
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
      containers:
        - name: postgres
          image: postgres:14
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: onedev-db-secret
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: onedev-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onedev-db-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "onedev", "-d", "onedev"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        volumeMode: Filesystem
        resources:
          requests:
            storage: 10Gi
---
# Headless Service required by StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: onedev-postgres-headless
  namespace: onedev
spec:
  clusterIP: None
  selector:
    app: onedev-postgres
  ports:
    - port: 5432
      targetPort: postgres
---
# ClusterIP Service for Onedev → Postgres connection
apiVersion: v1
kind: Service
metadata:
  name: onedev-postgres
  namespace: onedev
spec:
  selector:
    app: onedev-postgres
  ports:
    - port: 5432
      targetPort: postgres
---
# ExternalSecret — OneDev initial admin credentials from OpenBao
# Only used to pre-seed the admin password via environment variable on first boot.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onedev-admin-secret
  namespace: onedev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: onedev-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-login
      remoteRef:
        key: secret/platform/onedev
        property: admin-login
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/onedev
        property: admin-password
    - secretKey: admin-email
      remoteRef:
        key: secret/platform/onedev
        property: admin-email
    - secretKey: oidc-client-id
      remoteRef:
        key: secret/platform/onedev
        property: oidc-client-id
    - secretKey: oidc-client-secret
      remoteRef:
        key: secret/platform/onedev
        property: oidc-client-secret
---
# PersistentVolumeClaim — OneDev data (repos, CI artifacts, attachments)
# Uses local-path for reliability; Onedev state is backed by PostgreSQL.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onedev-data
  namespace: onedev
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# Deployment — OneDev server (PostgreSQL external DB + built-in CI agent)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onedev
  namespace: onedev
  labels:
    app.kubernetes.io/name: onedev
    app.kubernetes.io/component: server
spec:
  replicas: 1
  # OneDev uses file-based storage — only one replica is safe
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: onedev
  template:
    metadata:
      annotations:
        infraweaver.io/rebalance-memory: "true"
      labels:
        app.kubernetes.io/name: onedev
        app.kubernetes.io/component: server
    spec:
      priorityClassName: platform-high
      automountServiceAccountToken: false
      # Keep onedev away from registry — if they're on the same node and that node
      # has a Flannel disruption, both go down simultaneously causing image pull failures
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 80
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: registry
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: false  # OneDev requires root for Docker-in-Docker CI agents
      initContainers:
        # Patch boot classpath: copy PostgreSQL JDBC driver to /app/boot/ so the
        # Upgrade command handler can find it. The driver lives in /app/site/lib/
        # (plugin classloader path) but Upgrade runs with the boot classloader only.
        - name: patch-boot-classpath
          image: 1dev/server:15.0.8
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              set -e
              echo "Copying boot JARs to patched boot dir..."
              cp -a /app/boot/. /patched-boot/
              echo "Copying PostgreSQL JDBC driver to patched boot dir..."
              find /app/site/lib -name "postgresql*.jar" -exec cp {} /patched-boot/ \;
              echo "Patched boot dir contents (jdbc drivers):"
              ls /patched-boot/postgresql*.jar 2>/dev/null || echo "WARNING: no postgresql jar found"

              # Self-heal: if lib/ or boot/ in the data volume are empty/missing (can
              # happen after a corrupt-then-delete recovery from a node reboot), restore
              # them from the fresh container image so OneDev can start without manual
              # intervention. Uses the same JARs already in the image overlay layer.
              LIB_COUNT=$(find /opt/onedev/lib -name "*.jar" 2>/dev/null | wc -l)
              if [ "$LIB_COUNT" -lt 10 ]; then
                echo "WARNING: /opt/onedev/lib/ has only $LIB_COUNT JARs — restoring from image"
                mkdir -p /opt/onedev/lib /opt/onedev/boot
                cp -a /app/lib/. /opt/onedev/lib/
                cp -a /app/boot/. /opt/onedev/boot/
                echo "Restored $(find /opt/onedev/lib -name '*.jar' | wc -l) lib JARs and $(find /opt/onedev/boot -name '*.jar' | wc -l) boot JARs"
              else
                echo "lib/ OK: $LIB_COUNT JARs present"
              fi
              echo "Done."
          volumeMounts:
            - name: patched-boot
              mountPath: /patched-boot
            - name: data
              mountPath: /opt/onedev
        - name: wait-for-postgres
          image: postgres:14
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: false
          command:
            - sh
            - -c
            - |
              until pg_isready -h onedev-postgres -U onedev -d onedev; do
                echo "PostgreSQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: onedev-db-secret
                  key: password
      containers:
        - name: onedev
          image: 1dev/server:15.0.8
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 6610
              protocol: TCP
            - name: ssh
              containerPort: 6611
              protocol: TCP
          env:
            - name: ONEDEV_URL
              value: "https://onedev.rlservers.com"
            # cluster_ip must be set explicitly for Kubernetes (env var is exactly cluster_ip lowercase)
            - name: cluster_ip
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # PostgreSQL connection — driver patched into /app/boot/ by init container
            - name: hibernate_dialect
              value: "io.onedev.server.persistence.PostgreSQLDialect"
            - name: hibernate_connection_driver_class
              value: "org.postgresql.Driver"
            - name: hibernate_connection_url
              value: "jdbc:postgresql://onedev-postgres:5432/onedev"
            - name: hibernate_connection_username
              valueFrom:
                secretKeyRef:
                  name: onedev-db-secret
                  key: username
            - name: hibernate_connection_password
              valueFrom:
                secretKeyRef:
                  name: onedev-db-secret
                  key: password
            # Pre-seed admin account on first boot (only applies when data dir is empty)
            - name: INITIAL_ADMIN_LOGIN
              valueFrom:
                secretKeyRef:
                  name: onedev-admin-secret
                  key: admin-login
                  optional: true
            - name: INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onedev-admin-secret
                  key: admin-password
                  optional: true
            - name: INITIAL_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: onedev-admin-secret
                  key: admin-email
                  optional: true
          volumeMounts:
            - name: patched-boot
              mountPath: /app/boot
            - name: data
              mountPath: /opt/onedev
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1200Mi  # Reduced from 2Gi; actual usage ~644Mi, leaving headroom for CI
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: patched-boot
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: onedev-data
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: onedev
  namespace: onedev
  labels:
    app.kubernetes.io/name: onedev
spec:
  selector:
    app.kubernetes.io/name: onedev
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: ssh
      port: 22
      targetPort: ssh
      protocol: TCP
---
# IngressRoute — public via Traefik (onedev.rlservers.com)
# In traefik namespace (like all other IngressRoutes) to access platform-wildcard-tls secret.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: onedev
  namespace: traefik
  labels:
    app.kubernetes.io/name: onedev
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`onedev.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
      services:
        - name: onedev
          port: 80
          namespace: onedev
  tls:
    secretName: platform-wildcard-tls  # wildcard *.rlservers.com cert
---
# PodDisruptionBudget — protects OneDev during voluntary node drains.
# OneDev is single-replica (Recreate strategy) so we allow maxUnavailable: 0
# during drains — the operator must acknowledge this will briefly take OneDev offline.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: onedev
  namespace: onedev
  labels:
    app.kubernetes.io/name: onedev
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: onedev
---
# PodDisruptionBudget — protects OneDev Postgres during voluntary node drains.
# Local-path PVC is bound to cp1 — if cp1 is drained, Postgres cannot move.
# maxUnavailable: 0 blocks the drain until the operator resolves this manually.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: onedev-postgres
  namespace: onedev
  labels:
    app: onedev-postgres
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: onedev-postgres
