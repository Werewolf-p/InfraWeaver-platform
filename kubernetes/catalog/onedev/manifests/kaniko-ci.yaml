---
# InfraWeaver CI — kaniko image builder
# Runs every 5 minutes. Checks for new commits on OneDev; if the manifest image tag
# differs from the current HEAD, builds all 3 app images with kaniko and updates manifests.
# Each kaniko build runs in its own init container to guarantee a clean filesystem —
# kaniko modifies the root fs during builds, so sharing a container causes corruption.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infraweaver-ci
  namespace: onedev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-ci
  namespace: onedev
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "delete"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-ci
  namespace: onedev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-ci
subjects:
- kind: ServiceAccount
  name: infraweaver-ci
  namespace: onedev
---
apiVersion: v1
kind: Secret
metadata:
  name: onedev-registry-auth
  namespace: onedev
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "onedev.rlservers.com": {
          "username": "admin",
          "password": "ExkI2kJ2RRf7xoaEsuVErkXR",
          "auth": "YWRtaW46RXhrSTJrSjJSUmY3eG9hRXN1VkVya1hS"
        }
      }
    }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: infraweaver-ci
  namespace: onedev
  labels:
    app: infraweaver-ci
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: infraweaver-ci
          restartPolicy: OnFailure
          volumes:
          - name: workspace
            emptyDir: {}
          - name: registry-auth
            secret:
              secretName: onedev-registry-auth
          initContainers:
          # Step 1: Clone repo and check if build is needed
          - name: check-and-clone
            image: alpine/git:latest
            command: ["/bin/sh", "-c"]
            args:
            - |
              set -e
              REGISTRY="onedev.rlservers.com/infraweaver-platform"
              ONEDEV_URL="http://onedev.onedev.svc.cluster.local"

              echo "Cloning repo..."
              git clone "${ONEDEV_URL}/InfraWeaver-platform" /workspace/repo \
                --config credential.helper='!f() { echo "username=admin"; echo "password=ExkI2kJ2RRf7xoaEsuVErkXR"; }; f'

              cd /workspace/repo

              # Find last CODE commit SHA (exclude [skip ci] manifest updates)
              CODE_SHA=$(git log --format="%h %s" | grep -v "\[skip ci\]" | head -1 | awk '{print $1}')
              if [ -z "$CODE_SHA" ]; then
                CODE_SHA=$(git rev-parse --short HEAD)
              fi

              MANIFEST_TAG=$(grep -o "${REGISTRY}/infraweaver-console:[^ ]*" \
                kubernetes/catalog/infraweaver-console/manifests/deployment.yaml | cut -d: -f2)

              echo "Last code commit: main-${CODE_SHA} | Manifest: ${MANIFEST_TAG}"

              if [ "${MANIFEST_TAG}" = "main-${CODE_SHA}" ]; then
                echo "Already up to date. Skipping build."
                touch /workspace/skip
              else
                echo "main-${CODE_SHA}" > /workspace/build-tag
                echo "Build needed: ${MANIFEST_TAG} -> main-${CODE_SHA}"
              fi
            volumeMounts:
            - name: workspace
              mountPath: /workspace

          # Step 2a: Build infraweaver-api (isolated container — fresh filesystem)
          - name: build-api
            image: gcr.io/kaniko-project/executor:debug
            command: ["/busybox/sh", "-c"]
            args:
            - |
              [ -f /workspace/skip ] && echo "Skipping." && exit 0
              BUILD_TAG=$(cat /workspace/build-tag)
              REGISTRY="onedev.rlservers.com/infraweaver-platform"
              mkdir -p /kaniko/.docker
              cp /kaniko-auth/.dockerconfigjson /kaniko/.docker/config.json
              echo "--- Building infraweaver-api (${BUILD_TAG}) ---"
              /kaniko/executor \
                --context "dir:///workspace/repo/apps/infraweaver-api" \
                --destination "${REGISTRY}/infraweaver-api:${BUILD_TAG}" \
                --build-arg "APP_VERSION=${BUILD_TAG}" \
                --skip-tls-verify \
                --cache=false
            volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: registry-auth
              mountPath: /kaniko-auth
              readOnly: true

          # Step 2b: Build infraweaver-node (isolated container — fresh filesystem)
          - name: build-node
            image: gcr.io/kaniko-project/executor:debug
            command: ["/busybox/sh", "-c"]
            args:
            - |
              [ -f /workspace/skip ] && echo "Skipping." && exit 0
              BUILD_TAG=$(cat /workspace/build-tag)
              REGISTRY="onedev.rlservers.com/infraweaver-platform"
              mkdir -p /kaniko/.docker
              cp /kaniko-auth/.dockerconfigjson /kaniko/.docker/config.json
              echo "--- Building infraweaver-node (${BUILD_TAG}) ---"
              /kaniko/executor \
                --context "dir:///workspace/repo/apps/infraweaver-node" \
                --destination "${REGISTRY}/infraweaver-node:${BUILD_TAG}" \
                --build-arg "APP_VERSION=${BUILD_TAG}" \
                --skip-tls-verify \
                --cache=false
            volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: registry-auth
              mountPath: /kaniko-auth
              readOnly: true

          # Step 2c: Build infraweaver-console (isolated container — fresh filesystem)
          - name: build-console
            image: gcr.io/kaniko-project/executor:debug
            command: ["/busybox/sh", "-c"]
            args:
            - |
              [ -f /workspace/skip ] && echo "Skipping." && exit 0
              BUILD_TAG=$(cat /workspace/build-tag)
              REGISTRY="onedev.rlservers.com/infraweaver-platform"
              mkdir -p /kaniko/.docker
              cp /kaniko-auth/.dockerconfigjson /kaniko/.docker/config.json
              echo "--- Building infraweaver-console (${BUILD_TAG}) ---"
              /kaniko/executor \
                --context "dir:///workspace/repo/apps/infraweaver-console" \
                --destination "${REGISTRY}/infraweaver-console:${BUILD_TAG}" \
                --build-arg "APP_VERSION=${BUILD_TAG}" \
                --build-arg "CACHEBUST=$(date +%s)" \
                --skip-tls-verify \
                --cache=false
            volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: registry-auth
              mountPath: /kaniko-auth
              readOnly: true

          containers:
          # Step 3: Update manifests and push to OneDev (triggers ArgoCD deploy)
          - name: update-manifests
            image: alpine/git:latest
            command: ["/bin/sh", "-c"]
            args:
            - |
              if [ -f /workspace/skip ]; then
                echo "Nothing to build — manifests up to date."
                exit 0
              fi

              BUILD_TAG=$(cat /workspace/build-tag)
              REGISTRY="onedev.rlservers.com/infraweaver-platform"
              REPO="/workspace/repo"

              echo "=== Updating manifests to ${BUILD_TAG} ==="
              cd "$REPO"
              for APP in api console node; do
                MANIFEST="kubernetes/catalog/infraweaver-${APP}/manifests/deployment.yaml"
                sed -i "s|${REGISTRY}/infraweaver-${APP}:[^ ]*|${REGISTRY}/infraweaver-${APP}:${BUILD_TAG}|g" \
                  "$MANIFEST"
              done

              git config user.email "ci@infraweaver.internal"
              git config user.name "InfraWeaver CI"
              git add kubernetes/catalog/infraweaver-api/manifests/deployment.yaml \
                      kubernetes/catalog/infraweaver-console/manifests/deployment.yaml \
                      kubernetes/catalog/infraweaver-node/manifests/deployment.yaml

              if git diff --cached --quiet; then
                echo "Manifests already up to date."
              else
                git commit -m "ci: update image tags to ${BUILD_TAG} [skip ci]"
                # Rebase in case new commits were pushed during our build
                git pull --rebase http://admin:ExkI2kJ2RRf7xoaEsuVErkXR@onedev.onedev.svc.cluster.local/InfraWeaver-platform/ main
                git push http://admin:ExkI2kJ2RRf7xoaEsuVErkXR@onedev.onedev.svc.cluster.local/InfraWeaver-platform/ HEAD:main
                echo "Pushed manifest updates — ArgoCD will deploy shortly."
              fi
            volumeMounts:
            - name: workspace
              mountPath: /workspace
