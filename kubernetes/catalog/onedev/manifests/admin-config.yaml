---
# ConfigMap — OneDev admin users provisioning config
# Lists OneDev usernames (matching their SSO login name) that should be
# automatically added to the "Server Administrators" group on every bootstrap.
#
# Source of truth: users.yaml (users with access_level: admin)
# The bootstrap job reads /config/admin-users and ensures each listed user
# is a member of the Server Administrators group after SSO login creates them.
#
# To add a new admin: add their OneDev/SSO username (same as Authentik username)
# to the list below, commit, and wait for the next sync.
apiVersion: v1
kind: ConfigMap
metadata:
  name: onedev-admin-config
  namespace: onedev
  labels:
    app.kubernetes.io/name: onedev
    app.kubernetes.io/component: bootstrap
data:
  admin-users: |
    remon
