---
# Namespace for linkding
apiVersion: v1
kind: Namespace
metadata:
  name: linkding
  labels:
    app.kubernetes.io/name: linkding
    infraweaver.io/type: catalog-app
---
# ExternalSecret — linkding superuser credentials from OpenBao
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linkding-secret
  namespace: linkding
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: linkding-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: LD_SUPERUSER_PASSWORD
      remoteRef:
        key: secret/platform/linkding
        property: superuser-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: LD_SUPERUSER_NAME
      remoteRef:
        key: secret/platform/linkding
        property: superuser-name
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# PersistentVolumeClaim — stores linkding SQLite database and bookmarks
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: linkding-data
  namespace: linkding
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
# Deployment — linkding bookmark manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
  namespace: linkding
  labels:
    app: linkding
    infraweaver.io/auth: proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: linkding
  template:
    metadata:
      labels:
        app: linkding
    spec:
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: linkding
          image: sissbruecker/linkding:latest
          ports:
            - containerPort: 9090
          env:
            - name: LD_DISABLE_BACKGROUND_TASKS
              value: "False"
            - name: LD_DISABLE_URL_VALIDATION
              value: "False"
          envFrom:
            - secretRef:
                name: linkding-secret
          volumeMounts:
            - name: data
              mountPath: /etc/linkding/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 40
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: linkding-data
---
# Service — expose linkding internally
apiVersion: v1
kind: Service
metadata:
  name: linkding
  namespace: linkding
spec:
  selector:
    app: linkding
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
# IngressRoute — VPN-only + Authentik forward-auth
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: linkding-int
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`linkding.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
        - name: forward-auth
          namespace: traefik
      services:
        - name: linkding
          namespace: linkding
          port: 9090
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow Traefik ingress; egress to DNS and HTTPS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: linkding-netpol
  namespace: linkding
spec:
  podSelector:
    matchLabels:
      app: linkding
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 9090
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
