---
# Generated by InfraWeaver Community Apps from Unraid AppFeed
# Source: https://raw.githubusercontent.com/kilrah/unraid-docker-templates/main/templates/librespeed.xml
# Category: Network-Other
# Stars: 0 | Downloads: 0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: librespeed
  namespace: librespeed
  labels:
    app.kubernetes.io/name: librespeed
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: librespeed
  template:
    metadata:
      labels:
        app.kubernetes.io/name: librespeed
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      containers:
        - name: librespeed
          image: ghcr.io/librespeed/speedtest
          env:
            - name: MODE
              value: "standalone"
          ports:
            - containerPort: 8080
              protocol: TCP
              name: webui
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
          # No volume mounts defined
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      # No volumes defined
---
apiVersion: v1
kind: Service
metadata:
  name: librespeed
  namespace: librespeed
  labels:
    app.kubernetes.io/name: librespeed
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: librespeed
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: webui
  type: ClusterIP