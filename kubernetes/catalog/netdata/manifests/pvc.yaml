---
# PVC for "passwd" → /host/etc/passwd
# Default path on Unraid: /etc/passwd
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netdata-data-0
  namespace: netdata
  labels:
    app.kubernetes.io/name: netdata
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/etc/passwd"
    infraweaver.io/required: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
