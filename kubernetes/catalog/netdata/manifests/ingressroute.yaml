---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netdata
  namespace: netdata
  labels:
    app.kubernetes.io/name: netdata
    infraweaver.io/source: community-apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netdata.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: netdata
          port: 19999
  tls:
    secretName: int-rlservers-com-tls