---
# PVC for "Config Folder" → /config
# Default path on Unraid: /mnt/user/appdata/esphome
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esphome-data-0
  namespace: esphome
  labels:
    app.kubernetes.io/name: esphome
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/mnt/user/appdata/esphome"
    infraweaver.io/required: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
# PVC for "Data Folder" → /data
# Default path on Unraid: /mnt/user/appdata/esphome-data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esphome-data-1
  namespace: esphome
  labels:
    app.kubernetes.io/name: esphome
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/mnt/user/appdata/esphome-data"
    infraweaver.io/required: "false"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
# PVC for "Cache Folder" → /cache
# Default path on Unraid: /dev/shm/esphome-cache
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esphome-data-2
  namespace: esphome
  labels:
    app.kubernetes.io/name: esphome
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/dev/shm/esphome-cache"
    infraweaver.io/required: "false"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi