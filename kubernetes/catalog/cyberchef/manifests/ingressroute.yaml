---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cyberchef
  namespace: cyberchef
  labels:
    app.kubernetes.io/name: cyberchef
    infraweaver.io/source: community-apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`cyberchef.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: cyberchef
          port: 80
  tls:
    secretName: int-rlservers-com-tls