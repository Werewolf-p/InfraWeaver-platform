---
# Namespace for CyberChef
apiVersion: v1
kind: Namespace
metadata:
  name: cyberchef
  labels:
    app.kubernetes.io/name: cyberchef
    infraweaver.io/type: catalog-app
---
# Deployment — CyberChef (the Cyber Swiss Army Knife)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberchef
  namespace: cyberchef
  labels:
    app: cyberchef
    infraweaver.io/auth: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberchef
  template:
    metadata:
      labels:
        app: cyberchef
    spec:
      terminationGracePeriodSeconds: 30
      priorityClassName: platform-default
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cyberchef
          image: mpepping/cyberchef:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: cyberchef
  namespace: cyberchef
spec:
  selector:
    app: cyberchef
  ports:
    - port: 8000
      targetPort: 8000
---
# IngressRoute — VPN-only + Authentik forward-auth
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cyberchef-int
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`cyberchef.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
        - name: forward-auth
          namespace: traefik
      services:
        - name: cyberchef
          namespace: cyberchef
          port: 8000
  tls:
    secretName: int-rlservers-com-tls
---
# NetworkPolicy — allow Traefik ingress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-cyberchef
  namespace: cyberchef
spec:
  podSelector:
    matchLabels:
      app: cyberchef
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8000
