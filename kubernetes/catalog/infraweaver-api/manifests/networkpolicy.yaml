apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: infraweaver-api
  namespace: infraweaver-console
spec:
  podSelector:
    matchLabels:
      app: infraweaver-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow console (in same namespace)
    - from:
        - podSelector:
            matchLabels:
              app: infraweaver-console
      ports:
        - port: 3001
    # Allow Traefik ingress (for external access via api.int.rlservers.com)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 3001
  egress:
    # Allow all outbound (needs to reach k8s API, ArgoCD, Longhorn, etc.)
    - {}
