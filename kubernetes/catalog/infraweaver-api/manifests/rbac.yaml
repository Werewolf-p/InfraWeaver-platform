---
# ClusterRole: full read access + specific write operations for cluster management
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infraweaver-api
  labels:
    app: infraweaver-api
rules:
  # Core resources: full read
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "nodes", "events", "services", "configmaps", "secrets", "persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Pods: allow delete for force-stop
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  # Namespaces: read + delete (community app uninstall cascades through namespace deletion)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "delete"]
  # PVCs: create for game server deployment
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Secrets/ConfigMaps: full CRUD
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Apps: full CRUD for game server management
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Scale sub-resources
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  # Longhorn: full access including backups
  - apiGroups: ["longhorn.io"]
    resources: ["volumes", "nodes", "replicas", "engines", "backupvolumes", "backups", "backuptargets", "recurringjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects"]
    verbs: ["get", "list", "watch", "patch", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes", "ingressroutetcps", "ingressrouteudps", "middlewares", "traefikservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets", "secretstores", "clustersecretstores"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infraweaver-api
  labels:
    app: infraweaver-api
subjects:
  - kind: ServiceAccount
    name: infraweaver-api
    namespace: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infraweaver-api
---
# Additional Role for cluster registry management (ConfigMaps + Secrets in infraweaver-system ns)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-api-registry
  namespace: infraweaver-system
  labels:
    app: infraweaver-api
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-api-registry
  namespace: infraweaver-system
  labels:
    app: infraweaver-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-api-registry
subjects:
  - kind: ServiceAccount
    name: infraweaver-api
    namespace: infraweaver-console
