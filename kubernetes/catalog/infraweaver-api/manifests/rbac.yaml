---
# ClusterRole: full read access + specific write operations for cluster management
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infraweaver-api
  labels:
    app: infraweaver-api
rules:
  # Core resources: full read
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "namespaces", "nodes", "events", "services", "configmaps", "secrets", "persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Secrets in infraweaver-system: full CRUD (cluster registry)
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # Scoped to infraweaver-system via RoleBinding (not ClusterRole restriction)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["longhorn.io"]
    resources: ["volumes", "nodes", "replicas", "engines"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infraweaver-api
  labels:
    app: infraweaver-api
subjects:
  - kind: ServiceAccount
    name: infraweaver-api
    namespace: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infraweaver-api
---
# Additional Role for cluster registry management (ConfigMaps + Secrets in infraweaver-system ns)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-api-registry
  namespace: infraweaver-system
  labels:
    app: infraweaver-api
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-api-registry
  namespace: infraweaver-system
  labels:
    app: infraweaver-api
subjects:
  - kind: ServiceAccount
    name: infraweaver-api
    namespace: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-api-registry
