---
# This Secret is created manually / via ExternalSecret in production.
# Placeholder to document the required key.
# In production: use an ExternalSecret syncing from OpenBao path infraweaver/api/console-secret
apiVersion: v1
kind: Secret
metadata:
  name: infraweaver-api-console-secret
  namespace: infraweaver-console
  labels:
    app: infraweaver-api
  annotations:
    # Replace with actual ExternalSecret in production
    infraweaver.io/managed-by: "external-secret"
type: Opaque
stringData:
  # Generate with: openssl rand -hex 32
  # Then store in OpenBao at: infraweaver/api/console-secret key: CONSOLE_API_SECRET
  CONSOLE_API_SECRET: "REPLACE_WITH_REAL_SECRET_FROM_OPENBAO"
