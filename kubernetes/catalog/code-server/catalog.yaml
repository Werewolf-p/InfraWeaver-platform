---
# catalog.yaml — code-server
# Defined but not enabled by default. Add 'code-server' to catalog.enabled in platform.yaml to deploy.
# Access: code-server.int.rlservers.com (VPN-only, protected by Authentik forward-auth)
# SSO: Traefik forward-auth (code-server has no native OIDC)

name: code-server
description: "code-server — VS Code in the browser, self-hosted development environment"
namespace: code-server

ingressroute:
  host: code-server.int.rlservers.com
  entrypoint: websecure
