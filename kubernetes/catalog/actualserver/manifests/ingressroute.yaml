---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: actualserver
  namespace: actualserver
  labels:
    app.kubernetes.io/name: actualserver
    infraweaver.io/source: community-apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`actualserver.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: actualserver
          port: 5006
  tls:
    secretName: int-rlservers-com-tls