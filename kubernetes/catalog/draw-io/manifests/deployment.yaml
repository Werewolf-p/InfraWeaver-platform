            failureThreshold: 10
          # No volume mounts defined
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      # No volumes defined
---
apiVersion: v1
kind: Service
metadata:
  name: draw-io
  namespace: draw-io
  labels:
    app.kubernetes.io/name: draw-io
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: draw-io
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: webui-port
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: webui-ssl-port
  type: ClusterIP