apiVersion: apps/v1
kind: Deployment
metadata:
  name: draw-io
  namespace: draw-io
  labels:
    app.kubernetes.io/name: draw-io
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: draw-io
  template:
    metadata:
      labels:
        app.kubernetes.io/name: draw-io
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: draw-io
          image: jgraph/drawio
          env:
            - name: LETS_ENCRYPT_ENABLED
              value: "false"
            - name: PUBLIC_DNS
              value: ""
            - name: ORGANISATION_UNIT
              value: ""
            - name: ORGANISATION
              value: ""
            - name: CITY
              value: ""
            - name: STATE
              value: ""
            - name: COUNTRY_CODE
              value: ""
            - name: KEYSTORE_PASS
              valueFrom:
                secretKeyRef:
                  name: keystore-pass-secret
                  key: value
            - name: KEY_PASS
              valueFrom:
                secretKeyRef:
                  name: key-pass-secret
                  key: value
          ports:
            - containerPort: 8080
              protocol: TCP
              name: webui-port
            - containerPort: 8443
              protocol: TCP
              name: webui-ssl-port
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8080
