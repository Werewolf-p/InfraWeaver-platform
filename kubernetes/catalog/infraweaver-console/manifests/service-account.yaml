---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infraweaver-console-sa
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
---
# Long-lived token secret bound to the SA above.
apiVersion: v1
kind: Secret
metadata:
  name: infraweaver-console-sa-token
  namespace: infraweaver-console
  annotations:
    kubernetes.io/service-account.name: infraweaver-console-sa
  labels:
    app: infraweaver-console
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infraweaver-console-reader
  labels:
    app: infraweaver-console
rules:
  # Read access to core resources (no secrets)
  - apiGroups: [""]
    resources:
      - pods
      - services
      - nodes
      - namespaces
      - events
      - configmaps
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  # Read access to workload resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch"]
  # Read access to ingresses
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  # Limited write: pod restart (create + delete pods)
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["create", "delete"]
  # Limited write: deployment scale / rollout restart
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infraweaver-console-reader
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infraweaver-console-reader
subjects:
  - kind: ServiceAccount
    name: infraweaver-console-sa
    namespace: infraweaver-console
---
# PushSecret: pushes the SA token from the k8s Secret into OpenBao/Vault
# at path secret/infraweaver/console-sa so the console can read it at runtime.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: infraweaver-console-sa-vault-push
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: infraweaver-console-sa-token
  data:
    - match:
        secretKey: token
        remoteRef:
          remoteKey: infraweaver/console-sa
          property: token
    - match:
        secretKey: namespace
        remoteRef:
          remoteKey: infraweaver/console-sa
          property: namespace
