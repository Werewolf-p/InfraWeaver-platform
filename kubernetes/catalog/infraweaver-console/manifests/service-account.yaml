---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infraweaver-console-sa
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
---
# Long-lived token secret bound to the SA above.
apiVersion: v1
kind: Secret
metadata:
  name: infraweaver-console-sa-token
  namespace: infraweaver-console
  annotations:
    kubernetes.io/service-account.name: infraweaver-console-sa
  labels:
    app: infraweaver-console
type: kubernetes.io/service-account-token
# ClusterRole and ClusterRoleBinding are defined in rbac.yaml (consolidated there)
---
# PushSecret: pushes the SA token from the k8s Secret into OpenBao/Vault
# at path secret/infraweaver/console-sa so the console can read it at runtime.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: infraweaver-console-sa-vault-push
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: infraweaver-console-sa-token
  data:
    - match:
        secretKey: token
        remoteRef:
          remoteKey: infraweaver/console-sa
          property: token
    - match:
        secretKey: namespace
        remoteRef:
          remoteKey: infraweaver/console-sa
          property: namespace
