apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: infraweaver-console
  namespace: infraweaver-console
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`console.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: authentik-forward-auth
          namespace: authentik
        - name: security-headers
          namespace: traefik
      services:
        - name: infraweaver-console
          port: 3000
  tls:
    secretName: platform-wildcard-int-tls
