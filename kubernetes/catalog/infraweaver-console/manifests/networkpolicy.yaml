apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: infraweaver-console
  namespace: infraweaver-console
spec:
  podSelector:
    matchLabels:
      app: infraweaver-console
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - {}
