apiVersion: v1
kind: ServiceAccount
metadata:
  name: infraweaver-console
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
# MUST remain true — the console uses in-cluster k8s API calls (game-hub, apps,
# cluster info, pod logs, etc.) via loadFromCluster() which reads
# /var/run/secrets/kubernetes.io/serviceaccount/. Setting this to false breaks
# ALL k8s API functionality and causes "unknown" across the entire console.
automountServiceAccountToken: true
