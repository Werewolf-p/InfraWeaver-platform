apiVersion: apps/v1
kind: Deployment
metadata:
  name: infraweaver-console
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infraweaver-console
  template:
    metadata:
      labels:
        app: infraweaver-console
    spec:
      serviceAccountName: infraweaver-console
      imagePullSecrets:
      - name: onedev-pull-secret
      # Spread replicas across nodes so a single Flannel disruption
      # doesn't take down both console pods simultaneously
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: infraweaver-console
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: infraweaver-console
              topologyKey: kubernetes.io/hostname
      containers:
      - name: console
        image: onedev.rlservers.com/infraweaver/infraweaver-console:main
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXTAUTH_URL
          value: https://infraweaver.int.rlservers.com
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: nextauth-secret
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: nextauth-secret
        - name: AUTHENTIK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: oidc-client-id
        - name: AUTHENTIK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: oidc-client-secret
        - name: AUTHENTIK_ISSUER
          value: https://auth.rlservers.com/application/o/infraweaver-console/
        - name: ARGOCD_SERVER
          value: http://argocd-server.argocd.svc.cluster.local:80
        - name: ARGOCD_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: argocd-token
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: github-token
        - name: GITHUB_REPO
          value: Werewolf-p/InfraWeaver-platform
        - name: GATUS_URL
          value: http://gatus.gatus.svc.cluster.local:8080
        - name: LONGHORN_API
          value: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
        - name: NETBIRD_API
          value: http://netbird-management.netbird.svc.cluster.local:80
        - name: NETBIRD_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: netbird-token
        - name: NODE_ENV
          value: production
        - name: AUTH_TRUST_HOST
          value: "true"
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
