apiVersion: apps/v1
kind: Deployment
metadata:
  name: infraweaver-console
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
spec:
  replicas: 2
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  # minReadySeconds ensures a new pod must be stable for 30s before old pod terminates.
  # This prevents silent startup failures from causing a brief outage.
  minReadySeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: infraweaver-console
  template:
    metadata:
      labels:
        app: infraweaver-console
    spec:
      priorityClassName: platform-high
      terminationGracePeriodSeconds: 60
      serviceAccountName: infraweaver-console
      # MUST remain true — console uses in-cluster k8s API (game-hub, apps, cluster
      # info, etc.) via /var/run/secrets/kubernetes.io/serviceaccount/. Setting false
      # breaks ALL k8s features and makes everything show "unknown" in the UI.
      automountServiceAccountToken: true
      imagePullSecrets:
      - name: onedev-pull-secret
      # Spread replicas across nodes so a single Flannel disruption
      # doesn't take down both console pods simultaneously
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: infraweaver-console
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: infraweaver-console
              topologyKey: kubernetes.io/hostname
      containers:
      - name: console
        image: onedev.rlservers.com/infraweaver-platform/infraweaver-console:main-48ac3a4
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "HOSTNAME=0.0.0.0 node server.js"]
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXTAUTH_URL
          value: https://infraweaver.int.rlservers.com
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: nextauth-secret
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: nextauth-secret
        - name: AUTHENTIK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: oidc-client-id
        - name: AUTHENTIK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: oidc-client-secret
        - name: AUTHENTIK_ISSUER
          value: https://auth.rlservers.com/application/o/infraweaver-console/
        - name: ARGOCD_SERVER
          value: http://argocd-server.argocd.svc.cluster.local:80
        - name: ARGOCD_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: argocd-token
        # Optional: GitHub PAT for pipeline listing, pelican eggs, and workflow dispatch.
        # Seed in OpenBao: openbao kv patch secret/platform/infraweaver-console github-token=<pat>
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: github-token
              optional: true
        - name: GITHUB_REPO
          value: Werewolf-p/InfraWeaver-platform
        - name: GIT_PROVIDER
          value: onedev
        - name: ONEDEV_URL
          value: http://onedev.onedev.svc.cluster.local
        - name: ONEDEV_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: onedev-token
        - name: ONEDEV_PROJECT_ID
          value: "2"
        - name: ONEDEV_PROJECT_PATH
          value: "InfraWeaver-platform"
        - name: ONEDEV_BRANCH
          value: main
        - name: ONEDEV_USERNAME
          value: infraweaver
        - name: GIT_WORKTREE_ROOT
          value: /git-cache
        - name: GATUS_URL
          value: http://gatus.gatus.svc.cluster.local:8080
        # ─── Multi-Cluster Support (optional) ────────────────────────────────────
        # Set CLUSTER_CONTEXTS to a JSON array to enable multi-cluster switching.
        # Each entry can override ArgoCD server/token and Gatus URL per cluster.
        # The first entry with isLocal:true is the primary (uses in-cluster SA).
        # Additional entries require a base64-encoded kubeconfig.
        #
        # Example (base64-encode the JSON value):
        # - name: CLUSTER_CONTEXTS
        #   value: '[{"id":"homelab-prod","displayName":"Production","isLocal":true,"tags":["production"]},{"id":"homelab-dev","displayName":"Development","kubeconfig":"<base64>","argocdServer":"https://argocd.dev.example.com","argocdToken":"<token>","gatusUrl":"http://gatus.dev.svc:8080"}]'
        # ─────────────────────────────────────────────────────────────────────────
        - name: LONGHORN_API
          value: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
        - name: NETBIRD_API
          value: http://netbird-management.netbird.svc.cluster.local:80
        - name: PROMETHEUS_URL
          value: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        - name: NETBIRD_MANAGEMENT_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: netbird-token
        - name: NODE_ENV
          value: production
        - name: INFRAWEAVER_API_URL
          value: http://infraweaver-api.infraweaver-console.svc.cluster.local:3001
        - name: AUTHENTIK_URL
          value: http://authentik-server.authentik.svc.cluster.local
        - name: AUTHENTIK_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: authentik-token
        - name: CLOUDFLARE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: cloudflare-api-token
        - name: CF_ZONE_ID
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: cf-zone-id
        - name: DNS_PROVIDER
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: dns-provider
        - name: ADMIN_EMAILS
          value: admin@rlservers.com
        - name: AUTH_TRUST_HOST
          value: "true"
        # NAS provider configuration — for Synology/TrueNAS share management
        - name: SYNOLOGY_HOST
          value: "10.25.0.21"
        - name: SYNOLOGY_PORT
          value: "5001"
        - name: SYNOLOGY_USER
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: synology-user
              optional: true
        - name: SYNOLOGY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: synology-password
              optional: true
        - name: TRUENAS_HOST
          value: "10.25.0.135"
        - name: TRUENAS_API_KEY
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: truenas-api-key
              optional: true
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        startupProbe:
          httpGet:
            path: /api/ping
            port: 3000
          failureThreshold: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ping
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/ping
            port: 3000
          initialDelaySeconds: 0
          periodSeconds: 30
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 10"]
        volumeMounts:
        # Next.js needs a writable cache dir at runtime (readOnlyRootFilesystem prevents direct writes)
        - name: nextjs-cache
          mountPath: /app/.next/cache
        - name: git-cache
          mountPath: /git-cache
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: nextjs-cache
        emptyDir: {}
      - name: git-cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
