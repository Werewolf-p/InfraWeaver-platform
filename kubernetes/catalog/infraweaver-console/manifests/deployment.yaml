apiVersion: apps/v1
kind: Deployment
metadata:
  name: infraweaver-console
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infraweaver-console
  template:
    metadata:
      labels:
        app: infraweaver-console
    spec:
      serviceAccountName: infraweaver-console
      imagePullSecrets:
      - name: onedev-pull-secret
      # Spread replicas across nodes so a single Flannel disruption
      # doesn't take down both console pods simultaneously
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: infraweaver-console
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: infraweaver-console
              topologyKey: kubernetes.io/hostname
      containers:
      - name: console
        image: onedev.rlservers.com/infraweaver/infraweaver-console:main-f62ce83
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXTAUTH_URL
          value: https://infraweaver.int.rlservers.com
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: nextauth-secret
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: nextauth-secret
        - name: AUTHENTIK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: oidc-client-id
        - name: AUTHENTIK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: oidc-client-secret
        - name: AUTHENTIK_ISSUER
          value: https://auth.rlservers.com/application/o/infraweaver-console/
        - name: ARGOCD_SERVER
          value: http://argocd-server.argocd.svc.cluster.local:80
        - name: ARGOCD_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: argocd-token
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: github-token
        - name: GITHUB_REPO
          value: Werewolf-p/InfraWeaver-platform
        - name: GATUS_URL
          value: http://gatus.gatus.svc.cluster.local:8080
        - name: LONGHORN_API
          value: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
        - name: NETBIRD_API
          value: http://netbird-management.netbird.svc.cluster.local:80
        - name: NETBIRD_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: netbird-token
        - name: NODE_ENV
          value: production
        - name: AUTHENTIK_URL
          value: http://authentik-server.authentik.svc.cluster.local
        - name: AUTHENTIK_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: authentik-token
        - name: CLOUDFLARE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: cloudflare-api-token
        - name: CF_ZONE_ID
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: cf-zone-id
        - name: ADMIN_EMAILS
          value: remonhulst@gmail.com
        - name: AUTH_TRUST_HOST
          value: "true"
        # NAS provider configuration — for Synology/TrueNAS share management
        - name: SYNOLOGY_HOST
          value: "10.25.0.21"
        - name: SYNOLOGY_PORT
          value: "5001"
        - name: SYNOLOGY_USER
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: synology-user
              optional: true
        - name: SYNOLOGY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: synology-password
              optional: true
        - name: TRUENAS_HOST
          value: "10.25.0.135"
        - name: TRUENAS_API_KEY
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: truenas-api-key
              optional: true
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
