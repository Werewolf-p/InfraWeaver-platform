apiVersion: apps/v1
kind: Deployment
metadata:
  name: infraweaver-console
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infraweaver-console
  template:
    metadata:
      labels:
        app: infraweaver-console
    spec:
      serviceAccountName: infraweaver-console
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: console
        image: ghcr.io/werewolf-p/infraweaver-platform/infraweaver-console:main
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXTAUTH_URL
          value: https://console.int.rlservers.com
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: nextauth-secret
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: nextauth-secret
        - name: AUTHENTIK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: oidc-client-id
        - name: AUTHENTIK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: oidc-client-secret
        - name: AUTHENTIK_ISSUER
          value: https://auth.rlservers.com/application/o/infraweaver-console/
        - name: ARGOCD_SERVER
          value: http://argocd-server.argocd.svc.cluster.local:80
        - name: ARGOCD_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: argocd-token
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraweaver-console-secret
              key: github-token
        - name: GITHUB_REPO
          value: Werewolf-p/InfraWeaver-platform
        - name: GATUS_URL
          value: http://gatus.gatus.svc.cluster.local:8080
        - name: LONGHORN_API
          value: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
        - name: NETBIRD_API
          value: http://netbird-management.netbird.svc.cluster.local:80
        - name: NODE_ENV
          value: production
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
