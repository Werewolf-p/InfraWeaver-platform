---
# ClusterRole: read-only access to pods, logs, namespaces, events, nodes
# Required for the InfraWeaver Console to display live cluster data.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infraweaver-console-reader
  labels:
    app: infraweaver-console
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces", "nodes", "events", "services", "configmaps", "persistentvolumes", "persistentvolumeclaims", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["longhorn.io"]
    resources: ["volumes", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infraweaver-console-reader
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infraweaver-console-reader
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-console-configmaps
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-console-configmaps
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-console-configmaps
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
