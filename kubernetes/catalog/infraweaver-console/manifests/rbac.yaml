---
# ClusterRole: read + write access for InfraWeaver Console operations.
# Includes game-hub management (scale, delete pods, create PVCs), Longhorn backups,
# and ExternalSecrets viewing.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infraweaver-console-reader
  labels:
    app: infraweaver-console
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "namespaces", "nodes", "events", "services", "endpoints", "configmaps", "persistentvolumes", "persistentvolumeclaims", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes", "ingressroutetcps", "ingressrouteudps", "middlewares", "traefikservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["longhorn.io"]
    resources: ["volumes", "nodes", "backupvolumes", "backups", "recurringjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets", "secretstores", "clustersecretstores"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infraweaver-console-reader
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infraweaver-console-reader
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
---
# Role: full game-hub resource management (deploy/delete game servers)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-console-game-hub
  namespace: game-hub
  labels:
    app: infraweaver-console
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "services", "configmaps", "secrets", "persistentvolumeclaims", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-console-game-hub
  namespace: game-hub
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-console-game-hub
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-console-configmaps
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-console-configmaps
  namespace: infraweaver-console
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-console-configmaps
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
