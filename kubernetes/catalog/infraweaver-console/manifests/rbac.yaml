---
# ClusterRole: read-only access to pods, logs, namespaces, events, nodes
# Required for the InfraWeaver Console to display live cluster data.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infraweaver-console-reader
  labels:
    app: infraweaver-console
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces", "nodes", "events", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["longhorn.io"]
    resources: ["volumes", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infraweaver-console-reader
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infraweaver-console-reader
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-console-game-servers
  namespace: game-servers
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-console-game-servers
  namespace: game-servers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-console-game-servers
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
---
# Role: full CRUD on game-hub namespace resources for game server management
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraweaver-console-game-hub
  namespace: game-hub
  labels:
    app: infraweaver-console
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims", "configmaps", "events", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraweaver-console-game-hub
  namespace: game-hub
  labels:
    app: infraweaver-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraweaver-console-game-hub
subjects:
  - kind: ServiceAccount
    name: infraweaver-console
    namespace: infraweaver-console
