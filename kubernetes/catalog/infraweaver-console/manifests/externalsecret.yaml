---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: infraweaver-console-secret
  namespace: infraweaver-console
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: infraweaver-console-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: oidc-client-id
      remoteRef:
        key: secret/platform/infraweaver-console
        property: oidc-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: oidc-client-secret
      remoteRef:
        key: secret/platform/infraweaver-console
        property: oidc-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: nextauth-secret
      remoteRef:
        key: secret/platform/infraweaver-console
        property: nextauth-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: argocd-token
      remoteRef:
        key: secret/platform/infraweaver-console
        property: argocd-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # Optional: GitHub PAT for pipeline listing, pelican eggs, and node rolling-update triggers.
    # Set manually: openbao kv patch secret/platform/infraweaver-console github-token=<your-pat>
    # Console degrades gracefully without it (pipelines page shows empty, pelican eggs unavailable).
    - secretKey: github-token
      remoteRef:
        key: secret/platform/infraweaver-console
        property: github-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: netbird-token
      remoteRef:
        key: secret/platform/netbird
        property: netbird-pat-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: authentik-token
      remoteRef:
        key: secret/platform/infraweaver-console
        property: authentik-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: cloudflare-api-token
      remoteRef:
        key: secret/platform/infraweaver-console
        property: cloudflare-api-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: cf-zone-id
      remoteRef:
        key: secret/platform/infraweaver-console
        property: cf-zone-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # NAS provider credentials — optional; console works without them (ops on NAS shares disabled)
    # Seed these in OpenBao: openbao kv put secret/platform/nas/synology user=<u> password=<p>
    - secretKey: synology-user
      remoteRef:
        key: secret/platform/nas/synology
        property: user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: synology-password
      remoteRef:
        key: secret/platform/nas/synology
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # Seed in OpenBao: openbao kv put secret/platform/nas/truenas api-key=<key>
    - secretKey: truenas-api-key
      remoteRef:
        key: secret/platform/nas/truenas
        property: api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # Onedev service account token for console git operations
    - secretKey: onedev-token
      remoteRef:
        key: secret/platform/infraweaver-console
        property: onedev-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
