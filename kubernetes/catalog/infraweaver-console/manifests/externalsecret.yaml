apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: infraweaver-console-secret
  namespace: infraweaver-console
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: infraweaver-console-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: oidc-client-id
      remoteRef:
        key: secret/platform/infraweaver-console
        property: oidc-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: oidc-client-secret
      remoteRef:
        key: secret/platform/infraweaver-console
        property: oidc-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: nextauth-secret
      remoteRef:
        key: secret/platform/infraweaver-console
        property: nextauth-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: argocd-token
      remoteRef:
        key: secret/platform/infraweaver-console
        property: argocd-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: github-token
      remoteRef:
        key: secret/platform/infraweaver-console
        property: github-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: netbird-token
      remoteRef:
        key: secret/platform/netbird
        property: netbird-pat-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: authentik-token
      remoteRef:
        key: secret/platform/infraweaver-console
        property: authentik-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
