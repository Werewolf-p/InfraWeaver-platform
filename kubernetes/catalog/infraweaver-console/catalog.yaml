name: infraweaver-console
description: "InfraWeaver Console — platform management UI with RBAC"
namespace: infraweaver-console

ingressroute:
  host: console.int.rlservers.com
  entrypoint: websecure

secrets:
  path: platform/infraweaver-console
  keys:
    oidc-client-id:
      type: static
      value: "infraweaver-console"
    oidc-client-secret:
      type: password
    nextauth-secret:
      type: password
    argocd-token:
      type: password
    github-token:
      type: password
replicas: "2"
