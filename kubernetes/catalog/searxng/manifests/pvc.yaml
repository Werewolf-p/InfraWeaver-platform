---
# PVC for "Config" → /etc/searxng
# Default path on Unraid: /mnt/user/appdata/searxng/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: searxng-data-0
  namespace: searxng
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/mnt/user/appdata/searxng/"
    infraweaver.io/required: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi