---
# PVC for "Host Path 1" → /data/db
# Default path on Unraid: /mnt/user/appdata/mongodb/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data-0
  namespace: mongodb
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: storage
    infraweaver.io/source: community-apps
  annotations:
    infraweaver.io/unraid-path: "/mnt/user/appdata/mongodb/"
    infraweaver.io/required: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi