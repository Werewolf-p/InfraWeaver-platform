---
# Generated by InfraWeaver Community Apps from Unraid AppFeed
# Source: https://raw.githubusercontent.com/Collectathon/unraid-templates/main/karakeep.xml
# Category: Productivity
# Stars: 0 | Downloads: 0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep
  namespace: karakeep
  labels:
    app.kubernetes.io/name: karakeep
    app.kubernetes.io/managed-by: infraweaver
    infraweaver.io/source: community-apps
    infraweaver.io/tier: simple
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: karakeep
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karakeep
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      containers:
        - name: karakeep
          image: ghcr.io/karakeep-app/karakeep:release
          env:
            - name: NEXTAUTH_URL
              value: "http://localhost:3000"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextauth-secret-secret
                  key: value
            - name: BROWSER_WEBSOCKET_URL
              value: "ws://localhost:3000/chromium/playwright?token="
            - name: MEILI_ADDR
              value: "http://localhost:7700"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: meili-master-key-optional-secret
                  key: value
            - name: OPENAI_API_KEY
              value: ""
            - name: DISABLE_SIGNUPS
              value: "false"
            - name: DATA_DIR
              value: "/data"
            - name: BROWSER_CONNECT_ONDEMAND
              value: "true"
          ports:
            - containerPort: 3000
              protocol: TCP
              name: port
          startupProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: karakeep-data-0
              mountPath: "/data"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
      - name: karakeep-data-0
        persistentVolumeClaim:
          claimName: karakeep-data-0
---
apiVersion: v1
kind: Service
metadata:
  name: karakeep
  namespace: karakeep
  labels:
    app.kubernetes.io/name: karakeep
    infraweaver.io/source: community-apps
spec:
  selector:
    app.kubernetes.io/name: karakeep
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: port
  type: ClusterIP