apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameservers.infraweaver.${BASE_DOMAIN}
spec:
  group: infraweaver.${BASE_DOMAIN}
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                game:
                  type: string
                name:
                  type: string
                image:
                  type: string
                port:
                  type: integer
                protocol:
                  type: string
                resources:
                  type: object
                  properties:
                    memory:
                      type: string
                    cpu:
                      type: string
                    storage:
                      type: string
                env:
                  type: object
                  additionalProperties:
                    type: string
                eggId:
                  type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
  scope: Namespaced
  names:
    plural: gameservers
    singular: gameserver
    kind: GameServer
    shortNames:
      - gs
