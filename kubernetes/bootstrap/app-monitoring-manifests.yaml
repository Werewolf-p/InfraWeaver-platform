---
# ArgoCD Application for kube-prometheus-stack raw manifests (NetworkPolicies, etc.)
# These are K8s raw manifests that complement the Helm chart deployed via ApplicationSet.
# Deployed to the monitoring namespace alongside kube-prometheus-stack.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-kube-prometheus-stack-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/monitoring/kube-prometheus-stack/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
