---
# catalog-game-hub-manifests.yaml — namespace guardrails and scale scheduling for game server workloads
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-game-hub-manifests
  namespace: argocd
  labels:
    infraweaver.io/type: catalog-app
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: http://onedev.onedev.svc.cluster.local/InfraWeaver-platform
    targetRevision: HEAD
    path: kubernetes/catalog/game-hub
  destination:
    server: https://kubernetes.default.svc
    namespace: game-hub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
