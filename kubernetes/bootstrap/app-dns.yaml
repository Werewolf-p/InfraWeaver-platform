# Standalone ArgoCD Application for internal CoreDNS
# Deploys a custom DNS server accessible at 10.25.0.201:53 (MetalLB)
# Serves ${BASE_DOMAIN} and ${CLUSTER_LOCAL_DOMAIN} zones; forwards everything else upstream
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: http://onedev.onedev.svc.cluster.local/InfraWeaver-platform
    targetRevision: HEAD
    path: kubernetes/platform/dns/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: dns-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
