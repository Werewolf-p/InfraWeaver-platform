---
# appset-core-monitoring.yaml — Auto-generated by scripts/sync-groups.sh
# Source: platform.yaml groups.core-monitoring — DO NOT edit manually
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-monitoring
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
        revision: HEAD
        files:
          - path: "kubernetes/monitoring/*/application.yaml"
  template:
    metadata:
      name: '{{ index (splitList "/" .path.path) 1 }}-{{ index (splitList "/" .path.path) 2 }}'
      namespace: argocd
    spec:
      project: platform
      sources:
        - repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
          targetRevision: HEAD
          ref: values
        - repoURL: "{{ .repoURL }}"
          targetRevision: "{{ .targetRevision }}"
          chart: "{{ .chart }}"
          helm:
            releaseName: "{{ .releaseName }}"
            valueFiles:
              - "$values/{{ .path.path }}/values.yaml"
            parameters:
              - name: replicaCount
                value: '{{ if .replicas }}{{ .replicas }}{{ else }}1{{ end }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - '{{ if eq (default "true" .serverSideApply) "false" }}ServerSideApply=false{{ else }}ServerSideApply=true{{ end }}'
          - RespectIgnoreDifferences=true
          - Replace=true   # Required for large Prometheus CRDs that exceed 262144-byte annotation limit
      ignoreDifferences:
        - kind: Secret
          jqPathExpressions:
            - '.data["admin-password"]'
            - '.data["admin-user"]'
        - group: external-secrets.io
          kind: ExternalSecret
          jsonPointers:
            - /status
            - /metadata/finalizers
          jqPathExpressions:
            - '.spec.data[].remoteRef.conversionStrategy'
            - '.spec.data[].remoteRef.decodingStrategy'
            - '.spec.data[].remoteRef.metadataPolicy'
        - group: apps
          kind: StatefulSet
          jsonPointers:
            - /spec/persistentVolumeClaimRetentionPolicy
          managedFieldsManagers:
            - kube-controller-manager
