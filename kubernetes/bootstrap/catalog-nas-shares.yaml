---
# Bootstrap: NAS Shares Catalog
# Applied during platform.yml bootstrap loop.
# Manages user-specific NAS share PVCs generated by the InfraWeaver console.
# Manifests are committed to kubernetes/catalog/nas-shares/ by the console API.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-nas-shares
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/catalog/nas-shares
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
