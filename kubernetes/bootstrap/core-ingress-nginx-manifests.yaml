---
# Standalone ArgoCD Application for ingress-nginx extra manifests (PSA namespace labels).
# The ingress-nginx Helm chart (core-ingress-nginx) is managed by the root ApplicationSet.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-ingress-nginx-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/core/ingress-nginx/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
