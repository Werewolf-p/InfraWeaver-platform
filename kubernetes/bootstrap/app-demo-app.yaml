---
# ArgoCD Application for demo-app — auto-generated by scripts/new-app.sh
# Applied automatically by apply-changes.yml when pushed to main.
# To remove: delete this file and the kubernetes/apps/demo-app/ directory.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-demo-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/apps/demo-app/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-demo-app
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
