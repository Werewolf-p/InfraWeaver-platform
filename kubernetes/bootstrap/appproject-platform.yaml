---
# Root ArgoCD AppProject — defines what the platform is allowed to manage
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "InfraWeaver Platform — all cluster applications"
  sourceRepos:
    - "https://github.com/Werewolf-p/InfraWeaver-platform.git"
    - "https://charts.bitnami.com/bitnami"
    - "https://grafana.github.io/helm-charts"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://charts.jetstack.io"
    - "https://kubernetes.github.io/ingress-nginx"
    - "https://charts.external-secrets.io"
    - "https://argoproj.github.io/argo-helm"
    - "*"
  destinations:
    - namespace: "*"
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
    ignore:
      # openbao-token is managed by workflow (not ArgoCD)
      - kind: Secret
        name: openbao-token
      # grafana-admin-secret is created by ExternalSecret (ESO-managed)
      - kind: Secret
        name: grafana-admin-secret
