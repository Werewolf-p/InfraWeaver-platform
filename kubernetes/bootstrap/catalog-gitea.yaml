---
# catalog-gitea.yaml — Auto-generated by scripts/sync-catalog.sh
# Source: kubernetes/catalog/gitea/catalog.yaml
# Enable/disable this app in platform.yaml under catalog.enabled.
# DO NOT edit manually — changes will be overwritten on next sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-gitea
  namespace: argocd
  labels:
    infraweaver.io/type: catalog-app
  annotations:
    infraweaver.io/description: "Gitea — self-hosted Git service with Authentik OIDC SSO"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
      targetRevision: HEAD
      ref: values
    - repoURL: "https://dl.gitea.com/charts/"
      targetRevision: "10.*"
      chart: "gitea"
      helm:
        releaseName: "gitea"
        valueFiles:
          - "$values/kubernetes/catalog/gitea/values.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: "gitea"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: Secret
      jqPathExpressions:
        - '.data["admin-password"]'
        - '.data["admin-user"]'
