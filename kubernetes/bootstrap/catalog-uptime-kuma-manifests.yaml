---
# catalog-uptime-kuma-manifests.yaml — storage-backed community app test
# Uses longhorn StorageClass (3 replicas) to validate cascade-failure fix
# Installed: 2026-05-13T20:00:00.000Z
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-uptime-kuma-manifests
  namespace: argocd
  labels:
    infraweaver.io/type: catalog-app
    infraweaver.io/source: community-apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/catalog/uptime-kuma/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: uptime-kuma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
