---
# Standalone ArgoCD Application for Longhorn extra StorageClass manifests.
# The Longhorn Helm chart (core-longhorn) manages the "longhorn" StorageClass.
# This Application deploys supplementary manifests (e.g. longhorn-retain StorageClass).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-longhorn-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: http://onedev.onedev.svc.cluster.local/InfraWeaver-platform
    targetRevision: HEAD
    path: kubernetes/core/longhorn/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
