---
# ArgoCD Application for namespace-level default resource guardrails.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-limitranges
  namespace: argocd
  labels:
    infraweaver.io/type: core
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: http://onedev.onedev.svc.cluster.local/InfraWeaver-platform
    targetRevision: HEAD
    path: kubernetes/core/limitranges
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
