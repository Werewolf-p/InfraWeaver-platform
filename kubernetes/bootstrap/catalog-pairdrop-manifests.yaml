---
# catalog-pairdrop-manifests.yaml — community app manifests
# Installed via InfraWeaver community store
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-pairdrop-manifests
  namespace: argocd
  labels:
    infraweaver.io/type: catalog-app
    infraweaver.io/source: community-apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/catalog/pairdrop/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: pairdrop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
