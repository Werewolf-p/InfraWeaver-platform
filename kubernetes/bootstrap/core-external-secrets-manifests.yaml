---
# Standalone ArgoCD Application for External Secrets Operator extra manifests.
# The ESO Helm chart (core-external-secrets) is managed by the root ApplicationSet.
# This Application deploys ClusterSecretStore, NetworkPolicies, and PSA labels.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-external-secrets-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/core/external-secrets/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # Prevents ArgoCD from overwriting fields listed in ignoreDifferences during sync
      - RespectIgnoreDifferences=true
  # Suppress warning for openbao-token Secret (managed exclusively by workflow, not ArgoCD)
  orphanedResources:
    warn: true
    ignore:
      - kind: Secret
        name: openbao-token
  ignoreDifferences:
    - group: external-secrets.io
      kind: ClusterSecretStore
      jsonPointers:
        - /status
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .status
        - .metadata.annotations["argocd.argoproj.io/tracking-id"]
