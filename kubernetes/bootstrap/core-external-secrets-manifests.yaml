---
# Standalone ArgoCD Application for External Secrets Operator extra manifests.
# The ESO Helm chart (core-external-secrets) is managed by the root ApplicationSet.
# This Application deploys ClusterSecretStore, NetworkPolicies, and PSA labels.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-external-secrets-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/core/external-secrets/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # Prevents ArgoCD from overwriting fields listed in ignoreDifferences during sync
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ClusterSecretStore
      jsonPointers:
        - /status
        # Server URL and auth token are set by OpenTofu bootstrap, not from git
        - /spec/provider/vault/server
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .status
        - .metadata.annotations["argocd.argoproj.io/tracking-id"]
    # The openbao-token Secret data is written by OpenTofu bootstrap.
    # ArgoCD must not overwrite it with the git placeholder on every sync.
    - kind: Secret
      name: openbao-token
      jsonPointers:
        - /data/token
