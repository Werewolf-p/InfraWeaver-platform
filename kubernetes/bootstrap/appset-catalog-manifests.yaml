---
# appset-catalog-manifests.yaml — ApplicationSet for catalog app raw manifests
# Discovers kubernetes/catalog/*/manifests/ directories and creates one Application
# per catalog app that has a manifests/ subfolder.
# Managed by: bootstrap Application (always present for enabled catalog apps)
# Replaces: individual catalog-*-manifests.yaml files generated by sync-catalog.sh
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-catalog-manifests
  namespace: argocd
  labels:
    infraweaver.io/type: catalog-manifests-appset
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
        revision: HEAD
        directories:
          - path: "kubernetes/catalog/*/manifests"
          - path: "kubernetes/catalog/_template/manifests"
            exclude: true
  template:
    metadata:
      # Name: catalog-<app>-manifests, e.g. catalog-wiki-manifests
      name: 'catalog-{{ index (splitList "/" .path.path) 2 }}-manifests'
      namespace: argocd
      labels:
        infraweaver.io/type: catalog-app
    spec:
      project: platform
      source:
        repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
        targetRevision: HEAD
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        # Namespace matches the catalog app directory name (wiki, gatus, etc.)
        namespace: '{{ index (splitList "/" .path.path) 2 }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jsonPointers:
            - /status
            - /metadata/finalizers
          jqPathExpressions:
            - '.spec.data[].remoteRef.conversionStrategy'
            - '.spec.data[].remoteRef.decodingStrategy'
            - '.spec.data[].remoteRef.metadataPolicy'
