---
# catalog-wiki.yaml — Auto-generated by scripts/sync-catalog.sh
# Source: kubernetes/catalog/wiki/catalog.yaml
# Enable/disable this app in platform.yaml under catalog.enabled.
# DO NOT edit manually — changes will be overwritten on next sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-wiki
  namespace: argocd
  labels:
    infraweaver.io/type: catalog-app
  annotations:
    infraweaver.io/description: "Wiki.js self-hosted documentation wiki with Authentik OIDC SSO"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
      targetRevision: HEAD
      ref: values
    - repoURL: "https://charts.js.wiki"
      targetRevision: "3.0.0"
      chart: "wiki"
      helm:
        releaseName: "wiki"
        valueFiles:
          - "$values/kubernetes/catalog/wiki/values.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: "wiki"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: Secret
      jqPathExpressions:
        - '.data["admin-password"]'
        - '.data["admin-user"]'
