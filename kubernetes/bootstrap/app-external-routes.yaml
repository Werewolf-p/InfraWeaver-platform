---
# ArgoCD Application — deploys all external-routes manifests
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-routes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: main
    path: kubernetes/apps/external-routes/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
