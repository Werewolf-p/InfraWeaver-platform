---
# Standalone ArgoCD Application for test-website raw manifests
# This is NOT picked up by the ApplicationSet (which is Helm-only)
# This bootstrap Application directly points to the manifests directory
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-test-website
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/apps/test-website/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: test-website
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
