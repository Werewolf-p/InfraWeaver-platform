---
# ArgoCD Application — Discord webhook bridge for Alertmanager
# Requires Discord webhook URL stored in OpenBao:
#   bao kv put secret/platform/discord webhook_url="https://discord.com/api/webhooks/..."
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-alertmanager-discord
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: alertmanager-discord
    infraweaver.io/type: monitoring
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/monitoring/alertmanager-discord/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /metadata/finalizers
      jqPathExpressions:
        - '.spec.data[].remoteRef.conversionStrategy'
        - '.spec.data[].remoteRef.decodingStrategy'
        - '.spec.data[].remoteRef.metadataPolicy' 
