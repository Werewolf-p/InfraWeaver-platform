---
# Standalone ArgoCD Application for apps-grafana namespace secrets.
# The grafana Helm chart (apps-grafana) manages the Grafana deployment.
# This Application deploys supplementary manifests (ExternalSecret for admin credentials).
#
# NOTE: This is NOT picked up by the ApplicationSet (which is Helm-only).
# It is applied by the bootstrap loop in the platform.yml workflow:
#   for f in kubernetes/bootstrap/*.yaml; do kubectl apply -f "$f"; done
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-grafana-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/apps/grafana/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
