---
# Standalone ArgoCD Application for Wiki.js supporting manifests
# Deploys: Namespace, ExternalSecret, NetworkPolicy
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-wiki-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/platform/wiki/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: wiki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      name: wiki-postgres-secret
      jsonPointers:
        - /status
