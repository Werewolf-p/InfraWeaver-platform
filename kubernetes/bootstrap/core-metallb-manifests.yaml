---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-metallb-manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Remod-Dev/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/core/metallb/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
