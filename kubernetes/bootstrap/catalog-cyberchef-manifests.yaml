---
# ArgoCD Application for CyberChef catalog app
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-cyberchef-manifests
  namespace: argocd
  labels:
    infraweaver.io/type: catalog-app
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: HEAD
    path: kubernetes/catalog/cyberchef/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: cyberchef
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
