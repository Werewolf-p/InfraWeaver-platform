apiVersion: v1
kind: Namespace
metadata:
  name: test-website
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-website
  namespace: test-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-website
  template:
    metadata:
      labels:
        app: test-website
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
      volumes:
      - name: html
        configMap:
          name: test-website-content
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-website-content
  namespace: test-website
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>InfraWeaver - Test Website</title>
    <style>body{font-family:sans-serif;max-width:800px;margin:50px auto;padding:20px;background:#f5f5f5}
    .card{background:white;border-radius:8px;padding:30px;box-shadow:0 2px 4px rgba(0,0,0,.1)}
    h1{color:#2563eb}p{color:#666}.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;background:#dcfce7;color:#166534}</style>
    </head>
    <body>
    <div class="card">
    <h1>🚀 InfraWeaver Platform</h1>
    <span class="badge">✓ PUBLIC</span>
    <p>This test website is publicly accessible via Traefik.</p>
    <p>Other services (ArgoCD, Grafana) require NetBird VPN access.</p>
    <hr>
    <p><strong>Cluster:</strong> infraweaver-prod (Talos v1.10 + Kubernetes 1.33)</p>
    <p><strong>Load Balancer:</strong> MetalLB L2 → 10.25.0.200</p>
    <p><strong>Ingress:</strong> Traefik v3</p>
    </div>
    </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: test-website
  namespace: test-website
spec:
  selector:
    app: test-website
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-website
  namespace: test-website
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: test.prod.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-website
            port:
              number: 80
