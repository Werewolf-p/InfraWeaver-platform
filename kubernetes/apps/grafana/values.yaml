# ── How to configure your app ────────────────────────────────────────────────
# This is a standard Grafana Helm values override.
# All Helm chart values can be overridden here.
# See: https://github.com/grafana/helm-charts/tree/main/charts/grafana

adminUser: admin
# Password is injected from OpenBao via ExternalSecret
existingSecret: grafana-admin-secret
secretKey: admin-password
# Don't generate a random admin password — use existingSecret instead
generateAdminPassword: false

# ── Persistence ──────────────────────────────────────────────────────────────
persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path

# Disable default init container (fails with overlayfs-style mounts on Talos/local-path)
# Grafana user (472) will handle its own directory setup
initChownData:
  enabled: false

# ── Ingress ───────────────────────────────────────────────────────────────────
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.prod.local
    paths:
      - /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: selfsigned-issuer
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.prod.local

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Extra config ──────────────────────────────────────────────────────────────
grafana.ini:
  analytics:
    check_for_updates: false
  server:
    root_url: "https://grafana-apps.local"
