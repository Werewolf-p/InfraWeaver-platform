---
# ExternalSecret — pulls Grafana admin credentials from OpenBao.
# The grafana Helm chart references grafana-admin-secret in its own namespace (apps-grafana).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: apps-grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: secret/platform/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/grafana
        property: admin-password
