---
# ── NetBird Relay Server ──────────────────────────────────────────────────────
# Handles NAT traversal (TURN/relay) for peers that can't connect directly.
# External: 10.25.0.202:33080 (relay WebSocket), 10.25.0.202:3478 (TURN)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-relay
  namespace: netbird
  labels:
    app: netbird-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-relay
  template:
    metadata:
      labels:
        app: netbird-relay
    spec:
      containers:
        - name: relay
          image: netbirdio/relay:latest
          imagePullPolicy: Always
          env:
            - name: NB_EXPOSED_ADDRESS
              value: "rels://10.25.0.202:33080"
            - name: NB_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: turn-password
          ports:
            - name: relay
              containerPort: 33080
            - name: turn
              containerPort: 3478
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
# ── Relay LoadBalancer (external access at 10.25.0.202) ──────────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-relay
  namespace: netbird
spec:
  type: LoadBalancer
  loadBalancerIP: "10.25.0.202"
  selector:
    app: netbird-relay
  ports:
    - name: relay
      port: 33080
      targetPort: 33080
    - name: turn
      port: 3478
      targetPort: 3478
