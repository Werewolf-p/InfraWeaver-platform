---
# NetBird DB Bootstrap Job — runs as ArgoCD PostSync hook
# Fixes JSON type mismatches in policy_rules that prevent peer connectivity:
#   - authorized_groups: [] → {} (Go type map[string][]string needs JSON object)
#   - destination_resource / source_resource: '' → NULL (empty string breaks GORM)
# Also ensures the Default setup key exists for peer registration.
#
# Runs automatically on every ArgoCD sync. Safe to run multiple times (idempotent).
# See .github/memories/netbird-v0.69.0-db-bootstrap.md for full documentation.
apiVersion: batch/v1
kind: Job
metadata:
  name: netbird-db-bootstrap
  namespace: netbird
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: netbird-bootstrap-sa
      restartPolicy: OnFailure
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: netbird-management-data
      initContainers:
        # Wait for management to create the initial DB (accounts table must exist)
        - name: wait-for-db
          image: alpine
          command:
            - sh
            - -c
            - |
              apk add -q sqlite 2>/dev/null
              echo "Waiting for NetBird management to create the DB..."
              for i in $(seq 1 72); do
                COUNT=$(sqlite3 /data/store.db "SELECT COUNT(*) FROM accounts;" 2>/dev/null || echo "0")
                if [ "$COUNT" -ge 1 ] 2>/dev/null; then
                  echo "DB ready — $COUNT account(s) found"
                  exit 0
                fi
                echo "Attempt $i/72: DB not ready (count=$COUNT), waiting 5s..."
                sleep 5
              done
              echo "ERROR: DB not ready after 6 minutes"
              exit 1
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: fix-db
          image: alpine
          command:
            - sh
            - -c
            - |
              set -e
              apk add -q sqlite 2>/dev/null
              DB=/data/store.db

              echo "=== NetBird DB Bootstrap ==="
              ACCOUNT_ID=$(sqlite3 $DB "SELECT id FROM accounts LIMIT 1;")
              echo "Account ID: $ACCOUNT_ID"

              echo ""
              echo "=== Fixing policy_rules JSON types ==="
              # authorized_groups: Go type map[string][]string — needs '{}' not '[]'
              FIXED=$(sqlite3 $DB "UPDATE policy_rules SET authorized_groups = '{}' WHERE authorized_groups = '[]' OR authorized_groups IS NULL OR authorized_groups = ''; SELECT changes();")
              echo "authorized_groups fixed: $FIXED row(s)"

              # destination_resource / source_resource: Go type Resource struct — needs NULL not ''
              sqlite3 $DB "UPDATE policy_rules SET destination_resource = NULL WHERE destination_resource = '' OR destination_resource = 'null';"
              sqlite3 $DB "UPDATE policy_rules SET source_resource = NULL WHERE source_resource = '' OR source_resource = 'null';"
              echo "resource fields fixed"

              echo ""
              echo "=== Ensuring Default setup key exists ==="
              # Key hash = base64(sha256("A1B2C3D4-E5F6-7890-ABCD-EF1234567890"))
              EXISTING=$(sqlite3 $DB "SELECT COUNT(*) FROM setup_keys WHERE id='388f43a5-eb90-4ba0-a7cb-a892408886df';")
              if [ "$EXISTING" = "0" ]; then
                echo "Inserting Default setup key..."
                sqlite3 $DB "INSERT INTO setup_keys (id, account_id, key, key_secret, name, type, used_times, last_used, expires_at, auto_groups, revoked, ephemeral, updated_at, created_at, usage_limit, allow_extra_dns_labels) VALUES ('388f43a5-eb90-4ba0-a7cb-a892408886df', '${ACCOUNT_ID}', 'mewqgKYulb4neyT85tvUyw1QzCAhxDjA9+5h7WeAysw=', 'A1B2C****', 'Default Key', 'reusable', 0, datetime('now'), '2040-01-01 00:00:00', '[]', 0, 0, datetime('now'), datetime('now'), 0, 0);"
                echo "Setup key inserted"
              else
                echo "Setup key already exists"
              fi

              echo ""
              echo "=== Ensuring All group exists ==="
              GRP=$(sqlite3 $DB "SELECT COUNT(*) FROM groups WHERE name='All' AND account_id='${ACCOUNT_ID}';")
              if [ "$GRP" = "0" ]; then
                echo "Inserting All group..."
                sqlite3 $DB "INSERT INTO groups (id, account_id, name, issued, resources, integration_ref_id, integration_ref_integration_type) VALUES ('18d223c6-9999-4444-bbbb-000000000001', '${ACCOUNT_ID}', 'All', 'api', '[]', 0, '');"
              else
                echo "All group exists"
              fi

              echo ""
              echo "=== Ensuring Default policy and rule exist ==="
              POL=$(sqlite3 $DB "SELECT COUNT(*) FROM policies WHERE account_id='${ACCOUNT_ID}';")
              if [ "$POL" = "0" ]; then
                echo "Inserting Default policy..."
                sqlite3 $DB "INSERT INTO policies (id, account_id, name, description, enabled, source_posture_checks) VALUES ('def00001-0000-4000-a000-000000000001', '${ACCOUNT_ID}', 'Default', 'Allow all cluster peers', 1, '[]');"
                sqlite3 $DB "INSERT INTO policy_rules (id, policy_id, name, description, enabled, action, destinations, destination_resource, sources, source_resource, bidirectional, protocol, ports, port_ranges, authorized_groups, authorized_user) VALUES ('def00001-0000-4000-a000-000000000002', 'def00001-0000-4000-a000-000000000001', 'Default', 'Allow all in All group', 1, 'accept', '[\"18d223c6-9999-4444-bbbb-000000000001\"]', NULL, '[\"18d223c6-9999-4444-bbbb-000000000001\"]', NULL, 1, 'all', '[]', '[]', '{}', '');"
                echo "Policy inserted"
              else
                echo "Policy exists ($POL policy/ies) — only fixing types"
              fi

              echo ""
              echo "=== Final state ==="
              echo "policy_rules:"
              sqlite3 $DB "SELECT id, action, authorized_groups, destination_resource, source_resource FROM policy_rules;"
              echo "setup_keys:"
              sqlite3 $DB "SELECT id, name, type FROM setup_keys;"
              echo "=== Bootstrap complete ==="
          volumeMounts:
            - name: data
              mountPath: /data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netbird-bootstrap-sa
  namespace: netbird
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: netbird-bootstrap-role
  namespace: netbird
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: netbird-bootstrap-binding
  namespace: netbird
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: netbird-bootstrap-role
subjects:
  - kind: ServiceAccount
    name: netbird-bootstrap-sa
    namespace: netbird
