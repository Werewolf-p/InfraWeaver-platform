---
# ── NetBird Client DaemonSet ──────────────────────────────────────────────────
# Runs a NetBird client on every K8s node, registering each as a peer.
# Peer name = node hostname (spec.nodeName).
# Requires: netbird-secrets Secret with key SETUP_KEY
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netbird-client
  namespace: netbird
  labels:
    app: netbird-client
spec:
  selector:
    matchLabels:
      app: netbird-client
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: client
          image: netbirdio/netbird:latest
          imagePullPolicy: Always
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: SETUP_KEY
            - name: NB_MANAGEMENT_URL
              value: "https://netbird.rlservers.com"
            - name: NB_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - NET_RAW
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
      hostAliases:
        - ip: "10.25.0.5"
          hostnames:
            - "netbird.rlservers.com"
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
---
# ── NetBird Secrets ───────────────────────────────────────────────────────────
# Setup key used by DaemonSet clients to auto-register as peers.
# Rotate by changing SETUP_KEY and restarting the DaemonSet.
apiVersion: v1
kind: Secret
metadata:
  name: netbird-secrets
  namespace: netbird
type: Opaque
stringData:
  SETUP_KEY: "B9FE5C85-74E7-4013-806C-C48EE62DD2DF"
