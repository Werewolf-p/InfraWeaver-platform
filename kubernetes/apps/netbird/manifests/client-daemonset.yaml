---
# ── NetBird Client DaemonSet ──────────────────────────────────────────────────
# Runs a NetBird client on every K8s node, registering each as a peer.
# Peer name = node hostname (spec.nodeName).
# Requires: netbird-secrets Secret with key SETUP_KEY
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netbird-client
  namespace: netbird
  labels:
    app: netbird-client
spec:
  selector:
    matchLabels:
      app: netbird-client
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: client
          image: netbirdio/netbird:latest
          imagePullPolicy: Always
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: SETUP_KEY
            - name: NB_MANAGEMENT_URL
              value: "https://api-netbird.rlservers.com"
            - name: NB_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # Ensure iptables masquerade for VPN traffic routed to physical network.
                    # NetBird v0.70 sets FORWARD rules but not POSTROUTING masquerade.
                    # Without this, packets from VPN peers (100.64.0.0/10) forwarded to
                    # VLAN3 (eth0) keep the VPN source IP, breaking return routing.
                    sleep 5
                    iptables -t nat -C POSTROUTING -s 100.64.0.0/10 ! -d 100.64.0.0/10 -j MASQUERADE 2>/dev/null || \
                      iptables -t nat -A POSTROUTING -s 100.64.0.0/10 ! -d 100.64.0.0/10 -j MASQUERADE || true
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - NET_RAW
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
            - name: netbird-state
              mountPath: /etc/netbird
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: netbird-state
          hostPath:
            path: /var/lib/netbird-state
            type: DirectoryOrCreate

