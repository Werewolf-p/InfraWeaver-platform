---
# ── NetBird Client DaemonSet ──────────────────────────────────────────────────
# Runs on every cluster node. Creates a WireGuard tunnel back to the management
# server so cluster CIDRs are routable over NetBird VPN.
#
# Routes advertised:
#   10.244.0.0/16  — Flannel pod CIDR
#   10.96.0.0/12   — Kubernetes service CIDR
#   10.25.0.0/24   — Node LAN
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netbird-client
  namespace: netbird
  labels:
    app: netbird-client
spec:
  selector:
    matchLabels:
      app: netbird-client
  template:
    metadata:
      labels:
        app: netbird-client
    spec:
      hostNetwork: false
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: netbird-client
        image: netbirdio/netbird:latest
        env:
        - name: NB_MANAGEMENT_URL
          value: "http://netbird-management.netbird.svc:80"
        - name: NB_SETUP_KEY
          valueFrom:
            secretKeyRef:
              name: netbird-setup-key
              key: setup-key
              optional: true
        - name: NB_LOG_LEVEL
          value: info
        securityContext:
          privileged: true
          capabilities:
            add:
              - NET_ADMIN
              - SYS_MODULE
        volumeMounts:
        - name: tun
          mountPath: /dev/net/tun
        - name: wireguard-dir
          mountPath: /etc/wireguard
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
      volumes:
      - name: tun
        hostPath:
          path: /dev/net/tun
          type: CharDevice
      - name: wireguard-dir
        hostPath:
          path: /var/lib/wireguard
          type: DirectoryOrCreate
      tolerations:
      - operator: "Exists"
