---
# ── NetBird Signal Server ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-signal
  namespace: netbird
  labels:
    app: netbird-signal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-signal
  template:
    metadata:
      labels:
        app: netbird-signal
    spec:
      containers:
      - name: signal
        image: netbirdio/signal:latest
        args:
          - --port=10000
          - --log-file=console
          - --log-level=info
        ports:
        - containerPort: 10000
          name: grpc
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
---
# ── Signal Service (ClusterIP for internal + LoadBalancer for external access) ─
apiVersion: v1
kind: Service
metadata:
  name: netbird-signal
  namespace: netbird
spec:
  selector:
    app: netbird-signal
  ports:
  - port: 10000
    targetPort: 10000
    name: grpc
---
# ── Signal LoadBalancer Service (external access on 10.25.0.202) ─────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-signal-lb
  namespace: netbird
spec:
  type: LoadBalancer
  loadBalancerIP: "10.25.0.202"
  selector:
    app: netbird-signal
  ports:
  - port: 10000
    targetPort: 10000
    name: grpc
