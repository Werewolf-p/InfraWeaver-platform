---
# ── NetBird Secrets ExternalSecret ───────────────────────────────────────────
# Reads turn-password and SETUP_KEY from OpenBao (secret/platform/netbird).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbird-secrets
  namespace: netbird
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: netbird-secrets
    creationPolicy: Owner
  data:
    - secretKey: turn-password
      remoteRef:
        key: secret/platform/netbird
        property: turn-password
    - secretKey: SETUP_KEY
      remoteRef:
        key: secret/platform/netbird
        property: SETUP_KEY
