# ── Management ConfigMap (template) ──────────────────────────────────────────
# The init container substitutes the TURN password from the netbird-secrets Secret
# before writing management.json to the PVC. After first boot, the PVC copy is
# authoritative. To force config update: delete the PVC file and restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbird-management-config
  namespace: netbird
data:
  management.json.template: |
    {
      "Stuns": [{"Proto":"udp","URI":"stun:stun.l.google.com:19302","Username":"","Password":null}],
      "TURNs": [],
      "Relay": {
        "Addresses": ["rels://netbird.rlservers.com:443/relay"],
        "CredentialsTTL": "12h",
        "Secret": "RELAY_SECRET_PLACEHOLDER"
      },
      "Signal": {"Proto":"https","URI":"netbird.rlservers.com:443","Username":"","Password":null},
      "Datadir": "/var/lib/netbird/",
      "HttpConfig": {
        "LetsEncryptDomain":"","CertFile":"","CertKey":"",
        "AuthAudience":"netbird","AuthIssuer":"","AuthKeysLocation":"","AuthUserIDClaim":"",
        "IdpSignKeyRefreshEnabled":true,"OIDCConfigEndpoint":"https://auth.rlservers.com/application/o/netbird/.well-known/openid-configuration"
      },
      "IdpManagerConfig": {"Manager":"none","ExtraConfig":{},"ClientConfig":null},
      "DeviceAuthorizationFlow": null,
      "PKCEAuthorizationFlow": {
        "ProviderConfig": {
          "ClientID": "netbird",
          "ClientSecret": "",
          "Domain": "auth.rlservers.com",
          "Audience": "netbird",
          "TokenEndpoint": "https://auth.rlservers.com/application/o/token/",
          "AuthorizationEndpoint": "https://auth.rlservers.com/application/o/authorize/",
          "Scopes": ["openid", "profile", "email", "offline_access"],
          "RedirectURLs": ["https://netbird.rlservers.com/auth", "https://netbird.rlservers.com/silent-auth", "https://netbird.rlservers.com/#callback", "http://localhost:53000"],
          "UseIDToken": true,
          "DisableRefreshToken": false
        }
      },
      "DataStoreEncryptionKey": "DATASTORE_KEY_PLACEHOLDER"
    }
---
# ── Management PVC ────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netbird-management-data
  namespace: netbird
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
# ── Management StatefulSet ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netbird-management
  namespace: netbird
  labels:
    app: netbird-management
spec:
  serviceName: netbird-management
  replicas: 1
  selector:
    matchLabels:
      app: netbird-management
  template:
    metadata:
      labels:
        app: netbird-management
    spec:
      initContainers:
        # Wait for Authentik OIDC endpoint before starting management.
        # Uses curlimages/curl instead of busybox because busybox wget's TLS library
        # (uClibc) cannot negotiate modern TLS cipher suites with Traefik.
        - name: wait-for-oidc
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              echo "Waiting for Authentik OIDC endpoint..."
              until curl -sf --max-time 5 "https://auth.rlservers.com/application/o/netbird/.well-known/openid-configuration" > /dev/null 2>&1; do
                echo "OIDC endpoint not ready, retrying in 5s..."
                sleep 5
              done
              echo "OIDC endpoint ready!"
        # Substitute sensitive placeholders and copy to PVC only if not already present
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Generating management.json from template (substituting secrets)"
              sed -e "s|DATASTORE_KEY_PLACEHOLDER|${NB_DATASTORE_ENC_KEY}|g" \
                  -e "s|RELAY_SECRET_PLACEHOLDER|${NB_RELAY_SECRET}|g" \
                  /config-source/management.json.template > /var/lib/netbird/management.json
              echo "management.json generated"
          env:
            - name: NB_DATASTORE_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: datastore-enc-key
            - name: NB_RELAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: turn-password
          volumeMounts:
            - name: config-source
              mountPath: /config-source
            - name: data
              mountPath: /var/lib/netbird
      containers:
        - name: management
          image: netbirdio/management:latest
          imagePullPolicy: Always
          args:
            - --port=80
            - --log-file=console
            - --log-level=info
            - --disable-anonymous-metrics=true
            - --single-account-mode-domain=infraweaver.local
            - --dns-domain=netbird.infraweaver.local
            - --config=/var/lib/netbird/management.json
            - --datadir=/var/lib/netbird/
          ports:
            - name: http
              containerPort: 80
            - name: grpc-compat
              containerPort: 33073
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/netbird
      volumes:
        - name: config-source
          configMap:
            name: netbird-management-config
        - name: data
          persistentVolumeClaim:
            claimName: netbird-management-data
---
# ── Management ClusterIP Service ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-management
  namespace: netbird
spec:
  selector:
    app: netbird-management
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: grpc-compat
      port: 33073
      targetPort: 33073
---
# ── Management LoadBalancer (external access at 10.10.0.202) ─────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-management-lb
  namespace: netbird
spec:
  type: LoadBalancer
  loadBalancerIP: "10.10.0.202"
  selector:
    app: netbird-management
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: grpc-compat
      port: 33073
      targetPort: 33073
---
# ── Dashboard Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-dashboard
  namespace: netbird
  labels:
    app: netbird-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-dashboard
  template:
    metadata:
      labels:
        app: netbird-dashboard
    spec:
      containers:
      - name: dashboard
        image: netbirdio/dashboard:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: AUTH_SUPPORTED_SCOPES
          value: "openid profile email offline_access api"
        - name: NETBIRD_MGMT_API_ENDPOINT
          value: "https://netbird.rlservers.com"
        - name: NETBIRD_MGMT_GRPC_API_ENDPOINT
          value: "https://netbird.rlservers.com"
        - name: AUTH_AUDIENCE
          value: "netbird"
        - name: USE_AUTH0
          value: "false"
        - name: AUTH_AUTHORITY
          value: "https://auth.rlservers.com/application/o/netbird/"
        - name: AUTH_CLIENT_ID
          value: "netbird"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
# ── Dashboard Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-dashboard
  namespace: netbird
spec:
  selector:
    app: netbird-dashboard
  ports:
  - port: 80
    targetPort: 80
    name: http
---
# ── Management Ingress (for web dashboard via Traefik) ────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbird-management
  namespace: netbird
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: traefik-netbird-only@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: netbird.prod.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: netbird-management
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netbird-dashboard
                port:
                  number: 80
    # netbird.rlservers.com is handled exclusively by IngressRoutes in external-routes/09-routes-netbird.yaml
    # which apply the stricter netbird-vpn-only middleware (no local LAN access).
