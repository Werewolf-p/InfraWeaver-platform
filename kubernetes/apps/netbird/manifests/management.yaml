# ── Management ConfigMap (template) ──────────────────────────────────────────
# The init container substitutes the TURN password from the netbird-secrets Secret
# before writing management.json to the PVC. After first boot, the PVC copy is
# authoritative. To force config update: delete the PVC file and restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbird-management-config
  namespace: netbird
data:
  management.json.template: |
    {
      "Stuns": [{"Proto":"udp","URI":"stun:stun.l.google.com:19302","Username":"","Password":null}],
      "TURNs": [{"Proto":"udp","URI":"turn:10.25.0.202:3478","Username":"netbird","Password":"TURN_PASSWORD_PLACEHOLDER"}],
      "Signal": {"Proto":"http","URI":"10.25.0.204:10000","Username":"","Password":null},
      "Datadir": "/var/lib/netbird/",
      "HttpConfig": {
        "LetsEncryptDomain":"","CertFile":"","CertKey":"",
        "AuthAudience":"","AuthIssuer":"","AuthKeysLocation":"","AuthUserIDClaim":"",
        "IdpSignKeyRefreshEnabled":false,"OIDCConfigEndpoint":""
      },
      "IdpManagerConfig": {"Manager":"none","ExtraConfig":{},"ClientConfig":null},
      "DeviceAuthorizationFlow": null,
      "PKCEAuthorizationFlow": null
    }
---
# ── Management PVC ────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netbird-management-data
  namespace: netbird
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
# ── Management StatefulSet ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netbird-management
  namespace: netbird
  labels:
    app: netbird-management
spec:
  serviceName: netbird-management
  replicas: 1
  selector:
    matchLabels:
      app: netbird-management
  template:
    metadata:
      labels:
        app: netbird-management
    spec:
      initContainers:
        # Substitute sensitive placeholders and copy to PVC only if not already present
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /var/lib/netbird/management.json ]; then
                echo "Generating management.json from template (substituting secrets)"
                sed -e "s|TURN_PASSWORD_PLACEHOLDER|${NB_TURN_PASSWORD}|g" \
                    /config-source/management.json.template > /var/lib/netbird/management.json
                echo "management.json generated"
              else
                echo "management.json already exists, skipping"
              fi
          env:
            - name: NB_TURN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: turn-password
          volumeMounts:
            - name: config-source
              mountPath: /config-source
            - name: data
              mountPath: /var/lib/netbird
      containers:
        - name: management
          image: netbirdio/management:latest
          imagePullPolicy: Always
          args:
            - --port=80
            - --log-file=console
            - --log-level=info
            - --disable-anonymous-metrics=true
            - --single-account-mode-domain=infraweaver.local
            - --dns-domain=netbird.infraweaver.local
            - --config=/var/lib/netbird/management.json
            - --datadir=/var/lib/netbird/
          ports:
            - name: http
              containerPort: 80
            - name: grpc-compat
              containerPort: 33073
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/netbird
      volumes:
        - name: config-source
          configMap:
            name: netbird-management-config
        - name: data
          persistentVolumeClaim:
            claimName: netbird-management-data
---
# ── Management ClusterIP Service ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-management
  namespace: netbird
spec:
  selector:
    app: netbird-management
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: grpc-compat
      port: 33073
      targetPort: 33073
---
# ── Management LoadBalancer (external access at 10.25.0.203) ─────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-management-lb
  namespace: netbird
spec:
  type: LoadBalancer
  loadBalancerIP: "10.25.0.203"
  selector:
    app: netbird-management
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: grpc-compat
      port: 33073
      targetPort: 33073
---
# ── Dashboard Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-dashboard
  namespace: netbird
  labels:
    app: netbird-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-dashboard
  template:
    metadata:
      labels:
        app: netbird-dashboard
    spec:
      containers:
      - name: dashboard
        image: netbirdio/dashboard:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: AUTH_SUPPORTED_SCOPES
          value: "openid profile email offline_access api"
        - name: NETBIRD_MGMT_API_ENDPOINT
          value: "http://netbird-management.netbird.svc:80"
        - name: NETBIRD_MGMT_GRPC_API_ENDPOINT
          value: "http://netbird-management.netbird.svc:33073"
        - name: AUTH_AUDIENCE
          value: "netbird"
        - name: USE_AUTH0
          value: "false"
        - name: AUTH_AUTHORITY
          value: ""
        - name: AUTH_CLIENT_ID
          value: ""
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
# ── Dashboard Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-dashboard
  namespace: netbird
spec:
  selector:
    app: netbird-dashboard
  ports:
  - port: 80
    targetPort: 80
    name: http
---
# ── Management Ingress (for web dashboard via Traefik) ────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbird-management
  namespace: netbird
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: traefik-netbird-only@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: netbird.prod.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: netbird-management
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netbird-dashboard
                port:
                  number: 80
