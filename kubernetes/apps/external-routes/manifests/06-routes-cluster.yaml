---
# IngressRoutes for K8s cluster apps on *.rlservers.com
# These replace the HTTP-only Ingresses for rlservers.com hosts.
# All routes use VPN-only access (traefik-netbird-only@kubernetescrd) except test-website.

# ── ArgoCD ───────────────────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-rlservers
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-only
          namespace: traefik
      services:
        - name: argocd-server
          port: 80
  tls: {}
---
# ── Grafana ───────────────────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-rlservers
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-only
          namespace: traefik
      services:
        - name: grafana-apps
          port: 80
  tls: {}
---
# ── Longhorn ──────────────────────────────────────────────────────────────────
