---
# Homepage — homelab dashboard IngressRoute
# Internal-only: restricted to LAN + NetBird VPN via internal-only middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home.rlservers.com`)
      kind: Rule
      middlewares:
        - name: internal-only
          namespace: traefik
      services:
        - name: homepage
          namespace: traefik
          port: 3000
  tls: {}
