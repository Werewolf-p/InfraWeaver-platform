---
# Wildcard certificate for *.rlservers.com
# Stored in traefik namespace, used as TLSStore default cert.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rlservers-com-wildcard
  namespace: traefik
spec:
  secretName: rlservers-com-wildcard-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  commonName: "*.rlservers.com"
  dnsNames:
    - "*.rlservers.com"
    - "rlservers.com"
    - "*.gitlab.rlservers.com"
---
# Certificate for yonavaarwater.nl
apiVersion: cert-manager.io/v1
kind: Certificate
