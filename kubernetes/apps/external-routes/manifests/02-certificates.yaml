---
# Certificate for rlservers.com — all explicit subdomains (HTTP-01, no wildcard)
# Secret kept as rlservers-com-wildcard-tls so TLSStore default still works.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rlservers-com-wildcard
  namespace: traefik
spec:
  secretName: rlservers-com-wildcard-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "rlservers.com"
    - "www.rlservers.com"
    - "argocd.rlservers.com"
    - "grafana.rlservers.com"
    - "longhorn.rlservers.com"
    - "openbao.rlservers.com"
    - "netbird.rlservers.com"
    - "test.rlservers.com"
    - "traefik.rlservers.com"
    - "gitlab.rlservers.com"
    - "registry.gitlab.rlservers.com"
    - "registry.rlservers.com"
    - "bitwarden.rlservers.com"
    - "bitwarden-admin.rlservers.com"
    - "portainer.rlservers.com"
    - "portainer2.rlservers.com"
    - "proxmox.rlservers.com"
    - "truenas.rlservers.com"
    - "adguard.rlservers.com"
    - "cloud.rlservers.com"
    - "keycloak.rlservers.com"
    - "auth.rlservers.com"
    - "ansible.rlservers.com"
    - "awx.rlservers.com"
    - "vault1.rlservers.com"
    - "overseer.rlservers.com"
    - "radarr.rlservers.com"
    - "sonarr.rlservers.com"
    - "wazuh.rlservers.com"
    - "indexer.wazuh.rlservers.com"
    - "teleport.rlservers.com"
    - "degoudentijd.rlservers.com"
    - "feestinhetdonker.rlservers.com"
    - "marcel.rlservers.com"
    - "wiki.rlservers.com"
---
# Certificate for yonavaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yonavaarwater-nl
  namespace: traefik
spec:
  secretName: yonavaarwater-nl-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "yonavaarwater.nl"
    - "www.yonavaarwater.nl"
    - "ot.yonavaarwater.nl"
---
# Certificate for zonnevaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zonnevaarwater-nl
  namespace: traefik
spec:
  secretName: zonnevaarwater-nl-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "zonnevaarwater.nl"
    - "www.zonnevaarwater.nl"
---
# Certificate for waterdance.nl
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: waterdance-nl
  namespace: traefik
spec:
  secretName: waterdance-nl-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "waterdance.nl"
