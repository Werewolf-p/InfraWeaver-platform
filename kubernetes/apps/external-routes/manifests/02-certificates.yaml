---
# Certificate for rlservers.com — publicly-accessible subdomains (HTTP-01)
# auth.rlservers.com is bundled here (not a separate cert) to share the rate-limit allowance.
# netbird.rlservers.com → individual cert (separate to avoid cascading on VPN entry point).
# Internal cluster apps (argocd, grafana, longhorn, openbao, homepage) → *.int.rlservers.com wildcard
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rlservers-com-wildcard
  namespace: traefik
spec:
  secretName: rlservers-com-wildcard-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "rlservers.com"
    - "www.rlservers.com"
    - "auth.rlservers.com"
    - "netbird.rlservers.com"
    - "api-netbird.rlservers.com"
    - "traefik.rlservers.com"
    - "ansible.rlservers.com"
    - "test.rlservers.com"
    - "degoudentijd.rlservers.com"
    - "feestinhetdonker.rlservers.com"
    - "marcel.rlservers.com"
---
# Certificate for *.int.rlservers.com — private/VPN-only domain, DNS-01 required
# DNS-only Cloudflare record → 10.10.0.200 (private IP, unreachable without VPN)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: int-rlservers-com-wildcard
  namespace: traefik
spec:
  secretName: int-rlservers-com-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "*.int.rlservers.com"
---
# Certificate for yonavaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yonavaarwater-nl
  namespace: traefik
spec:
  secretName: yonavaarwater-nl-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "yonavaarwater.nl"
    - "www.yonavaarwater.nl"
    - "ot.yonavaarwater.nl"
---
# Certificate for zonnevaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zonnevaarwater-nl
  namespace: traefik
spec:
  secretName: zonnevaarwater-nl-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "zonnevaarwater.nl"
    - "www.zonnevaarwater.nl"
---
# Certificate for waterdance.nl
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: waterdance-nl
  namespace: traefik
spec:
  secretName: waterdance-nl-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
