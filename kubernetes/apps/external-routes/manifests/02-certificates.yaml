---
# Certificate for rlservers.com — only publicly-accessible subdomains (HTTP-01)
# auth.rlservers.com, netbird.rlservers.com → individual certs (prevent rate-limit cascades)
# Internal cluster apps (argocd, grafana, longhorn, openbao, homepage) → *.int.rlservers.com wildcard
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rlservers-com-wildcard
  namespace: traefik
spec:
  secretName: rlservers-com-wildcard-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "rlservers.com"
    - "www.rlservers.com"
    - "traefik.rlservers.com"
    - "ansible.rlservers.com"
    - "test.rlservers.com"
    - "degoudentijd.rlservers.com"
    - "feestinhetdonker.rlservers.com"
    - "marcel.rlservers.com"
---
# Individual cert for auth.rlservers.com — critical for SSO/Authentik
# Separate cert ensures SSO keeps working even when the main bundle hits rate limits.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-rlservers-com
  namespace: traefik
spec:
  secretName: auth-rlservers-com-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "auth.rlservers.com"
---
# Individual cert for netbird.rlservers.com — critical for VPN management
# Separate cert ensures NetBird keeps working even when the main bundle hits rate limits.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: netbird-rlservers-com
  namespace: traefik
spec:
  secretName: netbird-rlservers-com-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "netbird.rlservers.com"
---
# Certificate for *.int.rlservers.com — private/VPN-only domain, DNS-01 required
# DNS-only Cloudflare record → 10.10.0.200 (private IP, unreachable without VPN)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: int-rlservers-com-wildcard
  namespace: traefik
spec:
  secretName: int-rlservers-com-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "int.rlservers.com"
    - "*.int.rlservers.com"
---
# Certificate for yonavaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yonavaarwater-nl
  namespace: traefik
spec:
  secretName: yonavaarwater-nl-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "yonavaarwater.nl"
    - "www.yonavaarwater.nl"
    - "ot.yonavaarwater.nl"
---
# Certificate for zonnevaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zonnevaarwater-nl
  namespace: traefik
spec:
  secretName: zonnevaarwater-nl-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "zonnevaarwater.nl"
    - "www.zonnevaarwater.nl"
---
# Certificate for waterdance.nl
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: waterdance-nl
  namespace: traefik
spec:
  secretName: waterdance-nl-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "waterdance.nl"

