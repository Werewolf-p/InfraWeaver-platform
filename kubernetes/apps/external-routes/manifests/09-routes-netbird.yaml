---
# NetBird IngressRoute — dashboard only at netbird.rlservers.com
# API/gRPC/Signal/Relay → api.netbird.rlservers.com (see 10-routes-netbird-api.yaml)
#
# Dashboard (catch-all /) → dashboard:80

# ── Dashboard (publicly accessible for web login) ────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.rlservers.com`)
      kind: Rule
      priority: 10
      services:
        - name: netbird-dashboard
          port: 80
  tls:
    secretName: rlservers-com-wildcard-tls

