---
# Catch-all HTTP → HTTPS redirect on the web (port 80) entrypoint.
# Excludes /.well-known/acme-challenge/ so cert-manager HTTP-01 solver can respond.
# This replaces the entrypoint-level redirect (which can't be bypassed by routes).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`) && !PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-https
          namespace: traefik
      services:
        - name: noop@internal
          kind: TraefikService
---
# Middleware: redirect-to-https — HTTP → HTTPS permanent redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Middleware: internal-only — allows homelab LAN + VPN, blocks public internet
# NetBird masquerade=true means VPN clients appear as node LAN IPs (10.25.0.0/24).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: internal-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 10.25.0.0/24      # Homelab LAN + NetBird VPN masquerade (node IPs)
      - 10.25.90.0/24     # Homelab subnet variant
      - 192.168.1.0/24    # Home LAN
      - 172.25.0.0/16     # Docker/internal
      - 100.64.0.0/10     # NetBird CGNAT (direct WireGuard peers)
      - 127.0.0.1/32      # Localhost
---
# Middleware: netbird-vpn-only — allows ONLY NetBird VPN clients, blocks local LAN access.
#
# NetBird route 10.25.0.0/24 has masquerade=true. External VPN peers (100.64.x.x) reach
# Traefik via the K8s netbird-client DaemonSet pods, which masquerade traffic through their
# node's LAN IP. Due to kube-proxy SNAT in various scenarios, the source IP Traefik sees
# depends on whether the traffic is same-node (hairpin) or cross-node (flannel VTEP):
#
#   Same node (hairpin NAT):  source = CNI bridge IP (10.244.x.1)
#   Cross-node (via flannel): source = flannel VTEP IP (10.244.x.0)
#   Direct peer:              source = NetBird CGNAT IP (100.64.x.x)
#
# All internal K8s cluster traffic originates from 10.244.0.0/16. Allowing this entire
# pod CIDR covers all NetBird-masquerade paths while blocking local LAN users (10.25.0.x).
#
# Local LAN IPs (e.g. 10.25.0.50, 10.25.0.108) are NOT in any range → 403 Forbidden.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: netbird-vpn-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 100.64.0.0/10     # NetBird CGNAT CIDR (direct WireGuard peers, no masquerade)
      - 10.244.0.0/16     # K8s pod CIDR — all NetBird-masqueraded traffic arrives here
                          # (hairpin via cni bridge 10.244.x.1, cross-node via flannel VTEP 10.244.x.0)
---
# Middleware: add-https-headers — sets X-Forwarded-Proto for backends
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: add-https-headers
  namespace: traefik
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
# Middleware: forward-auth — delegates authentication to auth.rlservers.com
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: traefik
spec:
  forwardAuth:
    address: "https://auth.rlservers.com"
    trustForwardHeader: true
