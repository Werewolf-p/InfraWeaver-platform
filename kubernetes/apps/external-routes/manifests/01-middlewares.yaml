---
# Catch-all HTTP → HTTPS redirect on the web (port 80) entrypoint.
# Excludes /.well-known/acme-challenge/ so cert-manager HTTP-01 solver can respond.
# This replaces the entrypoint-level redirect (which can't be bypassed by routes).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`) && !PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-https
          namespace: traefik
      services:
        - name: noop@internal
          kind: TraefikService
---
# Middleware: redirect-to-https — HTTP → HTTPS permanent redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Middleware: internal-only — allows homelab LAN + VPN, blocks public internet
# NetBird masquerade=true means VPN clients appear as node LAN IPs (10.25.0.0/24).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: internal-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 10.25.0.0/24      # Homelab LAN + NetBird VPN masquerade (node IPs)
      - 10.25.90.0/24     # Homelab subnet variant
      - 192.168.1.0/24    # Home LAN
      - 172.25.0.0/16     # Docker/internal
      - 100.64.0.0/10     # NetBird CGNAT (direct WireGuard peers)
      - 127.0.0.1/32      # Localhost
---
# Middleware: netbird-vpn-only — allows ONLY NetBird VPN clients, blocks local LAN access.
#
# NetBird route 10.25.0.0/24 has masquerade=true. External VPN peers (100.64.x.x) reach
# Traefik via the K8s netbird-client DaemonSet pods, which masquerade traffic through their
# node's LAN IP. Traefik sees the K8s node IP, NOT the peer's CGNAT IP.
#
# Hairpin NAT edge case: when the VPN traffic arrives on the SAME node as Traefik,
# kube-proxy applies MASQUERADE and the source IP becomes the node's CNI bridge IP (10.244.x.1).
#
# Allow list:
#   - 10.25.0.90-92 : K8s nodes (masquerade exit points for VPN clients, cross-node traffic)
#   - 10.244.0.1-2.1: K8s CNI bridge IPs (hairpin NAT on same node as Traefik)
#   - 100.64.0.0/10 : Direct WireGuard peers (if masquerade is disabled or for direct access)
#
# Local LAN IPs (e.g. 10.25.0.50) are NOT in this list → 403 Forbidden.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: netbird-vpn-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 100.64.0.0/10     # NetBird CGNAT CIDR (direct WireGuard peers)
      - 10.25.0.90/32     # K8s node talos-prod-cp1 (masquerade exit for VPN clients)
      - 10.25.0.91/32     # K8s node talos-prod-cp2 (masquerade exit for VPN clients)
      - 10.25.0.92/32     # K8s node talos-prod-cp3 (masquerade exit for VPN clients)
      - 10.244.0.1/32     # CNI bridge talos-prod-cp3 (hairpin NAT same-node traffic)
      - 10.244.1.1/32     # CNI bridge talos-prod-cp2 (hairpin NAT same-node traffic)
      - 10.244.2.1/32     # CNI bridge talos-prod-cp1 (hairpin NAT same-node traffic)
---
# Middleware: add-https-headers — sets X-Forwarded-Proto for backends
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: add-https-headers
  namespace: traefik
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
# Middleware: forward-auth — delegates authentication to auth.rlservers.com
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: traefik
spec:
  forwardAuth:
    address: "https://auth.rlservers.com"
    trustForwardHeader: true
