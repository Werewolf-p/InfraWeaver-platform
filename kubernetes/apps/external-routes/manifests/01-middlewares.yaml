---
# Catch-all HTTP → HTTPS redirect on the web (port 80) entrypoint.
# Excludes /.well-known/acme-challenge/ so cert-manager HTTP-01 solver can respond.
# This replaces the entrypoint-level redirect (which can't be bypassed by routes).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`) && !PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-https
          namespace: traefik
      services:
        - name: noop@internal
          kind: TraefikService
---
# Middleware: redirect-to-https — HTTP → HTTPS permanent redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Middleware: internal-only — allows homelab LAN + VPN, blocks public internet
# NetBird masquerade=true means VPN clients appear as node LAN IPs (10.25.0.0/24).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: internal-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 10.25.0.0/24      # Homelab LAN + NetBird VPN masquerade (node IPs on eth0)
      - 10.10.0.0/24      # VLAN 3 — K8s nodes masquerade VPN traffic via eth1
      - 10.25.90.0/24     # Homelab subnet variant
      - 192.168.1.0/24    # Home LAN
      - 172.25.0.0/16     # Docker/internal
      - 100.64.0.0/10     # NetBird CGNAT (direct WireGuard peers)
      - 127.0.0.1/32      # Localhost
---
# Middleware: netbird-vpn-only — allows ONLY traffic that came through the NetBird routing peer.
#
# Architecture:
#   - netbird-router-vlan3 VM at 10.10.0.10 runs the NetBird client as a routing peer
#   - VPN clients route 10.10.0.0/24 traffic through this VM
#   - The routing VM masquerades traffic (SNAT) → Traefik sees source = 10.10.0.10
#   - Pod CIDR (10.244.0.0/16) allowed for in-cluster health probes
#   - 100.64.0.0/10 allowed for direct WireGuard peer connections (NetBird CGNAT)
#
# This middleware is applied ONLY to *.int.rlservers.com routes.
# The security model: 10.10.0.200 is a private IP (unreachable from internet) AND
# only the routing peer's source IP passes this allowlist. Both layers are required.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: netbird-vpn-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 100.64.0.0/10     # NetBird CGNAT CIDR (direct WireGuard peers, no masquerade)
      - 10.244.0.0/16     # K8s pod CIDR — in-cluster health probes
      - 10.10.0.10/32     # NetBird routing peer (netbird-router-vlan3) — VPN masquerade IP
---
# Middleware: add-https-headers — sets X-Forwarded-Proto for backends
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: add-https-headers
  namespace: traefik
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
# Middleware: forward-auth — delegates authentication to auth.rlservers.com
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: traefik
spec:
  forwardAuth:
    address: "https://auth.rlservers.com"
    trustForwardHeader: true
