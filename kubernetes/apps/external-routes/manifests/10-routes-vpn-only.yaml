---
# IngressRoutes for *.int.rlservers.com — private/VPN-only services.
#
# Architecture:
#   - Cloudflare DNS-only wildcard: *.int.rlservers.com → 10.10.0.200 (no proxy)
#   - 10.10.0.200 is a private VLAN3 IP — unreachable from the public internet
#   - Browser DoH resolvers return 10.10.0.200 but TCP fails without VPN route
#   - VPN clients have 10.10.0.0/24 in routing table via wt0 → can reach Traefik
#   - netbird-vpn-only middleware is kept as defense-in-depth
#
# TLS: int-rlservers-com-tls (wildcard cert via letsencrypt-cloudflare DNS-01)

# ── NetBird Dashboard ─────────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-dashboard-int
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: netbird-dashboard
          port: 80
  tls:
    secretName: int-rlservers-com-tls
---
