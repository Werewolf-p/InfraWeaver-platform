---
# ExternalName Services — allow IngressRoutes in traefik namespace to reach K8s services
# in other namespaces without cross-namespace service references.

# ArgoCD
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: traefik
spec:
  type: ExternalName
  externalName: argocd-server.argocd.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# Grafana (apps-grafana)
apiVersion: v1
kind: Service
metadata:
  name: grafana-apps
  namespace: traefik
spec:
  type: ExternalName
  externalName: grafana.apps-grafana.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# Longhorn
apiVersion: v1
kind: Service
metadata:
  name: longhorn-frontend
  namespace: traefik
spec:
  type: ExternalName
  externalName: longhorn-frontend.longhorn-system.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# OpenBao
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: traefik
spec:
  type: ExternalName
  externalName: openbao.openbao.svc.cluster.local
  ports:
