apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns
  namespace: dns-system
  labels:
    app: coredns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coredns
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: coredns
    spec:
      # Spread across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: coredns
      containers:
        - name: coredns
          image: coredns/coredns:1.11.3
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - containerPort: 53
              protocol: UDP
              name: dns-udp
            - containerPort: 53
              protocol: TCP
              name: dns-tcp
            - containerPort: 8080
              protocol: TCP
              name: health
            - containerPort: 8181
              protocol: TCP
              name: ready
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/coredns/Corefile
              subPath: Corefile
            - name: zones
              mountPath: /etc/coredns/zones
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: coredns-custom-config
            items:
              - key: Corefile
                path: Corefile
        - name: zones
          configMap:
            name: coredns-custom-config
            items:
              - key: rlservers.com.hosts
                path: rlservers.com.hosts
              - key: prod.local.hosts
                path: prod.local.hosts
