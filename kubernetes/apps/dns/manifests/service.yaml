apiVersion: v1
kind: Service
metadata:
  name: coredns
  namespace: dns-system
  annotations:
    # Static MetalLB IP — accessible from 10.25.0.0/24 LAN and NetBird VPN clients
    metallb.universe.tf/loadBalancerIPs: "10.25.0.201"
  labels:
    app: coredns
spec:
  type: LoadBalancer
  # Preserve source IP so logs show real client addresses
  externalTrafficPolicy: Local
  selector:
    app: coredns
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
