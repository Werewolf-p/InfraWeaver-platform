  rlservers.com.hosts: |
    # rlservers.com — internal A records
    # Cluster services point directly to internal Traefik (10.25.0.200) — no double-hop via external VM
    # Non-cluster services (Proxmox, TrueNAS, etc.) still route via external Traefik (10.25.0.5)

    10.25.0.200  argocd.rlservers.com
