---
# ── InfraWeaver Branding Blueprint ───────────────────────────────────────────
# Applies the InfraWeaver Prime dark theme to the Authentik login page.
# Custom CSS uses PatternFly variable overrides + card glow effect.
# Loaded via blueprints.configMaps in values.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-branding
  namespace: authentik
data:
  branding.yaml: |
    version: 1
    metadata:
      name: InfraWeaver Branding
    entries:
      # Update the default brand with InfraWeaver theme
      - model: authentik_brands.brand
        state: present
        identifiers:
          domain: authentik-default
        attrs:
          branding_title: "InfraWeaver"
          branding_logo: "/static/dist/assets/icons/icon_left_brand.svg"
          branding_favicon: "/static/dist/assets/icons/icon.png"
          ui_user_settings_enabled: true
          default_application: null
          branding_custom_css: |
            /* ── InfraWeaver Prime Dark Theme ─────────────────────────────── */
            /* Palette: bg=#0a0e17 surface=#111827 primary=#00d8ff green=#9fef00 */
            /* Authentik 2026.x: inner form stages use Lit web components with   */
            /* Shadow DOM. Use CSS custom properties (--pf-global--*) which      */
            /* pierce Shadow DOM boundaries. Light-DOM selectors cover the outer */
            /* container and page background.                                    */

            /* ── Global PatternFly variable overrides (pierce Shadow DOM) ──── */
            :root {
              --pf-global--BackgroundColor--100: #111827;
              --pf-global--BackgroundColor--200: #0a0e17;
              --pf-global--BackgroundColor--light-100: #111827;
              --pf-global--BackgroundColor--light-200: #0d1526;
              --pf-global--BackgroundColor--light-300: #060c18;
              --pf-global--primary-color--100: #00d8ff;
              --pf-global--primary-color--200: #00aece;
              --pf-global--active-color--100: #00d8ff;
              --pf-global--Color--100: #e2e8f0;
              --pf-global--Color--200: #94a3b8;
              --pf-global--Color--300: #64748b;
              --pf-global--BorderColor--100: #1e2d45;
              --pf-global--BorderColor--200: #1e2d45;
              --pf-global--link--Color: #00d8ff;
              --pf-global--link--Color--hover: #33e4ff;
              --pf-global--link--Color--visited: #00b8d9;
              --pf-global--BoxShadow--sm: 0 0 10px rgba(0, 216, 255, 0.15);
              --pf-global--BoxShadow--md: 0 0 25px rgba(0, 216, 255, 0.12), 0 20px 60px rgba(0,0,0,0.6);
              --pf-global--BorderRadius--lg: 12px;
              --pf-global--success-color--100: #9fef00;
              --pf-global--danger-color--100: #ff4757;
              --pf-global--warning-color--100: #f59e0b;
            }

            /* ── Page background (light DOM outer container) ─────────────── */
            body,
            html,
            .pf-c-page__drawer,
            .pf-c-background-image {
              background-color: #0a0e17 !important;
              background-image:
                linear-gradient(rgba(0, 216, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 216, 255, 0.025) 1px, transparent 1px) !important;
              background-size: 50px 50px !important;
            }

            /* ── Login outer wrapper — transparent so grid shows through ─── */
            .pf-c-login {
              background: transparent !important;
            }

            /* ── Login card (light DOM in 2026.x — direct child of .pf-c-login) */
            .pf-c-login__main {
              background: #111827 !important;
              border: 1px solid rgba(0, 216, 255, 0.25) !important;
              border-top: 3px solid #00d8ff !important;
              border-radius: 12px !important;
              box-shadow:
                0 0 40px rgba(0, 216, 255, 0.12),
                0 0 80px rgba(0, 216, 255, 0.05),
                0 20px 60px rgba(0, 0, 0, 0.6) !important;
            }

            /* ── Login card header ────────────────────────────────────────── */
            .pf-c-login__main-header {
              background: linear-gradient(135deg, #060c18 0%, #0a0e17 100%) !important;
              border-bottom: 1px solid #1e2d45 !important;
              padding: 24px !important;
            }
            .pf-c-login__main-header .pf-c-title,
            .pf-c-login__main-header h1,
            .pf-c-login__main-header h2 {
              color: #e2e8f0 !important;
              font-weight: 800 !important;
            }
            .pf-c-login__main-header-desc {
              color: #475569 !important;
              font-size: 12px !important;
              text-transform: uppercase;
              letter-spacing: 1.5px;
            }

            /* ── Form body and footer ─────────────────────────────────────── */
            .pf-c-login__main-body,
            .pf-c-login__main-footer {
              background: #111827 !important;
            }
            .pf-c-login__footer {
              background: #060c18 !important;
              border-top: 1px solid #1e2d45 !important;
            }
            .pf-c-login__footer p,
            .pf-c-login__footer a {
              color: #334155 !important;
              font-size: 11px !important;
            }

            /* ── Form labels ──────────────────────────────────────────────── */
            .pf-c-form__label-text,
            label {
              color: #94a3b8 !important;
              font-size: 11px !important;
              text-transform: uppercase;
              letter-spacing: 1px;
            }

            /* ── Text inputs ──────────────────────────────────────────────── */
            .pf-c-form-control,
            input[type="text"],
            input[type="password"],
            input[type="email"] {
              background: #060c18 !important;
              border: 1px solid #1e2d45 !important;
              color: #e2e8f0 !important;
              border-radius: 6px !important;
            }
            .pf-c-form-control:focus,
            .pf-c-form-control:focus-within,
            input:focus {
              border-color: #00d8ff !important;
              box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2) !important;
              outline: none !important;
            }
            .pf-c-form-control::placeholder,
            input::placeholder {
              color: #334155 !important;
            }

            /* ── Primary button ───────────────────────────────────────────── */
            .pf-c-button.pf-m-primary,
            button[type="submit"] {
              background: #00d8ff !important;
              color: #060c18 !important;
              font-weight: 800 !important;
              border: none !important;
              border-radius: 6px !important;
              text-transform: uppercase !important;
              letter-spacing: 1px !important;
              font-size: 12px !important;
            }
            .pf-c-button.pf-m-primary:hover,
            button[type="submit"]:hover {
              background: #33e4ff !important;
              box-shadow: 0 0 20px rgba(0, 216, 255, 0.4) !important;
            }

            /* ── Secondary/link buttons ───────────────────────────────────── */
            .pf-c-button.pf-m-link,
            .pf-c-button.pf-m-inline {
              color: #00d8ff !important;
            }

            /* ── Links ────────────────────────────────────────────────────── */
            a { color: #00d8ff !important; }
            a:hover { color: #33e4ff !important; }

            /* ── Alert messages ───────────────────────────────────────────── */
            .pf-c-alert.pf-m-danger {
              background: rgba(255, 71, 87, 0.1) !important;
              border-color: #ff4757 !important;
            }
            .pf-c-alert.pf-m-warning {
              background: rgba(245, 158, 11, 0.1) !important;
              border-color: #f59e0b !important;
            }

            /* ── Dividers / dropdowns ─────────────────────────────────────── */
            .pf-c-divider { background: #1e2d45 !important; }
            .pf-c-select__menu,
            .pf-c-dropdown__menu {
              background: #111827 !important;
              border-color: #1e2d45 !important;
            }
            .pf-c-select__menu-item:hover,
            .pf-c-dropdown__menu-item:hover { background: #1a2035 !important; }

            /* ── Tab navigation ───────────────────────────────────────────── */
            .pf-c-tabs__item.pf-m-current .pf-c-tabs__link {
              color: #00d8ff !important;
              border-bottom-color: #00d8ff !important;
            }
            .pf-c-tabs__link {
              color: #64748b !important;
              background: transparent !important;
            }

            /* ── Authentik header brand ───────────────────────────────────── */
            .ak-brand .pf-c-page__header-brand-link {
              color: #00d8ff !important;
              font-weight: 700 !important;
              letter-spacing: 1px !important;
            }
