---
# ── InfraWeaver Branding Blueprint ───────────────────────────────────────────
# Applies the InfraWeaver Prime dark theme to the Authentik login page.
# Custom CSS uses PatternFly variable overrides + card glow effect.
# Loaded via blueprints.configMaps in values.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-branding
  namespace: authentik
data:
  branding.yaml: |
    version: 1
    metadata:
      name: InfraWeaver Branding
    entries:
      # Create a recovery flow so password reset emails can be sent
      - model: authentik_flows.flow
        state: present
        identifiers:
          slug: default-recovery-flow
        attrs:
          name: Default Recovery Flow
          title: Account Recovery
          designation: recovery

      # Bind password-change-prompt stage (order 0) — shows new-password form
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, default-recovery-flow]]
          stage: !Find [authentik_stages_prompt.promptstage, [name, default-password-change-prompt]]
        attrs:
          order: 0

      # Bind user-write stage (order 10) — persists new password
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, default-recovery-flow]]
          stage: !Find [authentik_stages_user_write.userwritestage, [name, default-password-change-write]]
        attrs:
          order: 10

      # Update the default brand with InfraWeaver theme + recovery flow
      - model: authentik_brands.brand
        state: present
        identifiers:
          domain: authentik-default
        attrs:
          branding_title: "rlservers.com"
          branding_logo: "/static/dist/assets/icons/banner.jpg"
          branding_favicon: "/static/dist/assets/icons/favicon.png"
          ui_user_settings_enabled: true
          default: true
          default_application: null
          flow_recovery: !Find [authentik_flows.flow, [slug, default-recovery-flow]]
          branding_custom_css: |
            /* ── InfraWeaver — Space Aurora Theme ──────────────────────────── */
            /* Static aurora gradient background + glassmorphism card           */
            /* Full-width banner at card top, no constant animations            */

            /* ── PatternFly variable overrides ──────────────────────────────── */
            :root {
              --pf-global--BackgroundColor--100: #0d1123;
              --pf-global--BackgroundColor--200: #070b14;
              --pf-global--BackgroundColor--light-100: #0d1123;
              --pf-global--BackgroundColor--light-200: #0a0f1e;
              --pf-global--BackgroundColor--light-300: #070b14;
              --pf-global--primary-color--100: #6366f1;
              --pf-global--primary-color--200: #4f46e5;
              --pf-global--active-color--100: #818cf8;
              --pf-global--Color--100: #e2e8f0;
              --pf-global--Color--200: #94a3b8;
              --pf-global--Color--300: #64748b;
              --pf-global--BorderColor--100: rgba(99, 102, 241, 0.2);
              --pf-global--BorderColor--200: rgba(99, 102, 241, 0.2);
              --pf-global--link--Color: #818cf8;
              --pf-global--link--Color--hover: #a5b4fc;
              --pf-global--link--Color--visited: #6366f1;
              --pf-global--BoxShadow--sm: 0 0 20px rgba(99, 102, 241, 0.12);
              --pf-global--BoxShadow--md: 0 20px 60px rgba(0, 0, 0, 0.5);
              --pf-global--BorderRadius--lg: 12px;
              --pf-global--success-color--100: #22c55e;
              --pf-global--danger-color--100: #ef4444;
              --pf-global--warning-color--100: #f59e0b;
            }

            /* ── Deep space base ──────────────────────────────────────────── */
            html {
              background-color: #070b14 !important;
              min-height: 100vh;
            }
            body,
            .pf-c-page__drawer,
            .pf-c-background-image {
              background-color: transparent !important;
              background-image: none !important;
            }

            /* ── Aurora gradient (static — no animation) ─────────────────── */
            html::before {
              content: '';
              position: fixed;
              inset: 0;
              background:
                radial-gradient(ellipse 70% 55% at 10% 5%,  rgba(99, 102, 241, 0.22) 0%, transparent 60%),
                radial-gradient(ellipse 55% 45% at 88% 92%, rgba(139, 92, 246, 0.20) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 92% 8%,  rgba(59, 130, 246, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 5% 90%,  rgba(16, 185, 129, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse 60% 30% at 50% 50%, rgba(10, 14, 30, 0.95)   0%, transparent 100%);
              pointer-events: none;
              z-index: 0;
            }

            /* ── Login outer wrapper ──────────────────────────────────────── */
            .pf-c-login {
              background: transparent !important;
              position: relative;
              z-index: 1;
            }

            /* ── Glassmorphism login card ─────────────────────────────────── */
            .pf-c-login__main {
              background: rgba(10, 14, 30, 0.78) !important;
              border: 1px solid rgba(99, 102, 241, 0.22) !important;
              border-radius: 14px !important;
              backdrop-filter: blur(28px) saturate(1.4) !important;
              -webkit-backdrop-filter: blur(28px) saturate(1.4) !important;
              box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 24px 64px rgba(0, 0, 0, 0.65),
                0 0 60px rgba(99, 102, 241, 0.06) !important;
              overflow: hidden !important;
            }

            /* ── Full-width banner at the top of the card ────────────────── */
            /* Remove all padding so the image touches the card edges         */
            .pf-c-login__main-header {
              padding: 0 !important;
              background: transparent !important;
              border-bottom: 1px solid rgba(99, 102, 241, 0.12) !important;
              overflow: hidden !important;
            }
            /* Make the brand link and wrapper full-width */
            .pf-c-login__main-header .pf-c-brand,
            .pf-c-login__main-header a.pf-c-page__header-brand-link,
            .pf-c-login__main-header a {
              display: block !important;
              width: 100% !important;
              margin: 0 !important;
              padding: 0 !important;
              line-height: 0 !important;
            }
            /* Banner image — full width, fixed height strip */
            .pf-c-login__main-header img {
              display: block !important;
              width: 100% !important;
              max-width: 100% !important;
              max-height: none !important;
              height: 155px !important;
              object-fit: cover !important;
              object-position: center !important;
              border-radius: 0 !important;
              filter: none !important;
              margin: 0 !important;
              padding: 0 !important;
            }
            /* Title sits below the banner with proper padding */
            .pf-c-login__main-header .pf-c-title,
            .pf-c-login__main-header h1,
            .pf-c-login__main-header h2 {
              font-size: 0 !important;
              margin: 0 !important;
              padding: 0 !important;
              line-height: 0 !important;
            }
            .pf-c-login__main-header .pf-c-title::after {
              content: "Welcome to rlservers.com";
              display: block;
              font-size: 21px;
              font-weight: 700;
              color: #e2e8f0;
              padding: 20px 24px 2px;
              line-height: 1.3;
            }
            .pf-c-login__main-header-desc {
              color: #475569 !important;
              font-size: 12px !important;
              padding: 0 24px 16px !important;
              margin: 0 !important;
            }

            /* ── Form body and footer ─────────────────────────────────────── */
            .pf-c-login__main-body,
            .pf-c-login__main-footer {
              background: transparent !important;
            }
            .pf-c-login__footer {
              background: rgba(5, 8, 18, 0.6) !important;
              border-top: 1px solid rgba(99, 102, 241, 0.08) !important;
            }
            .pf-c-login__footer p,
            .pf-c-login__footer a {
              color: #334155 !important;
              font-size: 11px !important;
            }

            /* ── Form labels ──────────────────────────────────────────────── */
            .pf-c-form__label-text,
            label {
              color: #94a3b8 !important;
              font-size: 12px !important;
              font-weight: 500 !important;
            }

            /* ── Text inputs ──────────────────────────────────────────────── */
            .pf-c-form-control,
            input[type="text"],
            input[type="password"],
            input[type="email"] {
              background: rgba(5, 8, 18, 0.55) !important;
              border: 1px solid rgba(99, 102, 241, 0.22) !important;
              color: #e2e8f0 !important;
              border-radius: 8px !important;
              caret-color: #818cf8 !important;
            }
            .pf-c-form-control:focus,
            .pf-c-form-control:focus-within,
            input:focus {
              border-color: #6366f1 !important;
              box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18) !important;
              background: rgba(5, 8, 18, 0.75) !important;
              outline: none !important;
            }
            .pf-c-form-control::placeholder,
            input::placeholder {
              color: #334155 !important;
            }

            /* ── Primary button — gradient with hover lift ────────────────── */
            .pf-c-button.pf-m-primary,
            button[type="submit"] {
              background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%) !important;
              color: #ffffff !important;
              font-weight: 600 !important;
              border: none !important;
              border-radius: 8px !important;
              font-size: 14px !important;
              letter-spacing: 0.3px !important;
              box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35) !important;
              transition: transform 0.15s ease, box-shadow 0.15s ease !important;
            }
            .pf-c-button.pf-m-primary:hover,
            button[type="submit"]:hover {
              background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%) !important;
              box-shadow: 0 6px 22px rgba(99, 102, 241, 0.55) !important;
              transform: translateY(-1px) !important;
            }

            /* ── Secondary / link buttons ─────────────────────────────────── */
            .pf-c-button.pf-m-link,
            .pf-c-button.pf-m-inline {
              color: #818cf8 !important;
            }

            /* ── Links ────────────────────────────────────────────────────── */
            a { color: #818cf8 !important; }
            a:hover { color: #a5b4fc !important; }

            /* ── Alerts ───────────────────────────────────────────────────── */
            .pf-c-alert.pf-m-danger {
              background: rgba(239, 68, 68, 0.10) !important;
              border-color: #ef4444 !important;
            }
            .pf-c-alert.pf-m-warning {
              background: rgba(245, 158, 11, 0.10) !important;
              border-color: #f59e0b !important;
            }

            /* ── Dropdowns ────────────────────────────────────────────────── */
            .pf-c-divider { background: rgba(99, 102, 241, 0.12) !important; }
            .pf-c-select__menu,
            .pf-c-dropdown__menu {
              background: rgba(13, 17, 35, 0.96) !important;
              border-color: rgba(99, 102, 241, 0.2) !important;
              backdrop-filter: blur(12px) !important;
            }
            .pf-c-select__menu-item:hover,
            .pf-c-dropdown__menu-item:hover {
              background: rgba(99, 102, 241, 0.10) !important;
            }

            /* ── Tabs ─────────────────────────────────────────────────────── */
            .pf-c-tabs__item.pf-m-current .pf-c-tabs__link {
              color: #818cf8 !important;
              border-bottom-color: #6366f1 !important;
            }
            .pf-c-tabs__link {
              color: #64748b !important;
              background: transparent !important;
            }

            /* ── Authentik admin header brand ─────────────────────────────── */
            .ak-brand .pf-c-page__header-brand-link {
              color: #818cf8 !important;
              font-weight: 700 !important;
            }
