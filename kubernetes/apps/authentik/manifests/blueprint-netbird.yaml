---
# ── NetBird OAuth2 Blueprint ──────────────────────────────────────────────────
# Authentik blueprint that automatically creates the NetBird OAuth2 provider
# and application on first boot. Loaded via blueprints.configMaps in values.yaml.
#
# Client ID is statically set to "netbird" so that management.json and the
# dashboard env vars can reference it without needing a post-deploy step.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-netbird
  namespace: authentik
data:
  netbird.yaml: |
    version: 1
    metadata:
      name: NetBird OAuth2 Setup
    entries:
      # OAuth2/PKCE provider for the NetBird client and dashboard
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: NetBird Provider
        attrs:
          name: NetBird Provider
          client_id: netbird
          client_type: public
          redirect_uris: "https://netbird.rlservers.com/auth\nhttps://netbird.rlservers.com/silent-auth"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]

      # Authentik application backed by the OAuth2 provider above
      - model: authentik_core.application
        state: present
        identifiers:
          slug: netbird
        attrs:
          name: NetBird
          slug: netbird
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, NetBird Provider]]
          policy_engine_mode: any
