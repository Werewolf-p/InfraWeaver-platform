---
# Default-deny all ingress traffic to this namespace.
# Everything is blocked unless explicitly allowed below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: apps-demo-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress ONLY from Traefik (the ingress controller).
# This means only traffic routed through Traefik can reach this app.
# Direct pod-to-pod access from other namespaces is blocked.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: apps-demo-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
---
# Allow egress to kube-dns (port 53) so the app can resolve names.
# Allow all other egress (app calls external APIs, databases, etc).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-and-egress
  namespace: apps-demo-app
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
