---
# ── NetBird Relay Server ──────────────────────────────────────────────────────
# Handles NAT traversal (relay) for peers that can't connect directly.
# Relay listens on port 443 (port is derived from NB_EXPOSED_ADDRESS).
# External: api-netbird.rlservers.com/relay → Traefik → this pod
# NB_EXPOSED_ADDRESS must match the relay address in management.json Relay.Addresses.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-relay
  namespace: netbird
  labels:
    app: netbird-relay
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: netbird-relay
  template:
    metadata:
      labels:
        app: netbird-relay
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: relay
          image: "netbirdio/relay:0.70.4@sha256:de1cfcc84dad4fbdbdb3216695427191c644f375fb3564d92b56ed9c580b357a"
          imagePullPolicy: IfNotPresent
          env:
            - name: NB_EXPOSED_ADDRESS
              value: "rels://api-netbird.rlservers.com:443/relay"
            - name: NB_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: turn-password
          ports:
            - name: relay
              containerPort: 443
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 15
            periodSeconds: 30
---
# ── Relay LoadBalancer (external access at 10.10.0.204:443) ──────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-relay
  namespace: netbird
spec:
  type: LoadBalancer
  loadBalancerIP: "10.10.0.204"
  selector:
    app: netbird-relay
  ports:
    - name: relay
      port: 443
      targetPort: 443
