---
# ── NetBird Relay Server ──────────────────────────────────────────────────────
# Handles NAT traversal (relay) for peers that can't connect directly.
# Relay listens on port 443 (port is derived from NB_EXPOSED_ADDRESS).
# External: 10.10.0.204:443 → proxied by Traefik at netbird.rlservers.com/relay
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-relay
  namespace: netbird
  labels:
    app: netbird-relay
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: netbird-relay
  template:
    metadata:
      labels:
        app: netbird-relay
    spec:
      containers:
        - name: relay
          image: netbirdio/relay:v0.70.4
          imagePullPolicy: IfNotPresent
          env:
            - name: NB_EXPOSED_ADDRESS
              value: "rels://netbird.rlservers.com:443/relay"
            - name: NB_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: turn-password
          ports:
            - name: relay
              containerPort: 443
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
# ── Relay LoadBalancer (external access at 10.10.0.204:443) ──────────────────
apiVersion: v1
kind: Service
metadata:
  name: netbird-relay
  namespace: netbird
spec:
  type: LoadBalancer
  loadBalancerIP: "10.10.0.204"
  selector:
    app: netbird-relay
  ports:
    - name: relay
      port: 443
      targetPort: 443
