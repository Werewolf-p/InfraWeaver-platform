---
# ConfigMap holding the Python bootstrap script (avoids shell JSON escaping issues)
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbird-bootstrap-script
  namespace: netbird
data:
  bootstrap.py: |
    import sqlite3, json, base64, hashlib, hmac as _hmac, os, secrets as _secrets
    from cryptography.hazmat.primitives.ciphers.aead import AESGCM

    DB = os.environ.get("DB", "/data/store.db")
    # Static fallback IDs — used only for fresh DB (no existing account).
    # When management has already auto-created an account (random ID), these are
    # overridden below by reading the real IDs from the DB.
    ACC = "acc00000-0000-4000-a000-000000000001"
    USR = "usr00000-0000-4000-a000-000000000001"
    # remon's ID = their Authentik username because sub_mode=user_username in the blueprint.
    # This is stable across ALL Authentik redeployments (unlike hashed_user_id which changes
    # when the Authentik DB is wiped and a new install_id is generated).
    USR_REMON = "remon"
    GRP = "grp00000-0000-4000-a000-000000000001"
    GRP_ROUTING = "grp00000-0000-4000-a000-000000000002"  # routing-peers-vlan3 group
    POL = "pol00000-0000-4000-a000-000000000001"
    RUL = "rul00000-0000-4000-a000-000000000001"
    KEY_ID = "388f43a5-eb90-4ba0-a7cb-a892408886df"
    # Role-based group IDs (static fallbacks — overridden by DB detection below)
    GRP_INFRA     = "grp00000-0000-4000-a000-000000000003"  # infrastructure
    GRP_CI        = "grp00000-0000-4000-a000-000000000004"  # ci-runners
    GRP_ADMINS    = "grp00000-0000-4000-a000-000000000005"  # platform-admins
    GRP_USERS     = "grp00000-0000-4000-a000-000000000006"  # platform-users
    GRP_SVC_ADMIN = "grp00000-0000-4000-a000-000000000007"  # internal-services-admin
    GRP_SVC_ALL   = "grp00000-0000-4000-a000-000000000008"  # internal-services-all

    # AES-256-GCM encryption matching NetBird v0.70 Go: gcm.Seal(nonce, nonce, msg, nil)
    # Output format: base64(nonce[12] || ciphertext || tag[16])
    ENC_KEY = base64.b64decode(os.environ["DATASTORE_ENC_KEY"])
    aesgcm = AESGCM(ENC_KEY)
    def encrypt_field(value: str) -> str:
        nonce = _secrets.token_bytes(12)
        ct = aesgcm.encrypt(nonce, value.encode(), None)
        return base64.b64encode(nonce + ct).decode()

    # Read SETUP_KEY from env (from netbird-secrets ExternalSecret → OpenBao)
    # Hash it the same way NetBird v0.70 does: sha256 + base64 standard encoding
    SETUP_KEY = os.environ["SETUP_KEY"]
    key_hash = base64.b64encode(hashlib.sha256(SETUP_KEY.encode()).digest()).decode()
    key_secret = SETUP_KEY[:4] + "****"
    print(f"Using SETUP_KEY prefix: {SETUP_KEY[:8]}..., hash: {key_hash[:16]}...")

    # Derive role-specific setup keys (no longer used in SQLite — API phase handles them).
    # Kept for reference/documentation of how keys were previously derived.
    # CI_RUNNER_KEY, ADMIN_CLIENT_KEY, USER_CLIENT_KEY are now API-managed.

    # Correct format for net.IPNet in NetBird v0.70:
    # net.IP implements TextMarshaler -> stored as string "100.64.0.0"
    # net.IPMask is raw []byte -> stored as base64 "/8AAAA==" (255,192,0,0)
    network_net_json = json.dumps({
        "IP": "100.64.0.0",
        "Mask": base64.b64encode(bytes([255, 192, 0, 0])).decode()  # /8AAAA==
    })

    conn = sqlite3.connect(DB)
    c = conn.cursor()

    # DYNAMIC ACCOUNT DETECTION:
    # NetBird management auto-creates an account with a random ID on first startup
    # BEFORE the bootstrap job runs. We must detect and use that existing ID.
    # If the DB is truly fresh (no account), we create one with our static ID.
    existing_acc_row = c.execute("SELECT id FROM accounts LIMIT 1").fetchone()
    if existing_acc_row:
        ACC = existing_acc_row[0]
        print(f"Detected existing account (management auto-created): {ACC}")
    else:
        print(f"Fresh DB: creating account with static ID: {ACC}")
        c.execute("""INSERT OR IGNORE INTO accounts
          (id, created_by, created_at, domain, domain_category, is_domain_primary_account,
           network_identifier, network_net)
          VALUES (?,?,datetime('now'),?,?,?,?,?)""",
          (ACC, USR, "netbird.prod.local", "private", 1,
           "12345678-abcd-4000-8000-000000000001", network_net_json))

        c.execute("""INSERT OR IGNORE INTO users
          (id, account_id, role, is_service_user, non_deletable, auto_groups, blocked, issued, email, name, created_at)
          VALUES (?,?,?,?,?,?,?,?,?,?,datetime('now'))""",
          (USR, ACC, "admin", 0, 1, "[]", 0, "api", encrypt_field(""), encrypt_field("admin")))

        # Pre-create remon as admin so they have admin rights on first login.
        # USR_REMON = "remon" because Authentik sub_mode=user_username → sub is the username.
        c.execute("""INSERT OR IGNORE INTO users
          (id, account_id, role, is_service_user, non_deletable, auto_groups, blocked, issued, email, name, created_at)
          VALUES (?,?,?,?,?,?,?,?,?,?,datetime('now'))""",
          (USR_REMON, ACC, "admin", 0, 0, "[]", 0, "oidc",
           encrypt_field("remonhulst@gmail.com"), encrypt_field("remon")))

        # Clean up orphaned hashed_user_id entries from old Authentik deployments.
        # These are 64-char hex IDs that are no longer valid since we switched to user_username.
        c.execute("""DELETE FROM users WHERE LENGTH(id) = 64 AND id NOT IN (?, ?)""",
          (USR, USR_REMON))

        conn.commit()

    # DYNAMIC GROUP ID DETECTION:
    # Look up group IDs by name to handle management-auto-created groups (random IDs).
    # Falls back to inserting with static IDs if the group doesn't exist yet.
    row = c.execute("SELECT id FROM groups WHERE name='All' AND account_id=?", (ACC,)).fetchone()
    if row:
        GRP = row[0]
        print(f"Detected existing All group: {GRP}")
    else:
        print(f"Creating All group with static ID: {GRP}")
        c.execute("""INSERT OR IGNORE INTO groups
          (id, account_id, name, issued, resources, integration_ref_id, integration_ref_integration_type)
          VALUES (?,?,?,?,?,?,?)""",
          (GRP, ACC, "All", "api", "[]", 0, ""))

    row = c.execute("SELECT id FROM groups WHERE name='routing-peers-vlan3' AND account_id=?", (ACC,)).fetchone()
    if row:
        GRP_ROUTING = row[0]
        print(f"Detected existing routing group: {GRP_ROUTING}")
    else:
        print(f"Creating routing-peers-vlan3 group with static ID: {GRP_ROUTING}")
        # routing-peers-vlan3: peers that route 10.10.0.0/24 to VPN clients.
        # Only the netbird-router-vlan3 VM (10.10.0.10) should be in this group.
        # The vlan3-net route uses peer_groups=[GRP_ROUTING] so only this VM advertises the route.
        c.execute("""INSERT OR IGNORE INTO groups
          (id, account_id, name, issued, resources, integration_ref_id, integration_ref_integration_type)
          VALUES (?,?,?,?,?,?,?)""",
          (GRP_ROUTING, ACC, "routing-peers-vlan3", "api", "[]", 0, ""))

    # Helper: detect or create a group by name, return actual DB ID.
    def _ensure_group(c, acc, name, static_id):
        row = c.execute("SELECT id FROM groups WHERE name=? AND account_id=?", (name, acc)).fetchone()
        if row:
            print(f"Detected existing group '{name}': {row[0]}")
            return row[0]
        c.execute("""INSERT OR IGNORE INTO groups
          (id, account_id, name, issued, resources, integration_ref_id, integration_ref_integration_type)
          VALUES (?,?,?,?,?,?,?)""",
          (static_id, acc, name, "api", "[]", 0, ""))
        print(f"Created group '{name}' with static ID: {static_id}")
        return static_id

    GRP_INFRA     = _ensure_group(c, ACC, "infrastructure",          GRP_INFRA)
    GRP_CI        = _ensure_group(c, ACC, "ci-runners",              GRP_CI)
    GRP_ADMINS    = _ensure_group(c, ACC, "platform-admins",         GRP_ADMINS)
    GRP_USERS     = _ensure_group(c, ACC, "platform-users",          GRP_USERS)
    GRP_SVC_ADMIN = _ensure_group(c, ACC, "internal-services-admin", GRP_SVC_ADMIN)
    GRP_SVC_ALL   = _ensure_group(c, ACC, "internal-services-all",   GRP_SVC_ALL)

    # Write resolved IDs + derived keys to /tmp/nb-ids.env for the shell script section.
    with open("/tmp/nb-ids.env", "w") as f:
        f.write(f"GRP={GRP}\n")
        f.write(f"GRP_ROUTING={GRP_ROUTING}\n")
        f.write(f"GRP_INFRA={GRP_INFRA}\n")
        f.write(f"GRP_CI={GRP_CI}\n")
        f.write(f"GRP_ADMINS={GRP_ADMINS}\n")
        f.write(f"GRP_USERS={GRP_USERS}\n")
        f.write(f"GRP_SVC_ADMIN={GRP_SVC_ADMIN}\n")
        f.write(f"GRP_SVC_ALL={GRP_SVC_ALL}\n")
        f.write(f"ACC={ACC}\n")
    print(f"Wrote IDs to /tmp/nb-ids.env: ACC={ACC} GRP={GRP} (+ 7 role groups)")

    # Ensure policy exists (idempotent — management may auto-create one too)
    existing_pol = c.execute("SELECT id FROM policies WHERE account_id=? AND name='Default' LIMIT 1", (ACC,)).fetchone()
    if not existing_pol:
        grp_json = json.dumps([GRP])
        c.execute("""INSERT OR IGNORE INTO policies
          (id, account_id, name, description, enabled, source_posture_checks)
          VALUES (?,?,?,?,?,?)""",
          (POL, ACC, "Default", "Allow all cluster peers", 1, "[]"))
        c.execute("""INSERT OR IGNORE INTO policy_rules
          (id, policy_id, name, description, enabled, action,
           destinations, destination_resource, sources, source_resource,
           bidirectional, protocol, ports, port_ranges, authorized_groups, authorized_user)
          VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)""",
          (RUL, POL, "Default", "Allow all", 1, "accept",
           grp_json, None, grp_json, None, 1, "all", "[]", "[]", "{}", ""))
        conn.commit()
        print(f"Created Default policy with rule referencing All group: {GRP}")
    else:
        print(f"Default policy already exists: {existing_pol[0]}")

    # Additional role-based policies — supplement Default (All→All) during RBAC migration.
    # Once all devices are enrolled with the correct role key, Default can be removed.
    def _upsert_policy(c, acc, pol_id, rul_id, name, desc, src_grps, dst_grps,
                       bidirectional=False, protocol="all", ports=None):
        if c.execute("SELECT id FROM policies WHERE id=? AND account_id=?", (pol_id, acc)).fetchone():
            print(f"Policy already exists: {name}")
            return
        c.execute("""INSERT OR IGNORE INTO policies
          (id, account_id, name, description, enabled, source_posture_checks)
          VALUES (?,?,?,?,?,?)""",
          (pol_id, acc, name, desc, 1, "[]"))
        c.execute("""INSERT OR IGNORE INTO policy_rules
          (id, policy_id, name, description, enabled, action,
           destinations, destination_resource, sources, source_resource,
           bidirectional, protocol, ports, port_ranges, authorized_groups, authorized_user)
          VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)""",
          (rul_id, pol_id, name, desc, 1, "accept",
           json.dumps(dst_grps), None, json.dumps(src_grps), None,
           1 if bidirectional else 0, protocol, json.dumps(ports or []), "[]", "{}", ""))
        conn.commit()
        print(f"Created policy: {name}")

    _upsert_policy(c, ACC,
        "pol00000-0000-4000-a000-000000000002", "rul00000-0000-4000-a000-000000000002",
        "admin-full-access", "Platform admins have full access to all peers",
        [GRP_ADMINS], [GRP], bidirectional=True)
    _upsert_policy(c, ACC,
        "pol00000-0000-4000-a000-000000000003", "rul00000-0000-4000-a000-000000000003",
        "user-subnet-access", "Regular users can use subnet routes",
        [GRP_USERS], [GRP_ROUTING])
    _upsert_policy(c, ACC,
        "pol00000-0000-4000-a000-000000000004", "rul00000-0000-4000-a000-000000000004",
        "infra-to-all", "Infrastructure peers can reach all peers",
        [GRP_INFRA], [GRP], bidirectional=True)
    _upsert_policy(c, ACC,
        "pol00000-0000-4000-a000-000000000005", "rul00000-0000-4000-a000-000000000005",
        "ci-runner-mgmt", "CI runners can reach infrastructure (SSH + HTTPS)",
        [GRP_CI], [GRP_INFRA], protocol="tcp", ports=["22", "443"])

    # Upsert all setup keys — creates if not exists, always updates auto_groups.
    # Uses real group IDs (not static fallbacks) resolved above.
    def _upsert_key(c, acc, key_id, key_val, kh, name, auto_groups):
        ks = key_val[:4] + "****"
        c.execute("""INSERT OR IGNORE INTO setup_keys
          (id, account_id, key, key_secret, name, type, used_times, last_used, expires_at,
           auto_groups, revoked, ephemeral, updated_at, created_at, usage_limit, allow_extra_dns_labels)
          VALUES (?,?,?,?,?,?,?,datetime('now'),?,?,?,?,datetime('now'),datetime('now'),?,?)""",
          (key_id, acc, kh, ks, name, "reusable", 0, "2040-01-01 00:00:00",
           json.dumps(auto_groups), 0, 0, 0, 0))
        # Also update key hash on re-runs so key derivation changes always propagate.
        c.execute("UPDATE setup_keys SET name=?, auto_groups=?, key=?, key_secret=?, updated_at=datetime('now') WHERE id=?",
                  (name, json.dumps(auto_groups), kh, ks, key_id))
        print(f"Setup key upserted: {name}")

    # infrastructure-key = existing SETUP_KEY (router VM 10.10.0.10 uses this)
    # auto_groups includes routing-peers-vlan3 so router auto-joins on enrollment
    _upsert_key(c, ACC, KEY_ID, SETUP_KEY, key_hash,
                "infrastructure-key", [GRP, GRP_ROUTING, GRP_INFRA])
    # ci-runner-key, admin-client-key, user-client-key are managed by the API phase
    # (ensure-keys.py). SQLite-derived versions removed to avoid hash conflicts.

    # Always ensure the system admin user exists (USR) — needed as PAT owner.
    # Use INSERT OR IGNORE so we never overwrite an existing user's data.
    c.execute("""INSERT OR IGNORE INTO users
      (id, account_id, role, is_service_user, non_deletable, auto_groups, blocked, issued, email, name, created_at)
      VALUES (?,?,?,?,?,?,?,?,?,?,datetime('now'))""",
      (USR, ACC, "admin", 0, 1, "[]", 0, "api", encrypt_field(""), encrypt_field("admin")))

    # Always upsert PAT linked to USR_REMON ("remon") — this is the stable human admin
    # user. Using USR_REMON avoids failures when the system USR gets cleaned up by NetBird.
    PAT_TOKEN = os.environ.get("PAT_TOKEN", "")
    if PAT_TOKEN:
        pat_hash = base64.b64encode(hashlib.sha256(PAT_TOKEN.encode()).digest()).decode()
        c.execute("""INSERT OR REPLACE INTO personal_access_tokens
          (id, user_id, name, hashed_token, expiration_date, created_by, created_at, last_used)
          VALUES ('pat00000-0000-4000-a000-000000000001', ?, ?, ?, '2040-01-01 00:00:00', ?, datetime('now'), NULL)""",
          (USR_REMON, encrypt_field("bootstrap-admin"), pat_hash, USR_REMON))
        print(f"PAT upserted for user remon (token prefix: {PAT_TOKEN[:12]}...)")

    # Route for cluster subnet via routing-peers-vlan3 peer group.
    # routes.network must be JSON-encoded string (e.g. '"10.25.0.0/24"') so migratePreAuto
    # sees valid JSON and skips gob-decode (plain string triggers gob decode → crash).
    # Uses dynamically-resolved GRP and GRP_ROUTING — correct even for management-created accounts.
    c.execute("""INSERT OR REPLACE INTO routes
      (id, account_id, network, domains, keep_route, net_id, description, peer, peer_groups,
       network_type, masquerade, metric, enabled, groups, access_control_groups, skip_auto_apply)
      VALUES ('rte00000-0000-4000-a000-000000000001', ?, ?, '[]', 0,
       'homelab-net', 'Homelab management network route (10.25.0.0/24)', NULL, ?, 0, 1, 9999, 1, ?, '[]', 0)""",
      (ACC, json.dumps("10.25.0.0/24"), json.dumps([GRP_ROUTING]), json.dumps([GRP])))
    print(f"Route upserted: 10.25.0.0/24 via {GRP_ROUTING} group, accessible to {GRP}")

    # Route for VLAN 3 subnet via "routing-peers-vlan3" group (NOT "All").
    # peer_groups=[GRP_ROUTING] means only peers in routing-peers-vlan3 advertise this route.
    # groups=[GRP] means ALL peers can USE this route (to reach 10.10.0.0/24 via the router).
    # The netbird-router-vlan3 VM (10.10.0.10) is added to routing-peers-vlan3 via the API
    # after it connects (setup-key auto_groups handles this automatically on enrollment).
    c.execute("""INSERT OR REPLACE INTO routes
      (id, account_id, network, domains, keep_route, net_id, description, peer, peer_groups,
       network_type, masquerade, metric, enabled, groups, access_control_groups, skip_auto_apply)
      VALUES ('rte00000-0000-4000-a000-000000000002', ?, ?, '[]', 0,
       'vlan3-net', 'VLAN 3 network route (10.10.0.0/24)', NULL, ?, 0, 1, 9998, 1, ?, '[]', 0)""",
      (ACC, json.dumps("10.10.0.0/24"), json.dumps([GRP_ROUTING]), json.dumps([GRP])))
    print(f"Route upserted: 10.10.0.0/24 via {GRP_ROUTING} group, accessible to {GRP}")

    conn.commit()
    conn.execute("PRAGMA wal_checkpoint(TRUNCATE)")

    print(f"Accounts: {c.execute('SELECT COUNT(*) FROM accounts').fetchone()[0]}")
    print(f"network_net: {c.execute('SELECT network_net FROM accounts LIMIT 1').fetchone()[0]}")
    print(f"Users: {c.execute('SELECT id,role FROM users').fetchall()}")
    print(f"Setup keys: {c.execute('SELECT name,type,key_secret FROM setup_keys').fetchall()}")
    print(f"Groups: {c.execute('SELECT id,name FROM groups').fetchall()}")
    print(f"Policies: {c.execute('SELECT name FROM policies').fetchall()}")
    print(f"Routes: {c.execute('SELECT net_id,network,enabled FROM routes').fetchall()}")
    print("Bootstrap complete")
    conn.close()
  cleanup.py: |
    # Stale peer cleanup — runs after management API is back up.
    # Keeps only the newest peer per name; deletes duplicates caused by restarts.
    import json, subprocess, os
    from collections import defaultdict

    base = "http://netbird-management.netbird.svc:80"
    pat  = os.environ["PAT_TOKEN"]

    def api(method, path, data=None):
        cmd = ["curl", "-s", "-X", method, f"{base}{path}", "-H", f"Authorization: Token {pat}"]
        if data is not None:
            cmd += ["-H", "Content-Type: application/json", "-d", json.dumps(data)]
        return subprocess.check_output(cmd).decode()

    peers = json.loads(api("GET", "/api/peers"))
    if not isinstance(peers, list):
        print(f"Skipping peer cleanup: unexpected response")
        exit(0)

    by_name = defaultdict(list)
    for p in peers:
        by_name[p["name"]].append(p)

    deleted = 0
    for name, group in by_name.items():
        if len(group) <= 1:
            continue
        group.sort(key=lambda x: x["last_seen"], reverse=True)
        for stale in group[1:]:
            api("DELETE", f"/api/peers/{stale['id']}")
            print(f"Deleted stale peer {stale['id']} ({name}, last_seen={stale['last_seen'][:19]})")
            deleted += 1

    print(f"Peer cleanup complete: {deleted} stale peer(s) removed")

  ensure-keys.py: |
    # Ensure setup keys exist via management API.
    # Values stored in 'netbird-setup-keys' secret (NOT managed by ExternalSecret,
    # so bootstrap patches survive ESO reconciliation).
    # Keys are recreated only if no valid key with that name exists in NetBird.
    # Duplicate SQLite-derived keys (wrong prefix) are deleted automatically.
    import json, sys, os, urllib.request, urllib.error, base64, subprocess

    PAT = os.environ.get('PAT_TOKEN', '')
    BASE = 'http://netbird-management.netbird.svc:80'
    NAMESPACE = 'netbird'
    SECRET = 'netbird-setup-keys'

    def api(method, path, data=None):
        url = BASE + path
        headers = {'Authorization': 'Token ' + PAT, 'Content-Type': 'application/json'}
        body = json.dumps(data).encode() if data else None
        req = urllib.request.Request(url, data=body, headers=headers, method=method)
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                return json.loads(r.read())
        except urllib.error.HTTPError as e:
            return json.loads(e.read())

    def read_secret():
        r = subprocess.run(['kubectl', 'get', 'secret', SECRET, '-n', NAMESPACE,
                            '-o', 'json'], capture_output=True, text=True)
        if r.returncode != 0:
            return {}
        d = json.loads(r.stdout).get('data', {})
        return {k: base64.b64decode(v).decode() for k, v in d.items()}

    def write_secret(updates):
        # Create secret if missing, then patch
        r = subprocess.run(['kubectl', 'get', 'secret', SECRET, '-n', NAMESPACE],
                           capture_output=True)
        if r.returncode != 0:
            subprocess.run(['kubectl', 'create', 'secret', 'generic', SECRET,
                            '-n', NAMESPACE], check=True, capture_output=True)
        patch = [{'op': 'add', 'path': '/data/' + k,
                  'value': base64.b64encode(v.encode()).decode()}
                 for k, v in updates.items()]
        r = subprocess.run(['kubectl', 'patch', 'secret', SECRET, '-n', NAMESPACE,
                            '--type=json', '-p', json.dumps(patch)],
                           capture_output=True, text=True)
        if r.returncode == 0:
            for k, v in updates.items():
                print(f'  Saved {k}={v[:8]}... to {SECRET}')
        else:
            print(f'  Secret write failed: {r.stderr}', file=sys.stderr)

    stored = read_secret()
    groups = api('GET', '/api/groups')
    grp_map = {g['name']: g['id'] for g in (groups if isinstance(groups, list) else [])}

    keys_to_ensure = [
        ('ci-runner-key',    'CI_RUNNER_KEY',    [grp_map.get('ci-runners', '')]),
        ('admin-client-key', 'ADMIN_CLIENT_KEY',  [grp_map.get('platform-admins', '')]),
        ('user-client-key',  'USER_CLIENT_KEY',   [grp_map.get('platform-users', '')]),
    ]

    nb_keys = api('GET', '/api/setup-keys')
    nb_keys_list = nb_keys if isinstance(nb_keys, list) else []

    updates = {}
    for name, secret_key, auto_groups in keys_to_ensure:
        groups_filtered = [g for g in auto_groups if g]
        keys_for_name = [k for k in nb_keys_list if k['name'] == name]
        stored_val = stored.get(secret_key, '')

        # Find the key matching our stored value (prefix check)
        matching = None
        if stored_val:
            sp = stored_val[:4].upper()
            matching = next((k for k in keys_for_name
                             if k.get('key','')[:4].upper() == sp and k.get('valid')), None)

        # Delete stale duplicates (keys with wrong prefix)
        for k in keys_for_name:
            if matching and k['id'] == matching['id']:
                continue
            # Check if this is the good key too (if no matching yet and it's the only one)
            if not matching and k.get('valid') and not stored_val:
                continue
            print(f'  Deleting stale {name} ({k.get("key","?")[:8]}****)')
            api('DELETE', f'/api/setup-keys/{k["id"]}')

        if matching:
            print(f'  {name}: valid and stored ({matching.get("key","?")[:8]}****), skipping')
            continue

        # Check if any valid key remains (the one we didn't delete above)
        if not stored_val and keys_for_name:
            k = keys_for_name[0]
            if k.get('valid'):
                print(f'  {name}: valid in NetBird but no stored value, saving {k.get("key","?")[:8]}')
                # We can't recover the full key — recreate
                pass

        # Create new key
        payload = {'name': name, 'type': 'reusable', 'expires_in': 0,
                   'auto_groups': groups_filtered, 'usage_limit': 0}
        result = api('POST', '/api/setup-keys', payload)
        new_key = result.get('key', '')
        if new_key:
            print(f'  {name}: created {new_key[:8]}...')
            updates[secret_key] = new_key
        else:
            print(f'  {name}: creation failed: {result}', file=sys.stderr)

    if updates:
        write_secret(updates)
    print('Setup keys verified.')
---
# NetBird DB Bootstrap Job — runs as ArgoCD PostSync hook
#
# Creates the initial NetBird account, admin user, setup key, groups, and policy
# directly in the SQLite DB using Python (avoids shell JSON escaping issues).
#
# Flow:
#   1. Init: wait for management HTTP API to be reachable
#   2. Main: scale management to 0, run Python bootstrap, scale back to 1
#
# Safe to run multiple times (INSERT OR IGNORE skips existing data). Setup key is
# "A1B2C3D4-E5F6-7890-ABCD-EF1234567890" (hashed) — used by the client DaemonSet.
# See .github/memories/ for full documentation.
apiVersion: batch/v1
kind: Job
metadata:
  name: netbird-db-bootstrap
  namespace: netbird
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: netbird-bootstrap-sa
      restartPolicy: OnFailure
      # Must run on the same node as management to avoid RWO multi-attach error
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: netbird-management
              topologyKey: kubernetes.io/hostname
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: netbird-management-data
        - name: script
          configMap:
            name: netbird-bootstrap-script
      initContainers:
        # Wait for management HTTP API to respond (any HTTP code = it's up)
        - name: wait-for-api
          image: alpine
          command:
            - sh
            - -c
            - |
              apk add -q curl 2>/dev/null
              echo "Waiting for NetBird management HTTP API..."
              for i in $(seq 1 72); do
                CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 \
                  http://netbird-management.netbird.svc:80/api/status 2>/dev/null || echo "000")
                if [ "$CODE" != "000" ]; then
                  echo "Management API ready (HTTP $CODE)"
                  exit 0
                fi
                echo "Attempt $i/72: API not ready, waiting 5s..."
                sleep 5
              done
              echo "ERROR: Management API not ready after 6 minutes"
              exit 1
      containers:
        - name: fix-db
          image: python:3.12-alpine
          command:
            - sh
            - -c
            - |
              set -e

              # Install kubectl
              apk add -q curl
              curl -sLo /usr/local/bin/kubectl \
                "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x /usr/local/bin/kubectl

              echo "=== Scaling management to 0 ==="
              kubectl scale statefulset netbird-management -n netbird --replicas=0
              kubectl wait --for=delete pod -l app=netbird-management -n netbird --timeout=60s 2>/dev/null || true
              sleep 3

              echo "=== Running Python bootstrap ==="
              pip install -q cryptography
              python3 /script/bootstrap.py

              echo "=== Scaling management back to 1 ==="
              kubectl scale statefulset netbird-management -n netbird --replicas=1

              echo "=== Waiting for management API to be fully ready after restart ==="
              for i in $(seq 1 90); do
                RESP=$(curl -s --max-time 5 \
                  http://netbird-management.netbird.svc:80/api/peers \
                  -H "Authorization: Token ${PAT_TOKEN}" 2>/dev/null || echo "")
                if echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if isinstance(d,list) else 1)" 2>/dev/null; then
                  echo "Management API ready (attempt $i)"
                  break
                fi
                echo "Attempt $i/90: management API not ready, waiting 5s..."
                sleep 5
              done

              echo "=== Cleaning up stale routing peers ==="
              # After redeploys, restarts without persistent storage create new WireGuard
              # keys → duplicate peers per node name. Keep newest per name, delete the rest.
              python3 /script/cleanup.py

              # Load dynamic group IDs written by bootstrap.py to /tmp/nb-ids.env.
              # These are the REAL IDs (detected from DB) — avoids hardcoded static IDs
              # that break when management auto-creates groups with random IDs.
              if [ -f /tmp/nb-ids.env ]; then
                . /tmp/nb-ids.env
                echo "Loaded IDs from bootstrap: GRP=${GRP} GRP_ROUTING=${GRP_ROUTING} GRP_CI=${GRP_CI} GRP_INFRA=${GRP_INFRA}"
              else
                # Fallback: query the API for the All group ID
                GRP=$(curl -s --max-time 10 \
                  http://netbird-management.netbird.svc:80/api/groups \
                  -H "Authorization: Token ${PAT_TOKEN}" 2>/dev/null | \
                  python3 -c "import sys,json; d=json.load(sys.stdin); g=[x for x in (d if isinstance(d,list) else []) if x.get('name')=='All']; print(g[0]['id'] if g else '')" 2>/dev/null || echo "")
                GRP_ROUTING=$(curl -s --max-time 10 \
                  http://netbird-management.netbird.svc:80/api/groups \
                  -H "Authorization: Token ${PAT_TOKEN}" 2>/dev/null | \
                  python3 -c "import sys,json; d=json.load(sys.stdin); g=[x for x in (d if isinstance(d,list) else []) if x.get('name')=='routing-peers-vlan3']; print(g[0]['id'] if g else '')" 2>/dev/null || echo "")
                echo "Queried IDs from API: GRP=${GRP} GRP_ROUTING=${GRP_ROUTING}"
              fi

              echo "=== Ensuring setup keys exist (API-managed, values stored in secret) ==="
              # Keys managed via API; values stored in netbird-secrets. See ensure-keys.py in ConfigMap.
              python3 /script/ensure-keys.py

              echo "=== Configuring DNS nameserver via API ==="
              # Uses dynamic GRP (All group) — correct even for management-auto-created accounts
              NS_RESP=$(curl -s --max-time 10 \
                http://netbird-management.netbird.svc:80/api/dns/nameservers \
                -H "Authorization: Token ${PAT_TOKEN}" 2>/dev/null || echo "[]")
              EXISTING_NS=$(echo "$NS_RESP" | \
                python3 -c "import sys,json; d=json.load(sys.stdin); print(any(g.get('name')=='prod-local' for g in (d if isinstance(d,list) else [])))" 2>/dev/null || echo "False")
              if [ "$EXISTING_NS" = "False" ]; then
                curl -s --max-time 10 -X POST \
                  http://netbird-management.netbird.svc:80/api/dns/nameservers \
                  -H "Authorization: Token ${PAT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"prod-local\",\"description\":\"prod.local via cluster CoreDNS\",\"nameservers\":[{\"ip\":\"10.10.0.201\",\"ns_type\":\"udp\",\"port\":53}],\"enabled\":true,\"groups\":[\"${GRP}\"],\"primary\":false,\"domains\":[\"prod.local\"],\"search_domains_enabled\":true}" \
                  -o /dev/null && echo "DNS nameserver group created: prod-local → 10.10.0.201"
              else
                echo "DNS nameserver group prod-local already exists — skipping"
              fi

              # rlservers.com DNS group — routes rlservers.com resolution to internal IP (10.10.0.200)
              # so connected NetBird clients bypass Cloudflare CDN and hit Traefik directly
              NS_RESP2=$(curl -s --max-time 10 \
                http://netbird-management.netbird.svc:80/api/dns/nameservers \
                -H "Authorization: Token ${PAT_TOKEN}" 2>/dev/null || echo "[]")
              EXISTING_NS2=$(echo "$NS_RESP2" | \
                python3 -c "import sys,json; d=json.load(sys.stdin); print(any(g.get('name')=='rlservers-com' for g in (d if isinstance(d,list) else [])))" 2>/dev/null || echo "False")
              if [ "$EXISTING_NS2" = "False" ]; then
                curl -s --max-time 10 -X POST \
                  http://netbird-management.netbird.svc:80/api/dns/nameservers \
                  -H "Authorization: Token ${PAT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"rlservers-com\",\"description\":\"rlservers.com via cluster DNS (bypasses Cloudflare CDN for VPN clients)\",\"nameservers\":[{\"ip\":\"10.10.0.201\",\"ns_type\":\"udp\",\"port\":53}],\"enabled\":true,\"groups\":[\"${GRP}\"],\"primary\":false,\"domains\":[\"rlservers.com\"],\"search_domains_enabled\":false}" \
                  -o /dev/null && echo "DNS nameserver group created: rlservers-com → 10.10.0.201"
              else
                echo "DNS nameserver group rlservers-com already exists — skipping"
              fi

              # int.rlservers.com DNS group — private/VPN-only domain routing
              # Cloudflare DNS-only *.int.rlservers.com → 10.10.0.200 (no proxy)
              # This group ensures VPN clients resolve int.rlservers.com via internal CoreDNS
              NS_RESP3=$(curl -s --max-time 10 \
                http://netbird-management.netbird.svc:80/api/dns/nameservers \
                -H "Authorization: Token ${PAT_TOKEN}" 2>/dev/null || echo "[]")
              EXISTING_NS3=$(echo "$NS_RESP3" | \
                python3 -c "import sys,json; d=json.load(sys.stdin); print(any(g.get('name')=='int-rlservers-com' for g in (d if isinstance(d,list) else [])))" 2>/dev/null || echo "False")
              if [ "$EXISTING_NS3" = "False" ]; then
                curl -s --max-time 10 -X POST \
                  http://netbird-management.netbird.svc:80/api/dns/nameservers \
                  -H "Authorization: Token ${PAT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"int-rlservers-com\",\"description\":\"int.rlservers.com via cluster CoreDNS (VPN-only private subdomain)\",\"nameservers\":[{\"ip\":\"10.10.0.201\",\"ns_type\":\"udp\",\"port\":53}],\"enabled\":true,\"groups\":[\"${GRP}\"],\"primary\":false,\"domains\":[\"int.rlservers.com\"],\"search_domains_enabled\":false}" \
                  -o /dev/null && echo "DNS nameserver group created: int-rlservers-com → 10.10.0.201"
              else
                echo "DNS nameserver group int-rlservers-com already exists — skipping"
              fi

              echo "=== Updating peer groups from connected peers ==="
              # After every sync/redeploy, classify connected peers into the correct groups:
              #   routing-peers-vlan3 → only the router VM (netbird-router-vlan3)
              #   ci-runners          → runner VMs (hostname contains 'runner' or 'github')
              #   infrastructure      → router + runner peers combined
              # This is a safety-net; setup key auto_groups handles new enrollments.
              if [ -n "$GRP_ROUTING" ]; then
                PEERS_RESP=$(curl -s --max-time 10 \
                  http://netbird-management.netbird.svc:80/api/peers \
                  -H "Authorization: Token ${PAT_TOKEN}" 2>/dev/null || echo "[]")
                PEER_COUNT=$(echo "$PEERS_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d if isinstance(d,list) else []))" 2>/dev/null || echo "0")
                echo "Found ${PEER_COUNT} connected peer(s)"

                # Router peers: name starts with 'netbird-router'
                ROUTER_IDS=$(echo "$PEERS_RESP" | python3 -c "import sys,json; peers=json.load(sys.stdin); print(json.dumps([p['id'] for p in (peers if isinstance(peers,list) else []) if 'netbird-router' in p.get('name','').lower()]))" 2>/dev/null || echo "[]")
                echo "Router peer(s): $ROUTER_IDS"

                # Update routing-peers-vlan3: ONLY router peers advertise subnet routes
                curl -s --max-time 10 -X PUT \
                  http://netbird-management.netbird.svc:80/api/groups/${GRP_ROUTING} \
                  -H "Authorization: Token ${PAT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"routing-peers-vlan3\",\"peers\":${ROUTER_IDS}}" \
                  -o /dev/null && echo "routing-peers-vlan3 updated (router-only)"

                # CI runner peers: hostname contains 'runner' or 'github-actions'
                RUNNER_IDS=$(echo "$PEERS_RESP" | python3 -c "import sys,json; peers=json.load(sys.stdin); print(json.dumps([p['id'] for p in (peers if isinstance(peers,list) else []) if any(x in p.get('name','').lower() for x in ['runner','github-actions'])]))" 2>/dev/null || echo "[]")
                echo "Runner peer(s): $RUNNER_IDS"

                if [ -n "$GRP_CI" ] && [ "$RUNNER_IDS" != "[]" ]; then
                  curl -s --max-time 10 -X PUT \
                    http://netbird-management.netbird.svc:80/api/groups/${GRP_CI} \
                    -H "Authorization: Token ${PAT_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"ci-runners\",\"peers\":${RUNNER_IDS}}" \
                    -o /dev/null && echo "ci-runners group updated"
                fi

                if [ -n "$GRP_INFRA" ]; then
                  # Infrastructure = router + runner peers (merged, deduplicated by id)
                  INFRA_IDS=$(python3 -c "import json; r=json.loads('${ROUTER_IDS}'); ru=json.loads('${RUNNER_IDS}'); seen=set(); m=[p for p in r+ru if p not in seen and not seen.add(p)]; print(json.dumps(m))" 2>/dev/null || echo "${ROUTER_IDS}")
                  curl -s --max-time 10 -X PUT \
                    http://netbird-management.netbird.svc:80/api/groups/${GRP_INFRA} \
                    -H "Authorization: Token ${PAT_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"infrastructure\",\"peers\":${INFRA_IDS}}" \
                    -o /dev/null && echo "infrastructure group updated"
                fi
              else
                echo "GRP_ROUTING unknown — skipping peer group classification"
              fi

              echo "=== Bootstrap complete ==="
          env:
            - name: DB
              value: /data/store.db
            - name: SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: SETUP_KEY
            - name: DATASTORE_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: datastore-enc-key
            - name: PAT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: netbird-pat-token
          volumeMounts:
            - name: data
              mountPath: /data
            - name: script
              mountPath: /script
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netbird-bootstrap-sa
  namespace: netbird
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: netbird-bootstrap-role
  namespace: netbird
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: netbird-bootstrap-binding
  namespace: netbird
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: netbird-bootstrap-role
subjects:
  - kind: ServiceAccount
    name: netbird-bootstrap-sa
    namespace: netbird
