---
# Wiki.js NetworkPolicies
# Default-deny all ingress/egress, then allow specific traffic:
#  - Traefik → wiki port 3000 (HTTP)
#  - wiki → wiki-postgresql (Postgres port 5432)
#  - wiki → kube-dns (DNS resolution)
#  - wiki → internet (npm packages + OIDC callbacks)
#  - Prometheus → wiki metrics (if scraping)

# ── Default deny all ingress ─────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: wiki
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ── Allow Traefik → wiki HTTP ────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-wiki
  namespace: wiki
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wiki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 80
          protocol: TCP

---
# ── Allow intra-namespace (wiki → postgresql) ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wiki-intra-namespace
  namespace: wiki
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
