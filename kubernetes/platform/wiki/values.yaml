replicaCount: 1

image:
  repository: requarks/wiki
  imagePullPolicy: IfNotPresent

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 80

# No ingress — traffic routed via Traefik IngressRoute (wiki.int.rlservers.com)
ingress:
  enabled: false

postgresql:
  enabled: true
  postgresqlUser: wiki
  postgresqlDatabase: wiki
  # Password and username come from externalsecret → wiki-postgres-secret
  existingSecret: wiki-postgres-secret
  existingSecretKey: postgresql-password
  existingSecretUserKey: postgresql-username

  persistence:
    enabled: true
    storageClass: longhorn-retain
    size: 5Gi

  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
