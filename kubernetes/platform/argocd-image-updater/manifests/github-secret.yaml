---
# ExternalSecret — GitHub token for ArgoCD Image Updater git write-back
# Token is stored in OpenBao at secret/platform/github
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-image-updater-github
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: argocd-image-updater-github
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: secret/platform/github
        property: token
    - secretKey: username
      remoteRef:
        key: secret/platform/github
        property: username
