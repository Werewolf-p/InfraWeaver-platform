---
# ExternalSecret — pulls Cloudflare API token from OpenBao and creates
# the cloudflare-api-token K8s Secret that ExternalDNS reads at runtime.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: CF_API_TOKEN
      remoteRef:
        key: secret/platform/cloudflare
        property: CF_API_TOKEN
