---
# NetworkPolicies for the external-dns namespace
# Default-deny all ingress, then allow Prometheus scraping.
# ExternalDNS is egress-only (writes DNS records); it exposes only metrics.

# ── Default deny all ingress ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: external-dns
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ── Allow Prometheus to scrape ExternalDNS metrics (port 7979) ───────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: external-dns
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 7979
