---
# IngressRoutes for *.int.rlservers.com — private/VPN-only services.
#
# Security model (two layers):
#   Layer 1 — Private IP boundary:
#     Cloudflare DNS-only wildcard: *.int.rlservers.com → 10.10.0.200 (no proxy)
#     10.10.0.200 is a private VLAN3 IP — unreachable from the public internet
#
#   Layer 2 — IP allowlist via netbird-vpn-only middleware:
#     Only traffic from the NetBird routing peer (10.10.0.10) is allowed.
#     VPN clients route 10.10.0.0/24 via the netbird-router-vlan3 VM (VM 9200),
#     which masquerades their traffic — Traefik sees source = 10.10.0.10.
#     Direct VLAN3 hosts (10.25.0.x bridged, 10.10.0.85 runner) are BLOCKED.
#
# TLS: platform-int-wildcard-tls (wildcard cert via letsencrypt-dns DNS-01)

# ── NetBird Management gRPC (int) ─────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-management-grpc-int
  namespace: traefik
  labels:
    infraweaver.io/access-tier: vpn
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.int.rlservers.com`) && PathPrefix(`/management.ManagementService`)
      kind: Rule
      priority: 50
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: netbird-management
          port: 33073
          scheme: h2c
  tls:
    secretName: platform-int-wildcard-tls
---
# ── NetBird Signal gRPC (int) ─────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-signal-grpc-int
  namespace: traefik
  labels:
    infraweaver.io/access-tier: vpn
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.int.rlservers.com`) && (PathPrefix(`/signalexchange.SignalExchange`) || PathPrefix(`/grpc.reflection`))
      kind: Rule
      priority: 50
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: netbird-signal
          port: 10000
          scheme: h2c
  tls:
    secretName: platform-int-wildcard-tls
---
# ── NetBird Relay (int) ───────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-relay-int
  namespace: traefik
  labels:
    infraweaver.io/access-tier: vpn
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.int.rlservers.com`) && PathPrefix(`/relay`)
      kind: Rule
      priority: 40
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: netbird-relay
          port: 443
          serversTransport: insecure-skip-verify
  tls:
    secretName: platform-int-wildcard-tls
---
# ── NetBird Management API + WS proxy (int) ───────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-management-api-int
  namespace: traefik
  labels:
    infraweaver.io/access-tier: vpn
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.int.rlservers.com`) && (PathPrefix(`/api`) || PathPrefix(`/ws-proxy/management`))
      kind: Rule
      priority: 30
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: netbird-management
          port: 80
  tls:
    secretName: platform-int-wildcard-tls
---
# ── NetBird Dashboard (int — VPN only, catch-all) ────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-dashboard-int
  namespace: traefik
  labels:
    infraweaver.io/access-tier: vpn
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.int.rlservers.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: netbird-dashboard
          port: 80
  tls:
    secretName: platform-int-wildcard-tls
