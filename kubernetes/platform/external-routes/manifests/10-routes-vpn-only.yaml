---
# ── InfraWeaver Console ───────────────────────────────────────────────────────
# Next.js management UI — handles its own Authentik OAuth2 auth internally.
# Forward-auth NOT used (requires Proxy Provider; app uses OAuth2 provider instead).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: infraweaver-console-int
  namespace: traefik
  labels:
    infraweaver.io/access-tier: vpn
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`infraweaver.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
        - name: secure-headers
          namespace: traefik
      services:
        - name: infraweaver-console
          port: 3000
  tls:
    secretName: platform-int-wildcard-tls
---
# InfraWeaver Hub API — internal only, VPN-protected
# WebSocket (wss://) is supported via Traefik's passthrough
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: infraweaver-api-int
  namespace: traefik
  labels:
    infraweaver.io/access-tier: vpn
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`api.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
        - name: secure-headers
          namespace: traefik
      services:
        - name: infraweaver-api
          namespace: infraweaver-console
          port: 3001
  tls:
    secretName: platform-int-wildcard-tls
---
