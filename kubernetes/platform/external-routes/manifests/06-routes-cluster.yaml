---
# IngressRoutes for public K8s cluster apps on *.rlservers.com
# Internal-only apps (argocd, grafana, longhorn, openbao) use *.int.rlservers.com
# via 10-routes-vpn-only.yaml. Only public apps remain here.

# ── Test website (public) ─────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: test-website-rlservers
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`test.rlservers.com`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
      services:
        - name: test-website
          port: 80
  tls: {}
