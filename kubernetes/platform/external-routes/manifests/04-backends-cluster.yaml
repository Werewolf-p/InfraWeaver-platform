---
# ExternalName Services — allow IngressRoutes in traefik namespace to reach K8s services
# in other namespaces without cross-namespace service references.

# ArgoCD
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: traefik
spec:
  type: ExternalName
  externalName: argocd-server.argocd.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# Grafana (apps-grafana)
apiVersion: v1
kind: Service
metadata:
  name: grafana-apps
  namespace: traefik
spec:
  type: ExternalName
  externalName: grafana.apps-grafana.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# Longhorn
apiVersion: v1
kind: Service
metadata:
  name: longhorn-frontend
  namespace: traefik
spec:
  type: ExternalName
  externalName: longhorn-frontend.longhorn-system.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# OpenBao
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: traefik
spec:
  type: ExternalName
  externalName: openbao.openbao.svc.cluster.local
  ports:
    - port: 8200
      name: http
---
# NetBird Dashboard
apiVersion: v1
kind: Service
metadata:
  name: netbird-dashboard
  namespace: traefik
spec:
  type: ExternalName
  externalName: netbird-dashboard.netbird.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# NetBird Management HTTP
apiVersion: v1
kind: Service
metadata:
  name: netbird-management
  namespace: traefik
spec:
  type: ExternalName
  externalName: netbird-management.netbird.svc.cluster.local
  ports:
    - port: 80
      name: http
    - port: 33073
      name: grpc
---
# NetBird Signal
apiVersion: v1
kind: Service
metadata:
  name: netbird-signal
  namespace: traefik
spec:
  type: ExternalName
  externalName: netbird-signal.netbird.svc.cluster.local
  ports:
    - port: 10000
      name: grpc
---
# NetBird Relay
apiVersion: v1
kind: Service
metadata:
  name: netbird-relay
  namespace: traefik
spec:
  type: ExternalName
  externalName: netbird-relay.netbird.svc.cluster.local
  ports:
    - port: 443
      name: relay
---
# Test website
apiVersion: v1
kind: Service
metadata:
  name: test-website
  namespace: traefik
spec:
  type: ExternalName
  externalName: test-website.test-website.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# Authentik (SSO/OIDC identity provider)
apiVersion: v1
kind: Service
metadata:
  name: authentik-server
  namespace: traefik
spec:
  type: ExternalName
  externalName: authentik-server.authentik.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# Homepage (homelab dashboard)
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: traefik
spec:
  type: ExternalName
  externalName: homepage.apps-homepage.svc.cluster.local
  ports:
    - port: 3000
      name: http
---
# Wiki.js (documentation wiki)
apiVersion: v1
kind: Service
metadata:
  name: wiki
  namespace: traefik
spec:
  type: ExternalName
  externalName: wiki.wiki.svc.cluster.local
  ports:
    - port: 80
      name: http
---
# Traefik dashboard (ClusterIP — selects the Traefik pod directly for dashboard access)
apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - name: dashboard
      port: 8080
      targetPort: 8080
