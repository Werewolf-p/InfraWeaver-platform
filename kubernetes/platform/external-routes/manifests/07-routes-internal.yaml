---
# IngressRoutes for internal bare-metal services (homelab LAN + VPN only)
# All use internal-only middleware.

# ── AdGuard ───────────────────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`adguard.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: internal-only
          namespace: traefik
      services:
        - name: bm-adguard
          port: 80
  tls:
    secretName: platform-wildcard-int-tls
---
