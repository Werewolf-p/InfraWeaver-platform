---
# Bare-metal backend Services + Endpoints
# Each service has a matching Endpoints object pointing at a bare-metal IP.
# Using headless ClusterIP with manual Endpoints to proxy to LAN services.

# ── AdGuard ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: bm-adguard
  namespace: traefik
spec:
  ports:
    - port: 80
      targetPort: 40080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: bm-adguard
  namespace: traefik
subsets:
  - addresses:
      - ip: 10.25.0.5
    ports:
      - port: 40080
---
