---
# TLSStore default — sets *.int.rlservers.com wildcard as the default TLS certificate.
# All catalog IngressRoutes use this cert via fallback when no namespace-local secret exists.
# External routes (*.rlservers.com) explicitly specify rlservers-com-wildcard-tls in their routes.
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
spec:
  defaultCertificate:
    secretName: int-rlservers-com-tls
# Any HTTPS IngressRoute without an explicit cert will use the *.int.rlservers.com wildcard.
