---
# Catch-all HTTP → HTTPS redirect on the web (port 80) entrypoint.
# Excludes /.well-known/acme-challenge/ so cert-manager HTTP-01 solver can respond.
# This replaces the entrypoint-level redirect (which can't be bypassed by routes).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`) && !PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-https
          namespace: traefik
      services:
        - name: noop@internal
          kind: TraefikService
---
# Middleware: redirect-to-https — HTTP → HTTPS permanent redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Middleware: internal-only — allows homelab LAN + VPN, blocks public internet
# NetBird masquerade=true means VPN clients appear as node LAN IPs (10.25.0.0/24).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: internal-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 10.25.0.0/24      # Homelab LAN + NetBird VPN masquerade (node IPs on eth0)
      - 10.10.0.0/24      # VLAN 3 — K8s nodes masquerade VPN traffic via eth1
      - 10.25.90.0/24     # Homelab subnet variant
      - 192.168.1.0/24    # Home LAN
      - 172.25.0.0/16     # Docker/internal
      - 100.64.0.0/10     # NetBird CGNAT (direct WireGuard peers)
      - 127.0.0.1/32      # Localhost
      - 10.244.0.0/16     # K8s pod CIDR — in-cluster health probes (Gatus, etc.)
---
# Middleware: netbird-vpn-only — allows ONLY traffic that came through the NetBird VPN.
#
# Architecture:
#   - netbird-client DaemonSet pods run with hostNetwork: true on K8s nodes (10.10.0.90-92)
#   - VPN clients route 10.10.0.0/24 traffic through these DaemonSet peers (masquerade=true)
#   - DaemonSet pods masquerade traffic (SNAT) → Traefik sees source = 10.10.0.9x (node VLAN3 IP)
#   - Pod CIDR (10.244.0.0/16) allowed for in-cluster health probes
#   - 100.64.0.0/10 allowed for direct WireGuard peer connections (NetBird CGNAT)
#
# This middleware is applied ONLY to *.int.rlservers.com routes.
# The security model: 10.10.0.200 is a private IP (unreachable from internet) AND
# only VLAN3 node IPs and NetBird CGNAT pass this allowlist. Both layers are required.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: netbird-vpn-only
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 100.64.0.0/10     # NetBird CGNAT CIDR (direct WireGuard peers, no masquerade)
      - 10.244.0.0/16     # K8s pod CIDR — in-cluster health probes
      - 10.10.0.0/24      # VLAN3 K8s nodes (DaemonSet hostNetwork pods) — VPN masquerade IPs
---
# Middleware: add-https-headers — sets X-Forwarded-Proto for backends
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: add-https-headers
  namespace: traefik
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
# Middleware: secure-headers — browser security headers for all HTTPS responses.
#
# Applied automatically by new-app.sh to generated IngressRoutes.
# Safe to apply to any app — does NOT include Content-Security-Policy
# (that is highly app-specific and must be configured per-app if needed).
#
# Headers applied:
#   HSTS          — forces HTTPS for 1 year, including subdomains
#   X-Frame-Options — blocks your app from being embedded in iframes (clickjacking)
#   X-Content-Type-Options — prevents MIME-type sniffing attacks
#   Referrer-Policy — only send referrer to same-origin requests
#   Permissions-Policy — disable sensitive browser APIs not needed by most apps
#
# Usage in IngressRoute:
#   middlewares:
#     - name: secure-headers
#       namespace: traefik
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: traefik
spec:
  headers:
    customResponseHeaders:
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "geolocation=(), microphone=(), camera=(), payment=()"
      X-XSS-Protection: "1; mode=block"
---
# Middleware: forward-auth — Authentik proxy auth for any logged-in user.
#
# Uses Authentik's embedded outpost forward-auth endpoint.
# Any user with a valid Authentik session passes; unauthenticated users are
# redirected to auth.rlservers.com to log in, then returned here.
#
# authResponseHeaders: passes Authentik user info to the backend so apps can
# read who is logged in without doing their own auth.
#
# Usage in IngressRoute:
#   middlewares:
#     - name: forward-auth
#       namespace: traefik
#
# Label convention: add label infraweaver.io/auth: proxy to your Deployment
# to document that this app is protected (visible in: kubectl get deploy -A -L infraweaver.io/auth)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: traefik
spec:
  forwardAuth:
    address: "http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik"
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
      - authorization
---
# Middleware: forward-auth-admin — Authentik proxy auth for platform-admins only.
#
# Same as forward-auth but the Authentik Application for admin-protected services
# should have a Policy Binding requiring the `platform-admins` group.
# Authentik returns 403 for users not in the group; Traefik passes that through.
#
# To apply admin-only access to a new app in Authentik:
#   1. Create an Authentik Application + Proxy Provider pointing to your app URL
#   2. Add a Policy Binding: Expression Policy that checks ak_is_group_member(request.user, name="platform-admins")
#   3. Apply this middleware in the IngressRoute
#
# Usage in IngressRoute:
#   middlewares:
#     - name: forward-auth-admin
#       namespace: traefik
#
# Label convention: add label infraweaver.io/auth: admin to your Deployment
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth-admin
  namespace: traefik
spec:
  forwardAuth:
    address: "http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik"
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
      - authorization
---
# Middleware: compress — gzip/zstd response compression for text-heavy apps.
#
# Add to IngressRoutes for apps that serve HTML, JSON, CSS, JS, SVG, etc.
# Reduces response size by 60-80% for typical web apps, improving load times
# especially over NetBird VPN where bandwidth may be limited.
#
# Traefik v3 supports zstd (faster, better ratio) and gzip automatically.
# excludedContentTypes: skip compressing images/binary (already compressed)
#
# Usage in IngressRoute:
#   middlewares:
#     - name: compress
#       namespace: traefik
#     - name: secure-headers
#       namespace: traefik
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compress
  namespace: traefik
spec:
  compress:
    excludedContentTypes:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - image/avif
      - video/mp4
      - video/webm
      - audio/mpeg
      - application/zip
      - application/gzip
      - application/pdf
    minResponseBodyBytes: 1024   # Don't compress tiny responses (overhead not worth it)
