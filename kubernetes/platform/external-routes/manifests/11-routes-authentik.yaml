---
# CORS middleware for auth.rlservers.com
# Authentik handles CORS for application-specific OAuth2 endpoints (token, authorize)
# but NOT for the global revocation endpoint (/application/o/revoke/) or userinfo.
# This middleware adds CORS headers for those missing endpoints.
# Traefik replaces any existing Access-Control-Allow-Origin (no duplicates).
# Dashboard is public at netbird.rlservers.com.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-authentik
  namespace: traefik
spec:
  headers:
    customResponseHeaders:
      Access-Control-Allow-Origin: "https://netbird.rlservers.com"
      Access-Control-Allow-Methods: "GET, POST, OPTIONS, HEAD"
      Access-Control-Allow-Headers: "Authorization, Content-Type, Accept"
      Access-Control-Allow-Credentials: "true"
      Access-Control-Max-Age: "86400"
---
# Authentik — IngressRoute at auth.rlservers.com
# No VPN restriction: users need to reach Authentik to log in via SSO
# before connecting to services behind the VPN middleware.
# Uses individual cert (platform-auth-tls) to avoid rate limit dependency on main bundle.
#
# Two routes:
#   1. /ws/ — WebSocket path (flow SPA real-time stage updates).
#              No rate-limit-auth: rate limiting injects response-header latency that
#              delays the 101 Switching Protocols upgrade on first connection.
#              No secure-headers: X-Frame-Options/Permissions-Policy headers on a
#              101 response confuse some WebKit versions (iOS Safari/Brave).
#   2. Everything else — full middleware stack including rate-limit-auth for
#              brute-force protection on login/OIDC endpoints.
#
# Sticky cookie: ensures a user's flow session always lands on the same
# Authentik server pod. Required if replicas > 1 (flow plan tokens are
# stored in Redis but WebSocket connections are pod-local). Harmless with 1 replica.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    # WebSocket route — must be listed first (Traefik evaluates routes top-to-bottom,
    # longest match wins; the PathPrefix rule is more specific than Host-only).
    - match: Host(`auth.rlservers.com`) && PathPrefix(`/ws/`)
      kind: Rule
      priority: 20
      services:
        - name: authentik-server
          namespace: authentik
          port: 80
          sticky:
            cookie:
              name: ak_affinity
              secure: true
              httpOnly: true
              sameSite: lax

    # All other traffic — rate-limited brute-force protection
    - match: Host(`auth.rlservers.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: cors-authentik
          namespace: traefik
        - name: rate-limit-auth
          namespace: traefik
      services:
        - name: authentik-server
          namespace: authentik
          port: 80
          sticky:
            cookie:
              name: ak_affinity
              secure: true
              httpOnly: true
              sameSite: lax
  tls:
    secretName: platform-wildcard-tls

