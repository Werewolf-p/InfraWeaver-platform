---
# Homepage — homelab dashboard IngressRoute
# NetBird-VPN-only: accessible only via NetBird VPN (netbird-vpn-only middleware).
# Domain: home.int.rlservers.com — covered by *.int.rlservers.com wildcard cert (DNS-01).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home.int.rlservers.com`)
      kind: Rule
      middlewares:
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: homepage
          namespace: traefik
          port: 3000
  tls:
    secretName: int-rlservers-com-tls
