---
# Homepage — homelab dashboard IngressRoute
# NetBird-VPN-only: accessible only via NetBird VPN (netbird-vpn-only middleware).
# Domain: home.int.infraweaver.local — covered by *.int.infraweaver.local wildcard cert (DNS-01).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home.int.infraweaver.local`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: netbird-vpn-only
          namespace: traefik
      services:
        - name: homepage
          namespace: traefik
          port: 3000
  tls:
    secretName: platform-int-wildcard-tls
