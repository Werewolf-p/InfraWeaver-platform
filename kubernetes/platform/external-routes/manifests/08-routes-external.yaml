---
# IngressRoutes for public-facing services (no IP restriction)

# ── WordPress: infraweaver.local ──────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bm-wp-external
  namespace: traefik
  labels:
    infraweaver.io/access-tier: public
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`infraweaver.local`) || Host(`www.infraweaver.local`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: traefik
      services:
        - name: bm-wp-external
          port: 443
          scheme: https
          serversTransport: insecure-skip-verify
  tls:
    secretName: platform-wildcard-int-tls
---
