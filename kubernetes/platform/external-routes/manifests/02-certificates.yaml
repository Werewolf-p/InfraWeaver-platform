---
# Certificate for rlservers.com — signed by local self-signed CA
# (.local TLD is not valid for Let's Encrypt ACME; use infraweaver-ca instead)
# For public domains (yonavaarwater.nl etc.) use letsencrypt-dns below.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-wildcard-cert
  namespace: traefik
spec:
  secretName: platform-wildcard-tls
  issuerRef:
    name: infraweaver-ca
    kind: ClusterIssuer
  dnsNames:
    # Base domain
    - "rlservers.com"
    - "www.rlservers.com"
    # Platform public endpoints
    - "auth.rlservers.com"
    - "netbird.rlservers.com"
    - "api-netbird.rlservers.com"
    - "status.rlservers.com"
    - "test.rlservers.com"
    # TrueNAS (public-facing via Cloudflare)
    - "truenas.rlservers.com"
    # External/baremetal services
    - "keycloak.rlservers.com"
    - "awx.rlservers.com"
    - "bitwarden.rlservers.com"
    - "vaultwarden.rlservers.com"
    - "gitlab.rlservers.com"
    - "registry.gitlab.rlservers.com"
    - "cloud.rlservers.com"
    - "teleport.rlservers.com"
    - "registry.rlservers.com"
    # Websites
    - "degoudentijd.rlservers.com"
    - "feestinhetdonker.rlservers.com"
    - "marcel.rlservers.com"
    # Catalog apps (public)
    - "onedev.rlservers.com"
---
# Certificate for *.int.rlservers.com — signed by local CA (not publicly reachable)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: int-platform-wildcard-cert
  namespace: traefik
spec:
  secretName: platform-int-wildcard-tls
  issuerRef:
    name: infraweaver-ca
    kind: ClusterIssuer
  dnsNames:
    - "int.rlservers.com"
    - "*.int.rlservers.com"
---
# Certificate for yonavaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yonavaarwater-nl
  namespace: traefik
spec:
  secretName: yonavaarwater-nl-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - "yonavaarwater.nl"
    - "www.yonavaarwater.nl"
    - "ot.yonavaarwater.nl"
---
# Certificate for zonnevaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zonnevaarwater-nl
  namespace: traefik
spec:
  secretName: zonnevaarwater-nl-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - "zonnevaarwater.nl"
    - "www.zonnevaarwater.nl"
---
# Certificate for waterdance.nl
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: waterdance-nl
  namespace: traefik
spec:
  secretName: waterdance-nl-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "waterdance.nl"

