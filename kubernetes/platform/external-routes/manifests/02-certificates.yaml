---
# Certificate for infraweaver.local — publicly-accessible subdomains (HTTP-01)
# auth.infraweaver.local is bundled here (not a separate cert) to share the rate-limit allowance.
# netbird.infraweaver.local → separate cert (avoid cascading on VPN entry point).
# Internal services (proxmox, portainer, adguard, etc.) → moved to *.int.infraweaver.local (DNS-01 wildcard)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-wildcard-cert
  namespace: traefik
spec:
  secretName: platform-wildcard-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    # Base domain
    - "infraweaver.local"
    - "www.infraweaver.local"
    # Platform public endpoints
    - "auth.infraweaver.local"
    - "netbird.infraweaver.local"
    - "api-netbird.infraweaver.local"
    - "status.infraweaver.local"
    - "test.infraweaver.local"
    # TrueNAS (public-facing via Cloudflare)
    - "truenas.infraweaver.local"
    # External/baremetal services
    - "keycloak.infraweaver.local"
    - "awx.infraweaver.local"
    - "bitwarden.infraweaver.local"
    - "vaultwarden.infraweaver.local"
    - "gitlab.infraweaver.local"
    - "registry.gitlab.infraweaver.local"
    - "cloud.infraweaver.local"
    - "teleport.infraweaver.local"
    - "registry.infraweaver.local"
    # Websites
    - "degoudentijd.infraweaver.local"
    - "feestinhetdonker.infraweaver.local"
    - "marcel.infraweaver.local"
    # Catalog apps (public)
    - "onedev.infraweaver.local"
---
# Certificate for *.int.infraweaver.local — private/VPN-only domain, DNS-01 required
# DNS-only Cloudflare record → 10.10.0.200 (private IP, unreachable without VPN)
# NOTE: "int.infraweaver.local" apex is included intentionally — it creates a distinct SAN set
# from "*.int.infraweaver.local" alone, bypassing rate-limit exhaustion on the wildcard-only set.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: int-platform-wildcard-cert
  namespace: traefik
spec:
  secretName: platform-int-wildcard-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - "int.infraweaver.local"
    - "*.int.infraweaver.local"
---
# Certificate for yonavaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yonavaarwater-nl
  namespace: traefik
spec:
  secretName: yonavaarwater-nl-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - "yonavaarwater.nl"
    - "www.yonavaarwater.nl"
    - "ot.yonavaarwater.nl"
---
# Certificate for zonnevaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zonnevaarwater-nl
  namespace: traefik
spec:
  secretName: zonnevaarwater-nl-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - "zonnevaarwater.nl"
    - "www.zonnevaarwater.nl"
---
# Certificate for waterdance.nl
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: waterdance-nl
  namespace: traefik
spec:
  secretName: waterdance-nl-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "waterdance.nl"

