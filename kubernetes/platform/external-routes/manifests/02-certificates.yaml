---
# Certificate for rlservers.com — Let's Encrypt wildcard via Cloudflare DNS-01
# Covers *.rlservers.com + base domain (publicly trusted by all clients)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-wildcard-cert
  namespace: traefik
spec:
  secretName: platform-wildcard-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - "rlservers.com"
    - "*.rlservers.com"
---
# Certificate for *.int.rlservers.com — signed by local CA (not publicly reachable)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: int-platform-wildcard-cert
  namespace: traefik
spec:
  secretName: platform-int-wildcard-tls
  issuerRef:
    name: infraweaver-ca
    kind: ClusterIssuer
  dnsNames:
    - "int.rlservers.com"
    - "*.int.rlservers.com"
---
# Certificate for yonavaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yonavaarwater-nl
  namespace: traefik
spec:
  secretName: yonavaarwater-nl-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - "yonavaarwater.nl"
    - "www.yonavaarwater.nl"
    - "ot.yonavaarwater.nl"
---
# Certificate for zonnevaarwater.nl — Cloudflare-proxied, needs DNS-01
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zonnevaarwater-nl
  namespace: traefik
spec:
  secretName: zonnevaarwater-nl-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - "zonnevaarwater.nl"
    - "www.zonnevaarwater.nl"
---
# Certificate for waterdance.nl
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: waterdance-nl
  namespace: traefik
spec:
  secretName: waterdance-nl-tls
  issuerRef:
    name: letsencrypt-http
    kind: ClusterIssuer
  dnsNames:
    - "waterdance.nl"

