---
# netbird.rlservers.com → 301 redirect to netbird.int.rlservers.com (VPN-only)
# Dashboard is internal-only; clients must be on NetBird VPN to access it.
# The NetBird management API remains public at api-netbird.rlservers.com (enrollment).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: netbird-public-to-internal-redirect
  namespace: traefik
spec:
  redirectRegex:
    regex: "^https://netbird\\.rlservers\\.com(.*)"
    replacement: "https://netbird.int.rlservers.com${1}"
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-dashboard-public-redirect
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.rlservers.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: netbird-public-to-internal-redirect
      services:
        - name: netbird-dashboard
          port: 80
  tls:
    secretName: rlservers-com-wildcard-tls

