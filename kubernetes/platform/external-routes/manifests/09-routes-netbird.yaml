---
# netbird.rlservers.com — public dashboard (Authentik SSO via forward-auth)
# Accessible before VPN is connected — avoids chicken-and-egg enrollment problem.
# Once on VPN, netbird.int.rlservers.com is also available (no auth required).
# Management API stays public at api-netbird.rlservers.com (required for enrollment).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird.rlservers.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: forward-auth
      services:
        - name: netbird-dashboard
          port: 80
  tls:
    secretName: rlservers-com-wildcard-tls

