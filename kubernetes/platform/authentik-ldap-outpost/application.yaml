apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-authentik-ldap
  namespace: argocd
  labels:
    app.kubernetes.io/name: authentik-ldap-outpost
    infraweaver.io/layer: platform
spec:
  project: default
  source:
    repoURL: https://github.com/Werewolf-p/InfraWeaver-platform.git
    targetRevision: main
    path: kubernetes/platform/authentik-ldap-outpost/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
