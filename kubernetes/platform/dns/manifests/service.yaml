apiVersion: v1
kind: Service
metadata:
  name: coredns
  namespace: dns-system
  annotations:
    # Static MetalLB IP on VLAN 3 — VLAN 2 (homelab) has a firewall rule to access DNS on VLAN 3
    # NetBird VPN clients and all homelab LAN devices can reach DNS at ${METALLB_COREDNS_VIP}
    metallb.universe.tf/loadBalancerIPs: "${METALLB_COREDNS_VIP}"
  labels:
    app: coredns
spec:
  type: LoadBalancer
  # Preserve source IP so logs show real client addresses
  externalTrafficPolicy: Local
  selector:
    app: coredns
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
