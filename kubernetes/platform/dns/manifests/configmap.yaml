apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom-config
  namespace: dns-system
data:
  Corefile: |
    # ${BASE_DOMAIN} zone — all internal services
    ${BASE_DOMAIN}:53 {
        hosts /etc/coredns/zones/${BASE_DOMAIN}.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        forward . 1.1.1.1 8.8.8.8
        log
        errors
    }

    # ${CLUSTER_LOCAL_DOMAIN} zone — Talos cluster in-cluster ingress (Traefik)
    ${CLUSTER_LOCAL_DOMAIN}:53 {
        hosts /etc/coredns/zones/${CLUSTER_LOCAL_DOMAIN}.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        log
        errors
    }

    # int.${BASE_DOMAIN} zone — private/VPN-only services (DNS-only Cloudflare → ${METALLB_TRAEFIK_VIP})
    # hosts: explicit entries for known services (loaded from hosts file)
    # template: wildcard fallback — any *.int.${BASE_DOMAIN} not in hosts → ${METALLB_TRAEFIK_VIP}
    # This means new catalog apps resolve automatically without a hosts-file update.
    int.${BASE_DOMAIN}:53 {
        hosts /etc/coredns/zones/int.${BASE_DOMAIN}.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        template IN A int.${BASE_DOMAIN} {
            answer "{{ .Name }} 60 IN A ${METALLB_TRAEFIK_VIP}"
            fallthrough
        }
        log
        errors
    }

    # Catch-all — forward everything else to upstream DNS
    .:53 {
        forward . 1.1.1.1 8.8.8.8 {
            max_concurrent 1000
        }
        cache 300
        log
        errors
        health :8080
        ready :8181
    }

  ${BASE_DOMAIN}.hosts: |
    # ${BASE_DOMAIN} — all services route through K8s Traefik at ${METALLB_TRAEFIK_VIP}
    # K8s Traefik proxies to the actual bare-metal or cluster backend.

    # ── Cluster apps ─────────────────────────────────────────────────────────
    ${METALLB_TRAEFIK_VIP}  test.${BASE_DOMAIN}

    # ── Bare-metal services (proxied through K8s Traefik → bare-metal) ───────
    ${METALLB_TRAEFIK_VIP}  auth.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  netbird.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  api-netbird.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  bitwarden.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  cloud.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  degoudentijd.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  www.degoudentijd.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  feestinhetdonker.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  gitlab.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  registry.gitlab.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  keycloak.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  marcel.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  registry.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  ${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  www.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  teleport.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  truenas.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  status.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  keycloak.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  awx.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  bitwarden.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  gitlab.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  registry.gitlab.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  cloud.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  teleport.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  registry.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  wiki.${BASE_DOMAIN}

    # ── Static / non-Traefik ──────────────────────────────────────────────────
    10.25.0.43   dc1.${BASE_DOMAIN}

  ${CLUSTER_LOCAL_DOMAIN}.hosts: |
    # ${CLUSTER_LOCAL_DOMAIN} — Talos Kubernetes cluster services
    # All route through cluster Traefik at ${METALLB_TRAEFIK_VIP}

    ${METALLB_TRAEFIK_VIP}  argocd.${CLUSTER_LOCAL_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  grafana.${CLUSTER_LOCAL_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  longhorn.${CLUSTER_LOCAL_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  netbird.${CLUSTER_LOCAL_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  openbao.${CLUSTER_LOCAL_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  test.${CLUSTER_LOCAL_DOMAIN}

  int.${BASE_DOMAIN}.hosts: |
    # int.${BASE_DOMAIN} — VPN-only private services
    # Cloudflare DNS-only record *.int.${BASE_DOMAIN} → ${METALLB_TRAEFIK_VIP} (private IP)
    # Only reachable via NetBird VPN or VLAN3 network.
    # NOTE: The CoreDNS template plugin also handles wildcard *.int.${BASE_DOMAIN} → ${METALLB_TRAEFIK_VIP}
    # so new apps do NOT require a manual entry here. This file is kept for documentation.
    ${METALLB_TRAEFIK_VIP}  int.${BASE_DOMAIN}
    # ── Core platform ──────────────────────────────────────────────────────────
    ${METALLB_TRAEFIK_VIP}  netbird.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  argocd.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  grafana.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  home.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  longhorn.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  openbao.int.${BASE_DOMAIN}
    # ── Catalog apps ──────────────────────────────────────────────────────────
    ${METALLB_TRAEFIK_VIP}  wiki.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  gitea.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  vaultwarden.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  it-tools.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  stirling-pdf.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  excalidraw.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  actual.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  n8n.int.${BASE_DOMAIN}
    ${METALLB_TRAEFIK_VIP}  forgejo.int.${BASE_DOMAIN}
