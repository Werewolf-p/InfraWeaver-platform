apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom-config
  namespace: dns-system
data:
  Corefile: |
    # infraweaver.local zone — all internal services
    infraweaver.local:53 {
        hosts /etc/coredns/zones/infraweaver.local.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        forward . 1.1.1.1 8.8.8.8
        log
        errors
    }

    # prod.local zone — Talos cluster in-cluster ingress (Traefik)
    prod.local:53 {
        hosts /etc/coredns/zones/prod.local.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        log
        errors
    }

    # int.infraweaver.local zone — private/VPN-only services (DNS-only Cloudflare → ${METALLB_TRAEFIK_VIP})
    # hosts: explicit entries for known services (loaded from hosts file)
    # template: wildcard fallback — any *.int.infraweaver.local not in hosts → ${METALLB_TRAEFIK_VIP}
    # This means new catalog apps resolve automatically without a hosts-file update.
    int.infraweaver.local:53 {
        hosts /etc/coredns/zones/int.infraweaver.local.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        template IN A int.infraweaver.local {
            answer "{{ .Name }} 60 IN A ${METALLB_TRAEFIK_VIP}"
            fallthrough
        }
        log
        errors
    }

    # Catch-all — forward everything else to upstream DNS
    .:53 {
        forward . 1.1.1.1 8.8.8.8 {
            max_concurrent 1000
        }
        cache 300
        log
        errors
        health :8080
        ready :8181
    }

  infraweaver.local.hosts: |
    # infraweaver.local — all services route through K8s Traefik at ${METALLB_TRAEFIK_VIP}
    # K8s Traefik proxies to the actual bare-metal or cluster backend.

    # ── Cluster apps ─────────────────────────────────────────────────────────
    ${METALLB_TRAEFIK_VIP}  test.infraweaver.local

    # ── Bare-metal services (proxied through K8s Traefik → bare-metal) ───────
    ${METALLB_TRAEFIK_VIP}  auth.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  netbird.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  api-netbird.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  bitwarden.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  cloud.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  degoudentijd.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  www.degoudentijd.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  feestinhetdonker.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  gitlab.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  registry.gitlab.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  keycloak.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  marcel.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  registry.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  infraweaver.local
    ${METALLB_TRAEFIK_VIP}  www.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  teleport.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  truenas.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  status.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  keycloak.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  awx.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  bitwarden.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  gitlab.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  registry.gitlab.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  cloud.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  teleport.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  registry.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  wiki.infraweaver.local

    # ── Static / non-Traefik ──────────────────────────────────────────────────
    10.25.0.43   dc1.infraweaver.local

  prod.local.hosts: |
    # prod.local — Talos Kubernetes cluster services
    # All route through cluster Traefik at ${METALLB_TRAEFIK_VIP}

    ${METALLB_TRAEFIK_VIP}  argocd.prod.local
    ${METALLB_TRAEFIK_VIP}  grafana.prod.local
    ${METALLB_TRAEFIK_VIP}  longhorn.prod.local
    ${METALLB_TRAEFIK_VIP}  netbird.prod.local
    ${METALLB_TRAEFIK_VIP}  openbao.prod.local
    ${METALLB_TRAEFIK_VIP}  test.prod.local

  int.infraweaver.local.hosts: |
    # int.infraweaver.local — VPN-only private services
    # Cloudflare DNS-only record *.int.infraweaver.local → ${METALLB_TRAEFIK_VIP} (private IP)
    # Only reachable via NetBird VPN or VLAN3 network.
    # NOTE: The CoreDNS template plugin also handles wildcard *.int.infraweaver.local → ${METALLB_TRAEFIK_VIP}
    # so new apps do NOT require a manual entry here. This file is kept for documentation.
    ${METALLB_TRAEFIK_VIP}  int.infraweaver.local
    # ── Core platform ──────────────────────────────────────────────────────────
    ${METALLB_TRAEFIK_VIP}  netbird.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  argocd.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  grafana.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  home.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  longhorn.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  openbao.int.infraweaver.local
    # ── Catalog apps ──────────────────────────────────────────────────────────
    ${METALLB_TRAEFIK_VIP}  wiki.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  gitea.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  vaultwarden.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  it-tools.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  stirling-pdf.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  excalidraw.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  actual.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  n8n.int.infraweaver.local
    ${METALLB_TRAEFIK_VIP}  forgejo.int.infraweaver.local
