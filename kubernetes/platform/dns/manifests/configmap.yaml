apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom-config
  namespace: dns-system
data:
  Corefile: |
    # infraweaver.local zone — all internal services
    infraweaver.local:53 {
        hosts /etc/coredns/zones/infraweaver.local.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        forward . 1.1.1.1 8.8.8.8
        log
        errors
    }

    # prod.local zone — Talos cluster in-cluster ingress (Traefik)
    prod.local:53 {
        hosts /etc/coredns/zones/prod.local.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        log
        errors
    }

    # int.infraweaver.local zone — private/VPN-only services (DNS-only Cloudflare → 10.10.0.200)
    # hosts: explicit entries for known services (loaded from hosts file)
    # template: wildcard fallback — any *.int.infraweaver.local not in hosts → 10.10.0.200
    # This means new catalog apps resolve automatically without a hosts-file update.
    int.infraweaver.local:53 {
        hosts /etc/coredns/zones/int.infraweaver.local.hosts {
            ttl 60
            reload 30s
            fallthrough
        }
        template IN A int.infraweaver.local {
            answer "{{ .Name }} 60 IN A 10.10.0.200"
            fallthrough
        }
        log
        errors
    }

    # Catch-all — forward everything else to upstream DNS
    .:53 {
        forward . 1.1.1.1 8.8.8.8 {
            max_concurrent 1000
        }
        cache 300
        log
        errors
        health :8080
        ready :8181
    }

  infraweaver.local.hosts: |
    # infraweaver.local — all services route through K8s Traefik at 10.10.0.200
    # K8s Traefik proxies to the actual bare-metal or cluster backend.

    # ── Cluster apps ─────────────────────────────────────────────────────────
    10.10.0.200  test.infraweaver.local

    # ── Bare-metal services (proxied through K8s Traefik → bare-metal) ───────
    10.10.0.200  auth.infraweaver.local
    10.10.0.200  netbird.infraweaver.local
    10.10.0.200  api-netbird.infraweaver.local
    10.10.0.200  bitwarden.infraweaver.local
    10.10.0.200  cloud.infraweaver.local
    10.10.0.200  degoudentijd.infraweaver.local
    10.10.0.200  www.degoudentijd.infraweaver.local
    10.10.0.200  feestinhetdonker.infraweaver.local
    10.10.0.200  gitlab.infraweaver.local
    10.10.0.200  registry.gitlab.infraweaver.local
    10.10.0.200  keycloak.infraweaver.local
    10.10.0.200  marcel.infraweaver.local
    10.10.0.200  registry.infraweaver.local
    10.10.0.200  infraweaver.local
    10.10.0.200  www.infraweaver.local
    10.10.0.200  teleport.infraweaver.local
    10.10.0.200  truenas.infraweaver.local
    10.10.0.200  status.infraweaver.local
    10.10.0.200  keycloak.infraweaver.local
    10.10.0.200  awx.infraweaver.local
    10.10.0.200  bitwarden.infraweaver.local
    10.10.0.200  gitlab.infraweaver.local
    10.10.0.200  registry.gitlab.infraweaver.local
    10.10.0.200  cloud.infraweaver.local
    10.10.0.200  teleport.infraweaver.local
    10.10.0.200  registry.infraweaver.local
    10.10.0.200  wiki.infraweaver.local

    # ── Static / non-Traefik ──────────────────────────────────────────────────
    10.25.0.43   dc1.infraweaver.local

  prod.local.hosts: |
    # prod.local — Talos Kubernetes cluster services
    # All route through cluster Traefik at 10.10.0.200

    10.10.0.200  argocd.prod.local
    10.10.0.200  grafana.prod.local
    10.10.0.200  longhorn.prod.local
    10.10.0.200  netbird.prod.local
    10.10.0.200  openbao.prod.local
    10.10.0.200  test.prod.local

  int.infraweaver.local.hosts: |
    # int.infraweaver.local — VPN-only private services
    # Cloudflare DNS-only record *.int.infraweaver.local → 10.10.0.200 (private IP)
    # Only reachable via NetBird VPN or VLAN3 network.
    # NOTE: The CoreDNS template plugin also handles wildcard *.int.infraweaver.local → 10.10.0.200
    # so new apps do NOT require a manual entry here. This file is kept for documentation.
    10.10.0.200  int.infraweaver.local
    # ── Core platform ──────────────────────────────────────────────────────────
    10.10.0.200  netbird.int.infraweaver.local
    10.10.0.200  argocd.int.infraweaver.local
    10.10.0.200  grafana.int.infraweaver.local
    10.10.0.200  home.int.infraweaver.local
    10.10.0.200  longhorn.int.infraweaver.local
    10.10.0.200  openbao.int.infraweaver.local
    # ── Catalog apps ──────────────────────────────────────────────────────────
    10.10.0.200  wiki.int.infraweaver.local
    10.10.0.200  gitea.int.infraweaver.local
    10.10.0.200  vaultwarden.int.infraweaver.local
    10.10.0.200  it-tools.int.infraweaver.local
    10.10.0.200  stirling-pdf.int.infraweaver.local
    10.10.0.200  excalidraw.int.infraweaver.local
    10.10.0.200  actual.int.infraweaver.local
    10.10.0.200  n8n.int.infraweaver.local
    10.10.0.200  forgejo.int.infraweaver.local
