apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n-ingress
  namespace: n8n-prod
  annotations:
    # Couple n8n with Authentik SSO at the proxy layer (n8n community edition
    # has no native OIDC). Users must authenticate via Authentik before reaching
    # the n8n editor/owner-setup. Middleware defined in middleware-forward-auth.yaml.
    traefik.ingress.kubernetes.io/router.middlewares: n8n-prod-n8n-forward-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: n8n.rlservers.com
    http:
      paths:
      - backend:
          service:
            name: n8n-api
            port:
              number: 8080
        path: /
        pathType: Prefix
status:
  loadBalancer:
    ingress:
    - ip: 10.10.0.200
