apiVersion: v1
kind: Service
metadata:
  name: postgresql-n8n
  namespace: n8n-prod
spec:
  clusterIP: None
  clusterIPs:
  - None
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    app: postgresql-n8n
  sessionAffinity: None
  type: ClusterIP
status:
  loadBalancer: {}
