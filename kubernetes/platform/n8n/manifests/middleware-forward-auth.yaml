---
# Authentik forward-auth middleware for n8n.
# n8n community edition has no native OIDC/SSO, so we gate access at the proxy
# layer via the Authentik embedded outpost. The matching proxy provider + app
# ("n8n Provider" / slug "n8n", external_host https://n8n.rlservers.com) is
# defined in the Authentik apps blueprint and bound to the Embedded Outpost.
# Defined in n8n-prod (same namespace as the Ingress) for a clean reference.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: n8n-forward-auth
  namespace: n8n-prod
  labels:
    app: n8n
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - authorization
