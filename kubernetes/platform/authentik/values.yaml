global:
  # Mount custom branding images as static files so they are served
  # permanently at /static/dist/assets/icons/<filename> (no JWT expiry).
  # subPath mounts add individual files without replacing the whole directory.
  volumes:
    - name: authentik-media
      configMap:
        name: authentik-media
  volumeMounts:
    - name: authentik-media
      mountPath: /web/dist/assets/icons/logo.png
      subPath: logo.png
      readOnly: true
    - name: authentik-media
      mountPath: /web/dist/assets/icons/favicon.png
      subPath: favicon.png
      readOnly: true
    - name: authentik-media
      mountPath: /web/dist/assets/icons/banner.jpg
      subPath: banner.jpg
      readOnly: true

  # Inject secrets from ExternalSecret-managed K8s secret (authentik-secrets)
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: secret-key
    - name: AUTHENTIK_BOOTSTRAP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: bootstrap-password
    - name: AUTHENTIK_BOOTSTRAP_TOKEN
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: bootstrap-token
    - name: AUTHENTIK_BOOTSTRAP_EMAIL
      value: "admin@rlservers.com"
    - name: AUTHENTIK_REMON_PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: remon-password
          # No optional: true — pod must fail if password key is missing.
          # Silently empty password → blueprint runs without setting it → user locked out.
    - name: AUTHENTIK_ARDATY_PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: ardaty-password
          # No optional: true — pod must fail if password key is missing.

    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: postgresql-password
    - name: AUTHENTIK_EMAIL__USERNAME
      valueFrom:
        secretKeyRef:
          name: authentik-smtp-secret
          key: smtp-username
    - name: AUTHENTIK_EMAIL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-smtp-secret
          key: smtp-password

authentik:
  # secret_key must be non-empty for chart templating; actual value from env var above
  secret_key: "placeholder-overridden-by-env"
  log_level: info
  error_reporting:
    enabled: false
  email:
    host: "smtp-mail.outlook.com"
    port: 587
    use_tls: true
    use_ssl: false
    timeout: 30
    from: "admin@rlservers.com"
  postgresql:
    host: "authentik-postgresql"
    name: "authentik"
    user: "authentik"
    password: ""  # supplied via AUTHENTIK_POSTGRESQL__PASSWORD env var
    port: 5432
  redis:
    host: "authentik-redis-master"

blueprints:
  configMaps:
    - authentik-blueprint-branding
    - authentik-blueprint-netbird
    - authentik-blueprint-users
    - authentik-blueprint-apps
    - authentik-blueprint-access-control

postgresql:
  enabled: true
  auth:
    username: authentik
    database: authentik
    existingSecret: authentik-secrets
    secretKeys:
      userPasswordKey: postgresql-password
  primary:
    persistence:
      storageClass: longhorn-retain   # HA: 3 replicas across nodes (critical user data)
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Avoid cp3: Longhorn manager on cp3 is unstable, causing volume I/O errors
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
              - talos-prod-cp1
              - talos-prod-cp2

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      storageClass: longhorn   # HA: 3 replicas (rebuild-able cache)
      size: 256Mi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

server:
  replicas: 2
  ingress:
    enabled: false
  # Explicit rolling-update strategy: never take a pod down before a new one is ready.
  # With 2 replicas and maxUnavailable=0, Kubernetes always keeps both pods serving
  # traffic until the replacement is healthy — zero downtime during ArgoCD-triggered
  # rollouts or resource-limit changes from the cluster editor.
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  # Give enough time for Django migrations on a fresh DB (292+ migrations)
  # NOTE: Authentik chart does NOT support livenessProbe.enabled field — use raw k8s probe fields only
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 10
    failureThreshold: 30
  readinessProbe:
    # 30s is enough: Authentik static responses are available well before all migrations complete.
    # Reduced from 60s so rolling updates complete faster (old pod released sooner).
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 6
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: authentik
          app.kubernetes.io/component: server
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: authentik
                app.kubernetes.io/component: server
            topologyKey: kubernetes.io/hostname
    # Avoid cp3: Flannel/CNI unstable on cp3, causes pod sandbox failures
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - talos-prod-cp1
                  - talos-prod-cp2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

worker:
  replicas: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: authentik
          app.kubernetes.io/component: worker
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: authentik
                app.kubernetes.io/component: worker
            topologyKey: kubernetes.io/hostname
    # Avoid cp3: Flannel/CNI unstable on cp3, causes pod sandbox failures
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - talos-prod-cp1
                  - talos-prod-cp2
  # Give enough time for Django migrations on a fresh DB (292+ migrations)
  # NOTE: Authentik chart does NOT support livenessProbe.enabled field — use raw k8s probe fields only
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 10
    failureThreshold: 30
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 6
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
