---
# ── Authentik Secrets ExternalSecret ─────────────────────────────────────────
# Reads credentials from OpenBao (secret/platform/authentik) and creates the
# authentik-secrets K8s Secret used by the Helm chart.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: secret-key
      remoteRef:
        key: secret/platform/authentik
        property: secret-key
    - secretKey: postgresql-password
      remoteRef:
        key: secret/platform/authentik
        property: postgresql-password
    - secretKey: bootstrap-password
      remoteRef:
        key: secret/platform/authentik
        property: bootstrap-password
    - secretKey: bootstrap-token
      remoteRef:
        key: secret/platform/authentik
        property: bootstrap-token
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/authentik
        property: admin-password
---
# ── Authentik SMTP Secret ExternalSecret ─────────────────────────────────────
# Reads SMTP credentials from OpenBao (secret/platform/authentik) and creates
# the authentik-smtp-secret K8s Secret used by the Helm chart.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-smtp-secret
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: authentik-smtp-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: smtp-username
      remoteRef:
        key: secret/platform/authentik
        property: smtp-username
    - secretKey: smtp-password
      remoteRef:
        key: secret/platform/authentik
        property: smtp-password
