---
# NetworkPolicies for the Authentik namespace
# Default-deny all ingress, then allow Traefik → Authentik and Prometheus scraping.

# ── Default deny all ingress ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ── Allow Traefik to reach Authentik server (HTTP port 80) ───────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: authentik
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 9300   # Authentik metrics port

---
# ── Allow Prometheus to scrape Authentik metrics ─────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: authentik
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9300

---
# ── Allow Authentik pods to communicate with each other (server ↔ worker) ────
# Authentik server and worker need to share the Redis/PostgreSQL connections
# and the worker processes async tasks for the server.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}   # all pods within authentik namespace
