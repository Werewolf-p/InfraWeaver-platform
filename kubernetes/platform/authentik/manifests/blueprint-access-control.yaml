---
# ── Platform Access Control Blueprint ────────────────────────────────────────
# Defines groups and per-application access policies for the platform.
#
# Groups:
#   platform-admins  → full access to all apps (remon)
#   platform-users   → access to homepage, netbird, argocd (ardaty, guests)
#
# To add a new user → edit users.yaml in the repo root and add them to
# blueprint-users.yaml. Update this file if their group needs changing.
#
# To add a new app  → add a policy binding entry below targeting the app slug.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-access-control
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  access-control.yaml: |
    version: 1
    metadata:
      name: Platform Access Control
    entries:
      # ── Groups ──────────────────────────────────────────────────────────────
      - model: authentik_core.group
        state: present
        identifiers:
          name: platform-admins
        attrs:
          name: platform-admins
          is_superuser: false

      - model: authentik_core.group
        state: present
        identifiers:
          name: platform-users
        attrs:
          name: platform-users
          is_superuser: false

      # ── Expression Policies ──────────────────────────────────────────────────
      # Policy: only platform-admins may access admin-only apps
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: policy-admins-only
        attrs:
          name: policy-admins-only
          expression: |
            return ak_is_group_member(request.user, name="platform-admins")

      # Policy: platform-admins OR platform-users may access shared apps
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: policy-platform-users
        attrs:
          name: policy-platform-users
          expression: |
            return (
              ak_is_group_member(request.user, name="platform-admins") or
              ak_is_group_member(request.user, name="platform-users")
            )

      # ── Application Policy Bindings ──────────────────────────────────────────
      # netbird: both groups (all authenticated users can use VPN)
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          target: !Find [authentik_core.application, [slug, netbird]]
          order: 10
        attrs:
          target: !Find [authentik_core.application, [slug, netbird]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, policy-platform-users]]
          enabled: true
          order: 10
          negate: false
          timeout: 30

      # argocd: both groups (read-only vs admin controlled by ArgoCD RBAC)
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          target: !Find [authentik_core.application, [slug, argocd]]
          order: 10
        attrs:
          target: !Find [authentik_core.application, [slug, argocd]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, policy-platform-users]]
          enabled: true
          order: 10
          negate: false
          timeout: 30

      # openbao: admins only
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          target: !Find [authentik_core.application, [slug, openbao]]
          order: 10
        attrs:
          target: !Find [authentik_core.application, [slug, openbao]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, policy-admins-only]]
          enabled: true
          order: 10
          negate: false
          timeout: 30
