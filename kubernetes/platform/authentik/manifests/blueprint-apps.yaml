---
# ── ArgoCD + OpenBao OAuth2 Blueprints ───────────────────────────────────────
# Creates confidential OAuth2 providers and applications for ArgoCD and OpenBao.
# Client secrets are NOT set here (auto-generated by Authentik); the
# full-redeploy workflow reads them from the Authentik API and stores them in
# OpenBao + K8s secrets so the apps can reference them.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-apps
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  apps.yaml: |
    version: 1
    metadata:
      name: ArgoCD and OpenBao OAuth2 Setup
    entries:
      # ── ArgoCD OAuth2 Provider ──────────────────────────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: ArgoCD Provider
        attrs:
          name: ArgoCD Provider
          client_id: argocd
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: "https://argocd.int.rlservers.com/auth/callback"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: argocd
        attrs:
          name: ArgoCD
          slug: argocd
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, ArgoCD Provider]]
          policy_engine_mode: any

      # ── OpenBao OAuth2 Provider ─────────────────────────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: OpenBao Provider
        attrs:
          name: OpenBao Provider
          client_id: openbao
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: "https://openbao.int.rlservers.com/ui/vault/auth/oidc/oidc/callback"
            # CLI callback for bao login -method=oidc
            - matching_mode: strict
              url: "http://localhost:8250/oidc/callback"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: openbao
        attrs:
          name: OpenBao
          slug: openbao
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, OpenBao Provider]]
          policy_engine_mode: any

      # ── Wiki.js OAuth2 Provider ─────────────────────────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: WikiJS Provider
        attrs:
          name: WikiJS Provider
          client_id: wikijs
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: "https://wiki.int.rlservers.com/login/oidc/callback"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: wikijs
        attrs:
          name: Wiki.js
          slug: wikijs
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, WikiJS Provider]]
          policy_engine_mode: any

      # ── Grafana OAuth2 Provider ─────────────────────────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Grafana Provider
        attrs:
          name: Grafana Provider
          client_id: grafana
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: "https://grafana.int.rlservers.com/login/generic_oauth"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          slug: grafana
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Grafana Provider]]
          policy_engine_mode: any

      # ── Proxmox OAuth2 Provider ─────────────────────────────────────────────
      # PVE 7.4+ supports OIDC realms via pveum. The redirect URI is the PVE UI base URL.
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Proxmox Provider
        attrs:
          name: Proxmox Provider
          client_id: proxmox
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            # PVE sends a redirect to its own UI URL after successful OIDC auth
            - matching_mode: regex
              url: "https://proxmox\\.int\\.rlservers.com.*"
            - matching_mode: regex
              url: "https://proxmox\\.rlservers.com.*"
            - matching_mode: regex
              url: "https://10.25.0.3:8006.*"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: proxmox
        attrs:
          name: Proxmox VE
          slug: proxmox
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Proxmox Provider]]
          policy_engine_mode: any

      # ── Gitea OAuth2 Provider (catalog app) ────────────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Gitea Provider
        attrs:
          name: Gitea Provider
          client_id: gitea
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: "https://gitea.int.rlservers.com/user/oauth2/authentik/callback"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: gitea
        attrs:
          name: Gitea
          slug: gitea
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Gitea Provider]]
          policy_engine_mode: any

      # ── Vaultwarden (catalog app — proxy auth via Traefik forward-auth) ────
      # Vaultwarden free edition has no native OIDC; Traefik forward-auth protects the UI.
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Vaultwarden Provider
        attrs:
          name: Vaultwarden Provider
          mode: forward_single
          external_host: "https://vaultwarden.int.rlservers.com"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: vaultwarden
        attrs:
          name: Vaultwarden
          slug: vaultwarden
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Vaultwarden Provider]]
          policy_engine_mode: any

      # ── Longhorn (internal storage UI — proxy auth via Traefik forward-auth) ──
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Longhorn Provider
        attrs:
          name: Longhorn Provider
          mode: forward_single
          external_host: "https://longhorn.int.rlservers.com"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          slug: longhorn
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Longhorn Provider]]
          policy_engine_mode: any

      # ── IT-Tools (catalog app — forward-auth) ───────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: IT-Tools Provider
        attrs:
          name: IT-Tools Provider
          mode: forward_single
          external_host: "https://it-tools.int.rlservers.com"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: it-tools
        attrs:
          name: IT-Tools
          slug: it-tools
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, IT-Tools Provider]]
          policy_engine_mode: any

      # ── Stirling-PDF (catalog app — forward-auth) ────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Stirling-PDF Provider
        attrs:
          name: Stirling-PDF Provider
          mode: forward_single
          external_host: "https://stirling-pdf.int.rlservers.com"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: stirling-pdf
        attrs:
          name: Stirling-PDF
          slug: stirling-pdf
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Stirling-PDF Provider]]
          policy_engine_mode: any

      # ── Excalidraw (catalog app — forward-auth) ──────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Excalidraw Provider
        attrs:
          name: Excalidraw Provider
          mode: forward_single
          external_host: "https://excalidraw.int.rlservers.com"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: excalidraw
        attrs:
          name: Excalidraw
          slug: excalidraw
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Excalidraw Provider]]
          policy_engine_mode: any

      # ── Actual Budget (catalog app — forward-auth) ───────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Actual Budget Provider
        attrs:
          name: Actual Budget Provider
          mode: forward_single
          external_host: "https://actual.int.rlservers.com"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: actual
        attrs:
          name: Actual Budget
          slug: actual
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Actual Budget Provider]]
          policy_engine_mode: any

      # ── n8n (catalog app — forward-auth) ────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: n8n Provider
        attrs:
          name: n8n Provider
          mode: forward_single
          external_host: "https://n8n.int.rlservers.com"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: n8n
        attrs:
          name: n8n
          slug: n8n
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, n8n Provider]]
          policy_engine_mode: any

      # ── Forgejo (catalog app — native OAuth2 OIDC) ───────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Forgejo Provider
        attrs:
          name: Forgejo Provider
          client_id: forgejo
          client_type: confidential
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          redirect_uris:
            - url: https://forgejo.int.rlservers.com/user/oauth2/Authentik/callback
              matching_mode: strict
          scopes:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          access_token_validity: hours=1
          refresh_token_validity: days=30
          include_claims_in_id_token: true

      - model: authentik_core.application
        state: present
        identifiers:
          slug: forgejo
        attrs:
          name: Forgejo
          slug: forgejo
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Forgejo Provider]]
          policy_engine_mode: any

      # ── Portainer OAuth2 Provider ──────────────────────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Portainer Provider
        attrs:
          name: Portainer Provider
          client_id: portainer
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: "https://portainer.int.rlservers.com/"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: portainer
        attrs:
          name: Portainer
          slug: portainer
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Portainer Provider]]
          policy_engine_mode: any

      # ── OneDev OAuth2 Provider ─────────────────────────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: OneDev Provider
        attrs:
          name: OneDev Provider
          client_id: onedev
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            # OneDev v15 callback URL format: /~sso/callback/{providerName}
            - matching_mode: strict
              url: "https://onedev.rlservers.com/~sso/callback/Authentik"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: onedev
        attrs:
          name: OneDev
          slug: onedev
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, OneDev Provider]]
          policy_engine_mode: any

      # ── InfraWeaver Console OAuth2 Provider ─────────────────────────────────
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: InfraWeaver Console Provider
        attrs:
          name: InfraWeaver Console Provider
          client_id: infraweaver-console
          client_type: confidential
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: "https://infraweaver.int.rlservers.com/api/auth/callback/authentik"
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: infraweaver-console
        attrs:
          name: InfraWeaver Console
          slug: infraweaver-console
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, InfraWeaver Console Provider]]
          policy_engine_mode: any
      # NOTE: Embedded Outpost configuration (proxy providers) is handled by
      # configure-oidc.sh at deploy time, after proxy providers are created.
      # Do NOT define it here — proxy providers don't exist when this blueprint runs.
