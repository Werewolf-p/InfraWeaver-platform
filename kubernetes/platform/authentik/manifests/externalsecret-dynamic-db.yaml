---
# Proof of concept: fetch short-lived database credentials for Authentik from OpenBao.
# Prerequisite: configure the OpenBao database secrets engine role at
# `database/creds/authentik-app` before syncing this manifest.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-dynamic-db-creds
  namespace: authentik
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: authentik-dynamic-db-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/authentik-app
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/authentik-app
        property: password
