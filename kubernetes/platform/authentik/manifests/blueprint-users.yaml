---
# ── Authentik Platform Users Blueprint ───────────────────────────────────────
# Creates all platform users on first boot.
# Passwords are injected via env vars (from ExternalSecret sourced from OpenBao).
#
# TO ADD A USER:
#   1. Add entry to users.yaml (repo root) for documentation + sync
#   2. Add an entry below for the Authentik user
#   3. Add their password to OpenBao via seed-openbao-authentik.sh
#   4. Add password mapping to externalsecret.yaml + env var to authentik/values.yaml
#   (Group membership is set dynamically from users.yaml — no workflow changes needed)
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-users
  namespace: authentik
data:
  users.yaml: |
    version: 1
    metadata:
      name: Platform Users Setup
    entries:
      # ── remon (admin) ────────────────────────────────────────────────────────
      # Username matches sub_mode=user_username → NetBird user ID = "remon"
      # Group: platform-admins (set by workflow)
      - model: authentik_core.user
        state: present
        identifiers:
          username: remon
        attrs:
          name: "Remon Hulst"
          email: "remonhulst@gmail.com"
          password: !Env AUTHENTIK_REMON_PASSWORD
          is_active: true

      # ── ardaty (platform-user) ───────────────────────────────────────────────
      # Access: homepage, netbird, argocd (read-only) — see users.yaml for details
      # Group: platform-users (set dynamically from users.yaml)
      - model: authentik_core.user
        state: present
        identifiers:
          username: ardaty
        attrs:
          name: "Ardaty"
          email: "ardaty@rlservers.com"
          password: !Env AUTHENTIK_ARDATY_PASSWORD
          is_active: true

      # Will be removed after user-add workflow test
      - model: authentik_core.user
        state: present
        identifiers:
        attrs:
          email: "remonhulst@gmail.com"
          is_active: true

