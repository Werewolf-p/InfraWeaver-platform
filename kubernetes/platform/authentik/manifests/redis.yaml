# Standalone Redis for Authentik
# Required since authentik chart 2026.x dropped the Redis subchart dependency.
# Authentik workers connect to AUTHENTIK_REDIS__HOST=authentik-redis-master (from values.yaml).
apiVersion: v1
kind: Service
metadata:
  name: authentik-redis-master
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik-redis
    app.kubernetes.io/component: master
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: authentik-redis
    app.kubernetes.io/component: master
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: authentik-redis-master
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik-redis
    app.kubernetes.io/component: master
spec:
  serviceName: authentik-redis-master
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik-redis
      app.kubernetes.io/component: master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik-redis
        app.kubernetes.io/component: master
    spec:
      priorityClassName: platform-high
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: docker.io/redis:7-alpine
          command: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        annotations:
          recurring-job-group.longhorn.io/truenas-backup: "enabled"
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 256Mi
