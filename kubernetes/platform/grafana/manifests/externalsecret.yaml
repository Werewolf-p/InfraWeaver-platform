---
# ExternalSecret — pulls Grafana admin credentials from OpenBao.
# The grafana Helm chart references grafana-admin-secret in its own namespace (apps-grafana).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: apps-grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-user
      remoteRef:
        key: secret/platform/grafana
        property: admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: admin-password
      remoteRef:
        key: secret/platform/grafana
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# ExternalSecret — pulls Grafana OIDC client secret from OpenBao.
# Used by grafana.ini auth.generic_oauth as GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET env var.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc-secret
  namespace: apps-grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-oidc-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      data:
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ .client_secret }}"
  data:
    - secretKey: client_secret
      remoteRef:
        key: secret/platform/grafana-oidc
        property: client_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
