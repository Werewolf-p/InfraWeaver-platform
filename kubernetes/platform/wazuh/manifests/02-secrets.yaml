---
# ExternalSecret — pulls all Wazuh credentials from OpenBao into wazuh-credentials secret
# OpenBao path: secret/data/platform/wazuh
# Fields: indexer_password, dashboard_password, api_password, cluster_key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wazuh-credentials
  namespace: wazuh
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: wazuh-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: indexer_password
      remoteRef:
        key: secret/platform/wazuh
        property: indexer_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: dashboard_password
      remoteRef:
        key: secret/platform/wazuh
        property: dashboard_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: api_password
      remoteRef:
        key: secret/platform/wazuh
        property: api_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: cluster_key
      remoteRef:
        key: secret/platform/wazuh
        property: cluster_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
