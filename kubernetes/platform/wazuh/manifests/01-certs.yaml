---
# Self-signed root CA issuer for Wazuh internal TLS
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: wazuh-ca-issuer
  namespace: wazuh
spec:
  selfSigned: {}
---
# Root CA certificate for Wazuh
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wazuh-ca
  namespace: wazuh
spec:
  isCA: true
  commonName: wazuh-ca
  secretName: wazuh-ca-secret
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: wazuh-ca-issuer
    kind: Issuer
---
# CA-backed issuer using the wazuh root CA
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: wazuh-issuer
  namespace: wazuh
spec:
  ca:
    secretName: wazuh-ca-secret
---
# Indexer (OpenSearch) TLS certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wazuh-indexer-cert
  namespace: wazuh
spec:
  secretName: wazuh-indexer-certs
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: wazuh-issuer
    kind: Issuer
  commonName: wazuh-indexer
  dnsNames:
    - wazuh-indexer
    - wazuh-indexer.wazuh
    - wazuh-indexer.wazuh.svc
    - wazuh-indexer.wazuh.svc.cluster.local
    - wazuh-indexer-0.wazuh-indexer.wazuh.svc.cluster.local
  usages:
    - server auth
    - client auth
---
# Manager (filebeat) client certificate for indexer communication
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wazuh-manager-cert
  namespace: wazuh
spec:
  secretName: wazuh-manager-certs
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: wazuh-issuer
    kind: Issuer
  commonName: wazuh-manager
  dnsNames:
    - wazuh-manager
    - wazuh-manager-master
    - wazuh-manager-master.wazuh
    - wazuh-manager-master.wazuh.svc.cluster.local
  usages:
    - server auth
    - client auth
---
# Dashboard TLS certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wazuh-dashboard-cert
  namespace: wazuh
spec:
  secretName: wazuh-dashboard-certs
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: wazuh-issuer
    kind: Issuer
  commonName: wazuh-dashboard
  dnsNames:
    - wazuh-dashboard
    - wazuh-dashboard.wazuh
    - wazuh-dashboard.wazuh.svc.cluster.local
  usages:
    - server auth
    - client auth
---
# Admin certificate for OpenSearch security API (securityadmin.sh)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wazuh-admin-cert
  namespace: wazuh
spec:
  secretName: wazuh-admin-certs
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: wazuh-issuer
    kind: Issuer
  commonName: admin
  dnsNames:
    - admin
  usages:
    - client auth
