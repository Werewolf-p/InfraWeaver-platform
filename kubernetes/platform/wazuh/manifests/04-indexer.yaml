---
# Headless service for StatefulSet DNS discovery
apiVersion: v1
kind: Service
metadata:
  name: wazuh-indexer
  namespace: wazuh
  labels:
    app: wazuh-indexer
spec:
  clusterIP: None
  selector:
    app: wazuh-indexer
  ports:
    - name: https
      port: 9200
      protocol: TCP
      targetPort: 9200
    - name: transport
      port: 9300
      protocol: TCP
      targetPort: 9300
---
# ClusterIP service for indexer API access
apiVersion: v1
kind: Service
metadata:
  name: wazuh-indexer-svc
  namespace: wazuh
  labels:
    app: wazuh-indexer
spec:
  selector:
    app: wazuh-indexer
  ports:
    - name: https
      port: 9200
      protocol: TCP
      targetPort: 9200
---
# StatefulSet: wazuh-indexer (OpenSearch)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-indexer
  namespace: wazuh
  labels:
    app: wazuh-indexer
spec:
  serviceName: wazuh-indexer
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-indexer
  template:
    metadata:
      labels:
        app: wazuh-indexer
    spec:
      initContainers:
        # Fix vm.max_map_count required by OpenSearch
        - name: sysctl
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: wazuh-indexer
          image: wazuh/wazuh-indexer:4.10.3
          ports:
            - containerPort: 9200
              name: https
            - containerPort: 9300
              name: transport
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-credentials
                  key: indexer_password
            - name: bootstrap.memory_lock
              value: "false"
          volumeMounts:
            - name: opensearch-conf
              mountPath: /usr/share/wazuh-indexer/opensearch.yml
              subPath: opensearch.yml
            - name: opensearch-conf
              mountPath: /usr/share/wazuh-indexer/opensearch-security/internal_users.yml
              subPath: internal_users.yml
            - name: indexer-certs
              mountPath: /usr/share/wazuh-indexer/certs
              readOnly: true
            - name: wazuh-indexer-data
              mountPath: /var/lib/wazuh-indexer
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: 1000m
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: opensearch-conf
          configMap:
            name: wazuh-indexer-conf
        - name: indexer-certs
          secret:
            secretName: wazuh-indexer-certs
  volumeClaimTemplates:
    - metadata:
        name: wazuh-indexer-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn-retain
        resources:
          requests:
            storage: 20Gi
