---
# Configure GitHub Actions self-hosted runner on a cloud-init Ubuntu VM.
#
# Expects inventory with:
#   - runner_vms group: the runner VM (ubuntu user)
#   - cluster_nodes group: PVE nodes for SSH key distribution (root user)
#   - Variables: cluster_name, runner_repo_url, runner_labels, github_runner_token

# ---------------------------------------------------------------------------
# Play 1 — Configure runner VM: packages, SSH key, GitHub Actions runner
# ---------------------------------------------------------------------------
- name: Configure GitHub Actions runner
  hosts: runner_vms
  gather_facts: false
  become: true
  vars:
    runner_arch: "linux-x64"
    runner_user: ubuntu
    runner_dir: /opt/github-runner

  tasks:
    - name: Wait for cloud-init to complete
      raw: "cloud-init status --wait 2>/dev/null || timeout 180 bash -c 'while [ ! -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done'"
      changed_when: false
      retries: 3
      delay: 15
      register: cloud_init_wait
      until: cloud_init_wait is succeeded

    - name: Wait for SSH to become fully operational
      wait_for_connection:
        timeout: 300
        sleep: 10
        delay: 5
        connect_timeout: 15

    - name: Gather facts
      setup:

    - name: Wait for dpkg lock to be free
      raw: "timeout 120 bash -c 'while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done' || true"
      changed_when: false

    - name: Fix any broken dpkg state
      raw: "dpkg --configure -a 2>/dev/null || true"
      changed_when: false

    - name: Fix broken apt dependencies
      raw: "apt-get -y --fix-broken install 2>/dev/null || true"
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 0
      retries: 3
      delay: 10
      register: apt_update
      until: apt_update is succeeded

    - name: Create swap file if memory is low
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi
      changed_when: false

    - name: Install required packages
      block:
        - name: Install packages
          apt:
            name:
              - curl
              - jq
              - libicu74
              - git
              - make
              - docker.io
              - openssh-client
            state: present
          register: pkg_install
      rescue:
        - name: Clean apt cache and retry
          shell: |
            apt-get clean
            rm -rf /var/cache/apt/archives/partial/*
            apt-get update -qq
          changed_when: false
        - name: Retry package install
          apt:
            name:
              - curl
              - jq
              - libicu74
              - git
              - make
              - docker.io
              - openssh-client
            state: present
            update_cache: true

    - name: Add ubuntu user to docker group
      user:
        name: "{{ runner_user }}"
        groups: docker
        append: true

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Check if homelab-ansible image exists
      shell: docker images -q homelab-ansible:latest 2>/dev/null
      register: ansible_image_check
      changed_when: false

    - name: Pre-pull base image for CI ansible container
      shell: docker pull python:3.12-slim
      register: docker_pull
      retries: 3
      delay: 10
      until: docker_pull is succeeded
      changed_when: "'Downloaded newer image' in docker_pull.stdout or 'Pull complete' in docker_pull.stdout"
      when: ansible_image_check.stdout == ""

    - name: Ensure build directory exists
      file:
        path: /tmp/ansible-build
        state: directory
      when: ansible_image_check.stdout == ""

    - name: Copy Dockerfile for ansible image
      copy:
        dest: /tmp/ansible-build/Dockerfile
        content: |
          FROM python:3.12-slim
          ENV DEBIAN_FRONTEND=noninteractive \
              PYTHONDONTWRITEBYTECODE=1 \
              ANSIBLE_FORCE_COLOR=1 \
              ANSIBLE_HOST_KEY_CHECKING=False
          RUN apt-get update && \
              apt-get install -y --no-install-recommends openssh-client sshpass && \
              pip install --no-cache-dir "ansible-core~=2.17.0" && \
              ansible-galaxy collection install ansible.posix community.crypto && \
              rm -rf /var/lib/apt/lists/* && \
              mkdir -p /root/.ssh && chmod 700 /root/.ssh
          WORKDIR /ansible
        mode: "0644"
      when: ansible_image_check.stdout == ""

    - name: Pre-build homelab-ansible image for CI
      shell: docker build -t homelab-ansible:latest /tmp/ansible-build/
      register: docker_build
      retries: 2
      delay: 30
      until: docker_build is succeeded
      changed_when: true
      when: ansible_image_check.stdout == ""

    - name: Clean up build directory
      file:
        path: /tmp/ansible-build
        state: absent
      when: ansible_image_check.stdout == ""

    - name: Generate ed25519 SSH key pair for cluster management
      become_user: "{{ runner_user }}"
      openssh_keypair:
        path: "/home/{{ runner_user }}/.ssh/id_ed25519"
        type: ed25519
        comment: "github-runner-{{ cluster_name }}"
        force: false

    - name: Read runner SSH public key
      slurp:
        src: "/home/{{ runner_user }}/.ssh/id_ed25519.pub"
      register: runner_vm_ssh_pubkey

    - name: Store public key for cross-play distribution
      set_fact:
        runner_pubkey: "{{ runner_vm_ssh_pubkey.content | b64decode | trim }}"

    - name: Get latest GitHub Actions runner version
      uri:
        url: "https://api.github.com/repos/actions/runner/releases/latest"
        method: GET
        headers:
          Authorization: "Bearer {{ github_runner_token }}"
          Accept: "application/vnd.github+json"
        return_content: true
        status_code: 200
      register: latest_runner_release
      failed_when: false
      no_log: true

    - name: Set runner version
      set_fact:
        runner_version: >-
          {{
            latest_runner_release.json.tag_name | regex_replace('^v', '')
            if (latest_runner_release is not failed
                and latest_runner_release.json is defined
                and latest_runner_release.json.tag_name is defined)
            else '2.334.0'
          }}

    - name: Create runner directory
      file:
        path: "{{ runner_dir }}"
        state: directory
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
        mode: "0755"

    - name: Check if runner is already installed
      stat:
        path: "{{ runner_dir }}/config.sh"
      register: runner_installed

    - name: Download GitHub Actions runner
      become_user: "{{ runner_user }}"
      get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-{{ runner_arch }}-{{ runner_version }}.tar.gz"
        dest: "/tmp/actions-runner.tar.gz"
        mode: "0644"
        timeout: 300
      retries: 3
      delay: 15
      register: runner_download
      until: runner_download is succeeded
      when: not runner_installed.stat.exists

    - name: Extract runner package
      become_user: "{{ runner_user }}"
      unarchive:
        src: /tmp/actions-runner.tar.gz
        dest: "{{ runner_dir }}"
        remote_src: true
      when: not runner_installed.stat.exists

    - name: Clean up runner archive
      file:
        path: /tmp/actions-runner.tar.gz
        state: absent

    - name: Check if runner is already configured
      stat:
        path: "{{ runner_dir }}/.runner"
      register: runner_configured

    - name: Get runner registration token from GitHub API
      uri:
        url: "{{ runner_repo_url | regex_replace('https://github.com/', 'https://api.github.com/repos/') }}/actions/runners/registration-token"
        method: POST
        headers:
          Authorization: "Bearer {{ github_runner_token }}"
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        status_code: 201
      register: reg_token_response
      when:
        - not runner_configured.stat.exists
        - github_runner_token is match('^(ghp_|github_pat_)')
      no_log: true
      failed_when: false

    - name: Set registration token
      set_fact:
        runner_reg_token: >-
          {{
            reg_token_response.json.token
            if (reg_token_response is not skipped
                and reg_token_response.json is defined
                and reg_token_response.json.token is defined)
            else github_runner_token
          }}
      when: not runner_configured.stat.exists
      no_log: true

    - name: Configure runner (register with GitHub)
      become_user: "{{ runner_user }}"
      shell: |
        {{ runner_dir }}/config.sh \
          --url     {{ runner_repo_url }} \
          --token   {{ runner_reg_token }} \
          --name    {{ cluster_name }} \
          --labels  {{ runner_labels }} \
          --work    _work \
          --replace \
          --unattended
      args:
        chdir: "{{ runner_dir }}"
      when: not runner_configured.stat.exists
      no_log: true

    - name: Install runner as systemd service
      shell: |
        SVC_NAME="actions.runner.{{ cluster_name }}.service"
        if [ -f "/etc/systemd/system/$SVC_NAME" ]; then
          echo "Service already installed"
          exit 0
        fi
        cat > "/etc/systemd/system/$SVC_NAME" << 'UNIT'
        [Unit]
        Description=GitHub Actions Runner ({{ cluster_name }})
        After=network.target

        [Service]
        ExecStart={{ runner_dir }}/run.sh
        WorkingDirectory={{ runner_dir }}
        KillMode=process
        KillSignal=SIGTERM
        TimeoutStopSec=5min
        User={{ runner_user }}
        Restart=always
        RestartSec=5

        [Install]
        WantedBy=multi-user.target
        UNIT
        # Remove leading whitespace from heredoc
        sed -i 's/^        //' "/etc/systemd/system/$SVC_NAME"
        systemctl daemon-reload
        systemctl enable "$SVC_NAME"
        echo "Service installed: $SVC_NAME"
      args:
        chdir: "{{ runner_dir }}"

    - name: Start runner service
      shell: |
        systemctl start "actions.runner.{{ cluster_name }}.service"
        systemctl status "actions.runner.{{ cluster_name }}.service" --no-pager || true
      args:
        chdir: "{{ runner_dir }}"
      register: svc_start
      changed_when: true
      failed_when: false

    - name: Verify runner service is active
      shell: |
        sleep 5
        STATUS=$(systemctl is-active "actions.runner.{{ cluster_name }}.service")
        echo "$STATUS"
        if [ "$STATUS" = "active" ] || [ "$STATUS" = "activating" ]; then
          exit 0
        fi
        exit 1
      register: svc_status
      changed_when: false

    - name: Show runner status
      debug:
        msg: "Runner '{{ cluster_name }}' registered at {{ runner_repo_url }} — {{ svc_status.stdout | default('running') }}"

    - name: Register runner to additional repos
      when: runner_additional_repos | default('') != ''
      block:
        - name: Process each additional repo
          shell: |
            set -e
            RUNNER_DIR="{{ runner_dir }}"
            RUNNER_USER="{{ runner_user }}"
            TOKEN="{{ github_runner_token }}"
            LABELS="{{ runner_labels }}"
            CLUSTER="{{ cluster_name }}"

            for REPO_URL in $(echo "{{ runner_additional_repos }}" | tr ',' '\n'); do
              [ -z "$REPO_URL" ] && continue
              SAFE=$(echo "$REPO_URL" | sed 's|https://github.com/||;s|/|-|g')
              RUNNER_DIR2="/opt/github-runner-${SAFE}"

              echo "==> Registering to: $REPO_URL"

              # Copy runner binaries
              sudo mkdir -p "$RUNNER_DIR2"
              sudo cp -a "$RUNNER_DIR/bin" "$RUNNER_DIR2/"
              sudo cp -a "$RUNNER_DIR/externals" "$RUNNER_DIR2/"
              for f in run.sh run-helper.sh safe_sleep.sh config.sh env.sh svc.sh; do
                [ -f "$RUNNER_DIR/$f" ] && sudo cp "$RUNNER_DIR/$f" "$RUNNER_DIR2/" || true
              done
              sudo chown -R {{ runner_user }}:{{ runner_user }} "$RUNNER_DIR2"

              # Get registration token
              API_REPO=$(echo "$REPO_URL" | sed 's|https://github.com/||')
              REG_TOKEN=$(curl -fsSL \
                -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$API_REPO/actions/runners/registration-token" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['token'])" 2>/dev/null)

              # Configure
              sudo -u {{ runner_user }} "$RUNNER_DIR2/config.sh" \
                --url "$REPO_URL" --token "$REG_TOKEN" \
                --name "$CLUSTER" --labels "$LABELS" \
                --work _work --replace --unattended

              # Install service
              SVC_NAME="actions.runner.$(echo $SAFE).${CLUSTER}.service"
              if [ ! -f "/etc/systemd/system/$SVC_NAME" ]; then
                printf '[Unit]\nDescription=GitHub Actions Runner\nAfter=network.target\n\n[Service]\nExecStart=%s/run.sh\nWorkingDirectory=%s\nKillMode=process\nKillSignal=SIGTERM\nTimeoutStopSec=5min\nUser={{ runner_user }}\nRestart=always\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\n' \
                  "$RUNNER_DIR2" "$RUNNER_DIR2" > "/etc/systemd/system/$SVC_NAME"
                systemctl daemon-reload
                systemctl enable "$SVC_NAME"
              fi
              systemctl restart "$SVC_NAME" || systemctl start "$SVC_NAME"
              echo "==> Runner registered and started for $REPO_URL"
            done
          become: true
          no_log: true

# ---------------------------------------------------------------------------
# Play 2 — Distribute runner SSH key to cluster PVE nodes
# ---------------------------------------------------------------------------
- name: Distribute runner SSH key to cluster nodes
  hosts: cluster_nodes
  gather_facts: false

  tasks:
    - name: Get runner public key from runner VM
      set_fact:
        runner_pubkey: "{{ hostvars[groups['runner_vms'][0]]['runner_pubkey'] }}"

    - name: Authorize runner SSH key on PVE node
      authorized_key:
        user: root
        key: "{{ runner_pubkey }}"
        state: present
        comment: "github-runner-{{ cluster_name }}"

    - name: Confirm key distribution
      debug:
        msg: "Runner SSH key authorized on {{ inventory_hostname }}"
