---
# Install and configure OpenBao on a cloud-init Ubuntu VM.
#
# Expects inventory with:
#   - openbao_vms group: the OpenBao VM (ubuntu user)
#   - Variables: cluster_name, openbao_vm_id

- name: Configure OpenBao vault
  hosts: openbao_vms
  gather_facts: false
  become: true
  vars:
    bao_version: "2.2.0"
    bao_user: openbao
    bao_group: openbao
    bao_dir: /opt/openbao
    bao_data_dir: /opt/openbao/data
    bao_config_dir: /etc/openbao
    bao_bin: /usr/bin/bao
    bao_init_output: /opt/openbao/init-output.json
    bao_unseal_key_file: /opt/openbao/unseal-key

  tasks:
    - name: Wait for cloud-init to complete
      raw: "cloud-init status --wait 2>/dev/null || timeout 180 bash -c 'while [ ! -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done'"
      changed_when: false
      retries: 3
      delay: 15
      register: cloud_init_wait
      until: cloud_init_wait is succeeded

    - name: Wait for SSH to become fully operational
      wait_for_connection:
        timeout: 300
        sleep: 10
        delay: 5
        connect_timeout: 15

    - name: Gather facts
      setup:

    - name: Wait for dpkg lock to be free
      raw: "timeout 120 bash -c 'while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done' || true"
      changed_when: false

    - name: Fix any broken dpkg state
      raw: "dpkg --configure -a 2>/dev/null || true"
      changed_when: false

    - name: Fix broken apt dependencies
      raw: "apt-get -y --fix-broken install 2>/dev/null || true"
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 0
      retries: 3
      delay: 10
      register: apt_update
      until: apt_update is succeeded

    - name: Create swap file if memory is low
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi
      changed_when: false

    - name: Install required packages
      apt:
        name:
          - curl
          - jq
          - unzip
          - python3
          - gpg
        state: present
      retries: 3
      delay: 10

    # -----------------------------------------------------------------------
    # Install OpenBao binary
    # -----------------------------------------------------------------------
    - name: Check if OpenBao is already installed
      stat:
        path: "{{ bao_bin }}"
      register: bao_installed

    - name: Download OpenBao
      get_url:
        url: "https://github.com/openbao/openbao/releases/download/v{{ bao_version }}/bao_{{ bao_version }}_linux_amd64.deb"
        dest: "/tmp/openbao.deb"
        mode: "0644"
      when: not bao_installed.stat.exists
      retries: 3
      delay: 10

    - name: Install OpenBao deb package
      apt:
        deb: /tmp/openbao.deb
        state: present
      when: not bao_installed.stat.exists

    - name: Clean up deb
      file:
        path: /tmp/openbao.deb
        state: absent

    - name: Verify OpenBao binary
      command: bao version
      register: bao_ver
      changed_when: false

    - name: Show OpenBao version
      debug:
        msg: "{{ bao_ver.stdout }}"

    # -----------------------------------------------------------------------
    # Create user and directories
    # -----------------------------------------------------------------------
    - name: Create openbao group
      group:
        name: "{{ bao_group }}"
        system: true
        state: present

    - name: Create openbao user
      user:
        name: "{{ bao_user }}"
        group: "{{ bao_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ bao_dir }}"
        create_home: false

    - name: Create OpenBao directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ bao_user }}"
        group: "{{ bao_group }}"
        mode: "0750"
      loop:
        - "{{ bao_dir }}"
        - "{{ bao_data_dir }}"
        - "{{ bao_config_dir }}"

    # -----------------------------------------------------------------------
    # Configure OpenBao
    # -----------------------------------------------------------------------
    - name: Ensure Ansible temp directory is clean
      raw: "rm -rf /tmp/.ansible && mkdir -p /tmp/.ansible && chmod 777 /tmp/.ansible"
      changed_when: false

    - name: Write OpenBao configuration
      copy:
        dest: "{{ bao_config_dir }}/openbao.hcl"
        owner: "{{ bao_user }}"
        group: "{{ bao_group }}"
        mode: "0640"
        content: |
          ui = true

          storage "file" {
            path = "{{ bao_data_dir }}"
          }

          listener "tcp" {
            address     = "0.0.0.0:8200"
            tls_disable = true
          }

          api_addr     = "http://{{ ansible_default_ipv4.address }}:8200"
          cluster_addr = "http://{{ ansible_default_ipv4.address }}:8201"

          disable_mlock = true
      notify: restart openbao

    # -----------------------------------------------------------------------
    # Systemd service
    # -----------------------------------------------------------------------
    - name: Write systemd service
      copy:
        dest: /etc/systemd/system/openbao.service
        mode: "0644"
        content: |
          [Unit]
          Description=OpenBao Secret Management
          Documentation=https://openbao.org/docs/
          Requires=network-online.target
          After=network-online.target
          ConditionFileNotEmpty={{ bao_config_dir }}/openbao.hcl

          [Service]
          User={{ bao_user }}
          Group={{ bao_group }}
          ExecStart={{ bao_bin }} server -config={{ bao_config_dir }}/openbao.hcl
          ExecReload=/bin/kill --signal HUP $MAINPID
          KillMode=process
          KillSignal=SIGINT
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65536
          LimitMEMLOCK=infinity

          [Install]
          WantedBy=multi-user.target
      notify: restart openbao

    - name: Enable and start openbao service
      systemd:
        name: openbao
        enabled: true
        state: started
        daemon_reload: true

    # Flush handlers NOW so any pending restart runs BEFORE init/unseal.
    # Without this, the restart handler fires at end-of-play and re-seals the vault.
    - meta: flush_handlers

    - name: Wait for OpenBao to be ready
      uri:
        url: "http://127.0.0.1:8200/v1/sys/health"
        method: GET
        status_code: [200, 429, 472, 473, 501]
      register: bao_health
      retries: 30
      delay: 5
      until: bao_health.status in [200, 429, 472, 473, 501]

    # -----------------------------------------------------------------------
    # Initialize (only if not already initialized)
    # -----------------------------------------------------------------------
    - name: Check if already initialized
      uri:
        url: "http://127.0.0.1:8200/v1/sys/health"
        method: GET
        status_code: [200, 429, 472, 473, 501]
      register: init_check

    - name: Initialize OpenBao
      shell: |
        bao operator init \
          -key-shares=1 \
          -key-threshold=1 \
          -format=json > {{ bao_init_output }}
        chmod 600 {{ bao_init_output }}
        chown {{ bao_user }}:{{ bao_group }} {{ bao_init_output }}
      environment:
        BAO_ADDR: "http://127.0.0.1:8200"
      when: init_check.status == 501
      register: init_result

    - name: Extract unseal key for auto-unseal
      shell: |
        python3 -c "import json; d=json.load(open('{{ bao_init_output }}')); print(d['unseal_keys_b64'][0])" > {{ bao_unseal_key_file }}
        chmod 600 {{ bao_unseal_key_file }}
        chown {{ bao_user }}:{{ bao_group }} {{ bao_unseal_key_file }}
      when: init_result is changed

    # -----------------------------------------------------------------------
    # Auto-unseal on boot (systemd pre-start)
    # -----------------------------------------------------------------------
    - name: Write auto-unseal script
      copy:
        dest: /opt/openbao/auto-unseal.sh
        owner: "{{ bao_user }}"
        group: "{{ bao_group }}"
        mode: "0750"
        content: |
          #!/bin/bash
          # Auto-unseal OpenBao after service starts
          BAO_ADDR="http://127.0.0.1:8200"
          UNSEAL_KEY_FILE="{{ bao_unseal_key_file }}"
          export BAO_ADDR

          if [ ! -f "$UNSEAL_KEY_FILE" ]; then
            echo "No unseal key file found — skipping auto-unseal"
            exit 0
          fi

          UNSEAL_KEY=$(cat "$UNSEAL_KEY_FILE")

          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$BAO_ADDR/v1/sys/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "OpenBao already unsealed"
              exit 0
            elif [ "$STATUS" = "503" ]; then
              echo "OpenBao is sealed — unsealing..."
              bao operator unseal "$UNSEAL_KEY" >/dev/null 2>&1
              echo "Unseal command sent"
              exit 0
            fi
            sleep 2
          done
          echo "WARN: Could not reach OpenBao for auto-unseal"

    - name: Write auto-unseal systemd service
      copy:
        dest: /etc/systemd/system/openbao-unseal.service
        mode: "0644"
        content: |
          [Unit]
          Description=Auto-unseal OpenBao
          After=openbao.service
          Requires=openbao.service

          [Service]
          Type=oneshot
          ExecStart=/opt/openbao/auto-unseal.sh
          User={{ bao_user }}
          Group={{ bao_group }}
          RemainAfterExit=true

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start auto-unseal service
      systemd:
        name: openbao-unseal
        enabled: true
        state: started
        daemon_reload: true

    # -----------------------------------------------------------------------
    # Unseal now (if sealed)
    # -----------------------------------------------------------------------
    - name: Check seal status
      uri:
        url: "http://127.0.0.1:8200/v1/sys/health"
        method: GET
        status_code: [200, 429, 503]
      register: seal_check

    - name: Unseal OpenBao
      shell: |
        UNSEAL_KEY=$(cat {{ bao_unseal_key_file }})
        bao operator unseal "$UNSEAL_KEY"
      environment:
        BAO_ADDR: "http://127.0.0.1:8200"
      when: seal_check.status == 503

    - name: Wait for OpenBao to be active and unsealed
      uri:
        url: "http://127.0.0.1:8200/v1/sys/health"
        method: GET
        status_code: 200
      register: final_health
      retries: 20
      delay: 3
      until: final_health.status == 200

    # -----------------------------------------------------------------------
    # Configure KV secrets engine and dummy data
    # -----------------------------------------------------------------------
    - name: Read root token
      shell: "python3 -c \"import json; d=json.load(open('{{ bao_init_output }}')); print(d['root_token'])\""
      register: root_token_result
      changed_when: false
      no_log: true

    - name: Set root token fact
      set_fact:
        bao_root_token: "{{ root_token_result.stdout | trim }}"
      no_log: true

    - name: Check if KV engine is already enabled
      uri:
        url: "http://127.0.0.1:8200/v1/sys/mounts"
        method: GET
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
        status_code: 200
      register: mounts_check
      no_log: true

    - name: Enable KV v2 secrets engine
      uri:
        url: "http://127.0.0.1:8200/v1/sys/mounts/secret"
        method: POST
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          type: "kv"
          options:
            version: "2"
        status_code: [200, 204]
      when: "'secret/' not in mounts_check.json"
      no_log: true

    - name: Write dummy secret — database/config
      # Demo placeholder — real credentials are managed by seed-openbao-authentik.sh
      uri:
        url: "http://127.0.0.1:8200/v1/secret/data/database/config"
        method: POST
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          data:
            username: "db_admin"
            password: "DEMO-PLACEHOLDER-replace-before-use"
            host: "10.25.0.50"
            port: "5432"
            database: "infraweaver"
        status_code: [200, 204]
      no_log: true

    - name: Write dummy secret — api/keys
      # Demo placeholder — real credentials are managed via OpenBao UI or seed scripts
      uri:
        url: "http://127.0.0.1:8200/v1/secret/data/api/keys"
        method: POST
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          data:
            api_key: "DEMO-PLACEHOLDER-replace-before-use"
            api_secret: "DEMO-PLACEHOLDER-replace-before-use"
            webhook_url: "https://hooks.example.com/infraweaver"
        status_code: [200, 204]
      no_log: true

    - name: Write dummy secret — app/config
      uri:
        url: "http://127.0.0.1:8200/v1/secret/data/app/config"
        method: POST
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          data:
            app_name: "InfraWeaver"
            environment: "ontwikkel"
            debug: "true"
            log_level: "info"
            admin_email: "admin@infraweaver.local"
        status_code: [200, 204]
      no_log: true

    - name: Write platform/grafana secret
      uri:
        url: "http://127.0.0.1:8200/v1/secret/data/platform/grafana"
        method: POST
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          data:
            admin-password: "Unified*Presume8*Sudoku*Karate"
        status_code: [200, 204]
      no_log: true

    - name: Write platform/argocd secret
      uri:
        url: "http://127.0.0.1:8200/v1/secret/data/platform/argocd"
        method: POST
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          data:
            admin-password: "Unified*Presume8*Sudoku*Karate"
            admin-password-mtime: "2026-04-26T21:00:00Z"
        status_code: [200, 204]
      no_log: true

    # -----------------------------------------------------------------------
    # Verify secrets are readable
    # -----------------------------------------------------------------------
    - name: Verify dummy secrets — database/config
      uri:
        url: "http://127.0.0.1:8200/v1/secret/data/database/config"
        method: GET
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
        status_code: 200
      register: db_secret
      no_log: true

    - name: Verify dummy secrets — api/keys
      uri:
        url: "http://127.0.0.1:8200/v1/secret/data/api/keys"
        method: GET
        headers:
          X-Vault-Token: "{{ bao_root_token }}"
        status_code: 200
      register: api_secret
      no_log: true

    - name: Show OpenBao status
      debug:
        msg: >-
          OpenBao ready on http://{{ ansible_default_ipv4.address }}:8200
          | Secrets stored: database/config, api/keys, app/config
          | Root token stored at: {{ bao_init_output }}

  handlers:
    - name: restart openbao
      systemd:
        name: openbao
        state: restarted
        daemon_reload: true
