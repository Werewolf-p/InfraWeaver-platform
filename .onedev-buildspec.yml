# .onedev-buildspec.yml — InfraWeaver Platform CI Pipeline
# Triggered on push to main.
# Image builds are handled by the in-cluster CI CronJob (kaniko-based).
# This pipeline only handles the lightweight manifest tag update step.

version: 36

jobs:
- name: Update Manifests
  steps:
  - !CheckoutStep
    name: checkout
    cloneCredential: !DefaultCredential {}
    withLfs: false
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL

  - !CommandStep
    name: update-manifest-tags
    runInContainer: false
    interpreter: !DefaultInterpreter
      commands: |
        #!/usr/bin/env bash
        set -euo pipefail
        SHORT_SHA=$(git rev-parse --short HEAD)
        REGISTRY="onedev.example.com/infraweaver-platform"

        echo "Updating deployment manifests to tag main-${SHORT_SHA}..."

        for APP in api console node; do
          MANIFEST="kubernetes/catalog/infraweaver-${APP}/manifests/deployment.yaml"
          if [ -f "$MANIFEST" ]; then
            sed -i "s|${REGISTRY}/infraweaver-${APP}:[^ ]*|${REGISTRY}/infraweaver-${APP}:main-${SHORT_SHA}|g" \
              "$MANIFEST"
            echo "Updated $MANIFEST"
          fi
        done

        git config user.email "ci@infraweaver.internal"
        git config user.name "InfraWeaver CI"

        git add \
          kubernetes/catalog/infraweaver-api/manifests/deployment.yaml \
          kubernetes/catalog/infraweaver-console/manifests/deployment.yaml \
          kubernetes/catalog/infraweaver-node/manifests/deployment.yaml

        if git diff --cached --quiet; then
          echo "No manifest changes to commit."
        else
          git commit -m "ci: update image tags to main-${SHORT_SHA} [skip ci]"
          git push origin main
          echo "Committed and pushed updated manifest tags."
        fi
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL

  triggers:
  - !BranchUpdateTrigger
    branches: main
    projects: <default>
