catalog:
  # List of catalog apps to install.
  # Core apps (argocd, traefik, external-secrets, authentik, etc.) are always installed.
  # Add or remove entries here to control which optional apps are deployed.
  #
  # Available catalog apps:
  #   wiki             — Wiki.js documentation wiki            (wiki.int.rlservers.com)
  #   uptime-kuma      — Uptime/status monitoring              (uptime-kuma.int.rlservers.com)
  #   gitea            — Self-hosted Git forge                 (gitea.int.rlservers.com)
  #   vaultwarden      — Bitwarden-compatible passwords        (vaultwarden.int.rlservers.com)
  #   it-tools         — IT/Dev tool collection                (it-tools.int.rlservers.com)
  #   stirling-pdf     — PDF manipulation tools                (stirling-pdf.int.rlservers.com)
  #   excalidraw       — Collaborative whiteboard              (excalidraw.int.rlservers.com)
  #   actual           — Personal finance / budgeting          (actual.int.rlservers.com)
  #   n8n              — Workflow automation                   (n8n.int.rlservers.com)
  #   forgejo          — Community Git forge (Gitea fork)      (forgejo.int.rlservers.com)
  #   onedev           — All-in-one DevOps platform (Git+CI)   (onedev.int.rlservers.com)
  #
  # Defined but not yet enabled (manifests still in development):
  #   mealie           — Recipe manager with OIDC              (mealie.int.rlservers.com)
  #   changedetection  — Website change monitoring             (changedetection.int.rlservers.com)
  #   paperless-ngx    — Document management (complex)         (paperless.int.rlservers.com)
  #
  # Optional apps (fully implemented, not enabled by default):
  #   code-server      — VS Code in browser                   (code-server.int.rlservers.com)
  #   jellyfin         — Media server                          (jellyfin.int.rlservers.com)
  #   ntfy             — Push notifications                    (ntfy.int.rlservers.com)
  #   linkding         — Bookmark manager                      (linkding.int.rlservers.com)
  #   navidrome        — Music streaming server                (navidrome.int.rlservers.com)
  #   speedtest-tracker— Internet speed tracking               (speedtest-tracker.int.rlservers.com)
  #   searxng          — Private meta search engine            (searxng.int.rlservers.com)
  #   grocy            — Household & grocery management        (grocy.int.rlservers.com)
  #   immich           — Photo backup & management             (immich.int.rlservers.com)
  #   outline          — Team knowledge base (OIDC)            (outline.int.rlservers.com)
  enabled:
    - wiki
    - gatus
    - stirling-pdf
    - onedev

# ── Persistence (TrueNAS NFS backup for Longhorn volumes) ─────────────────────
persistence:
  truenas:
    # Set to true if you have a TrueNAS instance with NFS available.
    # When enabled, Longhorn backs up all PVCs annotated with
    #   recurring-job-group.longhorn.io/truenas-backup: "enabled"
    # to the NFS share at nfs_ip:/nfs_path nightly.
    #
    # TrueNAS prerequisites (one-time setup):
    #   1. Create dataset: Storage → Pools → Add Dataset "longhorn-backups"
    #   2. Sharing → NFS → Add Share: /mnt/tank/longhorn-backups
    #   3. Set "All Dirs" and network access to 10.10.0.0/24
    #   4. Set Mapall User: root (Longhorn requires root NFS access)
    #
    # Fresh redeploy restore:
    #   Run scripts/restore-from-truenas.sh before deploying apps to
    #   restore the latest backup of each volume from TrueNAS.
    enabled: true
    nfs_ip: "10.25.0.135"
    nfs_path: "/mnt/Main/k8s-longhorn-backups"
