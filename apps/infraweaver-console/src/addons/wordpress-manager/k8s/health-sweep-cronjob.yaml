# WordPress Connector health sweep — hourly, server-driven (§12.5).
#
# Every hour this CronJob POSTs to the console's own /api/wordpress/health-sweep
# endpoint, which runs a signed `health.check` against every commandable link and
# persists the outcome (`lastHealth` + `connectorVersion`) on each link record —
# §5.1 managed links over k8s-exec and §5 external links over the public HTTPS
# command channel (the console pod makes those outbound calls, reusing the same
# egress the manual "Health check" button uses). This keeps the ✓/✗ + "last
# checked" indicator AND the "update available" badge fresh even when no operator
# has the console open — the button on the connector page becomes a manual
# override, not the only trigger.
#
# APPLY NOTES (operator):
#   * The Job runs IN the console's namespace and calls the console Service by
#     its in-cluster DNS name. The values below match the reference deployment
#     (Service `infraweaver-console` on port 3000, namespace `infraweaver-console`).
#     If your console runs elsewhere (some installs use the `infraweaver`
#     namespace), adjust `metadata.namespace` and the curl URL host accordingly.
#   * Auth uses the shared `wordpress-health-cron` Secret (key `token`), which
#     MUST hold the SAME value the console has as its `WORDPRESS_HEALTH_CRON_TOKEN`
#     env var — otherwise the endpoint fails closed (401/403) and the sweep never
#     runs. A committed literal here can never match that env, so this file no
#     longer ships a placeholder Secret: `deploy.sh` sources the token from OpenBao
#     (the same origin ExternalSecrets syncs into the console) and creates the
#     Secret at deploy time. To apply this CronJob by hand, first create the
#     Secret from that shared token, e.g.:
#       kubectl -n infraweaver-console create secret generic wordpress-health-cron \
#         --from-literal=token="$WORDPRESS_HEALTH_CRON_TOKEN"
#     then: kubectl apply -f k8s/health-sweep-cronjob.yaml
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: wordpress-connector-health-sweep
  namespace: infraweaver-console
  labels:
    app.kubernetes.io/managed-by: infraweaver-console
    infraweaver.io/component: iwsl
spec:
  schedule: "0 * * * *" # top of every hour
  concurrencyPolicy: Forbid # never overlap two sweeps
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/managed-by: infraweaver-console
            infraweaver.io/component: iwsl
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: health-sweep
              image: curlimages/curl:8.11.1
              imagePullPolicy: IfNotPresent
              env:
                - name: CRON_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: wordpress-health-cron
                      key: token
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              command: ["/bin/sh", "-c"]
              args:
                - >-
                  curl --fail --silent --show-error --max-time 300
                  -X POST
                  -H "x-internal-cron-token: ${CRON_TOKEN}"
                  -H "Origin: http://infraweaver-console.infraweaver-console.svc.cluster.local:3000"
                  http://infraweaver-console.infraweaver-console.svc.cluster.local:3000/api/wordpress/health-sweep
